id: sm-agent-role-taxonomy
title: Agent Role Taxonomy
purpose: |
  Classify migrated agent profiles by role, actor boundary, inputs, outputs,
  selected tool families, runtime dependencies, and checkable outcomes.

overview: |
  Role entries give migration issues a compact checklist for each profile
  family. The fields identify what enters the profile, what leaves it, and what
  agent-core capability the profile expects at runtime. They also name a small
  set of checks that can later become validation commands, integration targets,
  or documentation review steps.

  The taxonomy is intentionally profile-oriented. It names executor as a
  coding agent, critic as a session and point runner, bench as a human UI
  launcher, and Knowledge Manager as a documentation curator. Those labels
  describe configured behavior. They are not package names, binary names, or
  new runtime modules.

roles:
  - id: executor
    title: Coding agent
    profile_path: agents/executor/profile.yaml
    actor_boundary: model plus workspace tools
    inputs:
      - task prompt
      - mounted workspace
      - selected model config
    selected_tool_families:
      - filesystem
      - llm
      - go exec validation
    runtime_dependencies:
      - agent-core loop runtime
      - agent-core builtin filesystem and LLM tools
      - agent-core exec tool declarations for Go validation
    outputs:
      - workspace changes
      - validation results
      - terminal status
      - task summary
    outcomes:
      - Succeeded
      - Failed
      - BudgetExceeded
    checks:
      - Load profile from AGENT_PROFILES_ROOT.
      - Run mounted profile command with --profile and --directory.
      - Confirm build, lint, and test validation are machine-declared.

  - id: critic
    title: Evaluation session and point runner
    profile_path: agents/critic/profile.yaml
    actor_boundary: suite fixtures plus child agent process
    inputs:
      - suite YAML
      - samples
      - model or profile grid
      - oracle command
    selected_tool_families:
      - critic session
      - critic point
      - child profile execution
    runtime_dependencies:
      - agent-core nested loop execution
      - profile-owned suites and samples
    outputs:
      - point directories
      - oracle results
      - trace token counts
      - metrics
      - session report
    outcomes:
      - Done
      - Failed
    checks:
      - Resolve suite fixtures through AGENT_PROFILES_ROOT.
      - Confirm point machine runs in isolated workspaces.
      - Confirm failed child runs still produce point summaries and metrics.
      - Trace critic to executor with rel07.0-uc002-evaluator-generator-profile-boundary.

  - id: planner
    title: Requirement planner and issue materializer
    profile_path: agents/planner/profile.yaml
    actor_boundary: requirement graph, model, issue queue, and child executor
    inputs:
      - requirement graph
      - SRD context
      - planning model config
    selected_tool_families:
      - planner tools
      - llm
      - Go validation
      - child profile execution
    runtime_dependencies:
      - agent-core planning tool implementations
      - agent-core model boundary
      - issue tracker CLI
    outputs:
      - implementation plan
      - created issue
      - graph status changes
      - validation results
    outcomes:
      - Completed
      - Stalled
      - Paused
      - Failed
    checks:
      - Confirm planner invokes executor as a child profile.
      - Confirm issues are materialized through the issue tracker.
      - Confirm graph terminal states are explicit.
      - Trace planner to executor with rel07.0-uc003-planner-generator-profile-boundary.

  - id: jurist
    title: Specification validator
    profile_path: agents/jurist/profile.yaml
    actor_boundary: local target directory and charter suites
    inputs:
      - target directory
      - charter suite path or paths
      - docs corpus for the built-in spec_corpus suite
    selected_tool_families:
      - specification validation
    runtime_dependencies:
      - agent-core spec validation tools
    outputs:
      - validation report with suite and check provenance
      - pass or fail status
    outcomes:
      - Passed
      - Failed
    checks:
      - Confirm no LLM boundary is selected.
      - Confirm report formatting runs for pass and fail outcomes.
      - Confirm charter suites run deterministically over the target directory.
      - Confirm findings identify suite, check, file, and line when available.

  - id: bench
    title: Human-operated evaluation launcher
    profile_path: agents/bench/profile.yaml
    actor_boundary: human HTTP operator and critic process
    inputs:
      - human UI action
      - experiment configuration
    selected_tool_families:
      - bench UI
      - critic launch
    runtime_dependencies:
      - agent-core bench tools
      - critic profile
    outputs:
      - served UI
      - critic run request
      - launch status
    outcomes:
      - Done
      - Failed
    checks:
      - Confirm serve_ui is the blocking human boundary.
      - Confirm launch_eval delegates session execution to critic.
      - Trace bench to critic with rel07.0-uc004-bench-evaluator-profile-boundary.

  - id: monitor
    title: Embedded monitor REST reader
    profile_path: agents/monitor/profile.yaml
    actor_boundary: supervisor and runtime monitor store
    inputs:
      - cached monitor state
      - control exit request
    selected_tool_families:
      - monitor REST
      - lifecycle control
    runtime_dependencies:
      - agent-core monitor store
      - agent-core REST runtime
    outputs:
      - monitor REST responses
      - listener lifecycle status
    outcomes:
      - Done
      - Failed
    checks:
      - Confirm REST reads use cached monitor state.
      - Confirm exit is routed through configured control.
      - Trace monitor/control status with rel07.0-uc005-monitor-control-profile-boundary.

  - id: documentation-curator
    title: Knowledge Manager documentation curator
    profile_path: agents/knowledge-manager/documentation-curator/profile.yaml
    actor_boundary: human browser, documentation corpus, and local REST API
    inputs:
      - browser request
      - documentation corpus path
      - control request
    selected_tool_families:
      - documentation serving
      - document resources
      - documentation validation
      - patch review
      - lifecycle control
    runtime_dependencies:
      - agent-core documentation host
      - agent-core REST runtime
      - profile-owned UI config and REST definitions
    outputs:
      - served documentation UI
      - document responses
      - validation or suggestion results
      - patch review outcome
      - controlled listener shutdown
    outcomes:
      - Done
      - Failed
    checks:
      - Confirm UI placement stays profile-local.
      - Confirm document resource behavior is configured by profile-owned YAML.
      - Confirm exit releases the documentation listener.
      - Trace profile UX with rel07.0-uc001-documentation-curator-profile-ux.

  # The mesh control plane (srd016, srd017), planned; profiles land with the
  # control-plane release (09.4). The coordinator decides and sequences; the creator
  # acts and holds the deployment-API authority alone.
  - id: coordinator
    title: Mesh control-plane coordinator
    profile_path: agents/coordinator/profile.yaml
    actor_boundary: the UX agent (chatbot) and the creator
    status: planned
    inputs:
      - provisioning intent from the UX agent
      - per-operation status from the creator
    selected_tool_families:
      - machine_request intent server
      - REST client to the creator
      - monitor and control servers
    runtime_dependencies:
      - agent-core request runtime
      - agent-core REST client transport
      - profile-owned intent endpoint and workflow machines
    outputs:
      - sequenced instance requests to the creator
      - decided values and config changes
      - aggregated status for the provisioning panel
    outcomes:
      - Done
      - Failed
    checks:
      - Confirm every instance operation is a declared-client request to the creator, never a direct deployment-API or run_agent call (srd016 R4).
      - Confirm the coordinator holds no deployment-API credentials and authenticates apart from chat.
      - Trace the control plane with rel09.4-uc001-control-plane-provisioning.

  - id: creator
    title: Mesh control-plane creator
    profile_path: agents/creator/profile.yaml
    actor_boundary: the coordinator, the deployment API, and child agent runs
    status: planned
    inputs:
      - decided instance operation from the coordinator
      - monitor reads for health verification
    selected_tool_families:
      - machine_request instance server
      - REST client to the deployment API
      - monitor reads
      - child run creation
    runtime_dependencies:
      - agent-core request runtime
      - agent-core REST client transport and monitor reads
      - profile-owned instance endpoint and template resolution
    outputs:
      - created child ingest runs
      - checkpoint-resume rollout restarts
      - post-operation health reported to the coordinator
    outcomes:
      - Done
      - Failed
    checks:
      - Confirm the creator alone holds the deployment-API credentials and passes no endpoint or credential into a running agent (srd017 R5, srd028 V30).
      - Confirm the creator makes no values or workflow decision (srd017 R6).
      - Trace the control plane with rel09.4-uc001-control-plane-provisioning.


# Conformance grammar fixtures, not roles (GH-328). Their only executors are the
# conformance tests and the monitor/control mage integration target; they prove
# REST boundary words, control signals, and checkpoint/suspend/resume vocabulary
# at runtime. They live under testdata/conformance/, outside the agents/ role
# catalog. The mesh (srd014) gives each agent embedded monitor/control servers via
# its own rest.yaml rather than deploying these standalone profiles.
conformance_fixtures:
  - id: rest
    title: REST boundary sample
    profile_path: testdata/conformance/rest/profile.yaml
    actor_boundary: configured HTTP clients and servers
    inputs:
      - REST definitions
      - OpenAPI import data
      - inbound webhook event
    selected_tool_families:
      - REST client
      - REST async client
      - REST server
    runtime_dependencies:
      - agent-core REST runtime
      - profile-owned rest.yaml
    outputs:
      - response signals
      - async completion
      - webhook event signal
      - listener lifecycle status
    outcomes:
      - Succeeded
      - Failed
    checks:
      - Confirm REST authority lives in rest.yaml.
      - Confirm server launch, await, and stop are explicit machine states.

  - id: control
    title: REST lifecycle control profile
    profile_path: testdata/conformance/control/profile.yaml
    actor_boundary: lifecycle supervisor
    inputs:
      - REST control request
    selected_tool_families:
      - control REST
      - exit_agent
    runtime_dependencies:
      - agent-core REST runtime
      - agent-core lifecycle vocabulary
    outputs:
      - selected control signal
      - AgentExited signal
      - terminal status
    outcomes:
      - Succeeded
      - Failed
    checks:
      - Confirm HTTP handlers enqueue signals only.
      - Confirm MachineSpec routes ExitRequested to exit_agent.
      - Trace monitor/control status with rel07.0-uc005-monitor-control-profile-boundary.

  - id: lifecycle
    title: Checkpoint, rollback, and approval profiles
    profile_path: testdata/conformance/lifecycle/*/profile.yaml
    actor_boundary: operator, checkpoint store, and workspace
    inputs:
      - checkpoint ID
      - target iteration
      - approval signal
    selected_tool_families:
      - checkpoint_history
      - checkpoint_rollback
      - suspend
      - done
    runtime_dependencies:
      - agent-core lifecycle ports
      - checkpoint store
      - receipt-backed rollback (opaque persisted receipts, receipt-walk Undo)
    outputs:
      - history report
      - rewritten checkpoint
      - suspended checkpoint
      - approved or rejected terminal state
    outcomes:
      - Done
      - Succeeded
      - Rejected
      - Failed
    checks:
      - Confirm lifecycle behavior is expressed as machine actions.
      - Confirm approval uses resume signals instead of hidden CLI branches.

taxonomy_rules:
  - Each role is a configured program, not a Go package.
  - Conformance grammar fixtures (rest, control, lifecycle) are not roles; they live under testdata/conformance/ and prove runtime vocabulary, keeping agents/ a role catalog (GH-328).
  - Actor boundaries name who or what crosses the profile boundary.
  - Runtime dependencies name agent-core capabilities without copying them into
    agent-profiles.
  - Checks name validation, mounted execution, integration proof, or
    documentation review paths.
  - Rel07 integration checks point at implemented cases in
    test-rel07.0-profile-integrations.
