id: test-rel03.0-mesh-deployment
title: Test Suite for Release 03.0 Mesh Deployment and Tiered Swap
release: "03.0"

overview: |
  This suite validates the Helm deployment of the mesh (srd003): the kind deploy
  smoke, the values-to-config co-generation drift lock, and the tiered hot swap
  (repoint and add-RAG rollout). The kind-cluster tracers skip cleanly without
  docker/kind/helm/kubectl; the co-generation tracers run without a cluster. The
  provisioning deployment API belongs to the control-plane surface (coordinator, creator, executor) and is out of scope for this data-plane suite.

traces:
  - rel03.0-uc001-mesh-deployment

preconditions:
  - agent-core is available as AGENT_CORE_ROOT or a sibling ../agent-core checkout.
  - A kind cluster and docker/helm/kubectl are available for the on-cluster tracers, and the rel06.0 runtime image is loadable.
  - The example owns the deployment chart (examples/chatbot-mesh/helm) and the chatbot/RAG profiles named by the tracers.

test_cases:
  - use_case: rel03.0-uc001-mesh-deployment
    name: Mesh Helm deployment smoke tracer on kind
    integration_target: mage integration:helmSmoke
    go_test: go test ./magefiles -run 'TestSplitImageRef|TestJaegerAgentServices|TestAssertSmoke|TestHelmSmoke'
    status: implemented
    description: |
      Integration.HelmSmoke deploys the chatbot-mesh chart on a disposable kind
      cluster with the ci values (one RAG unit, external Ollama). It builds the
      rel06.0 runtime image from the local agent-core checkout and kind-loads it,
      stages the chatbot and rag-server profiles into the chart ConfigMap, helm
      installs and waits for every Deployment and StatefulSet ready, port-forwards
      the chatbot chat Service, posts one chat turn and asserts a served answer,
      and queries Jaeger for spans from more than one service (each agent reports a
      distinct service.name via --otel-service-name). Teardown deletes the cluster
      in all paths; the target skips cleanly when the toolchain or models are
      absent.
    inputs:
      chart: examples/chatbot-mesh/helm/
      values: examples/chatbot-mesh/helm/ci/kind-values.yaml
      values_rag_list: [rag0]
    expected:
      chart_deploys_full_mesh: true
      chat_turn_served: true
      spans_from_multiple_services: true
      skips_clean_without_toolchain: true
    traces:
      - rel03.0-uc001-mesh-deployment S1
      - srd003-chatbot-deployment AC1
      - srd003-chatbot-deployment AC5

  - use_case: rel03.0-uc001-mesh-deployment
    name: Chatbot rest.yaml co-generation drift lock
    integration_target: mage integration:helmSmoke
    go_test: go test ./magefiles -run 'TestChatbotRestCoGenerated|TestChatbotUXMonitored|TestChatbotFanOutCoGeneratedForNRags'
    status: implemented
    description: |
      Locks srd003 R2: the chatbot rest.yaml, ux.yaml, request-machine.yaml, and
      request-fanout.yaml are rendered from the ragUnits list into the profiles
      ConfigMap, overriding the packaged keys, so the RAG client entries, the
      provider egress allowlist, the monitor_proxy upstreams, the monitored-agents
      list, and the N-RAG fan-out chain derive from the same list that creates the
      RAG objects and cannot drift. A helm template render with a three-RAG values
      set is asserted to carry exactly those clients, upstreams, and Retrieving
      states with no stale entry, the chatbot servers bind 0.0.0.0, and the
      co-generated profile passes --validate-config (the init-container gate).
    inputs:
      chart: examples/chatbot-mesh/helm/
      values_rag_list: [alpha, bravo, charlie]
    expected:
      client_config_cogenerated: true
      one_client_and_fanout_state_per_rag_unit: true
      no_drifted_or_stale_client: true
      rendered_profile_validates: true
    traces:
      - rel03.0-uc001-mesh-deployment S2
      - srd003-chatbot-deployment AC2

  - use_case: rel03.0-uc001-mesh-deployment
    name: Mesh hot-swap tracer on kind
    integration_target: mage integration:helmSwap
    go_test: go test ./magefiles -run TestChatbotFanOutCoGeneratedForNRags
    status: implemented
    description: |
      Integration.HelmSwap proves the tiered-swap rollout mechanics on a kind
      cluster. Repointing a rag Service selector leaves the chatbot pod unchanged
      (R3.1); adding a RAG stands up the new unit, re-renders the co-generated
      rest.yaml with the new client (locked by the drift test), and rolls the
      chatbot Deployment via its checksum/profiles annotation (R3.2). The target
      asserts the rollout infrastructure contracts (pod identity, workload
      existence, ConfigMap breadth, rolled generation) via kubectl and helm, so it
      needs docker/kind/helm/kubectl but not Ollama; it skips cleanly otherwise and
      deletes the cluster in all paths. It does not prove checkpoint-resume: the
      chart renders --dolt-dsn but not --resume-checkpoint, and no restored
      pre-rollout state is observed. The R3.2 resume-checkpoint rendering and a
      Dolt state-restored-after-rollout tracer are not covered here.
    inputs:
      chart: examples/chatbot-mesh/helm/
      values_rag_list: [rag0]
      swap_repoint: rag0 Service selector change
      swap_add: rag1 values entry
    expected:
      repoint_leaves_chatbot_pod_unchanged: true
      add_rag_rerenders_and_rolls_chatbot: true
    traces:
      - rel03.0-uc001-mesh-deployment S3
      - srd003-chatbot-deployment AC3
