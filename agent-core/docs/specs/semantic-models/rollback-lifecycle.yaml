id: sm-rollback-lifecycle
title: Rollback Lifecycle Semantic Model

purpose: |
  Models the runtime lifecycle for checkpointing, suspend/resume, approval
  gates, and rollback traversal. The model keeps agent state, command/domain
  state, and workspace/environment state separate so each layer can be stored
  and restored by the mechanism that fits it.

requirements_source:
  - docs/specs/software-requirements/srd025-rollback-lifecycle.yaml
  - roll-backs.md

primary_entities:
  - name: Loop
    kind: runtime
    responsibility: Drives MachineSpec transitions, dispatches Command values, records RunResult and optional History.
    owns: [agent_state]
    references: [StateStore, Workspace, CheckpointPolicy]
  - name: RunResult
    kind: runtime_record
    responsibility: Captures final status, counters, events, cost, terminal state, and summary.
    owns: [agent_state_summary]
  - name: Command
    kind: executable_word
    responsibility: Executes one tool action and exposes Undo for command-owned state restoration.
    owns: [command_domain_state_delta]
  - name: StateStore
    kind: storage_port
    responsibility: Persists JSON blobs for checkpoints, history, agent snapshots, and domain snapshots.
    owns: [serialized_agent_state, serialized_command_domain_state]
  - name: FileStore
    kind: storage_adapter
    responsibility: Stores StateStore keys as JSON files under a configured root.
    implements: StateStore
  - name: Workspace
    kind: environment_port
    responsibility: Checkpoints, restores, and reports external workspace/environment refs.
    owns: [workspace_environment_state]
  - name: GitWorkspace
    kind: environment_adapter
    responsibility: Implements Workspace with git commits, reset, and HEAD refs.
    implements: Workspace
  - name: CheckpointPolicy
    kind: decision_policy
    responsibility: Decides whether a lifecycle event should produce a checkpoint.
  - name: Checkpoint
    kind: persisted_record
    responsibility: Binds agent snapshot, optional command/domain snapshots, optional WorkspaceRef, and HistoryDigest.
  - name: HistoryEntry
    kind: execution_record
    responsibility: Records one dispatched command step for inspection and reverse traversal.
  - name: History
    kind: ordered_log
    responsibility: Preserves HistoryEntry order for forward replay/inspection and backward rollback.
  - name: MachineSpec
    kind: declarative_program
    responsibility: Defines states, signals, and actions; expresses approval/suspend routing.
  - name: ToolDef
    kind: tool_contract
    responsibility: Declares tool side effects, reversibility, undo, errors, and relationships.
  - name: ToolSpec
    kind: runtime_manifest_entry
    responsibility: Exposes selected tool metadata and parameters to runtime/LLM-visible callers.

state_layers:
  agent_state:
    owner: Loop
    examples:
      - current State and current Signal
      - iteration count and budget counters
      - token/cost counters
      - RunResult accumulator
      - terminal or suspended status
    storage: StateStore JSON through AgentSnapshot inside Checkpoint.
    not_stored_in: Workspace git refs
  command_domain_state:
    owner: Command or domain-specific runtime object
    examples:
      - Conversation message history
      - planner CurrentTask and CurrentPlan
      - evaluator session iterator
      - PointContext test/token/version fields
    storage: StateStore JSON snapshots or command-owned pre-execution state.
    restore: Command.Undo or explicit domain restore hook.
  workspace_environment_state:
    owner: Workspace
    examples:
      - files changed by write/edit
      - generated artifacts
      - child-agent workspace mutations
      - git index and commits in evaluator point workspaces
    storage: WorkspaceRef, usually a GitWorkspace commit SHA.
    restore: Workspace.Restore(ref)

ownership_rules:
  - GitWorkspace owns filesystem snapshots only; it never serializes conversation, state-machine position, or domain objects.
  - StateStore owns JSON blobs only; it does not attempt to represent a filesystem tree.
  - Commands own their own Undo semantics because only the command knows which command/domain state it changed.
  - Loop owns traversal order and lifecycle status, but not domain-specific compensation logic.
  - MachineSpec owns visible control flow such as approval gates; checkpointing itself is storage/lifecycle behavior around the machine.

data_flow:
  normal_execution: |
    Loop steps MachineSpec, dispatches Command, receives Result, appends
    RunResult event and optional HistoryEntry, then transitions on Result.Signal.
  checkpoint_capture: |
    CheckpointPolicy approves a lifecycle event. Loop builds AgentSnapshot,
    commands/domains provide optional JSON state, Workspace supplies optional
    CurrentRef or Checkpoint ref, and StateStore persists the Checkpoint.
  rollback_traversal: |
    Rollback walks History backward, calls Command.Undo for command/domain
    state, and restores Workspace to the target workspace ref.
  resume_restore: |
    Resume loads Checkpoint from StateStore, validates MachineSpec/tool
    compatibility, restores command/domain state, restores Workspace, and
    re-enters Loop at the checkpointed agent state.

lifecycle_diagrams:
  checkpoint: |
    ```mermaid
    sequenceDiagram
      participant L as Loop
      participant P as CheckpointPolicy
      participant C as Command/Domain
      participant W as Workspace
      participant S as StateStore
      L->>P: ShouldCheckpoint(event)
      P-->>L: yes
      L->>C: collect domain snapshot
      C-->>L: domain JSON
      L->>W: Checkpoint or CurrentRef
      W-->>L: workspace ref
      L->>S: Save(checkpoint/<id>, Checkpoint JSON)
    ```
  suspend: |
    ```mermaid
    stateDiagram-v2
      [*] --> Running
      Running --> AwaitingApproval: machine action emits AwaitApproval
      AwaitingApproval --> Checkpointing: lifecycle enabled
      Checkpointing --> Suspended: StateStore Save succeeds
      AwaitingApproval --> Failed: required checkpoint cannot be saved
    ```
  resume: |
    ```mermaid
    sequenceDiagram
      participant R as Resume
      participant S as StateStore
      participant W as Workspace
      participant L as Loop
      R->>S: Load(checkpoint/<id>)
      S-->>R: Checkpoint JSON
      R->>R: validate machine/tool compatibility
      R->>W: Restore(workspaceRef)
      W-->>R: restored
      R->>L: start from AgentSnapshot
    ```
  rollback: |
    ```mermaid
    flowchart TD
      A[Current HistoryEntry] --> B{Reached target?}
      B -- no --> C[Call Command.Undo]
      C --> D{Undo ok?}
      D -- yes --> E[Move to previous entry]
      E --> B
      D -- no --> F[Report partial rollback]
      B -- yes --> G[Restore Workspace target ref]
      G --> H[Return resumable agent state]
    ```
  failure_handling: |
    ```mermaid
    flowchart LR
      A[Lifecycle failure] --> B{Failure class}
      B --> C[StateStore error]
      B --> D[Command Undo error]
      B --> E[Workspace restore error]
      B --> F[Checkpoint incompatibility]
      C --> G[Report key and backing store]
      D --> H[Report command and remaining state]
      E --> I[Report ref and workspace path]
      F --> J[Refuse resume or rollback]
    ```

invariants:
  - Agent state, command/domain state, and workspace/environment state are independent layers.
  - Workspace git refs do not serialize agent state or command/domain state.
  - StateStore JSON blobs do not replace Workspace refs for filesystem restoration.
  - Rollback traverses History in reverse dispatch order.
  - Command.Undo restores command/domain state; Workspace.Restore restores workspace/environment state.
  - Lifecycle features are opt-in and preserve existing behavior when StateStore, Workspace, and CheckpointPolicy are disabled.
  - Approval gates and suspend paths are visible as MachineSpec transitions and signals.

non_goals:
  - Defining concrete CLI syntax for history, rollback, or resume commands.
  - Requiring every existing command to have specialized Undo before lifecycle infrastructure lands.
  - Treating git as the storage layer for conversation or state-machine position.
  - Hiding approval or suspend routing inside a composite tool.

