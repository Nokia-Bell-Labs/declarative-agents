tools:
- name: format_report
  type: builtin
  init: format_report
  visibility: internal
  emits:
  - ToolDone
  - ToolFailed
  - CommandError
  description: Format the validation results as a human-readable report.
  category: word
  side_effects:
  - kind: none
    description: Formats validation state into command output without mutating state.
  reversibility:
    classification: reversible
    undo: noop
  undo:
    strategy: noop
    description: Report formatting has no effects to reverse.
  problem: The machine needs a declared word for formatting validation findings without embedding that workflow step in Go control flow.
  goals:
  - Perform the format_report action as one machine-selected word.
  - Return an explicit signal that lets the MachineSpec choose the next state.
  - Keep sequencing outside the tool implementation and in machine.yaml.
  requirements:
    input:
    - must consume parameters from tool input, prior Result, or configured command/domain state
    output:
    - must emit one declared signal and return machine-readable output when available
    errors:
    - must emit CommandError for infrastructure failures and preserve domain failures as declared signals
  non_goals:
  - Does not choose the next workflow step; machine.yaml owns sequencing.
  - Does not hide unrelated tool execution behind this word.
  errors:
  - signal: CommandError
    condition: required input, configuration, or runtime state is invalid
    message_shape: 'format_report: <error>'
    state_after_failure: no additional workflow step is executed by this tool
  relationships:
    before:
    - machine-selected predecessor
    after:
    - machine-selected successor
  output:
    description: format_report command result summary.
    schema:
      type: object
      properties:
        message:
          type: string
        signal:
          type: string
      required:
      - message
