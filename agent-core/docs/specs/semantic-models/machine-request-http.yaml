id: sm-machine-request-http
title: Machine Request HTTP Semantic Model

purpose: |
  Defines how one inbound HTTP request becomes grammar input for one
  short-lived MachineSpec execution. Transport validation and run startup stay
  in the HTTP handler. MachineSpec composes request handling as a sentence.
  Only response words bridge machine output back to HTTP.

requirements_source:
  canonical:
    - docs/specs/software-requirements/srd030-machine-request-rest-binding.yaml
  supporting:
    - docs/specs/software-requirements/srd005-agentic-loop.yaml
    - docs/specs/software-requirements/srd006-yaml-machine-config.yaml
    - docs/specs/software-requirements/srd027-rest-tool-runtime.yaml
    - docs/specs/software-requirements/srd029-rest-server-tools.yaml
    - docs/specs/semantic-models/tool-language.yaml
    - docs/specs/semantic-models/rest-tool-language.yaml

primary_entities:
  - name: MachineRequestEndpoint
    kind: inbound_rest_route
    responsibility: Defines the route that accepts one HTTP request and starts one configured request machine run.
    owns: [route_identity, request_validation, response_policy]
    references: [MachineRequestBinding]
  - name: MachineRequestBinding
    kind: rest_server_binding
    responsibility: Maps accepted HTTP requests to short-lived MachineSpec executions.
    owns: [request_to_machine_mapping, timeout_policy, error_mapping]
    references: [MachineSpec, ToolDef, ResponseWord]
  - name: RequestEvent
    kind: grammar_input
    responsibility: Carries validated HTTP input, request metadata, and correlation data into the machine sentence.
    owns: [validated_payload, request_metadata]
  - name: RequestMachine
    kind: short_lived_declarative_program
    responsibility: Handles one request through configured states, signals, and tool words.
    owns: [request_sentence]
    references: [MachineSpec, Registry, ToolDef]
  - name: ResponseWord
    kind: machine_to_http_bridge
    responsibility: Produces structured response output that maps to HTTP status, headers, body, and content type.
    owns: [response_shape, response_signal]
  - name: ResponseSelection
    kind: terminal_mapping
    responsibility: Selects which terminal signal or response word output becomes the HTTP response.
    owns: [status_mapping, header_mapping, body_mapping, error_mapping]
  - name: RequestTrace
    kind: observability_record
    responsibility: Correlates the HTTP request, machine run, terminal state, terminal signal, and response mapping.
    owns: [request_id, correlation_id, run_summary]

language_model:
  request_as_input: |
    An inbound HTTP request is not a workflow. It is grammar input. After
    validation, the machine_request binding seeds the configured machine with a
    RequestEvent.
  machine_sentence_as_handler: |
    Request handling lives in the machine sentence. MachineSpec transitions
    choose the words that inspect request data, read documents, call models,
    validate output, and prepare a response.
  response_word_as_output_bridge: |
    HTTP response data leaves the machine only through response words or
    configured terminal response output. Direct Go handlers do not assemble demo
    behavior after validation.
  transport_boundary: |
    At the transport boundary, the HTTP handler owns validation, cancellation,
    timeouts, and response writing. Request-specific workflow composition stays
    in the machine.
  request_server_ownership: |
    A request server may be launched by a parent MachineSpec through
    rest_server_launch. A same-origin host proxy may also own the request
    server lifecycle when the proxy only adapts browser traffic to a configured
    generic REST server. In both cases, trusted REST configuration names the
    route contract, request program, and response policy. The proxy must not
    recompose request workflow in Go after launch.
  request_tool_selection: |
    Profile-backed request runners load ToolDefs from trusted profile
    declaration roots. They then select the actions named by the request
    MachineSpec transitions and register builtin factories only for the selected
    init names. This combination keeps vocabulary authority in the profile while
    allowing the request machine to narrow the words it needs for one
    short-lived sentence.
  generic_trace_envelope: |
    The generic machine_request response trace belongs to internal/tools/rest.
    It identifies the REST route, request machine, terminal signal, and run
    outcome. Profile-specific proxies may forward or display that trace, but
    they should not be the source of generic route or machine identity.

relationships:
  MachineRequestEndpoint_to_MachineRequestBinding:
    meaning: An endpoint with binding machine_request delegates accepted requests to the configured binding.
    invariant: The endpoint validates HTTP transport data before a machine run starts.
  MachineRequestBinding_to_RequestMachine:
    meaning: The binding constructs the configured LoopParams, selected registry, initial state, and request seed data for one run.
    invariant: Trusted config chooses profile, machine, tool selection, and boundary config; HTTP callers do not.
  Profile_to_RequestToolSelection:
    meaning: The request runner loads declarations from trusted profile config, selects only actions named by the request MachineSpec, and registers only selected builtin init names.
    invariant: Missing request-machine actions fail configuration validation before request execution, and unselected request factories remain unavailable.
  RequestEvent_to_RequestMachine:
    meaning: The request event becomes structured input available to the first machine action and later response words.
    invariant: RequestEvent contains only declared, validated, and redacted request fields.
  RequestMachine_to_ResponseWord:
    meaning: The machine routes to response vocabulary when it needs to shape the HTTP response.
    invariant: Response words are visible MachineSpec actions with declared outputs and signals.
  ResponseWord_to_ResponseSelection:
    meaning: Response word output is mapped to HTTP status, headers, body, and content type.
    invariant: Undeclared response fields cannot be written to the HTTP response.
  Error_to_ResponseSelection:
    meaning: Validation, config, timeout, run, and response failures map through configured error responses.
    invariant: Error responses redact secrets, raw prompts, credentials, internal paths, and unredacted body content.
  RequestTrace_to_RunResult:
    meaning: The request trace links HTTP metadata with RunResult and RunEvent records.
    invariant: Traces record generic route identity and run outcome without secret material.

request_flow:
  steps:
    - id: F1
      actor: HTTP handler
      action: Match configured route and binding machine_request.
    - id: F2
      actor: HTTP handler
      action: Validate method, path, query, headers, body, size, auth, and timeout policy.
    - id: F3
      actor: MachineRequestBinding
      action: Build RequestEvent from declared request fields and redacted metadata.
    - id: F4
      actor: MachineRequestBinding
      action: Resolve trusted profile, MachineSpec, selected ToolDefs, and response policy.
    - id: F4a
      actor: ProfileMachineRequestRunner
      action: Load trusted profile declaration roots and select the request MachineSpec action names.
    - id: F5
      actor: Loop
      action: Run the short-lived request machine with RequestEvent as seed input.
    - id: F6
      actor: RequestMachine
      action: Compose request handling through visible MachineSpec transitions and selected words.
    - id: F7
      actor: ResponseWord
      action: Produce structured terminal response output.
    - id: F8
      actor: ResponseSelection
      action: Map terminal signal and response output to HTTP status, headers, content type, and body.
    - id: F9
      actor: HTTP handler
      action: Write the mapped response and clean up request-scoped state.

diagrams:
  request_to_machine_sentence: |
    ```mermaid
    sequenceDiagram
      participant H as HTTP handler
      participant B as machine_request binding
      participant M as MachineSpec
      participant W as Tool words
      participant R as response word
      H->>H: validate request
      H->>B: accepted request metadata and payload
      B->>M: seed RequestEvent
      M->>W: dispatch visible request-handling words
      W-->>M: declared Result.Signal values
      M->>R: dispatch response word
      R-->>B: response output and terminal signal
      B-->>H: mapped status, headers, body
    ```
  grammar_owns_request_behavior: |
    ```mermaid
    flowchart LR
      REQ[HTTP Request] --> VAL[Transport validation]
      VAL --> EVENT[RequestEvent]
      EVENT --> M[MachineSpec sentence]
      M --> READ[read document word]
      READ --> RESP[response word]
      RESP --> HTTP[HTTP Response]
      VAL -. not allowed .-> GO[Direct Go demo workflow]
    ```

invariants:
  - machine_request is a REST server binding, not a direct Go handler workflow.
  - One accepted HTTP request starts at most one short-lived request machine run.
  - MachineSpec owns request-specific sequencing, branching, retries, and response preparation.
  - ToolDef owns request-handling vocabulary contracts, including response words.
  - Request-machine builtin factories are registered only when their init names are selected by the trusted request ToolDefs.
  - HTTP callers cannot choose profile, machine, tool declaration roots, model config, credentials, URLs, or workspace roots.
  - Invalid request input does not start a machine run.
  - Response words or configured terminal response output are the only bridge back to HTTP status, headers, and body.
  - Request-scoped timeout cancels the machine run context.
  - Generic traces identify route identity and run outcome without leaking secrets or raw prompts.
  - Request metadata is command/domain state for the request run; it is not workspace state.
  - Same-origin host proxies may own request server launch and shutdown only when they remain thin transport adapters over configured generic REST machine_request routes.

non_goals:
  - Defining Knowledge Manager document content.
  - Defining the full implementation API for internal/tools/rest.
  - Replacing long-lived REST event queues and rest_await_event.
  - Allowing arbitrary public web framework handlers inside configured agent behavior.
  - Generating HTTP handlers from machine.yaml.

