tools:
- name: report_suite_summary
  type: builtin
  init: report_suite_summary
  visibility: internal
  emits:
  - SuiteLoaded
  - CommandError
  description: Report suite point count after config parsing, sample discovery, grid expansion, and session initialization.
  category: word
  side_effects:
  - kind: stderr_write
    target: evaluator_output
    description: Prints suite summary to evaluator stderr.
  reversibility:
    classification: reversible
    undo: noop
  undo:
    strategy: noop
    description: Summary reporting writes only diagnostic output and has no state to restore.
  problem: The machine needs a declared word for reporting suite dimensions without embedding that workflow step in Go control flow.
  goals:
  - Perform the report_suite_summary action as one machine-selected word.
  - Return an explicit signal that lets the MachineSpec choose the next state.
  - Keep sequencing outside the tool implementation and in machine.yaml.
  requirements:
    input:
    - must consume parameters from tool input, prior Result, or configured command/domain state
    output:
    - must emit one declared signal and return machine-readable output when available
    errors:
    - must emit CommandError for infrastructure failures and preserve domain failures as declared signals
  non_goals:
  - Does not choose the next workflow step; machine.yaml owns sequencing.
  - Does not hide unrelated tool execution behind this word.
  errors:
  - signal: CommandError
    condition: required input, configuration, or runtime state is invalid
    message_shape: 'report_suite_summary: <error>'
    state_after_failure: no additional workflow step is executed by this tool
  relationships:
    before:
    - machine-selected predecessor
    after:
    - machine-selected successor
  output:
    description: report_suite_summary command result summary.
    schema:
      type: object
      properties:
        message:
          type: string
        signal:
          type: string
      required:
      - message
