openapi: 3.0.3
info:
  title: Knowledge Manager Documentation API
  version: 0.1.0
  description: Profile-owned API contract for document index and detail requests.
servers:
  - url: http://127.0.0.1:18081
paths:
  /api/v1/docs:
    get:
      operationId: listDocuments
      summary: List documentation resources.
      responses:
        "200":
          description: Document index response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentIndexResponse"
  /api/v1/docs/{path}:
    get:
      operationId: readDocument
      summary: Read one documentation resource.
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: Slash-normalized path inside the configured docs resource.
      responses:
        "200":
          description: Document detail response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDetailResponse"
        "404":
          description: Document is not present in the configured resource.
components:
  schemas:
    DocumentEntry:
      type: object
      required: [path, name, category]
      properties:
        path:
          type: string
        name:
          type: string
        category:
          type: string
        extension:
          type: string
        size:
          type: integer
    DocumentIndexResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DocumentEntry"
        count:
          type: integer
    DocumentDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [path, raw]
          properties:
            path:
              type: string
            content:
              type: object
            raw:
              type: string
