id: test-rel08.0-chroma-corpus
title: Test Suite for Release 08.0 Chroma Corpus Agents
release: "08.0"

overview: |
  This suite defines the profile-owned tracer bullet for the Chroma corpus
  agents: an ingest profile that loads a repository corpus into a local Chroma
  collection and a reader profile that answers a question grounded in retrieved
  chunks. Both profiles compute embeddings at a local Ollama provider and thread
  the vector into Chroma, because Chroma does not embed text server-side over its
  raw HTTP API (spike #239). The threading uses the agent-core previous-Result
  parameter capability delivered by #245 (srd028-rest-client-tools R12).

  A tracer is implemented only when agent-profiles owns the profiles, REST
  definitions, corpus fixture, and expected output evidence, and the run has a
  reachable Chroma server and Ollama with the configured models. The integration
  target and its fixtures landed (#242, #243, #244), and the ingest was
  redesigned as a model-driven loop that actually loads the corpus (#251).

  The mesh extraction moved the mage integration:chroma target out of
  agent-profiles; it no longer ships here. Its relocated counterpart in
  examples/chatbot-mesh runs over the example's copied corpus-ingest profile and
  verifies ingest and the collection count only -- not the knowledge-manager
  corpus-reader grounded-answer path. So neither case has a profile-owned
  executable tracer at present: profile validation confirms the ingest and reader
  profiles load, the ingest behavior is proven only over the example's copy, and
  the reader grounded-answer behavior is not exercised. Both cases are therefore
  planned pending a restored profile-owned ingest+reader tracer (follow-up #251).

traces:
  - rel08.0-uc001-corpus-ingest
  - rel08.0-uc002-corpus-query

preconditions:
  - agent-core is available as AGENT_CORE_ROOT or as a sibling ../agent-core checkout, including the previous-Result parameter threading from #245.
  - A Chroma server runs against a persistence directory (chroma run --path <dir>), started by the harness or operator, not the agent.
  - An Ollama server is reachable with the configured embedding model and answer model.
  - agent-profiles owns the ingest and reader profiles, the Chroma and Ollama REST definitions, the corpus fixture, and the expected outputs named by the tracer.

test_cases:
  - use_case: rel08.0-uc001-corpus-ingest
    name: Chroma corpus ingest tracer
    follow_up_issue: "#251"
    integration_target: (relocated) mage integration:chroma in examples/chatbot-mesh, over the example's copied corpus-ingest profile (ingest and count only)
    status: planned
    description: |
      Planned: no agent-profiles-owned tracer. The relocated example target proves
      ingest and the collection count over the example's copied profile, not the
      knowledge-manager corpus-ingest profile named here. The intended tracer would
      run the ingest profile over a small corpus fixture and prove
      chroma_ready and ollama_ready preconditions, create-or-get collection
      identity resolution with no server-side embedding function, and a
      model-driven loop in which the model lists the corpus and selects each file
      (list_resource, read_resource) while the machine sequences the
      deterministic read_resource -> embed_document -> chroma_add steps that
      thread the agent-supplied vector and carried document and id into the add
      body. The added count is verified with chroma_count.
    inputs:
      ingest_profile: agents/knowledge-manager/corpus-ingest/profile.yaml
      chroma_rest: agents/knowledge-manager/corpus-rest.yaml
      ollama_rest: agents/knowledge-manager/corpus-rest.yaml
      corpus_fixture: testdata/integration/rel08-chroma-corpus/corpus/
      embedding_model: configured Ollama embedding model
    expected:
      chroma_ready: true
      ollama_ready: true
      collection_resolved: true
      server_side_embedding: false
      documents_added_count_recorded: true
      count_matches_added: true
      target_owner: agent-profiles
    traces:
      - rel08.0-uc001-corpus-ingest S1
      - rel08.0-uc001-corpus-ingest S2
      - rel08.0-uc001-corpus-ingest S3
      - srd012-chroma-corpus-agents AC3

  - use_case: rel08.0-uc002-corpus-query
    name: Chroma corpus query tracer
    follow_up_issue: "#251"
    integration_target: (none) no profile-owned tracer; the relocated example integration:chroma does not cover the corpus-reader grounded-answer path
    status: planned
    description: |
      Planned: the corpus-reader grounded-answer path is not exercised by any
      current tracer (the relocated example target proves ingest only). The
      intended tracer would run the reader profile against the ingested collection
      and prove the embed_query -> chroma_query -> invoke_llm trace order: the query vector
      is computed at Ollama, threaded into the Chroma query body, used to
      retrieve the configured number of nearest chunks, and those chunks ground
      the model answer. No model authors a raw embedding vector.
    inputs:
      reader_profile: agents/knowledge-manager/corpus-reader/profile.yaml
      chroma_rest: agents/knowledge-manager/corpus-rest.yaml
      ollama_rest: agents/knowledge-manager/corpus-rest.yaml
      request_question: fixture question string
      result_count: configured nearest-chunk count
    expected:
      trace_order: [embed_query, chroma_query, invoke_llm]
      query_vector_threaded: true
      retrieved_chunk_ids_recorded: true
      answer_grounded_in_chunks: true
      target_owner: agent-profiles
    traces:
      - rel08.0-uc002-corpus-query S1
      - rel08.0-uc002-corpus-query S2
      - rel08.0-uc002-corpus-query S3
      - srd012-chroma-corpus-agents AC3
