id: test-rel01.0
title: Test Suite for Release 01.0 Unified Agent Runtime
release: "01.0"

traces:
  - rel01.0-uc001-generator-coding
  - rel01.0-uc002-evaluator-benchmark
  - rel01.0-uc003-bench-visualization

preconditions:
  - Go toolchain installed and repository packages buildable.
  - bin/agent is buildable through mage build or the integration target helper.
  - Ollama is available for live generator and evaluator integration targets.
  - qwen3.6:35b-mlx is available for mage integration:uc001.
  - qwen3.6:35b-mlx and qwen3.6:27b-mlx artifacts are available for mage integration:uc002.
  - Bench visualization requires an eval-results directory and a free port; mage integration:uc003 records the current skip behavior.

test_cases:
  - use_case: rel01.0-uc001-generator-coding
    name: Executor profile loads machine and validation sequence
    go_test: TestExecutorConfig_MachineLoads
    status: planned
    follow_up_issue: "#601"
    inputs:
      profile: ${AGENT_PROFILES_ROOT}/agents/executor/profile.yaml
      machine: agents/executor/machine.yaml
      validation_actions: [build, lint, test]
    expected:
      machine_loaded: true
      terminal_states: [Succeeded, Failed, BudgetExceeded]
      validation_sequence: build_then_lint_then_test
    traces:
      - srd006-yaml-machine-config AC3
      - srd013-standard-tool-library AC2

  - use_case: rel01.0-uc001-generator-coding
    name: Executor selected tools load from YAML declarations
    go_test: TestExecutorConfig_ToolsLoad
    status: planned
    follow_up_issue: "#601"
    inputs:
      tools: agents/executor/tools.yaml
      declarations:
        - tools/builtin
        - tools/exec
    expected:
      selected_tools_include:
        - read
        - write
        - edit
        - build
        - lint
        - test
        - invoke_llm
        - parse_response
        - done
    traces:
      - srd013-standard-tool-library AC1
      - srd022-builtin-tools AC1
      - srd023-cli-exec-tools AC4

  - use_case: rel01.0-uc001-generator-coding
    name: Executor transition table validates selected tool emits
    go_test: TestExecutorConfig_TransitionTable
    status: planned
    follow_up_issue: "#601"
    inputs:
      machine: agents/executor/machine.yaml
      selected_tools: agents/executor/tools.yaml
    expected:
      transition_table_builds: true
      selected_tool_emits_handled: true
      succeeded_is_terminal: true
    traces:
      - srd006-yaml-machine-config AC3
      - srd022-builtin-tools AC4

  - use_case: rel01.0-uc001-generator-coding
    name: Qwen profile strips thinking blocks and extracts tool envelope
    go_test: mage integration:uc001
    inputs:
      profile: ${AGENT_PROFILES_ROOT}/agents/executor/profile.yaml
      sample: testdata/integration/uc001-generator-coding
      model: qwen3.6:35b-mlx
    expected:
      qwen_profile_selected: true
      thinking_blocks_stripped: true
      tool_call_envelope_extracted: true
    traces:
      - srd009-ollama-adapter AC1
      - srd017-llm-extensions AC1
      - srd017-llm-extensions AC2
      - srd017-llm-extensions AC3

  - use_case: rel01.0-uc001-generator-coding
    name: Ollama adapter validates model availability
    go_test: TestNewAdapter_ModelFound
    inputs:
      ollama_tags: "model list with requested model and tag variants"
    expected:
      model_found: true
      case_insensitive_match: true
      missing_model_error_mentions_pull: true
    traces:
      - srd009-ollama-adapter AC2

  - use_case: rel01.0-uc001-generator-coding
    name: Ollama adapter emits tracing around check, list, and chat
    go_test: TestChat_EmitsSemconvInferenceSpan
    inputs:
      tracer: "recording tracer"
      chat_request: "non-streaming /api/chat"
    expected:
      check_model_events: true
      list_models_events: true
      inference_span_attrs: true
      nil_tracer_safe: true
    traces:
      - srd009-ollama-adapter AC3

  - use_case: rel01.0-uc001-generator-coding
    name: Ollama adapter reports HTTP and JSON failures
    go_test: TestChat_HTTPError
    inputs:
      failures:
        - connection_refused
        - bad_http_status
        - malformed_json
        - cancelled_context
    expected:
      distinct_errors: true
      no_retry: true
    traces:
      - srd009-ollama-adapter AC4

