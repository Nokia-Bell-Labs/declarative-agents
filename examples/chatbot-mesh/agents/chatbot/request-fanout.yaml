      - Does not call any provider.
    parameters:
      type: object
      properties: {}
      additionalProperties: false
    emits: [SourceMarked0]
    output:
      description: This source's outcome for the response metadata.
      schema:
        type: object
        properties:
          outcome: {type: string}
          reason: {type: string}
    side_effects: []
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Recording an outcome has no durable effect.
    config:
      signal: SourceMarked0
      inputs: {}
      template: |
        {"outcome": "degraded", "reason": "query_failed"}

