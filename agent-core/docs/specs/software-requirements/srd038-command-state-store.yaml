id: srd038-command-state-store
title: Command-State Store

problem: |
  A word can already thread one prior step's output into the next request, but
  only the REST client can do it and only for the immediately preceding step.
  srd028 R12 defines body_source previous_result: an operation selects declared
  params from the previous Result output through an input_mapping map, and
  carry_forward copies selected inputs into its own output under a carried key so
  a later word can reach them. That threading is REST-private. body_source,
  input_mapping, and carry_forward live in internal/tools/rest; the generic seam
  the core exposes to every word is only Builder.Build(res core.Result), a single
  handle on the immediately previous Result. srd028 R12.4 deliberately rejects
  body_source command_state today with a clear message, because no core-level
  store backs it.

  We need to lift the selection contract out of the REST package into the core so
  any word can select declared params from any earlier step in the run by label,
  not only from the adjacent step. The store is a read-only forward view over the
  run's execution log, populated from in-memory Entries during a run and
  rehydrated from the srd036 persistence tables after a process restart. It reads
  the same execution history srd036 already persists; it adds no new authoring
  power over transport, and it never exposes receipts. This SRD specifies that
  store: what it holds, how authors address it, what it must refuse, when its
  entries die, and where redaction sits relative to persistence. It does not
  change previous_result threading and does not replace it.

goals:
  - G1: Define a core-level read-only forward view over the run's execution log, keyed by (run_id, step_index), populated from in-memory Entries and rehydrated from the srd036 tables after restart.
  - G2: Define label addressing so a word selects declared params from an earlier step by command name or label through a $from(<label>).<dotted-path> selector, with most-recent-wins on duplicate labels.
  - G3: Define an authority boundary so selectors reach only declared param fields and can never name transport authority, and so receipts are structurally unaddressable.
  - G4: Define branch-scoped entry lifetime tied to Revert and terminal-state reaping, with no TTL or refcount machinery.
  - G5: Define a versioned, typed redaction boundary so sensitive output is removed before live selection and rechecked before persistence.
  - G6: Define how declared input sites adopt command-state selectors and how a machine_request seed remains addressable after intervening words.

requirements:
  R1:
    title: Store contract and rehydration
    items:
      - R1.1: The command-state store SHALL present a read-only forward view over the run's execution Entries; it SHALL NOT let a word write, mutate, or delete another step's recorded output.
      - R1.2: Entries SHALL be keyed internally by (run_id, step_index); step_index SHALL NOT be part of the authoring surface (see R2.3).
      - R1.3: During a run the store SHALL be populated from the in-memory Execution Entries the loop already records; it SHALL NOT introduce a second source of truth for step output.
      - R1.4: After a process restart the store SHALL rehydrate outputs from the srd036 tool_outputs plane and step labels from the persisted execution metadata so a resumed run resolves the same authored labels it resolved before suspension.
      - R1.5: A selector that resolves to no recorded entry SHALL surface a typed error that names the unresolved label; it SHALL NOT silently yield an empty value.
      - R1.6: Persisted execution metadata SHALL store the optional authored label separately from command_name. An existing row with no label SHALL retain command-name addressing after schema upgrade only when its output has recognized redaction metadata.
      - R1.7: A machine_request runner MAY place its initial Result in InitialExecution as one synthetic forward entry before the first dispatch, so later words can select the trusted request seed without a second state store. The synthetic producer SHALL apply the same typed ResultDigest redaction boundary as loop dispatch before the entry becomes live.
      - R1.8: Load SHALL retain an Entry whose output has no recognized redaction version for lifecycle accounting, but CommandStateView SHALL exclude its output and return a typed unavailable error on lookup by label or command name.
  R2:
    title: Label addressing
    items:
      - R2.1: An author SHALL set an optional TransitionSpec label and reference an earlier step through a $from(<command-name-or-label>).<dotted-path> selector, where <dotted-path> is a $.-style path into that step's declared param fields.
      - R2.2: Lookup SHALL scan completed steps from highest to lowest step_index and match either the authored label or executed command name. Duplicate labels and collisions between one step's label and another step's command name therefore resolve through the same most-recent-match rule.
      - R2.3: Absolute step indices SHALL NOT be part of the authoring surface; authors address steps only by command name or label.
      - R2.4: Label resolution SHALL be scoped to the current run; a selector SHALL NOT resolve to a step in any other run (see R6 non-goal on cross-run addressing).
      - R2.5: Current-value and $from selectors SHALL share one dotted-path grammar that rejects empty components, whitespace or control characters, malformed parentheses, and empty labels or paths.
      - R2.6: "A TransitionSpec label SHALL satisfy the same label grammar ParseSelector accepts inside $from(...): no dots, parentheses, whitespace, or control characters. Duplicate valid labels SHALL remain legal."
      - R2.7: A transition with no authored label SHALL remain addressable by its executed command name. The same fallback SHALL apply to legacy persisted entries and programmatic TransitionTable runs with no MachineSpec label.
      - R2.8: A labeled $tool transition SHALL record the transition label as its stable authored address and the dynamically selected tool as its command name. Both addresses SHALL resolve to that step.
      - R2.9: TransitionSpec label SHALL be distinct from metric_labels; command-state selection SHALL NOT read observability labels.
      - R2.10: "The synthetic machine_request entry SHALL reserve label and command_name seed. Its output SHALL have the same safe shape as the initial Result: non-sensitive mapped request input under parameters, with optional path and request_id fields. A non-sensitive mapped field SHALL therefore be addressable as $from(seed).parameters.<field>, while a configured sensitive field SHALL be absent. A fresh request SHALL add this entry exactly once, and a resumed execution that already contains it SHALL NOT add another."
      - R2.11: A declared input site MAY adopt canonical $from(<label>).<dotted-path> selectors when its subsystem specifies that extension. The consumer SHALL opt in through CommandStateAware and ResolveFromSelector; support SHALL NOT be inferred for every input site. An unresolved selector SHALL be an infrastructure fault such as CommandError, not a domain miss or an empty value.
  R3:
    title: Authority boundary
    items:
      - R3.1: A consumer SHALL receive only the fields it selects into its own declared params; the store SHALL NOT expose a prior step's full output shape to the consumer beyond the selected paths.
      - R3.2: A selector SHALL NOT name method, URL, authentication, redirect policy, or destination host; the store SHALL reject any selector or mapping target that resolves to transport authority with a clear message, consistent with srd028 R12.4.
      - R3.3: Receipts SHALL NOT be addressable by any forward selector; this SHALL hold structurally through the srd036 split that separates tool_outputs from receipts, not by a runtime filter alone.
      - R3.4: Selector targets SHALL be declared params only; the store SHALL reject a target that is not a declared path, query, header, or body param, consistent with srd028 R12.4.
  R4:
    title: Entry lifetime
    items:
      - R4.1: Store entries SHALL be branch-scoped; an entry SHALL exist only for the run branch that recorded it.
      - R4.2: Revert(run_id, step_index) SHALL invalidate every entry at a later step by construction, because reverting the run branch removes the later commits that recorded them; the store SHALL NOT need a separate invalidation walk.
      - R4.3: On a terminal state the merge-to-main-and-delete-branch reap defined by srd036 R4.3 SHALL reap the run's store entries; the store SHALL NOT retain per-run entries past terminal reaping.
      - R4.4: The store SHALL NOT define TTL, reference counting, or garbage-collection machinery; lifetime SHALL follow branch and terminal semantics only.
  R5:
    title: Redaction before persistence
    items:
      - R5.1: "A command Result SHALL carry versioned OutputRedaction metadata whose paths are typed sequences of object-key segments. Tool families SHALL identify sensitive fields; core SHALL validate and enforce the metadata."
      - R5.2: Before appending an Entry to live Execution, core SHALL remove each marked field from JSON object output. It SHALL remove the field rather than substitute a marker value.
      - R5.3: ResultDigest SHALL carry redaction_version, redacted_paths, and redaction_status. Version 1 statuses SHALL be applied and output_omitted, as defined by srd035 R7.
      - R5.4: Invalid paths, unsupported versions, or marked non-object output SHALL cause core to omit the whole output before constructing the Entry. Raw output SHALL NOT remain available to the live view.
      - R5.5: Every stateful Checkpoint Save implementation SHALL reapply typed field removal as defense in depth. Missing or malformed metadata SHALL cause output omission, never raw persistence.
      - R5.6: CommandStateView SHALL expose output only when it has a recognized version and applied status. It SHALL return a typed unavailable error for output_omitted, unversioned legacy, and unknown-version entries.
      - R5.7: A field removed by redaction SHALL NOT be readable by any later word through a $from selector, whether the run is live or resumed.
      - R5.8: Receipts SHALL remain opaque and unchanged in the reverse plane; output redaction metadata SHALL neither inspect nor rewrite them.
      - R5.9: Synthetic forward entries, including machine_request seed, SHALL use the core Result-to-ResultDigest redaction boundary rather than constructing an unversioned ResultDigest directly. Trusted seed configuration SHALL identify sensitive mapped field names without carrying request values in metadata.

non_goals:
  - Cross-run addressing; a selector resolves only within its own run and never reaches another run's steps.
  - A general-purpose key/value API for tools; the store is a read-only forward view over declared params, not a scratchpad tools can write.
  - Replacing previous_result threading; srd028 R12 body_source previous_result and carry_forward remain the adjacent-step path and are unchanged by this SRD.
  - Defining the persistence schema or the tool_outputs/receipts split; that belongs to the amended srd036.
  - Defining the REST-side body_source command_state selector syntax or its validation; that belongs to the amended srd028.
  - Defining command-state selectors for machine_request response bodies; response extraction continues to read configured terminal output, and GH-773 tracks the concrete structured-output need.

acceptance_criteria:
  - id: AC1
    criterion: The store is a read-only forward view keyed by (run_id, step_index), populated from in-memory Entries during a run and rehydrated from persisted outputs and execution metadata after restart. Authored labels persist separately from command names, legacy entries remain loadable but their unversioned output is selector-inaccessible, unresolved and unavailable reads produce typed errors, and machine_request may expose its initial Result through the same execution view.
    traces: [R1.1, R1.2, R1.3, R1.4, R1.5, R1.6, R1.7, R1.8]
  - id: AC2
    criterion: Authors optionally label a transition and select an earlier step by command name or label through a canonical $from(<label>).<dotted-path> grammar. One newest-to-oldest rule resolves duplicate labels and label/command-name collisions. Unlabeled, legacy, and programmatic steps retain command-name addressing; labeled $tool steps retain both addresses; absolute indices and metric_labels are excluded from the authoring surface. Machine requests reserve one seed address, and each declared input subsystem adopts selectors explicitly with infrastructure-fault semantics.
    traces: [R2.1, R2.2, R2.3, R2.4, R2.5, R2.6, R2.7, R2.8, R2.9, R2.10, R2.11]
  - id: AC3
    criterion: A consumer receives only the fields it selects into declared params, selectors can never name transport authority and are rejected when they try, receipts are structurally unaddressable via the srd036 split, and undeclared targets are rejected.
    traces: [R3.1, R3.2, R3.3, R3.4]
  - id: AC4
    criterion: Entries are branch-scoped, Revert invalidates later entries by construction, terminal-state reaping removes a run's entries, and the store carries no TTL or refcount machinery.
    traces: [R4.1, R4.2, R4.3, R4.4]
  - id: AC5
    criterion: Tool families and synthetic forward-entry producers supply versioned typed sensitive-output paths; core removes marked fields before live Entry construction; malformed metadata and marked non-object output cause whole-output omission; checkpoint adapters reapply removal before storage; and selectors reject omitted, unknown-version, and unversioned legacy output live and after reload while receipts remain unchanged. Machine-request seed metadata contains configured field names, never request values.
    traces: [R5.1, R5.2, R5.3, R5.4, R5.5, R5.6, R5.7, R5.8, R5.9]

neighboring_contracts: |
  srd028 R12 (REST client tools, previous_result threading) stays unchanged. Its
  body_source previous_result, input_mapping, and carry_forward remain the
  adjacent-step path a REST word uses to consume the immediately preceding
  Result. srd038 does not remove or replace R12; it provides the core store that a
  future body_source command_state (specified in the amended srd028) resolves
  against, lifting the selection contract from the adjacent step to any earlier
  labeled step. R12.4's present rejection of command_state is the seam srd038
  fills.

  srd036 (Dolt state persistence) stays the persistence contract. srd038 reads the
  execution history srd036 persists; it adds no new tables of its own. The store's
  rehydration source is the tool_outputs plane produced by the amended srd036
  tool_outputs/receipts split (srd036 R3 today records tool_results; the split is
  a sibling documentation change). srd036 R4.3 terminal merge-and-delete and R6
  Revert supply srd038 R4's lifetime semantics; srd038 adds no lifetime machinery
  of its own. Execution metadata persists the optional authored label in a
  nullable field. The adapter upgrades an existing schema idempotently; old rows
  restore an empty label and retain command-name addressing.

depends_on:
  - srd_id: srd035-checkpoint-port
    symbols_used: [Execution, Entry, Receipt, Position]
  - srd_id: srd036-dolt-state-persistence
    symbols_used: [tool_outputs, Revert, merge-to-main]
  - srd_id: srd028-rest-client-tools
    symbols_used: [body_source, input_mapping, carry_forward, previous_result]
  - srd_id: srd001-core-types
    symbols_used: [Result, Signal]

implementation_status:
  done:
    - Core CommandStateView (internal/runtime/core/command_state.go): a read-only, receipt-blind forward view over the run's execution log. One newest-to-oldest scan matches either an authored label or executed command name, while the projected struct omits Entry.Receipt so receipts are unreachable by construction (R1, R2, R3). The engine injects it before dispatch into commands implementing CommandStateAware, mirroring MonitorRecorderAware. Initially delivered by GH-277 and extended with authored labels and typed lookup errors by GH-488.
    - REST body_source command_state consumption and $from(label).path selector validation (V32): clientCmd implements CommandStateAware and resolves selectors against the injected view, with the no-store rejection enforced at runtime (R13.5). Delivered by GH-278.
    - rel07.0-uc001 tracer bullet (a three-word chain where word 3 selects word 1 non-adjacently and the run resumes mid-chain) and a commit-per-step large-blob storage benchmark showing per-step write cost bounded by the new blob (~linear, not cumulative). Delivered by GH-279.
    - Shared $from resolution: core.ParseFromSelector and core.ResolveFromSelector factor the selector parse and path walk out of the REST client so a second consumer, the compose builtin, resolves $from(label).path against the same view. The compose word renders a template from $from selectors, letting a later word (invoke_llm) receive one composed input assembled from non-adjacent prior steps without carry_forward chains. Delivered by GH-342.
    - Canonical selector AST: core.ParseSelector validates both $.path and $from(label).path forms, and the parsed selector owns the shared nested-map resolver used by core and REST consumers.
    - "GH-488: TransitionSpec authored labels are validated with the canonical selector grammar, recorded separately from command names, resolved with exported typed label/path errors, and persisted through an idempotent nullable Dolt schema upgrade. Real MachineSpec execution proves dynamic-tool separation, command-name fallback, duplicate-label newest-match behavior, and fresh-view restart rehydration."
    - "GH-786: Exec parameter source declarations resolve through CommandStateAware after command construction, and machine_request exposes its initial Result through the reserved seed entry."
    - "GH-489: Typed output-redaction metadata, pre-Entry removal, checkpoint defense in depth, selector denial for unsafe and legacy output, and persisted REST conformance evidence (R1.8, R5)."
  planned: []

