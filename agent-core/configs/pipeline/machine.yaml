name: pipeline
initial_state: Idle

states:
  - Idle
  - Extracting
  - Resetting
  - PromptAssembly
  - PlanInvoking
  - PlanParsing
  - Materializing
  - Executing
  - Vetting
  - Building
  - Testing
  - CheckingResult
  - Completed
  - Stalled
  - Paused
  - Failed

terminal_states:
  - Completed
  - Stalled
  - Paused
  - Failed

signals:
  - Seed
  - TaskExtracted
  - AllDone
  - Blocked
  - BatchLimitReached
  - ToolDone
  - ToolFailed
  - LLMResponded
  - PlanReady
  - PlanFailed
  - Materialized
  - MaterializeFailed
  - ExecutionDone
  - ExecutionFailed
  - ValidationPassed
  - RetryAvailable
  - RetriesExhausted
  - CommandError

transitions:
  # Idle
  - state: Idle
    signal: Seed
    next: Extracting
    action: extract_task

  # Extracting
  - state: Extracting
    signal: TaskExtracted
    next: Resetting
    action: reset_history
  - state: Extracting
    signal: AllDone
    next: Completed
  - state: Extracting
    signal: Blocked
    next: Stalled
  - state: Extracting
    signal: BatchLimitReached
    next: Paused
  - state: Extracting
    signal: CommandError
    next: Failed

  # Resetting — clear conversation history
  - state: Resetting
    signal: ToolDone
    next: PromptAssembly
    action: assemble_prompt
  - state: Resetting
    signal: CommandError
    next: Failed

  # PromptAssembly — build task/SRD context into prompt
  - state: PromptAssembly
    signal: ToolDone
    next: PlanInvoking
    action: invoke_llm
  - state: PromptAssembly
    signal: CommandError
    next: Failed

  # PlanInvoking — LLM call via STL invoke_llm
  - state: PlanInvoking
    signal: LLMResponded
    next: PlanParsing
    action: parse_plan
  - state: PlanInvoking
    signal: CommandError
    next: Failed

  # PlanParsing — parse YAML response into ImplementationPlan
  - state: PlanParsing
    signal: PlanReady
    next: Materializing
    action: create_issue
  - state: PlanParsing
    signal: PlanFailed
    next: Extracting
    action: extract_task
  - state: PlanParsing
    signal: CommandError
    next: Failed

  # Materializing
  - state: Materializing
    signal: Materialized
    next: Executing
    action: execute_task
  - state: Materializing
    signal: MaterializeFailed
    next: Failed
  - state: Materializing
    signal: CommandError
    next: Failed

  # Executing
  - state: Executing
    signal: ExecutionDone
    next: Vetting
    action: vet
  - state: Executing
    signal: ExecutionFailed
    next: Vetting
    action: vet
  - state: Executing
    signal: CommandError
    next: Failed

  # Vetting — go vet ./...
  - state: Vetting
    signal: ToolDone
    next: Building
    action: build
  - state: Vetting
    signal: ToolFailed
    next: CheckingResult
    action: check_result
  - state: Vetting
    signal: CommandError
    next: Failed

  # Building — go build ./...
  - state: Building
    signal: ToolDone
    next: Testing
    action: test
  - state: Building
    signal: ToolFailed
    next: CheckingResult
    action: check_result
  - state: Building
    signal: CommandError
    next: Failed

  # Testing — go test ./...
  - state: Testing
    signal: ToolDone
    next: CheckingResult
    action: check_result
  - state: Testing
    signal: ToolFailed
    next: CheckingResult
    action: check_result
  - state: Testing
    signal: CommandError
    next: Failed

  # CheckingResult — retry logic and graph mutation
  - state: CheckingResult
    signal: ValidationPassed
    next: Extracting
    action: extract_task
  - state: CheckingResult
    signal: RetryAvailable
    next: Resetting
    action: reset_history
  - state: CheckingResult
    signal: RetriesExhausted
    next: Extracting
    action: extract_task
  - state: CheckingResult
    signal: CommandError
    next: Failed
