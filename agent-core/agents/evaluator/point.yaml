# State machine for a single evaluation point.
# Sequences: create point dir → copy workspace/docs → git baseline →
# dump config → run agent → oracle check → trace tokens → version check
# → summarize results → collect metrics.

name: evaluator
initial_state: Idle

budget:
  max_iterations: 20

states:
  - Idle
  - CreatingPointDir
  - CopyingSampleWorkspace
  - CopyingSampleDocs
  - InitializingWorkspaceRepo
  - StagingWorkspaceBaseline
  - CommittingWorkspaceBaseline
  - SnapshotConfig
  - RunningAgent
  - RunningOracleCheck
  - CollectingTraceTokens
  - CheckingAgentVersion
  - SummarizingPointResults
  - CollectingMetrics
  - Done
  - Failed

terminal_states:
  - Done
  - Failed

signals:
  - Seed
  - CommandError
  - PointDirCreated
  - SampleWorkspaceCopied
  - SampleDocsCopied
  - WorkspaceRepoInitialized
  - WorkspaceBaselineStaged
  - WorkspaceBaselineCommitted
  - ConfigDumped
  - HarnessFinished
  - HarnessFailed
  - HarnessTimedOut
  - OracleCheckPassed
  - OracleCheckFailed
  - TraceTokensCollected
  - AgentVersionChecked
  - AgentVersionMismatch
  - ResultsCollected
  - MetricsCollected

transitions:
  - state: Idle
    signal: Seed
    next: CreatingPointDir
    action: create_point_dir

  - state: CreatingPointDir
    signal: PointDirCreated
    next: CopyingSampleWorkspace
    action: copy_sample_workspace

  - state: CopyingSampleWorkspace
    signal: SampleWorkspaceCopied
    next: CopyingSampleDocs
    action: copy_sample_docs

  - state: CopyingSampleDocs
    signal: SampleDocsCopied
    next: InitializingWorkspaceRepo
    action: init_workspace_repo

  - state: InitializingWorkspaceRepo
    signal: WorkspaceRepoInitialized
    next: StagingWorkspaceBaseline
    action: stage_workspace_baseline

  - state: StagingWorkspaceBaseline
    signal: WorkspaceBaselineStaged
    next: CommittingWorkspaceBaseline
    action: commit_workspace_baseline

  - state: CommittingWorkspaceBaseline
    signal: WorkspaceBaselineCommitted
    next: SnapshotConfig
    action: dump_config

  - state: SnapshotConfig
    signal: ConfigDumped
    next: RunningAgent
    action: run_agent

  - state: RunningAgent
    signal: HarnessFinished
    next: RunningOracleCheck
    action: run_oracle_check

  - state: RunningAgent
    signal: HarnessFailed
    next: RunningOracleCheck
    action: run_oracle_check

  - state: RunningAgent
    signal: HarnessTimedOut
    next: RunningOracleCheck
    action: run_oracle_check

  - state: RunningOracleCheck
    signal: OracleCheckPassed
    next: CollectingTraceTokens
    action: collect_trace_tokens

  - state: RunningOracleCheck
    signal: OracleCheckFailed
    next: CollectingTraceTokens
    action: collect_trace_tokens

  - state: CollectingTraceTokens
    signal: TraceTokensCollected
    next: CheckingAgentVersion
    action: check_agent_version

  - state: CheckingAgentVersion
    signal: AgentVersionChecked
    next: SummarizingPointResults
    action: summarize_point_results

  - state: CheckingAgentVersion
    signal: AgentVersionMismatch
    next: SummarizingPointResults
    action: summarize_point_results

  - state: SummarizingPointResults
    signal: ResultsCollected
    next: CollectingMetrics
    action: collect_metrics

  - state: CollectingMetrics
    signal: MetricsCollected
    next: Done

  # --- error handling ---
  - state: CreatingPointDir
    signal: CommandError
    next: Failed

  - state: CopyingSampleWorkspace
    signal: CommandError
    next: Failed

  - state: CopyingSampleDocs
    signal: CommandError
    next: Failed

  - state: InitializingWorkspaceRepo
    signal: CommandError
    next: Failed

  - state: StagingWorkspaceBaseline
    signal: CommandError
    next: Failed

  - state: CommittingWorkspaceBaseline
    signal: CommandError
    next: Failed

  - state: SnapshotConfig
    signal: CommandError
    next: Failed

  - state: RunningAgent
    signal: CommandError
    next: Failed

  - state: RunningOracleCheck
    signal: CommandError
    next: Failed

  - state: CollectingTraceTokens
    signal: CommandError
    next: Failed

  - state: CheckingAgentVersion
    signal: CommandError
    next: Failed

  - state: SummarizingPointResults
    signal: CommandError
    next: Failed

  - state: CollectingMetrics
    signal: CommandError
    next: Failed
