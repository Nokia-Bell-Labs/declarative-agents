  - name: mark_excluded_model0
    type: builtin
    init: compose
    visibility: internal
    category: response
    description: Record that the first RAG was excluded for an embedding-model mismatch.
    problem: |
      srd002 R3.3 requires the exclusion to be reported in the response metadata, so the reason must be recorded where the response can read it.
    goals:
      - Record this source's outcome under a label the response metadata reads.
      - Keep the outcome a visible machine transition rather than an inference the client makes.
    requirements:
      input:
        - The outcome is fixed by the transition that dispatched this word; no selector is read.
      output:
        - Output is a JSON object naming the outcome and its reason.
      errors:
        - Rendering a configured constant does not fail.
    non_goals:
      - Does not decide the outcome; the machine transition that reaches this word does.
      - Does not call any provider.
    parameters:
      type: object
      properties: {}
      additionalProperties: false
    emits: [SourceMarked0]
    output:
      description: This source's outcome for the response metadata.
      schema:
        type: object
        properties:
          outcome: {type: string}
          reason: {type: string}
    side_effects: []
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Recording an outcome has no durable effect.
    config:
      signal: SourceMarked0
      inputs: {}
      template: |
        {"outcome": "excluded", "reason": "embedding_model"}

  - name: mark_rejected0
    type: builtin
    init: compose
    visibility: internal
    category: response
    description: Record that the first RAG rejected the query vector.
    problem: |
      A mapped 400 excludes this source for a different reason than an identity mismatch, and R3.3 requires the two to be distinguishable in the response metadata.
    goals:
      - Record this source's outcome under a label the response metadata reads.
      - Keep the outcome a visible machine transition rather than an inference the client makes.
    requirements:
      input:
        - The outcome is fixed by the transition that dispatched this word; no selector is read.
      output:
        - Output is a JSON object naming the outcome and its reason.
