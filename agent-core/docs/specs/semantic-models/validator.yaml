id: sm-validator
title: Validator Agent Semantic Model

purpose: |
  The validator is a deterministic agent that loads a specification
  corpus, builds a labeled property graph of inter-document
  references, runs consistency checks, and produces a validation
  report. It does NOT use an LLM — it is a tool pipeline.

configuration:
  machine: configs/validate/machine.yaml
  tools: configs/validate/tools.yaml

states:
  - name: Idle
    meaning: Initial state before validation begins.
  - name: Loading
    meaning: |
      Loading the specification corpus from the project directory.
      Parses SRDs, use cases, test suites, and their cross-references.
  - name: Validating
    meaning: |
      Running consistency checks on the specification graph:
      orphan detection, missing references, duplicate IDs, cycle
      detection, and coverage gap analysis.
  - name: Reporting
    meaning: Formatting the validation results into a human-readable report.
  - name: Passed
    meaning: Terminal. All validation checks passed.
  - name: Failed
    meaning: Terminal. Validation errors were found or an infrastructure error occurred.

signals:
  - name: Seed
    trigger: Loop initialization.
  - name: ToolDone
    trigger: A tool completed successfully.
  - name: ToolFailed
    trigger: A tool completed with errors.
  - name: ValidationPassed
    trigger: All consistency checks passed.
  - name: ValidationFailed
    trigger: One or more consistency checks failed.
  - name: CommandError
    trigger: Infrastructure-level error.

lifecycle: |
  1. Idle → Loading (Seed): load_corpus from project directory
  2. Loading → Validating (ToolDone): validate_specs
  3. Validating → Reporting (ValidationPassed): format_report
  3a. Validating → Reporting (ValidationFailed): format_report
  4. Reporting → Passed (ToolDone): validation completed successfully
  4a. Reporting → Failed (ToolFailed): report indicates errors
  5. Loading → Failed (CommandError): infrastructure error
  5a. Reporting → Failed (CommandError): infrastructure error

  This is a linear pipeline with no loops or LLM calls.

tools_required:
  builtin:
    - load_corpus
    - validate_specs
    - format_report

invariants:
  - The validator never calls an LLM
  - Both pass and fail outcomes produce a formatted report
  - The corpus is loaded from the filesystem — no network calls
  - The graph is immutable once built — validation is read-only
