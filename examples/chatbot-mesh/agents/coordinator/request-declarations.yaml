tools:
  - name: request_ingest
    type: builtin
    init: rest_client_invoke
    category: boundary
    description: Delegate a corpus-ingest run for the requested directory to the creator.
    problem: A provisioning intent must ingest the directory before the mesh can serve it, and the coordinator delegates every instance operation rather than running it.
    goals:
      - Request one corpus-ingest instance from the creator for the intent's directory and collection.
      - Carry the intent's RAG name, collection, and embedding model forward for the reconfiguration decision.
      - Route a creator-reported count shortfall to a distinct rejection rather than a failure.
    requirements:
      input:
        - The directory and collection are selected from the seeded intent body.
      output:
        - Output includes the creator-reported post-run count, with the intent fields carried forward.
      errors:
        - Network, timeout, schema, and mapping failures emit CommandError; a creator 422 emits IngestRejected.
    non_goals:
      - Does not run the ingest itself; the creator materializes the corpus-ingest instance.
      - Does not accept a runtime method, URL, host, or credential for the creator.
    parameters:
      type: object
      properties:
        directory: {type: string}
        collection: {type: string}
    emits: [IngestReported, Rejected, CommandError]
    output:
      description: Creator-reported post-run count with the carried intent.
      schema:
        type: object
        properties:
          mapped: {type: object}
          carried: {type: object}
    side_effects:
      - kind: external_api
        target: creator.instance
        state: instance_created
    reversibility:
      classification: compensatable
      undo: creator_terminate
    undo:
      strategy: compensating_action
      description: A created ingest instance is terminated through the creator on a later failure; the coordinator issues the compensating request.
    errors:
      - signal: Rejected
        condition: The creator reports the ingested collection count does not meet the requested source.
        state_after_failure: No reconfiguration is decided; the request ends in Rejected.
      - signal: CommandError
        condition: Network, timeout, schema, or mapping failure reaching the creator.
        state_after_failure: No instance is known to be created; the request ends in Failed.
    relationships:
      before: [request_rollout]
    config:
      rest_ref: creator
      operation: creator_ingest

  - name: request_rollout
    type: builtin
    init: rest_client_invoke
    category: boundary
    description: Forward the desired values document and delegate the request-draining rollout to the creator.
    problem: The mesh values-plane list is replaced wholesale on apply, so the coordinator forwards the caller's full desired mesh state rather than a delta, realizing it by delegating the rollout to the creator rather than editing config itself.
    goals:
      - Thread the caller's full desired values document from the carried intent.
      - Request the reconfiguration rollout from the creator and forward the desired values as the content the creator applies.
      - Return the creator-reported health for the aggregated status.
    requirements:
      input:
        - The full desired values document is selected from the carried intent.
      output:
        - Output includes the creator-reported rollout health.
      errors:
        - Network, timeout, schema, and mapping failures emit CommandError.
    non_goals:
      - Does not execute the rollout itself; the creator holds the deployment-API authority.
      - Does not accept a runtime method, URL, host, or credential for the creator.
    parameters:
      type: object
      properties:
        values: {type: string}
    emits: [Reconfigured, CommandError]
    output:
      description: Creator-reported rollout health.
      schema:
        type: object
        properties:
          health: {type: string}
    side_effects:
      - kind: external_api
        target: creator.instance
        state: rollout_executed
    reversibility:
      classification: irreversible
      undo: noop
    undo:
      strategy: noop
      description: A completed rollout is superseded by a subsequent decided rollout, not undone in place.
    errors:
      - signal: CommandError
        condition: Network, timeout, schema, or mapping failure reaching the creator.
        state_after_failure: The rollout outcome is unknown; the request ends in Failed.
    relationships:
      after: [request_ingest]
    config:
      rest_ref: creator
      operation: creator_rollout

  - name: request_rollout_values
    type: builtin
    init: rest_client_invoke
    category: boundary
    description: Forward the operator's desired values document and delegate the rollout to the creator, for an apply that adds no source.
    problem: A panel apply changes values without ingesting a directory, so it reaches the rollout with the desired document on the seed rather than on a carried intent, and the ingest leg's word cannot read it.
    goals:
      - Thread the caller's full desired values document straight from the seeded intent.
      - Request the reconfiguration rollout from the creator and forward the desired values as the content the creator applies.
      - Return the creator-reported health for the aggregated status.
    requirements:
      input:
        - The full desired values document is selected from the seeded intent.
      output:
        - Output includes the creator-reported rollout health.
      errors:
        - Network, timeout, schema, and mapping failures emit CommandError.
    non_goals:
      - Does not execute the rollout itself; the creator holds the deployment-API authority.
      - Does not ingest a directory; an intent that names a source enters on the ingest leg instead.
      - Does not accept a runtime method, URL, host, or credential for the creator.
    parameters:
      type: object
      properties:
        values: {type: string}
    emits: [Reconfigured, CommandError]
    output:
      description: Creator-reported rollout health.
      schema:
        type: object
        properties:
          health: {type: string}
    side_effects:
      - kind: external_api
        target: creator.instance
        state: rollout_executed
    reversibility:
      classification: irreversible
      undo: noop
    undo:
      strategy: noop
      description: A completed rollout is superseded by a subsequent decided rollout, not undone in place.
    errors:
      - signal: CommandError
        condition: Network, timeout, schema, or mapping failure reaching the creator.
        state_after_failure: The rollout outcome is unknown; the request ends in Failed.
    relationships:
      overlaps:
        - tool: request_rollout
          difference: request_rollout_values reads the desired document off the seed for a values-only apply; request_rollout reads it from the intent carried through the ingest leg.
    config:
      rest_ref: creator
      operation: creator_rollout_values

  - name: read_creator_rollout
    type: builtin
    init: rest_client_invoke
    category: boundary
    description: Read the rollout status from the creator so the panel's poll is served by the coordinator.
    problem: The panel polls rollout progress while a reconfiguration runs, and it reads that progress from the coordinator rather than from the deployment API, which no browser may reach.
    goals:
      - Read the creator-reported rollout phase and the Deployment's ready and desired replicas and revision.
      - Serve the aggregated status the provisioning panel renders (srd004 R1.3).
    requirements:
      input:
        - Takes no request-scoped input; the read is unparameterized.
      output:
        - Output carries the creator-reported rollout phase and the Deployment's ready and desired replicas and revision.
      errors:
        - Network, timeout, schema, and mapping failures emit CommandError rather than an unknown phase.
        - A creator read that answers 502 because the executor could not reach the Deployment is outside the declared success status and emits CommandError.
    non_goals:
      - Does not drive an instance operation; a poll mutates nothing.
      - Does not accept a runtime method, URL, host, or credential for the creator.
    parameters:
      type: object
      properties: {}
    emits: [StatusRead, CommandError]
    output:
      description: Creator-reported rollout phase with the Deployment's replica counts and revision.
      schema:
        type: object
        properties:
          phase: {type: string}
          ready: {type: integer}
          desired: {type: integer}
          revision: {type: integer}
    side_effects:
      - kind: external_api
        target: creator.rollout
        state: read_only
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Reading the rollout status changes nothing.
    errors:
      - signal: CommandError
        condition: Network, timeout, schema, or mapping failure reaching the creator.
        state_after_failure: No status is reported; the request ends in Failed.
    relationships:
      after: [request_rollout]
    config:
      rest_ref: creator
      operation: creator_rollout_status

  - name: read_creator_state
    type: builtin
    init: rest_client_invoke
    category: boundary
    description: Read the deployed mesh view from the creator so the provisioning panel's initial load is served by the coordinator.
    problem: The panel loads its mesh view from the coordinator, which no browser may reach past (srd003 R4.4); the coordinator asks the creator, which is the only agent that declares a deployment-API client.
    goals:
      - Read the creator-reported RAG topology, LLM configuration, and parameters.
      - Serve the mesh view the provisioning panel renders on its initial load (srd006 R1.5).
    requirements:
      input:
        - Takes no request-scoped input; the read is unparameterized.
      output:
        - Output carries the flat mesh-view fields the creator's state read reports.
      errors:
        - Network, timeout, schema, and mapping failures emit CommandError rather than an empty view.
        - A creator read that answers 502 because the executor could not read the release is outside the declared success status and emits CommandError.
    non_goals:
      - Does not drive an instance operation; a state read mutates nothing.
      - Does not accept a runtime method, URL, host, or credential for the creator.
    parameters:
      type: object
      properties: {}
    emits: [StateRead, CommandError]
    output:
      description: Creator-reported mesh view -- topology, LLM configuration, and parameters -- as the flat fields the state_response contract declares (srd006 deployment_api_contract).
      schema:
        type: object
        properties:
          rags: {type: array}
          llmInCluster: {type: boolean}
          llmExternalURL: {type: string}
          llmChatModel: {type: string}
          llmEmbedModel: {type: string}
          llmChatModels: {type: array}
          llmRouterModel: {type: string}
          llmTopology: {type: string}
          paramsNResults: {type: integer}
          paramsChunkCap: {type: integer}
          paramsRouterDefault: {type: string}
    side_effects:
      - kind: external_api
        target: creator.state
        state: read_only
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Reading the deployed mesh view changes nothing.
    errors:
      - signal: CommandError
        condition: Network, timeout, schema, or mapping failure reaching the creator.
        state_after_failure: No mesh view is reported; the request ends in Failed.
    relationships:
      overlaps:
        - tool: read_creator_rollout
          difference: read_creator_state reads the deployed mesh view for the panel's initial load; read_creator_rollout reads rollout health while a reconfiguration proceeds.
    config:
      rest_ref: creator
      operation: creator_state
