id: agent-core-roadmap
title: Agent Core Release Road Map

releases:
  - version: "00.0"
    name: Core engine and supporting packages
    description: |
      Import the generic agentic loop engine from the generator project
      and expand with LLM, prompt, STL, and spec packages. Establishes
      internal/runtime/core (types, state machine, dispatch, registry, loop, machine
      config), internal/observability/tracing (5-method Tracer port interface with
      NoopTracer), internal/observability/telemetry (OTel setup, GenAI semconv helpers,
      traceparent), internal/model/llm (Client, Conversation, Ollama adapter,
      parseutil, profile, interfaces), internal/model/prompt (Prompt, loading,
      template, SerializeManifest), initial internal/tools/stl standard tools
      (file tools, build tools, LLM commands, subprocess), pkg/spec (graph loader, validator),
      and internal/support/cli (standard flag constants, PropagateArgs).
    status: done
    srds:
      - srd001-core-types
      - srd002-state-machine
      - srd003-command-dispatch
      - srd004-tool-registry
      - srd005-agentic-loop
      - srd006-yaml-machine-config
      - srd007-tracer-interface
      - srd008-telemetry
      - srd009-ollama-adapter
      - srd010-conversation
      - srd011-prompt-schema
      - srd012-system-prompt-template
      - srd013-standard-tool-library
      - srd014-spec-graph
      - srd015-genai-semconv
      - srd016-traceparent
      - srd017-llm-extensions
      - srd018-cli-flag-contract
    use_cases:
      - id: rel00.0-uc001-domain-agent-integration
        summary: Domain agent imports agent-core and runs an agentic loop
        status: done

  - version: "01.0"
    name: Unified agent binary and configuration-driven architecture
    description: |
      Consolidate generator, planner, and evaluator into a single agent
      binary (cmd/agent) driven entirely by YAML configurations. The
      original projects become configuration-only repositories.

      Deliverables:
      - Unified cmd/agent binary with machine-configurable modes (generate, eval, plan, bench)
      - YAML state machine configs for generator, evaluator, planner,
        and jurist (agents/*/machine.yaml)
      - YAML tool declarations replacing Go tool implementations
        (45 shared builtin declarations under tools/builtin/, 16 shared exec
        declarations under tools/exec/, plus agent-local overrides)
      - Per-model LLM tool configurations (agents/*/llm/*.yaml)
      - LLM response profiles for 9 model families (internal/model/llm/profiles/)
      - Planner pipeline packages (internal/planning/pipeline, internal/planning/plan, internal/planning/extract,
        internal/planning/graph, internal/planning/materialize)
      - Agent execution with process groups (internal/support/execute)
      - Git worktree management (internal/support/worktree)
      - Evaluator benchmark infrastructure (eval suites, result analysis)
      - Bench agent (internal/evaluation/bench, configured via machine.yaml) with embedded React frontend
      - Native Mage build targets replacing cobbler-scaffold dependency
      - Go test suite across all packages
    status: done
    srds:
      - srd019-eval-harness
      - srd020-bench-web-ui
      - srd021-agent-cli-exec-tool
      - srd022-builtin-tools
      - srd023-cli-exec-tools
      - srd024-blocking-input-tools
    use_cases:
      - id: rel01.0-uc001-generator-coding
        summary: Generator agent solves Go coding tasks using YAML config
        status: done
      - id: rel01.0-uc002-evaluator-benchmark
        summary: Evaluator runs generator across models and collects results
        status: done
      - id: rel01.0-uc003-bench-visualization
        summary: Bench serves web UI for evaluation result exploration
        status: done

  - version: "02.0"
    name: Rollback lifecycle and tool language documentation
    description: |
      Checkpoint, suspend, resume, and rollback lifecycle foundations are
      implemented in the runtime. Lifecycle profiles expose checkpoint history
      and rollback through first-class STL builtin tools. Tool-as-vocabulary
      authoring and sentence-to-word migration guidance are specified, with
      remaining work tracked as documentation, reference-profile follow-up, and
      a planned internal/tools package split that leaves internal/tools/stl as a
      temporary compatibility facade.
    status: in_progress
    srds:
      - srd025-rollback-lifecycle
      - srd026-lifecycle-tools
    use_cases:
      - id: rel02.0-uc001-approval-suspend-resume
        summary: Agent suspends at approval gate and resumes from checkpoint
        status: planned
      - id: rel02.0-uc002-history-rollback
        summary: User inspects history and rolls back after a bad tool action
        status: done
      - id: rel02.0-uc003-tool-authoring
        summary: Developer authors a new tool as a vocabulary word
        status: planned
      - id: rel02.0-uc004-sentence-tool-migration
        summary: Developer migrates a sentence-shaped tool into machine-composed words
        status: planned
    follow_up:
      - id: agent-core-vk8j
        summary: Reorganize standard tool library packages and tool declarations
        status: in_progress
