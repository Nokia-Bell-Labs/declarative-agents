        status: implemented
      - id: rel07.0-uc002-evaluator-generator-profile-boundary
        summary: Evaluator runs generator as a benchmark subject profile.
        status: implemented
      - id: rel07.0-uc003-planner-generator-profile-boundary
        summary: Planner executes materialized work through generator.
        status: implemented
      - id: rel07.0-uc004-bench-evaluator-profile-boundary
