{{- if .Values.executor.enabled }}
{{- $fullname := include "chatbot-mesh.fullname" . -}}
{{/*
The executor (srd006): the deployment-plane actuation agent that replaces the
standard-library Go provisioner as the deployment API (srd003 R4). It runs the
agent-core runtime with a mounted profile whose request-machine binds the helm and
kubectl CLIs in this image as exec words. It edits deployment values and triggers
rollouts only; it submits no endpoint or credential to a running agent.

Sanctioned image divergence (srd003 R1.3): the executor image carries helm and
kubectl and the chart at /chart alongside the runtime binary, diverging from the
binary-only runtime image because a deployment-plane agent needs its CLIs in its
container. Recorded here so the declarative-decomposition audit does not re-flag it.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullname }}-mesh-state
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
data:
  # The mesh view (srd003 R4) projected from the same values that render the
  # topology, mounted read-only for the executor's state read path.
  mesh.json: |-
    {{- include "chatbot-mesh.meshView" . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $fullname }}-executor
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullname }}-executor
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
rules:
  # Read deployment state for the rollout verification (kubectl rollout status).
  - apiGroups: [""]
    resources: [configmaps, services]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, statefulsets]
    verbs: [get, list, watch]
  # helm --wait judges readiness by watching the ReplicaSets and Pods a
  # Deployment owns, so an apply that waits needs to read them even though it
  # never writes them. Reading them is also what kubectl rollout status does.
  - apiGroups: [apps]
    resources: [replicasets]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  {{- if .Values.executor.allowApply }}
  # The apply path runs helm upgrade in-cluster, which manages the chart's objects
  # and the release Secret. Scoped to this namespace by the RoleBinding.
  #
  # helm needs to *read* the release Secrets before it can do anything at all --
  # even --dry-run queries them to find the current release -- so secrets appear
  # in a read rule here and not only in the write rule below. Without it an apply
  # fails at the validate step with "secrets is forbidden ... cannot list", which
  # the executor reports as a rejected patch: the caller is told their values were
  # bad when the executor could not read its own release (GH-747).
  - apiGroups: [""]
    resources: [secrets, serviceaccounts]
    verbs: [get, list, watch]
  # An upgrade re-renders the whole chart (srd006 R2.2), so the executor must be
  # able to read and write every object kind the chart contains -- not only the
  # workloads. It renders its own NetworkPolicy, ServiceAccount, Role, and
  # RoleBinding, and helm compares each against the cluster before applying.
  #
  # Writing Roles is a privilege-escalation surface, bounded here by two things:
  # the RoleBinding keeps every grant namespace-scoped, and Kubernetes forbids
  # granting permissions the grantor does not already hold, so the executor can
  # re-apply its own Role but cannot widen it.
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies]
    verbs: [get, list, watch, create, update, patch]
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [roles, rolebindings]
    verbs: [get, list, watch, create, update, patch]
  - apiGroups: [""]
    resources: [configmaps, secrets, services, serviceaccounts]
    verbs: [create, update, patch, delete]
  - apiGroups: [apps]
    resources: [deployments, statefulsets]
    verbs: [create, update, patch]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullname }}-executor
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullname }}-executor
subjects:
  - kind: ServiceAccount
    name: {{ $fullname }}-executor
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-executor
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "chatbot-mesh.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: executor
  template:
    metadata:
      labels:
        {{- include "chatbot-mesh.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: executor
    spec:
      serviceAccountName: {{ $fullname }}-executor
      containers:
        - name: executor
          # The executor image bundles the runtime, helm, kubectl, and the chart at
          # /chart (srd003 R1.3 divergence). The exec words run `helm upgrade
          # chatbot-mesh /chart ...`, so the release name matches the chart name.
          image: "{{ .Values.executor.image.repository }}:{{ .Values.executor.image.tag }}"
          imagePullPolicy: {{ .Values.executor.image.pullPolicy }}
          args:
            - "--profile"
            - "{{ .Values.profiles.mountPath }}/agents/executor/profile.yaml"
            - "--directory"
            - "{{ .Values.profiles.workMountPath }}"
            {{- with include "chatbot-mesh.otlpEndpoint" . }}
            - "--otel-otlp-endpoint"
            - {{ . | quote }}
            - "--otel-service-name"
            - "executor"
            {{- end }}
          env:
            - {name: EXECUTOR_BIND_HOST, value: "0.0.0.0"}
            # The workspace the agent writes its values file into, the same path
            # mounted as the work volume below and passed as --directory, so the
            # write stays inside the workspace wherever the mount moves (GH-737).
            - {name: EXECUTOR_WORK_DIR, value: {{ .Values.profiles.workMountPath | quote }}}
          ports:
            - {name: apply, containerPort: {{ .Values.executor.ports.apply }}}
            - {name: control, containerPort: {{ .Values.executor.ports.control }}}
            - {name: monitor, containerPort: {{ .Values.executor.ports.monitor }}}
          readinessProbe:
            httpGet: {path: /api/lifecycle/health, port: control}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.executor.resources | nindent 12 }}
          volumeMounts:
            - {name: profiles, mountPath: {{ .Values.profiles.mountPath }}, readOnly: true}
            - {name: work, mountPath: {{ .Values.profiles.workMountPath }}}
            - {name: mesh-state, mountPath: /etc/executor, readOnly: true}
      volumes:
        {{- include "chatbot-mesh.profilesVolume" . | nindent 8 }}
        - name: work
          emptyDir: {}
        - name: mesh-state
          configMap:
            name: {{ $fullname }}-mesh-state
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-executor
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
spec:
  selector:
    {{- include "chatbot-mesh.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: executor
  ports:
    - {name: apply, port: {{ .Values.executor.ports.apply }}, targetPort: apply}
    - {name: control, port: {{ .Values.executor.ports.control }}, targetPort: control}
    - {name: monitor, port: {{ .Values.executor.ports.monitor }}, targetPort: monitor}
{{- if .Values.executor.networkPolicy.enabled }}
---
# Authenticated apart from the chat path (srd003 R4.1 / srd006 R4.1) at the network
# layer: only the creator (and coordinator) may reach the apply surface. agent-core
# REST servers carry no inbound auth, so the boundary is enforced here rather than in
# the profile.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-executor
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
spec:
  podSelector:
    matchLabels:
      {{- include "chatbot-mesh.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: executor
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "chatbot-mesh.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: creator
      ports:
        - {protocol: TCP, port: apply}
{{- end }}
{{- end }}
