id: srd016-traceparent
title: W3C Traceparent Parse and Format

problem: |
  Agents that receive a parent trace context from an external caller need
  to parse the W3C traceparent header and inject it into the Go context
  so that OTel spans are linked to the parent trace. Without a shared
  parser, each agent implements its own traceparent handling.

  A multi-agent mesh also needs the trace to continue across REST calls between
  running agents. Today propagation exists only for subprocess-spawned children
  through --otel-parent-span; cross-agent REST calls start a fresh root span, so
  one logical request fragments into disconnected traces. This SRD therefore also
  governs injecting the active span's trace context into outbound REST client
  requests and extracting it on inbound REST server endpoints, reusing the same
  parser. HTTP propagation is a uniform transport concern with no per-operation
  authoring surface.

goals:
  - G1: Parse W3C traceparent version-00 headers into OTel SpanContext.
  - G2: Format SpanContext back to a W3C traceparent string.
  - G3: Convenience function to create a context with a remote parent span.
  - G4: Inject W3C trace context into outbound REST client requests from the active dispatch span.
  - G5: Extract W3C trace context on inbound REST server endpoints so a cross-agent trace continues.

requirements:
  R1:
    title: ParseTraceparent
    items:
      - R1.1: "ParseTraceparent(tp string) parses a W3C traceparent header with format \"00-<traceID>-<spanID>-<flags>\"."
      - R1.2: Returns a remote SpanContext on success, error on malformed input.
      - R1.3: Rejects non-00 version prefixes.
      - R1.4: Validates trace-id, span-id, and trace-flags hex encoding.

  R2:
    title: FormatTraceparent
    items:
      - R2.1: "FormatTraceparent(sc SpanContext) builds a W3C traceparent string from a SpanContext."
      - R2.2: Returns empty string for invalid SpanContext.

  R3:
    title: ParseParentSpan
    items:
      - R3.1: ParseParentSpan(raw string) parses a traceparent and returns a context carrying the remote span.
      - R3.2: Empty input returns context.Background() with no error.
      - R3.3: Invalid input returns a descriptive error.

  R4:
    title: Outbound REST traceparent injection
    items:
      - R4.1: Outbound REST client requests SHALL inject a traceparent header formatted (R2) from the active dispatch span's SpanContext into the request headers.
      - R4.2: When the active span carries tracestate, REST client requests SHALL inject a tracestate header alongside traceparent, passed through opaquely.
      - R4.3: Injection SHALL apply uniformly to every outbound REST client request as a transport concern; it SHALL NOT be author-configurable per operation and SHALL NOT add any rest-tool-format surface.
      - R4.4: When no recording span is active, REST client requests SHALL omit the traceparent header rather than emit an invalid one.

  R5:
    title: Inbound REST traceparent extraction
    items:
      - R5.1: Inbound REST server endpoints SHALL extract an incoming traceparent header and parent the request span, and any machine_request span, on the extracted remote SpanContext (R1, R3).
      - R5.2: When present, an incoming tracestate header SHALL be carried onto the extracted context opaquely.
      - R5.3: An absent or malformed traceparent header SHALL fall back to current behavior, starting a new root span rather than failing the request.
      - R5.4: Extraction SHALL reuse the ParseTraceparent and ParseParentSpan primitives and SHALL NOT introduce a second parser.

non_goals:
  - W3C tracestate parsing or validation beyond opaque pass-through of the header value.
  - Version negotiation beyond version 00.
  - Propagation over transports other than the built-in REST client and server (for example message queues).

acceptance_criteria:
  - id: AC1
    criterion: ParseTraceparent correctly parses valid version-00 traceparent headers and rejects malformed input.
    traces: [R1.1, R1.2, R1.3, R1.4]

  - id: AC2
    criterion: FormatTraceparent round-trips with ParseTraceparent. Invalid SpanContext returns empty string.
    traces: [R2.1, R2.2]

  - id: AC3
    criterion: ParseParentSpan returns a context with remote span, handles empty input, and wraps errors.
    traces: [R3.1, R3.2, R3.3]

  - id: AC4
    criterion: Outbound REST client requests inject traceparent (and tracestate when present) from the active dispatch span uniformly, with no per-operation authoring surface, and omit the header when no recording span is active.
    traces: [R4.1, R4.2, R4.3, R4.4]

  - id: AC5
    criterion: Inbound REST server endpoints extract traceparent (and tracestate) to parent the request and machine_request spans, fall back to a new root on absent or malformed headers, and reuse the existing parser.
    traces: [R5.1, R5.2, R5.3, R5.4]

depends_on: []

implementation_status:
  done:
    - ParseTraceparent, FormatTraceparent, and ParseParentSpan primitives, and the subprocess --otel-parent-span propagation path, which remains unchanged and complementary to HTTP propagation.
    - Outbound injection (R4): the engine injects the active dispatch span into TraceContextAware commands (core.TraceContextAware, set in dispatchWithMonitor from the dispatch span context); the REST client's applyTraceContext writes traceparent (and tracestate when present) into every outbound request uniformly, omitting the header when no recording span is active. No rest-tool-format surface. Delivered by GH-310.
    - Inbound extraction (R5): the REST server's startMachineRequestSpan extracts an incoming traceparent (and tracestate), parents the machine_request span on the remote SpanContext through the global tracer, and falls back to a new root on absent or malformed headers using the same parser; traceparent/tracestate are allowed undeclared request headers. Delivered by GH-310.

