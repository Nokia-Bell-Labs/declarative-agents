# An ordered script: the dependency succeeds once, then fails. This is how a
# scenario drives a subject's failure path without restarting anything. The
# last response repeats once the script is exhausted.
routes:
  - method: POST
    path: /v1/deploy
    responses:
      - status: 200
        body:
          accepted: true
      - status: 500
        body:
          error: upstream unavailable

  - method: GET
    path: /v1/status
    responses:
      - status: 200
        body:
          state: ready
