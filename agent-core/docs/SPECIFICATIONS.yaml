go_test_coverage:
  note: >
    Go test functions across all packages provide coverage beyond the
    formal YAML test suites. Release 00.0 YAML coverage (92 cases) covers
    srd001-srd018 where Go tests already prove behavior. For release 01.0,
    the YAML suite (37 cases) indexes generator and evaluator integration
    targets. It also covers bench integration targets plus Go tests for
    profile and machine behavior. Tool behavior and child-agent behavior are
    covered there too. Builtin, exec, Ollama, and LLM extraction contracts have
    focused cases. Bench API and result behavior now have direct cases. The
    mage integration:uc003 target records a skipped/manual-precondition result,
    not automated UI proof. Release 02.0 YAML coverage (30 cases) covers
    rollback lifecycle, lifecycle tool adapter, and tool contract requirements.
    The 03.0 YAML coverage (42 cases) names implemented Go tests for REST
    config loading, client execution, async send/await, server signal handling,
    OpenAPI import, credential resolution, redirect and size policies, server
    validation, redaction behavior, live Ollama OpenAPI model-listing, and
    documentation-curator ownership, curator validation workflows, generic REST fan-in, lifecycle-control routing, payload propagation, terminal-state routing, listener shutdown, migration smoke coverage, machine_request conformance checks, and Puppeteer coverage for machine_request documentation UX. Package tests cover
    srd009-srd018 and domain packages. Release 04.0 has package tests for the
    monitor store, metric export, REST API SRDs, and the cmd/agent release
    proof. mage integration:uc004 runs the release proof. Release 05.0 starts
    with mage integration:uc008 for monitored Qwen token progress. Run `go test
    ./... -v | grep -c '=== RUN'` for the current test function count.

