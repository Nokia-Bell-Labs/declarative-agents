id: test-rel05.0-control-plane
title: Test Suite for Release 05.0 Control Plane
release: "05.0"

overview: |
  This suite covers the mesh control plane (srd004 coordinator, srd005 creator):
  a provisioning intent flows from the UX agent through the coordinator to the
  creator's instance operations and back as aggregated status, with the
  deployment-API authority held by the creator alone.

  The integration:controlPlane tracer is a fake-backed transport-and-authority
  proof. It runs the real coordinator and creator agents against a fake deployment
  API and proves the intent flow (chatbot -> coordinator -> creator -> deployment
  API), the request/response sequencing, and the authority boundary (no endpoint or
  credential crosses, only the creator calls the deployment API). It does not prove
  the behavioral lifecycle: a real corpus-ingest with count verification, a real
  checkpoint-resume rollout, distinct create/restart/terminate workflows, or a
  grounded turn on a newly added source. Those need the real executor and profiles
  (the executor behavioral tracer is integration:executor) and are not asserted
  here; the trace links below relate the case to the srd004/srd005 acceptance
  criteria structurally, not as behavioral proof.

traces:
  - rel05.0-uc001-control-plane-provisioning

preconditions:
  - agent-core is available for the request runtime and REST client transport.
  - The chatbot, coordinator, and creator profiles are deployed with declared clients between them; the creator alone holds the deployment-API credentials.
  - A deployment API and the chart's values-to-config co-generation are reachable.

test_cases:
  - use_case: rel05.0-uc001-control-plane-provisioning
    name: Provisioning intent tracer across chatbot, coordinator, and creator
    integration_target: mage integration:controlPlane
    status: implemented
    description: |
      Drives a provisioning intent through the real coordinator and creator agents
      against a fake deployment API: the chatbot delegates an add-a-source intent to
      the coordinator through its declared client; the coordinator sequences an
      ingest request then a rollout request to the creator, forwarding the desired
      values; the creator drives the deployment API's apply and reads the rollout;
      the coordinator aggregates status. Asserts the authority boundary: the chatbot
      and coordinator submit no endpoint or credential, and only the creator calls
      the deployment API. The deployment API is a fake, so this proves transport
      sequencing and authority, not the behavioral lifecycle -- a real corpus-ingest
      with count verification, a real checkpoint-resume rollout, or a grounded turn
      on the new source are not asserted (see overview).
    inputs:
      intent: add a directory as a knowledge source
      directories: [one seeded directory]
      agents: [chatbot, coordinator, creator]
    expected:
      chatbot_delegates_intent_no_credential: true
      coordinator_sequences_ingest_then_rollout: true
      coordinator_forwards_values_and_requests_rollout: true
      creator_drives_apply_and_reads_rollout_via_deployment_api: true
      only_creator_calls_deployment_api: true
      # Not proven by this fake-backed tracer (see overview): real corpus-ingest
      # count verification, a real checkpoint-resume rollout, and a grounded turn
      # on the newly added source.
    traces:
      - rel05.0-uc001-control-plane-provisioning S1
      - rel05.0-uc001-control-plane-provisioning S2
      - rel05.0-uc001-control-plane-provisioning S3
      - rel05.0-uc001-control-plane-provisioning S4
      - rel05.0-uc001-control-plane-provisioning S5
      - srd004-coordinator AC1
      - srd004-coordinator AC2
      - srd004-coordinator AC3
      - srd004-coordinator AC4
      - srd004-coordinator AC5
      - srd005-creator AC1
      - srd005-creator AC2
      - srd005-creator AC3
      - srd005-creator AC4
      - srd005-creator AC5
      - srd003-chatbot-deployment AC4
