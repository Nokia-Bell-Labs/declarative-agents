id: srd025-rollback-lifecycle
title: Rollback, Checkpoint, Suspend, and Resume Lifecycle

problem: |
  Long-running agent programs need a safe way to record what happened, stop at
  approval gates, resume later, and roll back from bad actions. Persistence and
  resume rest on the srd035 checkpoint port: Save records the resumable position
  and the ordered execution log; Load restores them. The srd036 Dolt adapter is
  the default persistent backend, and NoopCheckpoint keeps disabled-mode
  execution unchanged.

  Rollback has two halves that this SRD keeps separate. DB-persisted state is
  rewound by the Dolt adapter's git-style Revert(run_id, step_index) (srd036).
  External effects -- files, external resources -- are reversed by a lifecycle
  tool that walks the reverted execution entries in reverse and hands each
  restored, receipt-bearing Result back to its tool's receipt-consuming Undo.
  The receipt is the memento: the originating tool encodes it during Execute and
  is the only decoder, so the engine and the checkpoint adapters never interpret
  it. This SRD defines the requirements for that lifecycle -- checkpoint,
  history, suspend, resume, and the two-part rollback -- without a three-layer
  state model, a key/blob StateStore, a Workspace layer, a CheckpointPolicy, or
  an engine-owned undo-walk.

goals:
  - G1: Rest persistence and resume on the srd035 checkpoint port with the srd036 Dolt adapter as the default persistent backend.
  - G2: Define the ordered execution history that history inspection and rollback traverse.
  - G3: Make reversibility receipt-driven -- tools encode a receipt on Execute and consume it on Undo -- with the engine and adapters treating receipts as opaque.
  - G4: Define rollback as Dolt Revert for DB-persisted state plus a lifecycle-tool reverse receipt walk for external effects.
  - G5: Preserve suspend, approval gates, and a single resume contract.
  - G6: Keep lifecycle behavior opt-in with zero persistence overhead when disabled.
  - G7: Keep history and rollback as declarative, profile-first lifecycle tool actions.

requirements:
  R1:
    title: Checkpoint-port-backed persistence
    items:
      - R1.1: Agent state, command/domain state, and conversation SHALL be persisted through the srd035 checkpoint port (Save(Position, Execution)), not a key/blob StateStore.
      - R1.2: The default persistent backend SHALL be the srd036 Dolt adapter; NoopCheckpoint SHALL be the default when persistence is disabled.
      - R1.3: Position SHALL carry the resumable machine position and the folded conversation snapshot; Execution SHALL carry the ordered entries with their opaque receipts.
      - R1.4: The runtime SHALL NOT model workspace or filesystem state as a separate persisted state layer; external effects are reversed through receipts rather than Workspace refs.

  R2:
    title: Execution history
    items:
      - R2.1: Each dispatched step SHALL append one Execution Entry (iteration, timestamp, command name, from state, to state, signal, result digest, and receipt) per srd035.
      - R2.2: Execution SHALL preserve dispatch order for forward inspection and reverse traversal.
      - R2.3: History inspection SHALL be expressible as a MachineSpec transition to a lifecycle tool such as checkpoint_history, which reads Dolt commit history (srd026).
      - R2.4: History recording SHALL be absent when persistence is disabled (NoopCheckpoint).

  R3:
    title: Receipt-driven reversibility
    items:
      - R3.1: State-mutating commands SHALL encode an opaque Receipt during Execute that captures what a later Undo needs, such as prior file content, external resource ids, or a workspace commit hash.
      - R3.2: "Command Undo SHALL be receipt-consuming: it takes the restored receipt-bearing Result and reverses the external effect."
      - R3.3: Read-only commands SHALL return an empty receipt and a no-op Undo.
      - R3.4: The engine and the checkpoint adapters SHALL treat receipts as opaque and SHALL NOT interpret them; only the originating tool decodes its receipt.
      - R3.5: The lifecycle validator SHALL check receipt presence for reversible state-mutating tools; receipt sufficiency SHALL be each tool's own round-trip test.

  R4:
    title: Two-part rollback
    items:
      - R4.1: Rollback of DB-persisted state SHALL be the git-style Revert(run_id, step_index) provided by the srd036 Dolt adapter.
      - R4.2: Rollback of external effects SHALL be a reverse receipt walk that, after Revert, hands each reverted entry's restored Result to its tool's receipt-consuming Undo in reverse dispatch order.
      - R4.3: The reverse receipt walk SHALL live in the lifecycle tool (checkpoint_rollback), not in the engine.
      - R4.4: Irreversible entries SHALL be skipped and logged, and the rollback report SHALL name them.
      - R4.5: Rollback SHALL return the machine position from which execution can resume.
      - R4.6: Rollback SHALL NOT require machine.yaml changes; it is lifecycle behavior around the machine.

  R5:
    title: Suspend and approval gates
    items:
      - R5.1: The runtime SHALL support a suspended run status when lifecycle features are enabled.
      - R5.2: A suspend or approval-gate tool SHALL emit a machine-declared signal that ends the run without failure.
      - R5.3: Suspend SHALL persist a checkpoint through the srd035 port before returning StatusSuspended.
      - R5.4: Approval gates SHALL be expressible as machine.yaml transitions to an internal tool.
      - R5.5: Approval outcomes such as approved and rejected SHALL map to explicit machine signals on resume.

  R6:
    title: Resume
    items:
      - R6.1: Resume SHALL Load Position and Execution through the srd035 port, backed by the Dolt adapter by default.
      - R6.2: Resume SHALL restore agent state and conversation from the typed snapshot and re-enter the same machine.
      - R6.3: Resume SHALL be a single path with no restore-hook fan-out.
      - R6.4: Resume SHALL validate the current machine and tool declarations before re-entering the loop.
      - R6.5: Resume errors SHALL distinguish missing checkpoint, incompatible checkpoint, and load failure.

  R7:
    title: Opt-in and zero-overhead defaults
    items:
      - R7.1: Rollback, checkpointing, suspend, resume, and approval-gate behavior SHALL be opt-in.
      - R7.2: When persistence is disabled (NoopCheckpoint), existing machines SHALL run with unchanged behavior and no persistence.
      - R7.3: Disabled lifecycle features SHALL not persist checkpoints or record history.

  R8:
    title: Tool contract integration
    items:
      - R8.1: Tool declarations SHOULD follow cfg-tool-authoring-standard for side_effects, reversibility, receipt-based undo, errors, and relationships.
      - R8.2: Tools that mutate state SHOULD declare a receipt-encoding Execute and a receipt-consuming Undo.
      - R8.3: Irreversible tools SHOULD require confirmation and declare why no receipt can reverse the effect.
      - R8.4: Lifecycle tools SHALL declare emitted signals, typed config, output shape, side effects, reversibility, undo strategy, errors, and relationships.

  R9:
    title: Declarative lifecycle tools and profiles
    items:
      - R9.1: History and rollback SHALL be profile-first lifecycle machines that dispatch declared lifecycle tools such as checkpoint_history and checkpoint_rollback.
      - R9.2: Persistence and Revert operations SHALL remain in the checkpoint port and the Dolt adapter and SHALL NOT depend on Cobra, ToolDef, agent profiles, or STL factory wiring.
      - R9.3: The reverse receipt walk SHALL be owned by the checkpoint_rollback lifecycle tool, which hands restored Results to tool Undo.
      - R9.4: Lifecycle tools SHALL NOT shell back into the agent binary to perform history or rollback.

non_goals:
  - Retaining the three-layer state model, the key/blob StateStore, Workspace/GitWorkspace, or CheckpointPolicy.
  - An engine-owned reverse undo-walk; the walk lives in the checkpoint_rollback lifecycle tool.
  - Reverting files, HTTP, or workspace state inside the Dolt adapter; Revert is DB-only and tools own external compensation through receipts.
  - Defining the Dolt schema or revert mechanics (srd036) or the checkpoint port wire format and Receipt shape (srd035).
  - Making core.Loop concurrent.

acceptance_criteria:
  - id: AC1
    criterion: Persistence and resume rest on the srd035 checkpoint port with the srd036 Dolt default backend and NoopCheckpoint when disabled; no three-layer state model, StateStore, Workspace, or CheckpointPolicy remains.
    traces: [R1.1, R1.2, R1.3, R1.4, R6.1, R6.2, R6.3, R6.4, R6.5, R7.1, R7.2, R7.3]

  - id: AC2
    criterion: Execution history is the ordered srd035 Entry log with receipts, preserving dispatch order and inspectable through checkpoint_history over Dolt commit history.
    traces: [R2.1, R2.2, R2.3, R2.4]

  - id: AC3
    criterion: Reversibility is receipt-driven -- tools encode receipts on Execute and consume them on Undo, read-only tools return empty receipts, the engine treats receipts as opaque, and the validator checks presence while tools test sufficiency.
    traces: [R3.1, R3.2, R3.3, R3.4, R3.5, R8.1, R8.2, R8.3, R8.4]

  - id: AC4
    criterion: Rollback is Dolt Revert for DB-persisted state plus a lifecycle-tool reverse receipt walk for external effects, skipping and logging irreversible entries, returning a resumable position, with no engine undo-walk and no machine.yaml changes.
    traces: [R4.1, R4.2, R4.3, R4.4, R4.5, R4.6, R9.1, R9.2, R9.3, R9.4]

  - id: AC5
    criterion: Suspend and approval gates end the run through machine-declared signals with a checkpoint persisted via the srd035 port, and resume is a single Load-and-re-enter path.
    traces: [R5.1, R5.2, R5.3, R5.4, R5.5]

test_trace_plan:
  - test_suite: test-rel02.0-lifecycle
    covers: [AC1, AC2, AC3, AC4, AC5]
  - test_suite: test-rel02.0-tool-contracts
    covers: [AC3]

