tools:
- name: commit_workspace_baseline
  type: builtin
  init: commit_workspace_baseline
  visibility: internal
  emits:
  - WorkspaceBaselineCommitted
  - CommandError
  description: Create the baseline git commit for the current point workspace.
  category: word
  side_effects:
  - kind: filesystem_write
    target: point_workspace_git_history
    paths:
    - .git
    description: Creates the baseline commit in the point workspace repository.
  reversibility:
    classification: compensatable
    undo: reset_or_recreate_workspace_repo
  undo:
    strategy: compensating_action
    description: Reset the point repository to the intended baseline or recreate the point workspace.
  problem: The machine needs a declared word for committing the point workspace baseline without embedding that workflow step in Go control flow.
  goals:
  - Perform the commit_workspace_baseline action as one machine-selected word.
  - Return an explicit signal that lets the MachineSpec choose the next state.
  - Keep sequencing outside the tool implementation and in machine.yaml.
  requirements:
    input:
    - must consume parameters from tool input, prior Result, or configured command/domain state
    output:
    - must emit one declared signal and return machine-readable output when available
    errors:
    - must emit CommandError for infrastructure failures and preserve domain failures as declared signals
  non_goals:
  - Does not choose the next workflow step; machine.yaml owns sequencing.
  - Does not hide unrelated tool execution behind this word.
  errors:
  - signal: CommandError
    condition: required input, configuration, or runtime state is invalid
    message_shape: 'commit_workspace_baseline: <error>'
    state_after_failure: no additional workflow step is executed by this tool
  relationships:
    before:
    - machine-selected predecessor
    after:
    - machine-selected successor
  output:
    description: commit_workspace_baseline command result summary.
    schema:
      type: object
      properties:
        message:
          type: string
        signal:
          type: string
      required:
      - message
