tools:
- name: check_result
  type: builtin
  init: check_result
  description: Evaluate validation results and decide retry vs. advance vs. fail.
  visibility: internal
  emits:
  - ValidationPassed
  - RetryAvailable
  - RetriesExhausted
  - CommandError
  category: stateful_internal
  side_effects:
  - kind: state_mutation
    target: pipeline_state
    state: retry_count_or_task_status_updated
    description: Updates retry counters and task status based on execution result.
  reversibility:
    classification: reversible
    undo: pipeline_state_restore
  undo:
    strategy: session_state_restore
    description: Restore the pipeline state snapshot captured before result evaluation.
  problem: The machine needs a declared word for checking planner execution results without embedding that workflow step in Go control flow.
  goals:
  - Perform the check_result action as one machine-selected word.
  - Return an explicit signal that lets the MachineSpec choose the next state.
  - Keep sequencing outside the tool implementation and in machine.yaml.
  requirements:
    input:
    - must consume parameters from tool input, prior Result, or configured command/domain state
    output:
    - must emit one declared signal and return machine-readable output when available
    errors:
    - must emit CommandError for infrastructure failures and preserve domain failures as declared signals
  non_goals:
  - Does not choose the next workflow step; machine.yaml owns sequencing.
  - Does not hide unrelated tool execution behind this word.
  errors:
  - signal: CommandError
    condition: required input, configuration, or runtime state is invalid
    message_shape: 'check_result: <error>'
    state_after_failure: no additional workflow step is executed by this tool
  relationships:
    before:
    - machine-selected predecessor
    after:
    - machine-selected successor
  output:
    description: check_result command result summary.
    schema:
      type: object
      properties:
        message:
          type: string
        signal:
          type: string
      required:
      - message
