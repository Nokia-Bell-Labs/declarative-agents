# State machine for the Go code-generation agent.
# Adapted from the generator's machine.yaml for use with the
# unified agent binary (cmd/agent).

name: generator
initial_state: Idle

budget:
  max_iterations: 100
  max_consecutive_parse_errors: 5

states:
  - Idle
  - Composing
  - Parsing
  - ValidatingBuild
  - ValidatingLint
  - ValidatingTest
  - Succeeded
  - Failed
  - BudgetExceeded

terminal_states:
  - Succeeded
  - Failed
  - BudgetExceeded

signals:
  - Seed
  - LLMResponded
  - ToolDone
  - ToolFailed
  - ParseFailed
  - TaskCompleted
  - CommandError
  - BudgetExhausted
  - EditDone

transitions:
  # Initial entry: start by invoking the LLM
  - state: Idle
    signal: Seed
    next: Composing
    action: invoke_llm

  # LLM responded: parse the raw output
  - state: Composing
    signal: LLMResponded
    next: Parsing
    action: parse_response

  # Parse succeeded with a tool call: dispatch the tool dynamically
  - state: Parsing
    signal: ToolDone
    next: Composing
    action: $tool

  # Parse produced TaskCompleted (done tool): run declared validation sequence
  - state: Parsing
    signal: TaskCompleted
    next: ValidatingBuild
    action: build

  # Parse failed (malformed JSON): report error back to LLM
  - state: Parsing
    signal: ParseFailed
    next: Composing
    action: report_parse_error

  # Tool completed successfully: feed result back to LLM
  - state: Composing
    signal: ToolDone
    next: Composing
    action: invoke_llm

  # Edit completed: nudge the model to re-read before continuing
  - state: Composing
    signal: EditDone
    next: Composing
    action: nudge_reread

  # Tool failed (recoverable): feed error back to LLM
  - state: Composing
    signal: ToolFailed
    next: Composing
    action: invoke_llm

  # Validation sequence: build -> lint -> test
  - state: ValidatingBuild
    signal: ToolDone
    next: ValidatingLint
    action: lint

  - state: ValidatingBuild
    signal: ToolFailed
    next: Failed

  - state: ValidatingLint
    signal: ToolDone
    next: ValidatingTest
    action: test

  - state: ValidatingLint
    signal: ToolFailed
    next: Failed

  - state: ValidatingTest
    signal: ToolDone
    next: Succeeded

  - state: ValidatingTest
    signal: ToolFailed
    next: Failed

  # Error handling: infrastructure failures terminate the run
  - state: Composing
    signal: CommandError
    next: Failed

  - state: Parsing
    signal: CommandError
    next: Failed

  - state: ValidatingBuild
    signal: CommandError
    next: Failed

  - state: ValidatingLint
    signal: CommandError
    next: Failed

  - state: ValidatingTest
    signal: CommandError
    next: Failed

  # Budget exhaustion
  - state: Composing
    signal: BudgetExhausted
    next: BudgetExceeded
