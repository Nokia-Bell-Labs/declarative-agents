id: test-rel09.1-routing-fanout
title: Test Suite for Release 09.1 Routing and Multi-RAG Fan-Out
release: "09.1"

overview: |
  This suite validates the routing and fan-out extension of the chatbot turn
  (srd014 R2, R3): the LLM $tool router that dispatches one chat-LLM word, and the
  sequential two-RAG fan-out that cites both disjoint corpora, degrades on a per-RAG
  failure (CommandError), and excludes an embedding-space mismatch (QueryRejected)
  through visible machine transitions.

  This retained suite is a historical relocation pointer. The canonical suite,
  profiles, tests, and integration target live under examples/chatbot-mesh as
  release 01.0.

traces:
  - rel09.1-uc001-routed-fanout

preconditions:
  - agent-core is available as AGENT_CORE_ROOT or a sibling ../agent-core checkout.
  - A Chroma server and an Ollama are reachable with the configured embedding, router, and two chat-LLM models.
  - examples/chatbot-mesh owns the chatbot profile, router prompt, and fan-out declarations.

test_cases:
  - use_case: rel09.1-uc001-routed-fanout
    name: Routed two-RAG fan-out tracer over disjoint corpora
    integration_target: cd ../examples/chatbot-mesh && mage integration:chatbot
    go_test: cd ../examples/chatbot-mesh && go test ./magefiles -run '^TestChatbotFanOutCoGeneratedForNRags$'
    status: implemented
    description: |
      Integration.Chatbot starts one Chroma container with two disjoint collections
      (the ingest fixture for rag0 and a seeded disjoint Solar Ridge corpus for
      rag1), launches two rag-server agents and the router-enabled chatbot, and
      drives the chat endpoint. A factual turn and an analytical turn exercise the
      $tool router; the chatbot span log is asserted to show both the fast and the
      deep chat model answered (the router dispatched each word). A spanning turn
      draws the disjoint rag1 corpus into the answer (sequential fan-out; compose
      renders each RAG under its own [ragN] header, no merge word). Stopping rag1
      degrades the next turn to a 200 with the disjoint corpus absent (R3.2 via the
      CommandError machine transition). Verified end to end against live Docker and
      Ollama; skips cleanly without them, naming a missing model.
    inputs:
      chatbot_profile: ../examples/chatbot-mesh/agents/chatbot/profile.yaml
      rag_clients: [rag0, rag1]
      turns: factual, analytical, cross-corpus, then a degraded follow-up
      fault: rag1 stopped before the degraded turn
    expected:
      router_dispatches_both_chat_models: true
      fanout_draws_both_corpora: true
      degraded_turn_omits_stopped_corpus: true
      excluded_source_routes_on_queryrejected: true
    traces:
      - rel09.1-uc001-routed-fanout S1
      - rel09.1-uc001-routed-fanout S2
      - rel09.1-uc001-routed-fanout S3
      - rel09.1-uc001-routed-fanout S4
      - srd014-chatbot-agent AC2
      - srd014-chatbot-agent AC3
