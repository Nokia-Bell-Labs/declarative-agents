tools:
- name: extract_all
  type: builtin
  init: extract_all
  description: Extract all requirements as a single task group (passthrough mode).
  visibility: internal
  emits:
  - TaskExtracted
  - AllDone
  - Blocked
  - CommandError
  category: stateful_internal
  side_effects:
  - kind: state_mutation
    target: pipeline_state
    state: passthrough_task_group_selected
    description: Updates the current task to represent the full requirement group.
  reversibility:
    classification: reversible
    undo: pipeline_state_restore
  undo:
    strategy: session_state_restore
    description: Restore the pipeline state snapshot captured before extraction.
  problem: The machine needs a declared word for extracting all planning tasks without embedding that workflow step in Go control flow.
  goals:
  - Perform the extract_all action as one machine-selected word.
  - Return an explicit signal that lets the MachineSpec choose the next state.
  - Keep sequencing outside the tool implementation and in machine.yaml.
  requirements:
    input:
    - must consume parameters from tool input, prior Result, or configured command/domain state
    output:
    - must emit one declared signal and return machine-readable output when available
    errors:
    - must emit CommandError for infrastructure failures and preserve domain failures as declared signals
  non_goals:
  - Does not choose the next workflow step; machine.yaml owns sequencing.
  - Does not hide unrelated tool execution behind this word.
  errors:
  - signal: CommandError
    condition: required input, configuration, or runtime state is invalid
    message_shape: 'extract_all: <error>'
    state_after_failure: no additional workflow step is executed by this tool
  relationships:
    before:
    - machine-selected predecessor
    after:
    - machine-selected successor
  output:
    description: extract_all command result summary.
    schema:
      type: object
      properties:
        message:
          type: string
        signal:
          type: string
      required:
      - message
