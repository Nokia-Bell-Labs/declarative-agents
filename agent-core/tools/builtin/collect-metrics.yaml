tools:
- name: collect_metrics
  type: builtin
  init: collect_metrics
  visibility: internal
  emits:
  - MetricsCollected
  - CommandError
  description: Write evaluation metadata (exit code, duration, test results, tokens) to meta.json.
  category: word
  side_effects:
  - kind: filesystem_write
    target: point_metrics
    paths:
    - meta.json
    description: Writes point metadata to meta.json.
  reversibility:
    classification: reversible
    undo: workspace_restore
  undo:
    strategy: workspace_restore
    description: Restore point artifact files to a previous workspace ref.
    requires:
    - Workspace
  problem: The machine needs a declared word for collecting evaluator point metrics without embedding that workflow step in Go control flow.
  goals:
  - Perform the collect_metrics action as one machine-selected word.
  - Return an explicit signal that lets the MachineSpec choose the next state.
  - Keep sequencing outside the tool implementation and in machine.yaml.
  requirements:
    input:
    - must consume parameters from tool input, prior Result, or configured command/domain state
    output:
    - must emit one declared signal and return machine-readable output when available
    errors:
    - must emit CommandError for infrastructure failures and preserve domain failures as declared signals
  non_goals:
  - Does not choose the next workflow step; machine.yaml owns sequencing.
  - Does not hide unrelated tool execution behind this word.
  errors:
  - signal: CommandError
    condition: required input, configuration, or runtime state is invalid
    message_shape: 'collect_metrics: <error>'
    state_after_failure: no additional workflow step is executed by this tool
  relationships:
    before:
    - machine-selected predecessor
    after:
    - machine-selected successor
  output:
    description: collect_metrics command result summary.
    schema:
      type: object
      properties:
        message:
          type: string
        signal:
          type: string
      required:
      - message
