name: ollama-rest-model-listing
purpose: |-
  Reference Qwen + REST boundary profile for listing local Ollama models.
  The machine lets the model choose the OpenAPI-backed ollama_list_models word,
  then feeds the live REST result back so the final answer names observed
  models instead of guessing.
configuration:
  machine: testdata/conformance/rest/ollama-machine.yaml
  tools: testdata/conformance/rest/ollama-tools.yaml
invariants:
  - REST authority lives in testdata/conformance/rest/ollama-rest.yaml.
  - The selected model-visible manifest contains only ollama_list_models and done.
  - OpenAPI imports populate REST definitions without generated Go code.
  - The final answer must use model names from the REST result.
initial_state: Idle
budget:
  max_iterations: 8
  max_consecutive_parse_errors: 2
states:
  - name: Idle
    meaning: Initial state before the model receives the operator request.
  - name: Composing
    meaning: The Qwen boundary is deciding the next tool call or final answer.
  - name: Parsing
    meaning: The model response is being parsed into one tool request.
  - name: Succeeded
    meaning: Terminal. The model listed live Ollama models and produced a final answer.
  - name: Failed
    meaning: Terminal. The model or REST boundary failed.
  - name: BudgetExceeded
    meaning: Terminal. The loop exhausted its iteration or parse-error budget.
terminal_states:
  - Succeeded
  - Failed
  - BudgetExceeded
signals:
  - name: Seed
    trigger: Loop initialization.
  - name: LLMResponded
    trigger: Qwen returned a response.
  - name: ToolDone
    trigger: The parser found a model-selected tool call.
  - name: ParseFailed
    trigger: The model response could not be parsed.
  - name: TaskCompleted
    trigger: The model called done with the final answer.
  - name: RESTResponded
    trigger: Ollama returned the configured successful model-listing response.
  - name: RESTDomainFailed
    trigger: Ollama returned a configured service-domain failure.
  - name: CommandError
    trigger: Runtime or REST boundary infrastructure failed.
  - name: BudgetExhausted
    trigger: Iteration or parse-error budget was exhausted.
transitions:
  - state: Idle
    signal: Seed
    next: Composing
    action: invoke_llm
  - state: Composing
    signal: LLMResponded
    next: Parsing
    action: parse_response
  - state: Parsing
    signal: ToolDone
    next: Composing
    action: $tool
  - state: Parsing
    signal: TaskCompleted
    next: Succeeded
  - state: Parsing
    signal: ParseFailed
    next: Composing
    action: report_parse_error
  - state: Composing
    signal: ToolDone
    next: Composing
    action: invoke_llm
  - state: Composing
    signal: RESTResponded
    next: Composing
    action: invoke_llm
  - state: Composing
    signal: RESTDomainFailed
    next: Composing
    action: invoke_llm
  - state: Composing
    signal: CommandError
    next: Failed
  - state: Parsing
    signal: CommandError
    next: Failed
  - state: Composing
    signal: BudgetExhausted
    next: BudgetExceeded
