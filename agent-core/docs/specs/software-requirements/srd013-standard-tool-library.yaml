id: srd013-standard-tool-library
title: Standard Tool Library (STL)

problem: |
  Every agentic agent needs a common set of tools: file operations (read,
  write, edit, find, list), build tools (build, vet, lint, test), LLM
  interaction commands (invoke_llm, parse_response), and subprocess
  utilities. Without a shared library, each agent reimplements these tools
  with inconsistent interfaces and behavior. The STL provides production-
  ready implementations that any agent can import and register.

goals:
  - G1: Shared file tools (read, write, edit, find, list_files) confined to a workspace root.
  - G2: Shared build tools (build, vet, lint, test) for Go projects.
  - G3: LLM interaction commands (invoke_llm, parse_response, done) with tracing.
  - G4: Subprocess execution utilities with process group management.
  - G5: Batch registration helpers (RegisterFileTools, RegisterBuildTools, RegisterAll).

requirements:
  R1:
    title: File tools
    items:
      - R1.1: read tool reads file contents with optional line range (startLine, endLine).
      - R1.2: write tool creates or overwrites a file at a validated path.
      - R1.3: edit tool performs search-and-replace operations on files.
      - R1.4: find tool searches file contents using ripgrep with workspace confinement.
      - R1.5: list_files tool lists directory contents.
      - R1.6: All file tools validate paths against the workspace root via ValidatePath.

  R2:
    title: Build tools
    items:
      - R2.1: build runs go build ./... in the workspace root.
      - R2.2: vet runs go vet ./... in the workspace root.
      - R2.3: lint runs golangci-lint run in the workspace root.
      - R2.4: test runs go test ./... in the workspace root.

  R3:
    title: LLM tools
    items:
      - R3.1: invoke_llm assembles messages via PromptAssembler, calls Chat, and appends the response to the conversation.
      - R3.2: parse_response extracts tool calls from LLM output using a ResponseParser. The "done" tool name is recognised inside parse_response to signal TaskCompleted; it is not a separate Command.
      - R3.3: report_parse_error feeds parse failure feedback back to the LLM, classifying the error via ClassifyParseError.
      - R3.4: reset_history clears the Conversation for a fresh LLM context, emitting the previous message count as a span attribute.
      - R3.5: invoke_llm checks ContextLimit; if estimated tokens exceed the limit it returns CommandError before calling Chat.
      - R3.6: invoke_llm supports CallTimeout (per-call context deadline) and NumCtx (Ollama context window size forwarded via ChatOptions).
      - R3.7: invoke_llm emits verbose OTel attributes (genai input/output messages) when Verbose is true.

  R4:
    title: Subprocess utilities
    items:
      - R4.1: SubprocessResult maps subprocess output and error to a core.Result with ToolDone or ToolFailed signals.
      - R4.2: ProcGroupCmd sets up a command to run in its own process group for clean cancellation.
      - R4.3: RunInProcGroup executes a command with process group management, capturing stdout, stderr, exit code, and elapsed time.
      - R4.4: CapOutput truncates output to a maximum line count, appending an omission summary. DefaultOutputLineCap (200) is the default limit.
      - R4.5: ExtractStringParam extracts a named string parameter from a serialised JSON tool request for use by tool builders.

  R7:
    title: Metrics helpers
    items:
      - R7.1: ParseTestMetrics extracts pass/fail/skip counts from go test output. Detects build-failed state (no tests ran).
      - R7.2: ParseBuildMetrics extracts unique file-level error counts from go build output.

  R5:
    title: Registration helpers
    items:
      - R5.1: RegisterFileTools registers all file tools scoped to a root directory.
      - R5.2: RegisterBuildTools registers all build tools scoped to a root directory.
      - R5.3: RegisterAll registers both file and build tools.

  R6:
    title: Workspace utilities
    items:
      - R6.1: ValidatePath normalizes paths against the workspace root, resolves symlinks, and rejects escapes.

non_goals:
  - Domain-specific tools (those are registered by individual agents).
  - Tool parameter validation beyond path confinement.
  - Retry or error recovery logic.

acceptance_criteria:
  - id: AC1
    criterion: File tools (read, write, edit, find, list_files) operate within workspace root boundaries. ValidatePath rejects path escapes.
    traces: [R1.1, R1.2, R1.3, R1.4, R1.5, R1.6]

  - id: AC2
    criterion: Build tools (build, vet, lint, test) execute Go toolchain commands and return structured results.
    traces: [R2.1, R2.2, R2.3, R2.4]

  - id: AC3
    criterion: LLM tools (invoke_llm, parse_response, report_parse_error, reset_history) integrate with Conversation, ResponseParser, and PromptAssembler. invoke_llm enforces ContextLimit, CallTimeout, and NumCtx. "done" is a tool name recognised in parse_response.
    traces: [R3.1, R3.2, R3.3, R3.4, R3.5, R3.6, R3.7]

  - id: AC4
    criterion: SubprocessResult maps output to ToolDone/ToolFailed. ProcGroupCmd enables process group cancellation. CapOutput and ExtractStringParam support tool builders.
    traces: [R4.1, R4.2, R4.3, R4.4, R4.5]

  - id: AC7
    criterion: ParseTestMetrics and ParseBuildMetrics extract structured ToolMetrics from go test and go build output.
    traces: [R7.1, R7.2]

  - id: AC5
    criterion: RegisterFileTools, RegisterBuildTools, and RegisterAll register tools in bulk with workspace scoping.
    traces: [R5.1, R5.2, R5.3]

depends_on:
  - srd_id: srd001-core-types
    symbols_used: [Command, Result, Signal, Cost, Builder, ToolDone, ToolFailed, CommandError]
  - srd_id: srd004-tool-registry
    symbols_used: [Registry, ToolSpec, Register]
  - srd_id: srd010-conversation
    symbols_used: [Conversation]
  - srd_id: srd007-tracer-interface
    symbols_used: [Tracer]
