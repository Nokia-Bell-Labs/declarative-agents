tools:
  - name: rag_resolve
    type: builtin
    init: rest_client_invoke
    category: boundary
    description: Create-or-get the served collection and carry the query vector forward.
    problem: Single-hop threading means the resolved collection id and the query vector must ride together into the query word.
    goals:
      - Create-or-get the plain served collection with no server-side embedding function.
      - Resolve the returned collection id for the query path.
      - Carry the caller-supplied query vector forward from the seeded request body.
    requirements:
      input:
        - The query vector is selected from the seeded request body output.
      output:
        - Output includes the mapped collection id and the carried query vector.
      errors:
        - Network, timeout, schema, and mapping failures emit CommandError.
    non_goals:
      - Does not configure a server-side embedding function.
      - Does not accept runtime method, URL, host, or auth overrides.
    parameters:
      type: object
      properties:
        query_embeddings: {type: array}
    emits: [CollectionReady, CommandError]
    output:
      description: Mapped Chroma collection id with the carried query vector.
      schema:
        type: object
        properties:
          mapped: {type: object}
          carried: {type: object}
    side_effects:
      - kind: external_api
        target: chroma.collection
        state: collection_upserted
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Create-or-get is idempotent for a stable collection name.
    config:
      rest_ref: chroma
      operation: rag_resolve_collection

  - name: rag_query
    type: builtin
    init: rest_client_invoke
    category: boundary
    description: Query the resolved collection with the caller-supplied query vector.
    problem: Chroma retrieval uses a client-supplied query vector threaded from the previous words.
    goals:
      - Thread the collection id and query vector from the previous Result.
      - Return the retrieved chunk ids, documents, and distances.
    requirements:
      input:
        - Collection id and query vector are selected from the previous Result output.
      output:
        - Output includes the retrieved chunk ids, documents, and distances.
      errors:
        - Network, timeout, schema, and mapping failures emit CommandError.
    non_goals:
      - Does not author the query vector.
      - Does not accept runtime method, URL, host, or auth overrides.
    parameters:
      type: object
      properties:
        collection: {type: string}
        query_embeddings: {type: array}
    emits: [QueryResponded, QueryRejected, CommandError]
    output:
      description: Mapped Chroma query result.
      schema:
        type: object
        properties:
          ids: {type: array}
          documents: {type: array}
          distances: {type: array}
    side_effects:
      - kind: external_api
        target: chroma.query
        state: read_only
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Querying a collection does not mutate state.
    config:
      rest_ref: chroma
      operation: rag_query
