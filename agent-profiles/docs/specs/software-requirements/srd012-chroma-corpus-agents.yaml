id: srd012-chroma-corpus-agents
title: Chroma Corpus Agents Functional Block

context: |
  The Chroma corpus agents are two configured profiles that use a local Chroma
  vector database as a retrieval boundary: an ingest profile that loads
  repository documents into a Chroma collection, and a reader profile that
  answers a question grounded in retrieved chunks. Both are pure agent-profiles
  configuration over existing agent-core boundary words: REST client words, the
  read tool, and invoke_llm. This SRD owns the Chroma corpus family requirements.

  Chroma does not embed text server-side over its raw HTTP API (see spike #239);
  the client must supply vectors. The agents therefore compute embeddings at a
  provider (a local Ollama /api/embed word) and thread the resulting vector into
  the Chroma add and query words using the REST client previous-Result parameter
  threading defined by agent-core srd028-rest-client-tools R12 (body_source
  previous_result, input_mapping, and carry_forward). No embedding vector is
  authored by a model; the vector always rides between boundary words.

  The reusable HTTP runtime, the embedding transport, and the threading mechanism
  stay in agent-core. The Chroma and Ollama REST definitions, the collection
  identity, the corpus selection, both machines, and the reader prompt stay
  profile-owned.

problem: |
  The corpus family needs its own requirements document so that changes to
  retrieval behavior do not churn a shared cross-family file. The requirements
  must name the profile-owned REST vocabulary, the provider-embedding threading
  contract, the server-lifecycle precondition, and the persistence configuration
  separately from the agent-core HTTP runtime and threading capability.

goals:
  - G1: Model the ingest and reader profiles as configured Chroma retrieval boundary functional blocks.
  - G2: Define the profile-owned Chroma and Ollama REST vocabulary and the provider-embedding threading contract.
  - G3: Record the corpus actor boundary, inputs, tool selections, runtime dependencies, outputs, and terminal outcomes.
  - G4: Keep REST authority, collection identity, corpus selection, and prompts profile-owned while agent-core supplies the HTTP runtime and the previous-Result threading capability.

requirements:
  R1:
    title: Behavior model
    items:
      - R1.1: The corpus family SHALL ship two profiles -- an ingest profile and a reader profile -- that model Chroma retrieval as explicit MachineSpec boundary steps.
      - R1.2: The ingest machine SHALL sequence chroma_ready, ollama_ready, then a per-document loop of read, embed_document, create-or-get collection (which resolves the returned collection id and carries the embedding forward), and chroma_add; when the corpus is exhausted it SHALL re-resolve the collection and run a terminal chroma_count verification state.
      - R1.3: The reader machine SHALL sequence chroma_ready, ollama_ready, embed_query, create-or-get collection (which resolves the returned collection id and carries the query vector forward), chroma_query, then invoke_llm over the retrieved chunks.
      - R1.5: Because previous-Result threading is single-hop and read cannot carry the collection id across the loop, the create-or-get collection word SHALL sit immediately before chroma_add or chroma_query so the returned id and the carried vector thread together into the write or query body.
      - R1.4: The embed-to-Chroma vector step SHALL be machine-sequenced, because a model cannot author a raw embedding vector.
  R2:
    title: REST vocabulary
    items:
      - R2.1: chroma_ready SHALL check the Chroma v2 heartbeat and ollama_ready SHALL check the Ollama version endpoint, each failing fast when its server is unreachable.
      - R2.2: chroma_collection SHALL create-or-get a plain collection and resolve the returned collection identifier for use in the add, query, and count paths; it SHALL NOT configure a server-side embedding function, because the agent supplies vectors.
      - R2.3: embed_document and embed_query SHALL call the provider embedding endpoint (Ollama /api/embed) with the configured embedding model and map the returned vector into the word's Result output.
      - R2.4: chroma_add SHALL write documents, ids, and agent-supplied embeddings to the resolved collection, and chroma_query SHALL query the resolved collection with agent-supplied query embeddings and a configured result count.
      - R2.5: chroma_count SHALL read the collection item count for post-ingest verification.
  R3:
    title: Provider-embedding threading
    items:
      - R3.1: embed_document and embed_query SHALL declare carry_forward for the source text and identity so those declared inputs ride into the word's Result output for a downstream word to select (srd028 R12.3).
      - R3.2: chroma_add and chroma_query SHALL declare body_source previous_result with an input_mapping that selects the embedding vector from the embed word's Result output and, for chroma_add, the document text and id from the carried inputs (srd028 R12.1, R12.2).
      - R3.3: The Chroma request bodies SHALL place each selected vector inside a single-token array element so the flat vector renders as the nested array Chroma expects (srd028 R12.5).
      - R3.4: No embedding vector SHALL be authored by a model or supplied as free runtime input; the vector SHALL only be threaded between boundary words.
  R4:
    title: Inputs, tools, and runtime dependencies
    items:
      - R4.1: Corpus inputs SHALL include the profile-owned Chroma and Ollama REST definitions, the configured corpus file set, the configured embedding model, and, for the reader, the request question.
      - R4.2: The profiles SHALL select only existing agent-core tool families -- REST client words, read, and invoke_llm.
      - R4.3: The REST asset network policy SHALL permit only the configured local Chroma host and port and the local Ollama host and port, and SHALL set a max_response_bytes bound.
      - R4.4: REST authority, collection identity, corpus selection, and the reader prompt SHALL be profile-owned, while agent-core supplies the HTTP runtime and the previous-Result threading capability.
  R5:
    title: Lifecycle precondition and persistence
    items:
      - R5.1: The profiles SHALL treat a running Chroma server (started by the harness or operator as chroma run --path <dir>) and a reachable Ollama with the embedding model as external preconditions, surfaced through the chroma_ready and ollama_ready words rather than started by the agent.
      - R5.2: The Chroma persistence directory SHALL be a configuration input to the server lifecycle, not authored by the agent.
  R6:
    title: Outputs and outcomes
    items:
      - R6.1: Ingest outputs SHALL include the created-or-resolved collection, the added document count, and the verifying count read; reader outputs SHALL include the retrieved chunk identities and a grounded answer.
      - R6.2: Corpus terminal outcomes SHALL be Succeeded or Failed, with REST or embedding boundary failures routed to Failed.

non_goals:
  - Define Go package APIs for the agent-core HTTP runtime or the previous-Result threading capability.
  - Reimplement HTTP transport, embedding transport, or vector storage in agent-profiles.
  - Add server-side embedding to Chroma or a new embedding builtin word; embeddings come from the provider REST word threaded by srd028 R12.
  - Own cross-profile dependency-direction invariants; those stay in srd001.

acceptance_criteria:
  - id: AC1
    criterion: The ingest and reader profiles are described as configured Chroma retrieval boundary words and explicit machine steps rather than Go packages.
    traces: [R1.1, R1.2, R1.3, R1.4, R1.5]
  - id: AC2
    criterion: The Chroma and Ollama REST vocabulary is named with each word's boundary behavior and the create-or-get collection identity resolution.
    traces: [R2.1, R2.2, R2.3, R2.4, R2.5]
  - id: AC3
    criterion: The provider-embedding threading contract is specified in terms of srd028 R12 body_source previous_result, input_mapping, carry_forward, and single-token vector reshape, with no model-authored vectors.
    traces: [R3.1, R3.2, R3.3, R3.4]
  - id: AC4
    criterion: Corpus inputs, selected tool families, network policy, and profile-owned authority are named and separated from agent-core runtime capability.
    traces: [R4.1, R4.2, R4.3, R4.4]
  - id: AC5
    criterion: The server-lifecycle precondition and persistence-directory configuration are checkable by profile validation and the integration target.
    traces: [R5.1, R5.2]
  - id: AC6
    criterion: Corpus outputs and terminal outcomes are checkable by profile validation or the profile-owned integration target.
    traces: [R6.1, R6.2]

