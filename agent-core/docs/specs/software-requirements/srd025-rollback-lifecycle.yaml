implementation_status:
  planned:
    - Retarget checkpoint, history, suspend, and resume onto the srd035 port and the srd036 Dolt adapter (tracked by the checkpoint-port epic).
    - checkpoint_rollback reimplemented as Dolt Revert plus a reverse receipt walk over restored Results.
    - Receipt-consuming Undo across state-mutating tools; removal of StateStore, Workspace/GitWorkspace, CheckpointPolicy, and the engine undo-walk.
  done:
    - Suspend and resume around explicit approval-gate machine signals (retained through the port).

