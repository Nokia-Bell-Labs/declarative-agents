      The release now includes executable profile-owned tracer bullets for
      Knowledge Manager/documentation-curator UX, evaluator to generator,
      planner to generator, bench to evaluator, and monitor/control boundaries.
      Each listed Mage target has profile-owned evidence.
    status: done
    related_agent_core_release: "07.0"
    planned_work:
      - id: gh-106
        summary: Define profile integration tracer-bullet use cases and suite.
        status: done
      - id: gh-107
        summary: Move documentation-curator integration proof to agent-profiles.
        status: done
      - id: gh-108
        summary: Add evaluator-to-generator profile tracer bullet.
        status: done
      - id: gh-109
        summary: Add planner-to-generator profile tracer bullet.
        status: done
      - id: gh-110
        summary: Add bench-to-evaluator profile tracer bullet.
        status: done
      - id: gh-111
        summary: Add or explicitly scope monitor-control tracer evidence.
        status: done
    use_cases:
      - id: rel07.0-uc001-documentation-curator-profile-ux
