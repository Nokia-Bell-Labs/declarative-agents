id: srd001-agent-functional-blocks
title: Agent Functional Blocks

context: |
  This SRD holds the cross-cutting requirements that every migrated profile
  family shares: the profile ownership boundary between agent-profiles and
  agent-core, and the dependency-direction invariants that connect the families.

  Each profile family owns its own SRD for actor boundary, inputs, outputs, tool
  selections, runtime dependencies, and terminal outcomes:

    - srd002-generator            (generator)
    - srd003-evaluator            (evaluator)
    - srd004-planner              (planner)
    - srd005-jurist               (jurist)
    - srd006-bench                (bench)
    - srd007-rest                 (rest)
    - srd008-monitor              (monitor)
    - srd009-lifecycle            (lifecycle)
    - srd010-control              (control)
    - srd011-knowledge-manager    (knowledge-manager)

  A functional block is the contract a profile presents to the rest of the
  multi-agent system. The block does not own the Go code that executes a word.
  That runtime remains in agent-core.

problem: |
  Requirements that describe individual profile families were originally held as
  ten blocks in this single SRD. Any change to one family churned a shared file,
  and the rel07.0 use cases already treat families individually while the
  requirements layer did not.

  Each family now owns its own SRD. This document keeps only what is genuinely
  cross-cutting: the ownership boundary that separates profile-owned configured
  behavior from agent-core-owned runtime capability, and the dependency
  directions that must survive as the families evolve.

goals:
  - G1: Fix the profile ownership boundary between agent-profiles and agent-core.
  - G2: Record the cross-profile dependency directions as invariants the families must preserve.
  - G3: Route each profile family to its own dedicated SRD.

requirements:
  R1:
    title: Profile ownership boundary
    items:
      - R1.1: Each migrated profile must keep profile.yaml, machine.yaml, tools.yaml, profile-local declarations, REST definitions, and UI assets under agent-profiles when those files define agent behavior.
      - R1.2: Migrated profiles must reference agent-core runtime assets through documented core-owned roots, mounted paths, or release bundle paths.
      - R1.3: Migrated profiles must not copy agent-core Go runtime packages, builtin tool implementations, or container build logic.
  R2:
    title: Cross-profile dependency direction
    items:
      - R2.1: Planner must invoke generator through child profile execution; generator must not depend on planner.
      - R2.2: Evaluator point runs may invoke generator or another configured profile as the benchmark subject; the subject profile must not depend on the evaluator.
      - R2.3: Bench must launch evaluator from a human operator action; evaluator must not depend on bench.
      - R2.4: Monitor must read cached runtime state supplied by agent-core, and control must route REST events to visible lifecycle words such as exit_agent; the documentation-curator must embed control flow and wait for explicit exit events.
      - R2.5: Dependency edges must point from configured profiles toward agent-core runtime ports and never in the reverse direction.
  R3:
    title: Per-family requirement ownership
    items:
      - R3.1: Each profile family's actor boundary, inputs, outputs, tool selections, runtime dependencies, and terminal outcomes must live in a dedicated per-family SRD (srd002-generator through srd011-knowledge-manager).
      - R3.2: Per-family SRDs must depend on this SRD for the ownership boundary and dependency-direction invariants.

non_goals:
  - Define Go package APIs for agent-core.
  - Reimplement builtin tool behavior in agent-profiles.
  - Define release container build mechanics.
  - Treat migrated profiles as separate binaries.
  - Restate per-family functional block requirements; those live in srd002 through srd011.

acceptance_criteria:
  - id: AC1
    criterion: The SRD defines the profile ownership boundary that keeps configured behavior in agent-profiles and runtime capability in agent-core.
    traces: [R1.1, R1.2, R1.3]
  - id: AC2
    criterion: The SRD records the cross-profile dependency directions as invariants that the per-family SRDs must preserve.
    traces: [R2.1, R2.2, R2.3, R2.4, R2.5]
  - id: AC3
    criterion: Each profile family has a dedicated SRD that depends on this document for the shared boundary and invariants.
    traces: [R3.1, R3.2]

depends_on: []

