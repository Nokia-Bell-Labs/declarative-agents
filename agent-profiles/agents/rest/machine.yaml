name: rest-sample
purpose: |-
  Reference REST boundary profile for release 03.0.
  The machine shows sync client, async client, server signal, and OpenAPI
  import flows as explicit grammar steps.
configuration:
  machine: agents/rest/machine.yaml
  tools: agents/rest/tools.yaml
invariants:
  - REST authority lives in agents/rest/rest.yaml.
  - MachineSpec owns sequencing between REST boundary words.
  - OpenAPI imports populate REST definitions without generating Go code.
initial_state: Idle
budget:
  max_iterations: 8
states:
  - name: Idle
    meaning: Initial state before the sample REST flow starts.
  - name: ReadingPayment
    meaning: A configured REST resource read is in flight.
  - name: CreatingPayment
    meaning: A configured async payment create request is being submitted.
  - name: AwaitingPayment
    meaning: The machine waits for async client completion.
  - name: LaunchingWebhook
    meaning: The configured webhook server is being launched.
  - name: WaitingWebhook
    meaning: The machine waits for an inbound webhook signal.
  - name: StoppingWebhook
    meaning: The configured webhook server is shutting down.
  - name: Succeeded
    meaning: Terminal. The sample REST flow completed.
  - name: Failed
    meaning: Terminal. A REST boundary word failed or timed out.
terminal_states:
  - Succeeded
  - Failed
signals:
  - name: Seed
    trigger: Loop initialization.
  - name: RESTResourceRead
    trigger: REST client read returned a configured success status.
  - name: RESTAccepted
    trigger: REST async send accepted a request.
  - name: RESTResponded
    trigger: REST async await observed a configured success response.
  - name: RESTMissing
    trigger: REST client mapping reported a missing resource.
  - name: RESTDomainFailed
    trigger: REST client mapping reported a domain failure.
  - name: RESTAwaitTimedOut
    trigger: REST async await timed out.
  - name: ServerLaunched
    trigger: REST server launch registered configured routes.
  - name: PaymentWebhookReceived
    trigger: REST server await consumed the configured webhook event.
  - name: AwaitTimedOut
    trigger: REST server await timed out.
  - name: ServerStopped
    trigger: REST server stop completed or unblocked an await.
  - name: CommandError
    trigger: Runtime or REST boundary infrastructure failed.
transitions:
  - state: Idle
    signal: Seed
    next: ReadingPayment
    action: get_payment
  - state: ReadingPayment
    signal: RESTResourceRead
    next: CreatingPayment
    action: create_payment
  - state: ReadingPayment
    signal: RESTMissing
    next: Failed
  - state: ReadingPayment
    signal: RESTDomainFailed
    next: Failed
  - state: ReadingPayment
    signal: CommandError
    next: Failed
  - state: CreatingPayment
    signal: RESTAccepted
    next: AwaitingPayment
    action: await_payment
  - state: CreatingPayment
    signal: CommandError
    next: Failed
  - state: AwaitingPayment
    signal: RESTResponded
    next: LaunchingWebhook
    action: launch_payment_webhooks
  - state: AwaitingPayment
    signal: RESTDomainFailed
    next: Failed
  - state: AwaitingPayment
    signal: RESTMissing
    next: Failed
  - state: AwaitingPayment
    signal: RESTAwaitTimedOut
    next: Failed
  - state: AwaitingPayment
    signal: CommandError
    next: Failed
  - state: LaunchingWebhook
    signal: ServerLaunched
    next: WaitingWebhook
    action: await_payment_webhook
  - state: LaunchingWebhook
    signal: CommandError
    next: Failed
  - state: WaitingWebhook
    signal: PaymentWebhookReceived
    next: StoppingWebhook
    action: stop_payment_webhooks
  - state: WaitingWebhook
    signal: AwaitTimedOut
    next: Failed
  - state: WaitingWebhook
    signal: ServerStopped
    next: Failed
  - state: WaitingWebhook
    signal: CommandError
    next: Failed
  - state: StoppingWebhook
    signal: ServerStopped
    next: Succeeded
  - state: StoppingWebhook
    signal: CommandError
    next: Failed
