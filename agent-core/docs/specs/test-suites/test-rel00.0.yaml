id: test-rel00.0
title: Test Suite for Release 00.0 (Core Engine Import)
release: "00.0"

traces:
  - rel00.0-uc001-domain-agent-integration

preconditions:
  - Go toolchain installed (go 1.26+)
  - internal/runtime/core, internal/observability/tracing, and internal/observability/telemetry packages buildable

test_cases:
  - use_case: rel00.0-uc001-domain-agent-integration
    name: Loop runs a two-step state machine to completion
    go_test: TestLoop_RunsToCompletion
    inputs:
      table: "Start->Working->Finished (two commands)"
      budget: "MaxIterations=100"
    expected:
      status: succeeded
      final_state: Finished
      iterations: 2
    traces:
      - srd005-agentic-loop AC5

  - use_case: rel00.0-uc001-domain-agent-integration
    name: Loop stops when iteration budget is exhausted
    go_test: TestLoop_BudgetExhausted
    inputs:
      budget: "MaxIterations=1"
    expected:
      status: budget_exceeded
      final_state: OverBudget
    traces:
      - srd005-agentic-loop AC1
      - srd005-agentic-loop AC5

  - use_case: rel00.0-uc001-domain-agent-integration
    name: Loop produces cancelled status on context cancellation
    go_test: TestLoop_ContextCancellation
    inputs:
      context: "pre-cancelled"
    expected:
      status: cancelled
    traces:
      - srd005-agentic-loop AC5

  - use_case: rel00.0-uc001-domain-agent-integration
    name: ValidateParams hook aborts the run on error
    go_test: TestLoop_ValidateParamsHook
    inputs:
      hooks: "ValidateParams checks for nonexistent builder"
    expected:
      error: "contains 'nonexistent'"
    traces:
      - srd005-agentic-loop AC3
      - srd005-agentic-loop AC5

  - use_case: rel00.0-uc001-domain-agent-integration
    name: ValidateBuilders helper checks named builders
    go_test: TestLoop_ValidateBuildersHelper
    inputs:
      registry: "one builder named 'a'"
    expected:
      validate_a: pass
      validate_a_b: fail
    traces:
      - srd005-agentic-loop AC6

  - use_case: rel00.0-uc001-domain-agent-integration
    name: OnResult hook is called after each dispatch
    go_test: TestLoop_OnResultHook
    inputs:
      hooks: "OnResult increments a counter"
    expected:
      call_count: 2
    traces:
      - srd005-agentic-loop AC3

  - use_case: rel00.0-uc001-domain-agent-integration
    name: Custom BudgetExceeded hook triggers budget exhaustion
    go_test: TestLoop_CustomBudgetHook
    inputs:
      hooks: "BudgetExceeded returns true at iteration >= 1"
    expected:
      status: budget_exceeded
    traces:
      - srd005-agentic-loop AC1
      - srd005-agentic-loop AC3

  - use_case: rel00.0-uc001-domain-agent-integration
    name: Core source contains no mode-specific tool policy literals
    go_test: TestCoreSourceDoesNotEmbedModeOrToolPolicyNames
    inputs:
      source: "internal/runtime/core/*.go excluding tests"
      forbidden_literals: "agent mode names and workflow tool init names"
    expected:
      policy_boundary: "workflow behavior stays in MachineSpec and tool config"
    traces:
      - srd005-agentic-loop AC5

  - use_case: rel00.0-uc001-domain-agent-integration
    name: Agent runtime does not branch on agent mode names
    go_test: TestMainRuntimeDoesNotBranchOnAgentModeNames
    inputs:
      source: "cmd/agent/main.go"
      forbidden_branches: "if/switch comparisons against generator, planner, evaluator, bench, validate"
    expected:
      bootstrap_boundary: "selected tool init gates are allowed; mode branches are not"
    traces:
      - srd005-agentic-loop AC5

  - use_case: rel00.0-uc001-domain-agent-integration
    name: Token counts are accumulated in RunResult
    go_test: TestLoop_AccumulatesTokens
    inputs:
      command_cost: "50 tokens in, 50 tokens out"
    expected:
      tokens_in: 50
      tokens_out: 50
    traces:
      - srd005-agentic-loop AC2
      - srd005-agentic-loop AC5

  - use_case: rel00.0-uc001-domain-agent-integration
    name: Loop emits init.registry_frozen OTel event
    go_test: TestLoop_EmitsRegistryFrozenEvent
    inputs:
