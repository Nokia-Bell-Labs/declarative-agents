tools:
- name: reset_history
  type: builtin
  init: reset_history
  visibility: internal
  emits:
  - ToolDone
  - CommandError
  description: Clear the conversation history and restart the LLM context.
  category: stateful_internal
  side_effects:
  - kind: state_mutation
    target: conversation_history
    state: reset_to_empty
    description: Clears the in-memory LLM conversation history.
  reversibility:
    classification: reversible
    undo: conversation_restore
  undo:
    strategy: conversation_restore
    description: Restore the conversation snapshot captured before clearing history.
  problem: The machine needs a declared word for resetting conversation history without embedding that workflow step in Go control flow.
  goals:
  - Perform the reset_history action as one machine-selected word.
  - Return an explicit signal that lets the MachineSpec choose the next state.
  - Keep sequencing outside the tool implementation and in machine.yaml.
  requirements:
    input:
    - must consume parameters from tool input, prior Result, or configured command/domain state
    output:
    - must emit one declared signal and return machine-readable output when available
    errors:
    - must emit CommandError for infrastructure failures and preserve domain failures as declared signals
  non_goals:
  - Does not choose the next workflow step; machine.yaml owns sequencing.
  - Does not hide unrelated tool execution behind this word.
  errors:
  - signal: CommandError
    condition: required input, configuration, or runtime state is invalid
    message_shape: 'reset_history: <error>'
    state_after_failure: no additional workflow step is executed by this tool
  relationships:
    before:
    - machine-selected predecessor
    after:
    - machine-selected successor
  output:
    description: reset_history command result summary.
    schema:
      type: object
      properties:
        message:
          type: string
        signal:
          type: string
      required:
      - message
