tools:
- name: validate_specs
  type: builtin
  init: validate_specs
  visibility: internal
  emits:
  - ValidationPassed
  - ValidationFailed
  - CommandError
  description: Run consistency checks on the loaded specification corpus.
  category: stateful_internal
  side_effects:
  - kind: state_mutation
    target: validation_state
    state: validation_results_recorded
    description: Records validation findings in validation state.
  reversibility:
    classification: reversible
    undo: validation_state_restore
  undo:
    strategy: session_state_restore
    description: Restore validation state to the snapshot before running checks.
  problem: The machine needs a declared word for validating specification graph consistency without embedding that workflow step in Go control flow.
  goals:
  - Perform the validate_specs action as one machine-selected word.
  - Return an explicit signal that lets the MachineSpec choose the next state.
  - Keep sequencing outside the tool implementation and in machine.yaml.
  requirements:
    input:
    - must consume parameters from tool input, prior Result, or configured command/domain state
    output:
    - must emit one declared signal and return machine-readable output when available
    errors:
    - must emit CommandError for infrastructure failures and preserve domain failures as declared signals
  non_goals:
  - Does not choose the next workflow step; machine.yaml owns sequencing.
  - Does not hide unrelated tool execution behind this word.
  errors:
  - signal: CommandError
    condition: required input, configuration, or runtime state is invalid
    message_shape: 'validate_specs: <error>'
    state_after_failure: no additional workflow step is executed by this tool
  relationships:
    before:
    - machine-selected predecessor
    after:
    - machine-selected successor
  output:
    description: validate_specs command result summary.
    schema:
      type: object
      properties:
        message:
          type: string
        signal:
          type: string
      required:
      - message
