id: sm-command-undo-audit
title: Command Undo Audit

purpose: |
  Tracks which commands currently satisfy the mechanical Command.Undo
  contract with an explicit no-op and which commands still need real undo
  implementations. This document is a migration checklist for the rollback
  epic; it does not change runtime behavior.

current_contract: |
  Every core.Command implementation exposes Undo() Result. Undo coverage is now
  mixed: read-only words intentionally return core.NoopUndo, LLM and several
  planner words have mechanical in-memory restore, and many state-mutating
  workspace, evaluator, validation, exec, and boundary commands still return
  core.NoopUndo pending follow-up implementation. No production command yet
  implements UndoMementoProvider, so persisted rollback from checkpoint history
  still needs serialized mementos before non-noop undo can work after resume.

noop_contract:
  signal: ToolDone
  output: "undo: no-op"
  command_name: "the command being undone"

real_undo_pending:
  planner_state:
    - command: create_issue
      current_undo: compensatable_memento_with_pipeline_snapshot
      gap: "external bd issue creation is not compensated"
      target_strategy: compensatable_memento_with_issue_id
      follow_up: agent-core-gm-rollback.8

  workspace_state:
    follow_up: agent-core-gm-rollback.7
    commands:
      - command: create_point_dir
        reason: "creates evaluator point directory and mutates PointContext paths"
        target_strategy: workspace_restore_and_point_context_restore
      - command: copy_sample_workspace
        reason: "copies sample files into point workspace"
        target_strategy: workspace_restore
      - command: copy_sample_docs
        reason: "copies optional sample docs into point workspace"
        target_strategy: workspace_restore
      - command: init_workspace_repo
        reason: "creates .git metadata in point workspace"
        target_strategy: workspace_restore
      - command: stage_workspace_baseline
        reason: "mutates git index"
        target_strategy: workspace_restore_or_git_index_restore
      - command: commit_workspace_baseline
        reason: "creates baseline commit in point workspace"
        target_strategy: workspace_restore
      - command: dump_config
        reason: "writes experiment.yaml"
        target_strategy: workspace_restore
      - command: run_agent
        reason: "runs child process that mutates point workspace and writes trace/result artifacts"
        target_strategy: workspace_restore
      - command: collect_metrics
        reason: "writes meta.json"
        target_strategy: workspace_restore

  evaluator_state:
    follow_up: agent-core-gm-rollback.7
    commands:
      - command: parse_suite_config
        reason: "mutates suite metadata state"
        target_strategy: evaluator_session_restore
      - command: discover_suite_samples
        reason: "mutates suite sample state"
        target_strategy: evaluator_session_restore
      - command: expand_eval_grid
        reason: "mutates grid point iterator input"
        target_strategy: evaluator_session_restore
      - command: init_eval_session
        reason: "creates session directory and mutates runtime defaults"
        target_strategy: evaluator_session_restore_and_workspace_restore
      - command: next_point
        reason: "mutates point iterator and current PointContext"
        target_strategy: evaluator_iterator_restore
      - command: run_point
        reason: "records point result after nested machine execution"
        target_strategy: evaluator_session_restore_and_workspace_restore
      - command: run_oracle_check
        reason: "mutates point test output and result flags"
        target_strategy: point_context_restore
      - command: collect_trace_tokens
        reason: "mutates point token count"
        target_strategy: point_context_restore
      - command: check_agent_version
        reason: "mutates point trace version and version mismatch fields"
        target_strategy: point_context_restore
      - command: report_session
        reason: "finalizes session duration"
        target_strategy: evaluator_session_restore
        declaration_gap: "tools/builtin.yaml currently declares noop"

  validation_state:
    follow_up: agent-core-gm-rollback.7
    commands:
      - command: load_corpus
        reason: "mutates ValidateSpecState corpus"
        target_strategy: validate_state_restore
      - command: validate_specs
        reason: "mutates ValidateSpecState graph and findings"
        target_strategy: validate_state_restore

  boundary_or_compensation:
    follow_up: agent-core-gm-rollback.8
    commands:
      - command: execute_task
        reason: "spawns child generator that can mutate workspace"
        target_strategy: child_workspace_restore
      - command: self_invoke
        reason: "spawns child agent process"
        target_strategy: child_workspace_restore_or_compensation
      - command: launch_eval
        reason: "spawns evaluator child process and can create eval artifacts"
        target_strategy: artifact_compensation
      - command: serve_ui
        reason: "blocks on user input and mutates bench UI state"
        target_strategy: bench_state_restore
      - command: run_agent
        reason: "spawns a child agent and mutates point context/workspace artifacts"
        target_strategy: child_workspace_restore_or_compensation
      - command: run_point
        reason: "runs a nested point machine and records point result"
        target_strategy: nested_machine_checkpoint_or_session_restore
      - command: suspend
        reason: "lifecycle boundary word; undo semantics are resume/checkpoint scoped"
        target_strategy: lifecycle_checkpoint_compensation
      - command: validate
        reason: "replays child validation words and aggregates result"
        target_strategy: child_command_undo_or_workspace_restore

expected_noop_long_term:
  - read
  - find
  - list_files
  - done
  - assemble_prompt
  - nudge_reread
  - format_report
  - summarize_point_results
  - report_suite_summary
  - read_only_exec_tools:
      - build
      - vet
      - lint
      - test
      - workspace_status
      - rev_parse
      - diff_stat
      - log_oneline
      - issue_list
  - FailedParamCmd
  - failCmd

implemented_memento_undo:
  conversation_and_retry_state:
    - command: invoke_llm
      strategy: conversation_truncate
      memento: reversible_conversation_snapshot
    - command: reset_history
      strategy: conversation_restore
      memento: reversible_conversation_snapshot
    - command: parse_response
      strategy: parse_retry_counter_restore_when_tracker_enabled
      memento: reversible_parse_retry_counter_snapshot
    - command: report_parse_error
      strategy: parse_retry_counter_restore_when_tracker_enabled
      memento: reversible_parse_retry_counter_snapshot
  planner_state:
    - command: extract_task
      strategy: pipeline_state_restore
      memento: reversible_pipeline_snapshot
    - command: extract_all
      strategy: pipeline_state_restore
      memento: reversible_pipeline_snapshot
    - command: parse_plan
      strategy: pipeline_state_restore
      memento: reversible_pipeline_snapshot
    - command: check_result
      strategy: pipeline_state_restore
      memento: reversible_pipeline_snapshot
    - command: create_issue
      strategy: pipeline_state_restore_only
      memento: compensatable_pipeline_snapshot
  workspace_state:
    - command: write
      strategy: file_snapshot_restore_and_workspace_restore
      memento: reversible_workspace_restore_paths
    - command: edit
      strategy: file_snapshot_restore_and_workspace_restore
      memento: reversible_workspace_restore_paths
    - command: copy_dir
      strategy: workspace_restore
      memento: reversible_workspace_restore_paths
    - command: make_dir
      strategy: workspace_restore
      memento: reversible_workspace_restore_paths
    - command: git_init
      strategy: workspace_restore
      memento: reversible_workspace_restore_paths
    - command: stage_all
      strategy: workspace_restore
      memento: reversible_workspace_restore_paths
    - command: commit
      strategy: compensating_action
      memento: compensatable_workspace_restore_paths
      follow_up: agent-core-gm-rollback.8
    - command: issue_create
      strategy: compensating_action
      memento: compensatable_workspace_restore_paths
      follow_up: agent-core-gm-rollback.8
    - command: issue_close
      strategy: compensating_action
      memento: compensatable_workspace_restore_paths
      follow_up: agent-core-gm-rollback.8

declaration_mismatches:
  - command: evaluator_and_point_tools
    declaration: session_state_restore_or_workspace_restore
    implementation: NoopUndo
    follow_up: agent-core-gm-rollback.7
  - command: report_session
    declaration: noop
    implementation: mutates_session_duration_then_NoopUndo
    follow_up: agent-core-gm-rollback.7
  - command: boundary_tools
    declaration: compensating_action_or_child_command_undo
    implementation: NoopUndo
    follow_up: agent-core-gm-rollback.8

related_issues:
  - agent-core-gm-rollback.5
  - agent-core-gm-rollback.6
  - agent-core-gm-rollback.7
  - agent-core-gm-rollback.8
