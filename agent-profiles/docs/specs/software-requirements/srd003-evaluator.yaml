id: srd003-evaluator
title: Evaluator Functional Block

context: |
  The evaluator profile is an evaluation session and point runner. It parses a
  suite, expands evaluation points, runs a nested point machine, and reports
  session outcomes. This SRD owns the evaluator family requirements that
  srd001-agent-functional-blocks previously held as block R3.

  The block names the contract the evaluator presents to the rest of the profile
  system. Nested loop execution stays in agent-core; the suites and samples stay
  profile-owned.

problem: |
  The evaluator family needs its own requirements document so that changes to
  evaluator behavior do not churn a shared cross-family file. The requirements
  must name profile-owned suites and samples separately from the agent-core
  nested loop runtime.

goals:
  - G1: Model the evaluator profile as a configured session and point runner functional block.
  - G2: Record the evaluator actor boundary, inputs, tool selections, runtime dependencies, outputs, and terminal outcomes.
  - G3: Keep suites and samples profile-owned while agent-core supplies nested loop execution.

requirements:
  R1:
    title: Behavior model
    items:
      - R1.1: The evaluator profile must model a deterministic session pipeline that parses a suite, expands evaluation points, runs a nested point machine, and reports session outcomes.
      - R1.2: The evaluator point machine must prepare an isolated point workspace, invoke a configured agent profile, run oracle checks, and collect trace, version, summary, and metric outputs.
  R2:
    title: Inputs, tools, and runtime dependencies
    items:
      - R2.1: Evaluator inputs must include a suite YAML, samples, a model or profile grid, and an oracle command.
      - R2.2: The evaluator profile must select the evaluator session, evaluator point, and child profile execution tool families.
      - R2.3: Evaluator dependencies must name profile-owned suites and samples as inputs while agent-core supplies nested loop execution.
  R3:
    title: Outputs and outcomes
    items:
      - R3.1: Evaluator outputs must include point directories, oracle results, trace token counts, metrics, and a session report.
      - R3.2: Evaluator terminal outcomes must be Done or Failed.

non_goals:
  - Define Go package APIs for the agent-core nested loop runtime.
  - Reimplement the point loop or oracle execution in agent-profiles.
  - Own cross-profile dependency-direction invariants; those stay in srd001.

acceptance_criteria:
  - id: AC1
    criterion: The evaluator profile is described as a configured session and point pipeline rather than a Go package.
    traces: [R1.1, R1.2]
  - id: AC2
    criterion: Evaluator inputs, selected tool families, and runtime dependencies are named and separated from agent-core runtime capability.
    traces: [R2.1, R2.2, R2.3]
  - id: AC3
    criterion: Evaluator outputs and terminal outcomes are checkable by mounted execution or integration targets.
    traces: [R3.1, R3.2]

depends_on:
  - srd_id: srd001-agent-functional-blocks
    symbols_used: [R1]

diagrams:
  requirements_trace: |
    ```mermaid
    flowchart LR
      Problem["Problem: Evaluator family needs its own requirements..."] --> Goals["Goals: Evaluator Functional Block"]
      Goals --> R1["R1: Behavior model"]
      Goals --> R2["R2: Inputs, tools, and runtime dependencies"]
      Goals --> R3["R3: Outputs and outcomes"]
      R1 --> AC1["AC1: Configured session and point pipeline"]
      R2 --> AC2["AC2: Inputs, tools, dependencies named"]
      R3 --> AC3["AC3: Outputs and outcomes checkable"]
    ```
