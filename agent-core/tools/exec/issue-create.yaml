tools:
- name: issue_create
  type: exec
  binary: bd
  args:
  - create
  - --json
  description: Create a new beads issue. Returns the issue ID.
  category: boundary
  side_effects:
  - kind: filesystem_write
    target: beads_store
    paths:
    - .beads
    description: Writes issue and interaction records into the Beads store.
  reversibility:
    classification: compensatable
    undo: close_or_delete_created_issue
  undo:
    strategy: compensating_action
    description: Capture the created issue ID and compensate by closing/deleting it or restoring the workspace ref.
    payload: boundary_compensation
    captures:
    - created_issue_id
    - workspace_paths
    requires:
    - created_issue_id
  parameters:
    type: object
    properties:
      title:
        type: string
        description: Issue title
        flag: --title
      body:
        type: string
        description: Issue body/description
        flag: --body
      type:
        type: string
        description: 'Issue type (default: task)'
        flag: -t
      priority:
        type: string
        description: 'Priority level (default: P2)'
        flag: -p
      deps:
        type: string
        description: Comma-separated dependency issue IDs
        flag: --deps
    required:
    - title
