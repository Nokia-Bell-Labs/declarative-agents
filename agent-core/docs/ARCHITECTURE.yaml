  embedded_monitor_runtime_architecture:
    status: current
    summary: |
      Embedded monitor support runs inside the agent process when a profile
      configures monitor labels, metric declarations, or monitor REST views.
      This reusable runtime capability is not a Kubernetes sidecar, daemon, or
      required external service. A bounded in-memory store records tool and loop
      metrics so readers can expose live progress without waiting for an
      external collector.

      Metric meaning stays with each tool family. File tools can emit changed
      byte counts. Exec tools can emit exit status and output sizes. REST tools
      can emit operation names, status codes, retry counts, and body sizes.
      Runtime code owns the common envelope: run ID, tool name, state, signal,
      timestamp, duration, and status.

      OpenTelemetry metric export reads normalized samples through the monitor
      recorder. Export behavior stays separate from tool execution. Export
      failure does not break the agent loop.

      Cached monitor state backs REST and OpenAPI read paths. Handlers return
      snapshots and recent sample windows from trusted in-process state. They
      do not scrape tools, re-run commands, or read arbitrary workspace files.
      cmd/agent startup allocates the live store, passes it to REST monitor
      routes, and applies MachineSpec workflow labels to emitted samples.

      Monitor serving uses the same lifecycle shape as the Knowledge Manager
      documentation curator. After a launch word, the REST listener runs in the
      background. A monitor MachineSpec must not make that launch state
      terminal. Its next step should be a serving or awaiting state with a
      blocking await word. A configured control exit request then stops the
      owned listener and routes the machine to Done or Succeeded.
    monitor_flow_diagram: |
      ```mermaid
      flowchart LR
        T[Tool command] -->|metric sample| R[Monitor recorder port]
        L[Loop runtime] -->|run envelope| R
        R --> S[In-memory monitor store]
        S --> M[OpenTelemetry metric exporter]
        S --> API[REST and OpenAPI read handlers]
        API --> UI[Monitor UI or supervisor]
      ```
    responsibilities:
      recorder_port: |
        Recorder ports accept normalized samples from tools and runtime code.
        Agents without monitor config keep the current disabled-mode behavior.
      in_memory_store: |
        Bounded recent state covers active and recent runs. Store reads are
        optimized for a local UI or supervisor, not durable history.
      tool_metric_emission: |
        Each tool family owns specialized metric fields in its ToolDef and
        command implementation. Shared runtime code must not know every
        tool-specific metric name.
      otel_export: |
        Metric export converts normalized samples into OpenTelemetry metric
        instruments and attributes. Exporter failures are reported as monitor
        diagnostics rather than command failures.
      rest_openapi_reads: |
        REST handlers expose cached monitor state through configured routes and
        OpenAPI descriptions. Read handlers return snapshots, time windows, and
        known metric schemas from trusted monitor state.
      serving_lifecycle: |
        Monitor REST listeners are background servers. Profile grammar keeps
        cmd/agent alive by awaiting a control event after launch. This follows
        agents/knowledge-manager/documentation-curator/machine.yaml: launch,
        await, exit, stop, and reach a success terminal.
    source_files:
      current:
        - internal/observability/monitor/
        - internal/runtime/core/dispatch.go
        - internal/runtime/core/loop.go
        - internal/runtime/core/metric_config.go
        - internal/tools/filesystem/monitor_metrics.go
        - internal/tools/llm/monitor_metrics.go
        - internal/tools/rest/monitor_metrics.go
        - internal/tools/rest/monitor_views.go
        - internal/tools/rest/monitor_openapi.go
        - internal/tools/exec/metrics.go
        - agents/monitor/
        - testdata/integration/rel04-monitor/
        - docs/specs/software-requirements/srd032-tool-metrics-monitor-store.yaml
        - docs/specs/software-requirements/srd033-monitor-rest-api.yaml
        - docs/specs/semantic-models/tool-metrics-monitoring.yaml
        - docs/specs/test-suites/test-rel04.0-monitor.yaml
      proof:
        - cmd/agent/main_test.go: TestMonitorReleaseProfileProof
        - internal/tools/rest/monitor_test.go: TestMonitorREST_FactoryUsesLiveMonitorState
        - magefiles/integration_monitor.go: mage integration:uc004
      planned_proof:
        - cmd/agent/main_test.go: TestMonitorCLIProfileServesUntilControlExit

  container_runtime_architecture:
    summary: |
      Release containers package Agent Core as an installed runtime for
      external configuration repositories. The Dockerfile is multi-stage: the
      builder stage clones the selected GitLab ref, downloads Go dependencies,
      runs the test suite, and builds the `agent` binary; the final Alpine
      runtime stage copies only the binary, common Unix utilities, and shared
      YAML assets needed by profiles and tool declarations.

      Runtime images place shared assets under `/opt/agent-core`, including
      `tools/`, `agents/generator/`, and `agents/evaluator/`. External
      evaluation repositories mount their local suites, samples, and profile
      overrides into `/work` and can reference shared image assets by absolute
      path. The Go toolchain, source checkout, and test dependencies are not
      copied into the final image. Exec tools that require Go, golangci-lint,
      or project-specific CLIs therefore need those tools supplied by the
      mounted workspace, a derived image, or the host/container environment.

      `mage docker` is the canonical release-image build wrapper. It
      resolves the latest remote release tag unless `AGENT_CORE_REF` overrides
      it, passes repository-local `.netrc` credentials as a BuildKit secret
      when present, chooses Docker when available and Podman as fallback, and
      prints the exact build command before running it.

  rollback_lifecycle_architecture:
    status: |
      Core lifecycle ports, checkpoint operations, history recording, resume,
      rollback traversal, lifecycle STL adapters, and history/rollback profiles
      are implemented. Disabled-mode behavior remains the default: when
      StateStore, Workspace, and CheckpointPolicy are nil or disabled, existing
      machines run without checkpoint persistence, full history recording, or
      workspace restore behavior. The remaining release 02.0 proof is an
      approval-gate reference agent that exercises suspend and resume end to end.

    summary: |
      Rollback and lifecycle support is architectural because agent programs
      mutate more than one kind of state. The runtime must keep those state
      layers separate. Agent state is loop bookkeeping for current position,
      budget, cost, status, and run summary. Command or domain state is mutable
      in-process data owned by commands and domains, such as conversation
      history or evaluator session state. Workspace and environment state is the
      external filesystem or environment changed by tools, child agents, and
      evaluator point tools.

      StateStore stores JSON snapshots for agent and command/domain state.
      Workspace stores external environment refs, with GitWorkspace as the
      default filesystem implementation. A Checkpoint references all relevant
      layers without pretending one layer can serialize another.

      Lifecycle history and rollback follow the same profile-first runtime
      path as other configured programs. Lifecycle profiles select their
      MachineSpec, tools.yaml selection, and builtin ToolDefs. The selected STL
      lifecycle tools call reusable core checkpoint operations.

    state_layer_diagram: |
      ```mermaid
      flowchart TB
        subgraph Runtime["Loop runtime"]
          L[Loop]
          RR[RunResult]
          H[History]
        end

        subgraph AgentState["Agent state JSON"]
          AS[State, Signal, Iteration, Budget, Cost, Status]
        end

        subgraph DomainState["Command/domain state JSON"]
          CONV[Conversation]
          PLAN[Planner state]
          EVAL[Evaluator session and PointContext]
        end

        subgraph WorkspaceState["Workspace/environment state"]
          FS[Filesystem tree]
          ART[Generated artifacts]
          CHILD[Child process effects]
        end

        L --> AS
        L --> H
        RR --> AS
        CONV --> STORE[StateStore or command snapshot]
        PLAN --> STORE
        EVAL --> STORE
        FS --> WORK[Workspace]
        ART --> WORK
        CHILD --> WORK
        WORK --> GIT[GitWorkspace ref]
      ```

    checkpoint_capture_diagram: |
      ```mermaid
      sequenceDiagram
        participant L as Loop
        participant P as CheckpointPolicy
        participant C as Command or domain owner
        participant W as Workspace
        participant S as StateStore

        L->>P: inspect lifecycle event
        P-->>L: checkpoint enabled
        L->>L: build AgentSnapshot
        L->>C: collect command/domain snapshot
        C-->>L: domain JSON or no snapshot
        L->>W: CurrentRef or Checkpoint(label)
        W-->>L: WorkspaceRef
        L->>S: Save checkpoint JSON
      ```

    suspend_resume_diagram: |
      ```mermaid
      stateDiagram-v2
        [*] --> Running
        Running --> AwaitingApproval: machine action emits approval signal
        AwaitingApproval --> SavingCheckpoint: lifecycle enabled
        SavingCheckpoint --> Suspended: checkpoint saved
        Suspended --> LoadingCheckpoint: resume requested
        LoadingCheckpoint --> RestoringState: checkpoint compatible
        RestoringState --> Running: StateStore and Workspace restored
        LoadingCheckpoint --> Failed: missing or incompatible checkpoint
        SavingCheckpoint --> Failed: required StateStore unavailable
      ```

    rollback_traversal_diagram: |
      ```mermaid
      flowchart TD
        A[Current iteration] --> B[Load History]
        B --> C{Reached target iteration?}
        C -- no --> D[Call Command.Undo]
        D --> E{Undo succeeded?}
        E -- yes --> F[Move to previous HistoryEntry]
        F --> C
        E -- no --> G[Report partial rollback and remaining state]
        C -- yes --> H[Restore Workspace target ref]
        H --> I[Return resumable agent state]
      ```

    profile_first_lifecycle_diagram: |
      ```mermaid
      flowchart LR
        P[agents/lifecycle/*/profile.yaml] --> M[Lifecycle MachineSpec]
        P --> S[tools.yaml selection]
        P --> D[ToolDef declarations]
        S --> D
        D --> R[Registry and BuiltinRegistry]
        M -->|action checkpoint_history| H[STL checkpoint_history]
        M -->|action checkpoint_rollback| RB[STL checkpoint_rollback]
        H --> C[core checkpoint operations]
        RB --> C
        C --> STORE[StateStore]
        C --> WORK[Workspace]
      ```

    tool_effects_to_lifecycle_diagram: |
      ```mermaid
      flowchart LR
        TD[ToolDef contract] --> SE[side_effects]
        TD --> RV[reversibility]
        TD --> UNDO[undo strategy]
        TD --> ERR[errors and state_after_failure]

        SE --> CLASS{Effect layer}
        CLASS -->|state_mutation| CMD[Command/domain restore]
        CLASS -->|filesystem| WS[Workspace restore]
        CLASS -->|boundary| COMP[Compensation or confirmation]

        CMD --> HIST[HistoryEntry]
        WS --> HIST
        COMP --> HIST
        HIST --> RB[Rollback traversal]
      ```

    ownership_rules:
      - StateStore owns JSON blobs for agent and command/domain state; it does not store filesystem trees.
      - Workspace owns external environment refs; GitWorkspace refs do not serialize conversation history or state-machine position.
      - Command.Undo owns command/domain restoration because each command knows the state it changed.
      - MachineSpec owns approval and suspend routing through explicit states and signals.
      - Loop owns traversal order, checkpoint timing, and lifecycle status, but not domain-specific compensation logic.

    references:
      - docs/specs/software-requirements/srd025-rollback-lifecycle.yaml
      - docs/specs/software-requirements/srd026-lifecycle-tools.yaml
      - docs/specs/semantic-models/rollback-lifecycle.yaml
      - docs/specs/test-suites/test-rel02.0-lifecycle.yaml
      - docs/specs/test-suites/test-rel02.0-tool-contracts.yaml
      - roll-backs.md

  engine_operations:
    summary: |
      internal/runtime/core exposes four domain operations.
      These are the state machine's capabilities, independent of any CLI or
      build system adapter. Run executes a grammar from its initial state
      through core.Loop. Resume loads a suspended checkpoint and re-enters the
      loop through core.ResumeFromCheckpoint. Rollback rewrites a checkpoint to
      a target iteration by walking the sentence backward through each word's
      Undo memento. History formats a persisted checkpoint as a readable
      execution digest. Supporting helpers resolve the latest checkpoint ID and
      deserialize checkpoint data from a StateStore.

    hexagonal_view: |
      Core knows nothing about CLI flags, Cobra commands, or Mage targets.
      Adapters are thin wiring layers that parse external input and call core:

        Profile runtime (cmd/agent)       -> core.Loop / core.ResumeFromCheckpoint
        checkpoint_history STL adapter    -> core.FormatCheckpointHistory
        checkpoint_rollback STL adapter   -> core.RollbackFromCheckpoint
        Mage audit target                 -> runs agent binary with --profile

      Resume and rollback have different dependency requirements:
      - Resume needs the full engine stack (machine spec, tool definitions,
        LLM adapter) because it re-enters core.Loop.
      - Rollback is a pure checkpoint operation: it only needs a StateStore
        and optionally a Workspace. No grammar or lexicon is loaded.

      That dependency boundary is why lifecycle profiles dispatch separate tool
      adapters instead of forcing rollback through the resume path. History and
      rollback are machine actions selected by profiles, not CLI subcommands.

    source_files:
      - internal/runtime/core/checkpoint_ops.go
      - internal/runtime/core/checkpoint_ops_test.go
      - internal/runtime/core/resume.go
      - internal/runtime/core/rollback.go
      - internal/tools/lifecycle/checkpoint.go
      - internal/tools/stl/checkpoint_lifecycle_test.go

  coordination_pattern: |
    Work flows through the state machine. The loop holds the current
    State and last Result. StateMachine.Step returns the next State
    plus a Command (via ActionFunc). The loop dispatches that Command
    via Dispatch and repeats.

    Domain agents control behavior by supplying State and Signal constants,
    transition tables, registered tool builders, terminal predicates, and
    optional LoopHooks. Core only executes the protocol because those inputs
    remain domain-owned.

    Dependency rules keep the engine below adapters. internal/runtime/core may
    use tracing ports, GenAI attributes, YAML parsing, and the Go standard
    library. Observability packages depend on tracing contracts and telemetry
    SDK packages without importing core. Model packages depend on core, prompt
    assembly, and tracing. Focused internal/tools packages own catalog,
    registry, exec, filesystem, LLM, lifecycle, control, validation, and undo
    responsibilities while internal/tools/stl remains a facade. Domain packages
    in evaluation and planning depend on core plus the focused tools they use.
    Support packages own subprocess, CLI, and child-agent execution boundaries.
    cmd/agent wires core, tools, telemetry, planning, bench, execution, and
    tracing together.

interfaces:
  - name: Tracer interface
    summary: |
      Port interface for OpenTelemetry tracing (internal/observability/tracing). Five
      methods: Push (child span), Event (span event), SetAttributes
      (span metadata), RecordError (error recording with status),
      Context (span context access). The engine imports this interface;
      the implementation lives in internal/observability/telemetry (TraceAdapter).
      Tests and optional tracing paths use NoopTracer.

  - name: Command interface
    summary: |
      Single interface for all executable units of work (internal/runtime/core).
      Three methods: Name() string, Execute() Result, and Undo() Result.
      Both internal commands (model-boundary invoke, response parsing) and external
      tools (file I/O, build, test) implement Command. The loop dispatches
      them uniformly through Dispatch. Undo gives every command an explicit
      rollback contract, even when the current implementation is a no-op.

  - name: Builder interface
    summary: |
      Stateless factory that constructs a ready-to-execute Command
      from the previous Result (internal/runtime/core). One method: Build(res
      Result) Command. Builders are registered in the Registry and
      resolved by name during state machine transitions and YAML
      machine config loading.

  - name: CommandResolver interface
    summary: |
      Lookup interface satisfied by Registry (internal/runtime/core). One method:
      Resolve(name string) (Builder, bool). Used by domain code that
      needs to resolve builders without depending on the full Registry
      type.

components:
  - name: Types
    responsibility: |
      Core type definitions shared across all components. Defines
      State (string), Signal (string), Command interface, Result
      struct, Cost struct, ToolMetrics struct, Builder interface,
      CommandResolver interface, SpanOverride interface, and rollback
      foundation interfaces for StateStore, Workspace, CheckpointPolicy,
      Checkpoint, and GitWorkspace. Defines
      generic signals (Seed, BudgetExhausted, CommandError), standard
      tool signals (ToolDone, ToolFailed, EditDone), and LLM signals
      (LLMResponded, ParseFailed, TaskCompleted).
    capabilities:
      - Define the State and Signal string types
      - Define the Command interface (Name, Execute, Undo)
      - Define Result, Cost, and ToolMetrics structs for command output
      - Define ToolMetrics for structured success/failure tracking on Result
      - Define Builder and CommandResolver interfaces
      - Define SpanOverride interface for custom dispatch span naming
      - Define StateStore, Workspace, CheckpointPolicy, Checkpoint, and GitWorkspace
      - Define generic signals (Seed, BudgetExhausted, CommandError)
      - Define standard tool signals (ToolDone, ToolFailed, EditDone)
      - Define LLM signals (LLMResponded, ParseFailed, TaskCompleted)

  - name: State Machine
    responsibility: |
      Holds an immutable transition table and a terminal-state
      predicate. Step performs a single (State, Signal) lookup and
      returns the next state and a Command built by the matching
      ActionFunc. IsTerminal delegates to the domain-supplied
      TerminalFunc.
    capabilities:
      - Map (State, Signal) pairs to (NextState, ActionFunc) transitions
      - Build Commands via ActionFunc from the previous Result
      - Detect terminal states via TerminalFunc
      - Report unhandled state-signal pairs as errors

  - name: Dispatch
    responsibility: |
      Wraps Command.Execute with tracing, timeout, panic recovery,
      duration measurement, and signal normalization. SafeExecute
      runs the command in a goroutine with a timer. Dispatch adds
      an OpenTelemetry child span using GenAI semconv execute_tool
      naming. Commands implementing SpanOverride customize the span.
    capabilities:
      - Execute commands with panic recovery
      - Enforce per-command timeout
      - Measure and fill command duration
      - Normalize error signals (ForceErrorSignal)
      - Emit GenAI semconv execute_tool spans per dispatch
      - Support SpanOverride for custom span naming (e.g. LLM inference)

  - name: Registry
    responsibility: |
      Pairs ToolSpec metadata (name, description, JSON schema,
      visibility, phases) with Builders. Supports state-filtered
      manifest generation. Freezes before the loop starts to prevent
      mutation during execution.
    capabilities:
      - Register ToolSpec-Builder pairs (panics on duplicate or post-freeze)
      - Freeze the registry to prevent further registration
      - Resolve a Builder by name
      - Look up a ToolSpec by name
      - Generate state-filtered tool listings
      - Report all tool names or external-only tool names

  - name: Loop
    responsibility: |
      Main agentic loop. Drives the state machine from an initial
      state to a terminal state, dispatching Commands, tracking budget,
      and collecting events. Domain-specific behavior is injected
      through LoopHooks callbacks.
    capabilities:
      - Drive the state machine through initialization, iteration, and completion
      - Enforce iteration, token, and wall-clock budget limits
      - Support domain-specific budget hooks (BudgetExceeded)
      - Accumulate token usage, cost, and events per iteration
      - Capture task summary from TaskCompletedSignal
      - Emit GenAI semconv invoke_agent spans for the entire run and events for each iteration
      - Support pre-run validation (ValidateParams hook)
      - Support post-dispatch processing (OnResult hook)
      - Handle context cancellation

  - name: Machine Config
    responsibility: |
      Provides YAML-based declarative state machine configuration.
      MachineSpec defines states, signals, terminal states, and
      transitions. ParseMachineSpec validates referential integrity.
      BuildTransitionTable resolves action names from the Registry.
    capabilities:
      - Parse MachineSpec from YAML bytes or file
      - Validate referential integrity (states, signals, terminals, transitions)
      - Build a TransitionTable from a MachineSpec and Registry
      - Support the $tool sentinel for dynamic dispatch
      - Support empty actions for terminal transitions

  - name: Telemetry
    responsibility: |
      OpenTelemetry implementation satisfying the Tracer port
      interface. Sets up trace and metric providers, manages root span
      lifecycle, handles file and OTLP export, and provides offline
      trace replay.
    capabilities:
      - Create providers with file and/or OTLP exporters (NewRoot)
      - Manage root span lifecycle with idempotent shutdown
      - Atomic file delivery via temp-file-then-rename
      - Satisfy tracing.Tracer via TraceAdapter
      - Replay recorded OTLP JSON trace files to a remote collector

design_decisions:
  - id: 1
    title: Domain-agnostic engine
    decision: |
      Engine types define State, Signal, Command, Budget, Result, registry,
      state machine, loop, dispatch, and lifecycle ports as abstract runtime
      concepts. All domain-specific states, signals, tools, and budget
      dimensions are supplied by the configured agent. No import in internal/runtime/core
      references coding tools, model-boundary implementations, or any specific domain.
    benefits:
      - Multiple agent types share one loop engine
      - Engine improvements propagate to all agents
      - Clean testing without domain dependencies
    alternatives_rejected:
      - "Embedded domain logic: couples engine to one agent type"

  - id: 2
    title: Hooks for domain injection
    decision: |
      LoopHooks is a struct of optional function callbacks. The domain
      agent populates only the hooks it needs. No interface
      implementation or subclassing required.
    benefits:
      - Zero-cost for unused hooks (nil check)
      - New hooks can be added without breaking existing agents
      - Simpler than interface hierarchies
    alternatives_rejected:
      - "Interface with many methods: forces empty stubs"
      - "Plugin system: overengineered for a Go library"

  - id: 3
    title: OpenTelemetry for observability
    decision: |
      Engine instrumentation emits OpenTelemetry spans and events for state
      transitions, budget checks, and command dispatch. The Tracer
      port interface decouples span creation from the OTel SDK setup.
    benefits:
      - Industry-standard API, stable Go SDK
      - Instrumentation decoupled from export destination
      - Domain agents supply their own OTel configuration
    alternatives_rejected:
      - "Custom logging: not interoperable"
      - "No tracing: loses observability"

  - id: 4
    title: YAML declarative state machine
    decision: |
      State machines can be defined in YAML files (MachineSpec) and
      converted to TransitionTables at runtime. This separates behavior
      definition from code.
    benefits:
      - Non-programmers can read and modify agent behavior
      - Machine configuration is version-controlled alongside code
      - Validation catches errors before the loop starts
    alternatives_rejected:
      - "Code-only tables: harder to audit, harder to diff"

  - id: 5
    title: Tool composition via machine.yaml sequences
    decision: |
      Complex workflows (e.g. "stage all then commit") are NOT encoded
      as compound Go tools. Instead, each atomic verb is a separate
      declared tool (stage_all, commit), and the machine.yaml
      wires them together via state transitions:

        - state: Staging
          signal: ToolDone
          next: Committing
          action: commit

      State machine configuration is the composition layer. This eliminates
      compound tool code entirely — the workflow lives in YAML where
      it can be audited, diffed, and modified without recompilation.
    benefits:
      - Workflows are visible in machine.yaml diffs
      - Each tool stays atomic and independently testable
      - New workflows require zero Go code changes
      - State machine validation catches broken compositions at init
    alternatives_rejected:
      - "Compound Go tools: embed workflow logic in code, untestable"
      - "Shell script tools: opaque, no validation, no tracing"

  - id: 6
    title: Declarative tool initialization
    decision: |
      When LoopParams.MachineFile is set, Loop owns the full init
      sequence: create registry, call InitFunc to register tools,
      load machine YAML, validate all actions resolve, enter loop.
      That structure enforces the ordering invariant.
    benefits:
      - Impossible to validate the machine before tools are registered
      - Eliminates per-agent init boilerplate
      - Single function call replaces multi-step setup
    alternatives_rejected:
      - "Caller manages ordering: error-prone, duplicated in every agent"

  - id: 7
    title: Registry freeze before loop
    decision: |
      Registry state is mutable during initialization and frozen before
      the loop starts. Post-freeze registration panics. This ensures
      the tool set is stable during execution.
    benefits:
      - No race conditions during the loop
      - Manifest generation is deterministic
      - Early detection of initialization errors
    alternatives_rejected:
      - "Immutable from construction: harder to build incrementally"
      - "No freeze: risk of mutation during dispatch"

technology_choices:
  - component: Language
    technology: Go
    purpose: Implementation language
  - component: Observability
    technology: OpenTelemetry (go.opentelemetry.io/otel/attribute)
    purpose: Span attribute types for tracing interface
  - component: YAML parsing
    technology: gopkg.in/yaml.v3
    purpose: Machine spec parsing and validation
  - component: REST runtime HTTP
    technology: net/http
    purpose: Planned REST client requests and REST server bindings
  - component: REST OpenAPI
    technology: github.com/getkin/kin-openapi/openapi3
    purpose: Planned OpenAPI 3 loading, resolution, and validation
  - component: REST code generation
    technology: none
    purpose: No generated Go REST clients or servers in the first implementation
  - component: Test assertions
    technology: testify (stretchr/testify)
    purpose: Test assertions and helpers

project_structure:
  binaries:
    - path: cmd/agent/
      role: Unified agent binary — generator, evaluator, planner, jurist, bench modes via YAML config

  bench:
    - path: internal/evaluation/
      role: Evaluator session/point runtime, result artifacts, metrics, convergence, and trace analysis
    - path: internal/evaluation/bench/
      role: Bench server, API handlers, state machine tools (serve_ui, launch_eval)
    - path: internal/evaluation/bench/ui/
      role: Embedded React frontend for experiment browsing and launching

  engine:
    - path: internal/runtime/core/
      role: Generic agentic loop engine (types, state machine, dispatch, registry, loop, machine config)

  infrastructure:
    - path: internal/observability/tracing/
      role: Tracer port interface for OpenTelemetry (5 methods) and NoopTracer
    - path: internal/observability/telemetry/
      role: OTel implementation (providers, exporters, adapter, traceparent, replay)
    - path: internal/observability/telemetry/genai/
      role: OTel GenAI semantic convention constants, span name builders, attribute helpers
    - path: internal/observability/monitor/
      role: Embedded monitor store, recorder ports, metric schema registry, and OpenTelemetry metric export for normalized samples
    - path: internal/model/llm/
      role: Model-boundary client, conversation, profiles, parse utilities, domain interfaces
    - path: internal/model/llm/ollama/
      role: Ollama client implementation used by model boundary tools
    - path: internal/model/prompt/
      role: Prompt struct, YAML loading, system prompt template, and manifest serialization
    - path: internal/tools/stl/
      role: Temporary standard tool library compatibility facade
    - path: internal/tools/catalog/
      role: Planned ToolDef, declaration loading, tool selection, ToolSpec conversion, and config decoding package
    - path: internal/tools/registry/
      role: Planned BuiltinRegistry, registration, and standard factory catalog package
    - path: internal/tools/exec/
      role: Planned exec tool builder, argv mapping, subprocess command, and exec undo package
    - path: internal/tools/filesystem/
      role: Planned file tools, path validation, snapshots, and workspace restore package
    - path: internal/tools/llm/
      role: Planned model-boundary, response parsing, conversation state, and done tool package
    - path: internal/tools/rest/
      role: Planned REST client/server boundary tool package with OpenAPI loading, operation definitions, async inbox integration, and net/http runtime behavior
