dependencies:
  direct:
    - go.opentelemetry.io/otel (attributes, trace, metric)
    - go.opentelemetry.io/otel/sdk (trace and metric providers)
    - go.opentelemetry.io/otel/exporters (OTLP gRPC, stdout)
    - go.opentelemetry.io/proto/otlp (proto types for replay)
    - google.golang.org/grpc (OTLP transport)
    - google.golang.org/protobuf (proto serialization)
    - gopkg.in/yaml.v3 (YAML parsing)
    - github.com/stretchr/testify (test assertions)
  indirect:
    - github.com/dominikbraun/graph (spec dependency graphs)
    - github.com/google/uuid (trace IDs)
    - github.com/cenkalti/backoff/v5 (OTLP retry)
