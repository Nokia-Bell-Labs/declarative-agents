id: srd007-tracer-interface
title: Tracer Port Interface

problem: |
  The agentic loop engine needs to emit OpenTelemetry spans and events
  for observability. Depending directly on the OTel SDK would couple
  the engine to a specific tracer configuration. A port interface
  abstracts span creation, event recording, attribute setting, error
  recording, and context access behind five methods. Domain agents
  supply the concrete implementation.

goals:
  - G1: Minimal interface decoupling the engine from OTel SDK internals.
  - G2: Support child span creation, event recording, attribute setting, error recording, and context access.

requirements:
  R1:
    title: Tracer interface
    items:
      - R1.1: Tracer is an interface in internal/observability/tracing with five methods.
      - R1.2: "Push(name string, attrs ...attribute.KeyValue) returns (Tracer, func()). Creates a child span and returns a scoped Tracer plus a done function."
      - R1.3: "Event(name string, attrs ...attribute.KeyValue) records a point-in-time span event."
      - R1.4: "SetAttributes(attrs ...attribute.KeyValue) sets attributes on the current span."
      - R1.5: "RecordError(err error) records err on the current span and sets its status to error."
      - R1.6: "Context() context.Context returns the context carrying the current span."

  R2:
    title: Dependencies
    items:
      - R2.1: internal/observability/tracing depends on go.opentelemetry.io/otel/attribute for the KeyValue type and context for Context().
      - R2.2: The interface does not import the OTel SDK (go.opentelemetry.io/otel/sdk).

  R3:
    title: NoopTracer
    items:
      - R3.1: NoopTracer is a concrete implementation that discards all operations.
      - R3.2: NoopTracer satisfies the Tracer interface at compile time.
      - R3.3: NoopTracer.Context() returns context.Background().

non_goals:
  - Concrete Tracer implementation beyond NoopTracer (domain agent responsibility).
  - OTel exporter configuration.
  - Metrics or logging interfaces.

acceptance_criteria:
  - id: AC1
    criterion: Tracer interface has Push, Event, SetAttributes, RecordError, and Context methods.
    traces: [R1.1, R1.2, R1.3, R1.4, R1.5, R1.6]

  - id: AC2
    criterion: internal/observability/tracing depends on go.opentelemetry.io/otel/attribute and context. No OTel SDK import.
    traces: [R2.1, R2.2]

  - id: AC3
    criterion: NoopTracer satisfies Tracer at compile time and discards all operations.
    traces: [R3.1, R3.2, R3.3]
