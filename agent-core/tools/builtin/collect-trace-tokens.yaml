tools:
- name: collect_trace_tokens
  type: builtin
  init: collect_trace_tokens
  visibility: internal
  emits:
  - TraceTokensCollected
  - CommandError
  description: Read the point trace file and record total GenAI input/output token usage.
  category: word
  side_effects:
  - kind: state_mutation
    target: point_context
    state: trace_tokens_recorded
    description: Sets PointContext.Tokens from gen_ai.usage input and output token attributes in the trace file.
  reversibility:
    classification: reversible
    undo: point_context_restore
  undo:
    strategy: session_state_restore
    description: Restore PointContext token fields from the prior snapshot.
  problem: The machine needs a declared word for collecting token counts from trace output without embedding that workflow step in Go control flow.
  goals:
  - Perform the collect_trace_tokens action as one machine-selected word.
  - Return an explicit signal that lets the MachineSpec choose the next state.
  - Keep sequencing outside the tool implementation and in machine.yaml.
  requirements:
    input:
    - must consume parameters from tool input, prior Result, or configured command/domain state
    output:
    - must emit one declared signal and return machine-readable output when available
    errors:
    - must emit CommandError for infrastructure failures and preserve domain failures as declared signals
  non_goals:
  - Does not choose the next workflow step; machine.yaml owns sequencing.
  - Does not hide unrelated tool execution behind this word.
  errors:
  - signal: CommandError
    condition: required input, configuration, or runtime state is invalid
    message_shape: 'collect_trace_tokens: <error>'
    state_after_failure: no additional workflow step is executed by this tool
  relationships:
    before:
    - machine-selected predecessor
    after:
    - machine-selected successor
  output:
    description: collect_trace_tokens command result summary.
    schema:
      type: object
      properties:
        message:
          type: string
        signal:
          type: string
      required:
      - message
