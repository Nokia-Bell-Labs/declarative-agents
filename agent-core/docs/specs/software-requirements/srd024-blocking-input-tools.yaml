id: srd024-blocking-input-tools
title: Blocking Input Tools

problem: |
  Some tools intentionally pause the state-machine loop while waiting for
  an external actor. invoke_llm waits for a model response. serve_ui waits
  for a human action submitted through the web UI. Future approval or
  human-input tools will have the same shape. Without an explicit contract,
  these tools can blur the boundary between "tool execution" and "program
  control flow", leading to inconsistent cancellation, signal mapping, and
  observability.

goals:
  - G1: Define the execution contract for tools that block while collecting external input.
  - G2: Define how external input maps to core.Result output and Signal.
  - G3: Define cancellation, timeout, shutdown, and backpressure expectations.
  - G4: Define state-machine routing expectations for signals returned by blocking input tools.
  - G5: Define observability expectations for long-running tools.

requirements:
  R0:
    title: Tool authoring standard
    items:
      - R0.1: Blocking input tool declarations SHOULD follow cfg-tool-authoring-standard for vocabulary category, problem, goals, requirements, non-goals, output, side effects, reversibility, undo, errors, and relationships.
      - R0.2: Blocking input tools SHOULD be classified as boundary tools when they wait on a model, human, approval gate, server, or other external actor.
      - R0.3: Blocking input tools SHOULD keep workflow sequencing in machine.yaml transitions and return one declared Signal per completed external interaction.

  R1:
    title: Blocking command execution
    items:
      - R1.1: A blocking input tool SHALL implement core.Command and block inside Execute until input arrives, the context is cancelled, or a configured timeout/shutdown condition occurs.
      - R1.2: A blocking input tool SHALL keep ownership of the external wait mechanism inside the tool, not inside core.Loop.
      - R1.3: core.Loop SHALL continue to treat the blocking tool like any other command: dispatch once, receive one core.Result, then transition on the returned Signal.
      - R1.4: Blocking behavior SHALL be visible in tool documentation and tool declaration descriptions.

  R2:
    title: External input to Result mapping
    items:
      - R2.1: External input SHALL be converted into core.Result.Output in a machine-consumable format, such as JSON for structured actions.
      - R2.2: External input SHALL be converted into a Signal that is declared in the active machine.
      - R2.3: Invalid input SHALL return CommandError or another explicitly documented failure signal.
      - R2.4: Blocking input tools SHOULD declare possible emitted signals once emitted-signal contracts are supported by tool declarations.

  R3:
    title: Cancellation, timeout, and shutdown
    items:
      - R3.1: Blocking input tools SHALL observe parent context cancellation when a context is available.
      - R3.2: Blocking input tools MAY define a timeout, mapped to a documented timeout/failure signal.
      - R3.3: Blocking input tools that expose servers or channels SHALL support orderly shutdown.
      - R3.4: Shutdown input from an external actor SHOULD map to an explicit machine signal such as Shutdown.
      - R3.5: Cancellation and shutdown SHALL not leave goroutines, sockets, or child processes running.

  R4:
    title: Backpressure and concurrency
    items:
      - R4.1: Blocking input tools SHALL define whether they accept one pending input or multiple queued inputs.
      - R4.2: If only one pending input is supported, additional input SHOULD be rejected or backpressured with a clear response.
      - R4.3: Long-running tools SHALL avoid unbounded queues unless explicitly configured.
      - R4.4: State-machine transitions SHALL remain sequential even if the external input source is concurrent.

  R5:
    title: Observability
    items:
      - R5.1: Blocking input tools SHOULD trace wait start, input receipt, cancellation, timeout, and shutdown events.
      - R5.2: Long waits SHOULD include enough span attributes to identify the tool, input source, and resulting signal.
      - R5.3: Sensitive external input SHOULD be redacted or included only when verbose tracing is explicitly enabled.
      - R5.4: Tool duration SHALL reflect the full wait time.

  R6:
    title: Concrete tool examples
    items:
      - R6.1: invoke_llm is a blocking input tool whose external actor is an LLM provider; model output is parsed into tool calls or completion signals.
      - R6.2: serve_ui is a blocking input tool whose external actor is a human using the Bench web UI; posted actions map to signals such as ExperimentRequested or Shutdown.
      - R6.3: Future human approval tools SHOULD follow the same Result and Signal mapping contract.

non_goals:
  - Defining the HTTP API for Bench; see srd020.
  - Defining the LLM provider protocol; see srd009.
  - Making core.Loop concurrent.

acceptance_criteria:
  - id: AC1
    criterion: Blocking input tools execute as normal Commands that block until input, cancellation, timeout, or shutdown and then return one Result.
    traces: [R0.1, R0.2, R0.3, R1.1, R1.2, R1.3, R1.4]

  - id: AC2
    criterion: External input maps to structured Result.Output and a machine-declared Signal, with invalid input mapped to a documented failure path.
    traces: [R2.1, R2.2, R2.3, R2.4]

  - id: AC3
    criterion: Blocking input tools support cancellation, optional timeout, orderly shutdown, and no leaked resources.
    traces: [R3.1, R3.2, R3.3, R3.4, R3.5]

  - id: AC4
    criterion: Blocking input tools define concurrency/backpressure behavior while preserving sequential state-machine transitions.
    traces: [R4.1, R4.2, R4.3, R4.4]

  - id: AC5
    criterion: Long-running waits are observable through tracing, duration, resulting signal, and optional redacted input metadata.
    traces: [R5.1, R5.2, R5.3, R5.4]

  - id: AC6
    criterion: invoke_llm and serve_ui are documented as concrete blocking input tools following this contract.
    traces: [R6.1, R6.2, R6.3]

depends_on:
  - srd_id: srd001-core-types
    symbols_used: [Command, Result, Signal]
  - srd_id: srd003-command-dispatch
    symbols_used: [Dispatch]
  - srd_id: srd005-agentic-loop
    symbols_used: [Loop]
  - srd_id: srd009-ollama-adapter
    symbols_used: [Chat]
  - srd_id: srd020-bench-web-ui
    symbols_used: [serve_ui]
  - srd_id: srd022-builtin-tools
    symbols_used: [BuiltinRegistry]

related_documents:
  - cfg-tool-authoring-standard

implementation_examples:
  - pkg/stl/llmtools.go
  - pkg/bench/serve_ui.go
