# Builtin tool declarations — Go-implemented tools.
# Contains reusable tool identity, init, parameters, emits, and visibility.
# Mode-specific config lives in per-mode override files (e.g.
# configs/planner/builtin.yaml, configs/evaluator/builtin.yaml).
# Pass via: agent --tools-declaration configs/tools/builtin.yaml \
#                 --tools-declaration configs/<mode>/builtin.yaml

tools:
  # --- file tools ---
  - name: read
    type: builtin
    init: file_read
    emits: [ToolDone, ToolFailed]
    description: "Read a single file's contents. Path must point to a file, not a directory. Use find to discover file paths first."
    output:
      description: "Line-numbered text content from the requested file range."
      schema:
        type: object
        properties:
          path:
            type: string
          content:
            type: string
          start_line:
            type: integer
          end_line:
            type: integer
        required: [path, content]
    parameters:
      type: object
      properties:
        path:
          type: string
          description: "File path relative to workspace root (must be a file, not a directory)"
        start_line:
          type: integer
          description: "Start line (1-indexed, inclusive)"
        end_line:
          type: integer
          description: "End line (1-indexed, inclusive)"
      required: [path]

  - name: write
    type: builtin
    init: file_write
    emits: [ToolDone, ToolFailed]
    description: "Create or overwrite a file. Provide the complete file content — this replaces the entire file. Parent directories are created automatically."
    output:
      description: "Write result describing the file path and bytes written."
      schema:
        type: object
        properties:
          path:
            type: string
          bytes_written:
            type: integer
          created_parent_dirs:
            type: boolean
        required: [path, bytes_written]
    parameters:
      type: object
      properties:
        path:
          type: string
          description: "File path relative to workspace root"
        content:
          type: string
          description: "Full file content to write"
      required: [path, content]

  - name: edit
    type: builtin
    init: file_edit
    emits: [EditDone, ToolFailed]
    description: "Replace the first occurrence of an exact string in a file. Use read first to see the current content, then provide the exact old_string to match."
    output:
      description: "Edit result describing the changed file and replacement count."
      schema:
        type: object
        properties:
          path:
            type: string
          replacements:
            type: integer
          ambiguous_matches:
            type: integer
        required: [path, replacements]
    parameters:
      type: object
      properties:
        path:
          type: string
          description: "File path relative to workspace root"
        old_string:
          type: string
          description: "Exact text to find"
        new_string:
          type: string
          description: "Replacement text"
      required: [path, old_string, new_string]

  - name: find
    type: builtin
    init: file_find
    emits: [ToolDone, ToolFailed]
    description: "Search for text patterns in the workspace using ripgrep. The query is a regex, not a glob — use \\.go$ to find Go files, not *.go. Returns matching lines with file paths and line numbers."
    parameters:
      type: object
      properties:
        query:
          type: string
          description: "Regex pattern (ripgrep syntax, not glob). Example: \\.go$ for Go files, func main for function search"
        path:
          type: string
          description: "Subdirectory to scope the search (optional)"
      required: [query]

  - name: list_files
    type: builtin
    init: file_list
    emits: [ToolDone, ToolFailed]
    description: "List files and directories in a tree format. Use this first to understand the workspace layout before reading files."
    parameters:
      type: object
      properties:
        path:
          type: string
          description: "Subdirectory to list (default: workspace root)"
        max_depth:
          type: integer
          description: "Maximum directory depth to traverse (default: 4)"

  # --- LLM tools ---
  # invoke_llm is NOT declared here — it is defined per-agent via
  # --llm config files (e.g. configs/generator/llm/default.yaml).
  # Multiple LLM tools can be registered with different names/models.

  - name: parse_response
    type: builtin
    init: parse_response
    visibility: internal
    emits: [ToolDone, TaskCompleted, ParseFailed, CommandError]
    description: "Parse raw LLM output into a tool call or task-completed signal."

  - name: report_parse_error
    type: builtin
    init: report_parse_error
    visibility: internal
    emits: [ToolDone]
    description: "Report a parse error back to the LLM for correction."

  - name: reset_history
    type: builtin
    init: reset_history
    visibility: internal
    emits: [ToolDone, CommandError]
    description: "Clear the conversation history and restart the LLM context."

  # --- validation ---
  - name: validate
    type: builtin
    init: validate
    visibility: internal
    emits: [ValidationPassed, ValidationFailed, CommandError]
    description: "Run a configured validation tool sequence and emit aggregate validation status."

  - name: nudge_reread
    type: builtin
    init: nudge_reread
    visibility: internal
    emits: [ToolDone]
    description: "Append a re-read instruction after file edits to prompt the model to verify changes."

  - name: done
    type: builtin
    init: done
    visibility: internal
    emits: [TaskCompleted]
    description: "Signal that the generation task is complete."

  # --- pipeline/planner tools ---
  - name: extract_task
    type: builtin
    init: extract_task
    description: "Extract the next unblocked task from the dependency graph."
    visibility: internal
    emits: [TaskExtracted, AllDone, Blocked, BatchLimitReached, CommandError]

  - name: extract_all
    type: builtin
    init: extract_all
    description: "Extract all requirements as a single task group (passthrough mode)."
    visibility: internal
    emits: [TaskExtracted, AllDone, Blocked, CommandError]

  - name: assemble_prompt
    type: builtin
    init: assemble_prompt
    description: "Assemble the LLM prompt from task context and SRD requirements."
    visibility: internal
    emits: [ToolDone, CommandError]

  - name: parse_plan
    type: builtin
    init: parse_plan
    description: "Parse the LLM YAML response into an ImplementationPlan."
    visibility: internal
    emits: [PlanReady, ParseFailed, CommandError]

  - name: create_issue
    type: builtin
    init: create_issue
    description: "Create a bd issue from the parsed implementation plan."
    visibility: internal
    emits: [Materialized, MaterializeFailed, CommandError]

  - name: execute_task
    type: builtin
    init: execute_task
    description: "Execute the current task via the code generator agent."
    visibility: internal
    emits: [ExecutionDone, ExecutionFailed, CommandError]

  - name: check_result
    type: builtin
    init: check_result
    description: "Evaluate validation results and decide retry vs. advance vs. fail."
    visibility: internal
    emits: [ValidationPassed, RetryAvailable, RetriesExhausted, CommandError]

  # --- evaluator session tools ---
  - name: load_suite
    type: builtin
    init: load_suite
    visibility: internal
    emits: [SuiteLoaded, CommandError]
    description: "Load an evaluation suite YAML, discover samples, expand the grid, and create the session output directory."

  - name: next_point
    type: builtin
    init: next_point
    visibility: internal
    emits: [PointReady, AllPointsDone, CommandError]
    description: "Advance to the next evaluation point in the grid. Returns PointReady or AllPointsDone."

  - name: run_point
    type: builtin
    init: run_point
    visibility: internal
    emits: [PointDone, CommandError]
    description: "Run the per-point evaluation pipeline via a nested core.Loop with the point machine."

  - name: report_session
    type: builtin
    init: report_session
    visibility: internal
    emits: [SessionReported, CommandError]
    description: "Print session summary with pass/fail/timeout counts and total duration."

  # --- evaluator per-point tools ---
  - name: create_point_dir
    type: builtin
    init: create_point_dir
    visibility: internal
    emits: [PointDirCreated, CommandError]
    description: "Create the per-point evaluation directory and record trace artifact paths."
    category: word
    side_effects:
      - kind: filesystem_write
        target: point_artifacts
        description: "Creates the point output directory under the evaluator session directory."
      - kind: state_mutation
        target: point_context
        state: point_dir_and_trace_path_set
        description: "Sets PointContext.PointDir and PointContext.TracePath for later point tools."

  - name: copy_sample_workspace
    type: builtin
    init: copy_sample_workspace
    visibility: internal
    emits: [SampleWorkspaceCopied, CommandError]
    description: "Copy the sample workspace contents into the current point directory."
    category: word
    side_effects:
      - kind: filesystem_write
        target: point_workspace
        description: "Copies sample workspace files into PointContext.PointDir."

  - name: copy_sample_docs
    type: builtin
    init: copy_sample_docs
    visibility: internal
    emits: [SampleDocsCopied, CommandError]
    description: "Copy optional sample docs into the current point directory, or no-op when the sample has no docs."
    category: word
    side_effects:
      - kind: filesystem_write
        target: point_docs
        paths: [doc]
        description: "Copies sample docs into PointContext.PointDir/doc when docs exist."

  - name: init_workspace_repo
    type: builtin
    init: init_workspace_repo
    visibility: internal
    emits: [WorkspaceRepoInitialized, CommandError]
    description: "Initialize a git repository in the current point workspace."
    category: word
    side_effects:
      - kind: filesystem_write
        target: point_workspace_git_metadata
        paths: [.git]
        description: "Creates git metadata in PointContext.PointDir."

  - name: stage_workspace_baseline
    type: builtin
    init: stage_workspace_baseline
    visibility: internal
    emits: [WorkspaceBaselineStaged, CommandError]
    description: "Stage all current point workspace files for the baseline commit."
    category: word
    side_effects:
      - kind: state_mutation
        target: git_index
        state: all_changes_staged
        description: "Stages all files in the point workspace git index."

  - name: commit_workspace_baseline
    type: builtin
    init: commit_workspace_baseline
    visibility: internal
    emits: [WorkspaceBaselineCommitted, CommandError]
    description: "Create the baseline git commit for the current point workspace."
    category: word
    side_effects:
      - kind: filesystem_write
        target: point_workspace_git_history
        paths: [.git]
        description: "Creates the baseline commit in the point workspace repository."

  - name: run_agent
    type: builtin
    init: run_agent
    visibility: internal
    emits: [HarnessFinished, HarnessFailed, HarnessTimedOut, CommandError]
    description: "Run the agent binary on the prepared workspace and collect exit code, timing, and output."

  - name: check_results
    type: builtin
    init: check_results
    visibility: internal
    emits: [ResultsCollected, CommandError]
    description: "Validate agent output against expected results (run oracle tests, parse trace tokens)."

  - name: collect_metrics
    type: builtin
    init: collect_metrics
    visibility: internal
    emits: [MetricsCollected, CommandError]
    description: "Write evaluation metadata (exit code, duration, test results, tokens) to meta.json."

  - name: dump_config
    type: builtin
    init: dump_config
    visibility: internal
    emits: [ConfigDumped, CommandError]
    description: "Serialize the full experiment configuration (harness, model, tools, prompts) into experiment.yaml."

  # --- bench tools ---
  - name: serve_ui
    type: builtin
    init: serve_ui
    visibility: internal
    emits: [ExperimentRequested, Shutdown, CommandError]
    description: "Start the bench web UI server and block waiting for user actions (bench equivalent of invoke_llm)."

  - name: launch_eval
    type: builtin
    init: launch_eval
    visibility: internal
    emits: [EvalCompleted, EvalFailed, CommandError]
    description: "Spawn a child agent as a subprocess to run an experiment."

  # --- spec validation tools ---
  - name: load_corpus
    type: builtin
    init: load_corpus
    visibility: internal
    emits: [ToolDone, CommandError]
    description: "Load the specification corpus from the project directory."

  - name: validate_specs
    type: builtin
    init: validate_specs
    visibility: internal
    emits: [ValidationPassed, ValidationFailed, CommandError]
    description: "Run consistency checks on the loaded specification corpus."

  - name: format_report
    type: builtin
    init: format_report
    visibility: internal
    emits: [ToolDone, ToolFailed, CommandError]
    description: "Format the validation results as a human-readable report."
