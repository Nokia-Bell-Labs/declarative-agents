tools:
- name: stage_workspace_baseline
  type: builtin
  init: stage_workspace_baseline
  visibility: internal
  emits:
  - WorkspaceBaselineStaged
  - CommandError
  description: Stage all current point workspace files for the baseline commit.
  category: word
  side_effects:
  - kind: state_mutation
    target: git_index
    state: all_changes_staged
    description: Stages all files in the point workspace git index.
  reversibility:
    classification: reversible
    undo: git_index_restore
  undo:
    strategy: workspace_restore
    description: Restore the point workspace git index from a previous workspace ref.
    requires:
    - Workspace
  problem: The machine needs a declared word for staging the point workspace baseline without embedding that workflow step in Go control flow.
  goals:
  - Perform the stage_workspace_baseline action as one machine-selected word.
  - Return an explicit signal that lets the MachineSpec choose the next state.
  - Keep sequencing outside the tool implementation and in machine.yaml.
  requirements:
    input:
    - must consume parameters from tool input, prior Result, or configured command/domain state
    output:
    - must emit one declared signal and return machine-readable output when available
    errors:
    - must emit CommandError for infrastructure failures and preserve domain failures as declared signals
  non_goals:
  - Does not choose the next workflow step; machine.yaml owns sequencing.
  - Does not hide unrelated tool execution behind this word.
  errors:
  - signal: CommandError
    condition: required input, configuration, or runtime state is invalid
    message_shape: 'stage_workspace_baseline: <error>'
    state_after_failure: no additional workflow step is executed by this tool
  relationships:
    before:
    - machine-selected predecessor
    after:
    - machine-selected successor
  output:
    description: stage_workspace_baseline command result summary.
    schema:
      type: object
      properties:
        message:
          type: string
        signal:
          type: string
      required:
      - message
