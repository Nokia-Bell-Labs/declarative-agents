id: test-rel09.4-control-plane
title: Test Suite for Release 09.4 Control Plane
release: "09.4"

overview: |
  Non-canonical historical record. The mesh control plane was extracted to
  examples/chatbot-mesh/, which owns the coordinator and creator profiles, the
  deployment API, and the integration:controlPlane tracer. Its canonical suite is
  examples/chatbot-mesh/docs/specs/test-suites/test-rel05.0-control-plane.yaml.
  This file remains as a pointer to that history, so its proof commands run from
  the canonical module.

  This suite validated the mesh control plane (srd016 coordinator, srd017 creator):
  a provisioning intent flows from the UX agent through the coordinator's ingestion
  and reconfiguration workflows to the creator's instance operations and back as
  aggregated status, with the deployment-API authority held by the creator alone.

traces:
  - rel09.4-uc001-control-plane-provisioning

preconditions:
  - agent-core is available for the request runtime and REST client transport.
  - The chatbot, coordinator, and creator profiles are deployed with declared clients between them; the creator alone holds the deployment-API credentials.
  - A deployment API and the chart's values-to-config co-generation are reachable.

test_cases:
  - use_case: rel09.4-uc001-control-plane-provisioning
    name: Provisioning intent tracer across chatbot, coordinator, and creator
    integration_target: cd ../examples/chatbot-mesh && mage integration:controlPlane
    status: planned
    description: |
      Drives a provisioning intent end to end: the chatbot delegates an add-a-source
      intent to the coordinator through its declared client; the coordinator
      requests a corpus-ingest run per directory from the creator and verifies the
      collection counts; the coordinator decides the values changes and requests a
      rollout; the creator selects the profiles, spawns the ingest run, executes the
      checkpoint-resume rollout through the deployment API, verifies health, and
      reports it back; the coordinator aggregates status; and a subsequent chat turn
      is grounded in the newly added source. Asserts the authority boundary: the
      chatbot and coordinator submit no endpoint or credential, and only the creator
      calls the deployment API.
    inputs:
      intent: add a directory as a knowledge source
      directories: [one seeded directory]
      agents: [chatbot, coordinator, creator]
    expected:
      chatbot_delegates_intent_no_credential: true
      coordinator_sequences_ingest_and_verifies_counts: true
      coordinator_decides_values_and_requests_rollout: true
      creator_executes_resume_rollout_and_reports_health: true
      only_creator_calls_deployment_api: true
      new_source_serves_a_grounded_turn: true
    traces:
      - rel09.4-uc001-control-plane-provisioning S1
      - rel09.4-uc001-control-plane-provisioning S2
      - rel09.4-uc001-control-plane-provisioning S3
      - rel09.4-uc001-control-plane-provisioning S4
      - rel09.4-uc001-control-plane-provisioning S5
      - srd016-coordinator AC2
      - srd016-coordinator AC3
      - srd017-creator AC3
      - srd017-creator AC5
