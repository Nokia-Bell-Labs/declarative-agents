tools:
- name: read
  type: builtin
  category: word
  init: file_read
  emits:
  - ToolDone
  - ToolFailed
  description: Read a single file's contents. Path must point to a file, not a directory. Use find to discover file paths first.
  output:
    description: Line-numbered text content from the requested file range.
    schema:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
        start_line:
          type: integer
        end_line:
          type: integer
      required:
      - path
      - content
  metrics:
    instruments:
    - name: filesystem.bytes_read
      kind: histogram
      unit: By
      description: Bytes read from one workspace file.
      value_source: bytes_read
      attributes:
      - operation
    attributes:
    - name: operation
      source: tool_name
      cardinality: low
      redaction: none
  parameters:
    type: object
    properties:
      path:
        type: string
        description: File path relative to workspace root (must be a file, not a directory)
      start_line:
        type: integer
        description: Start line (1-indexed, inclusive)
      end_line:
        type: integer
        description: End line (1-indexed, inclusive)
    required:
    - path
  side_effects:
  - kind: filesystem_read
    target: workspace_file
    description: Reads file contents from the configured workspace without mutating state.
  reversibility:
    classification: reversible
    undo: noop
  undo:
    strategy: noop
    description: Read-only command has no effects to reverse.
  problem: The machine needs a declared word for reading one workspace file without embedding that workflow step in Go control flow.
  goals:
  - Perform the read action as one machine-selected word.
  - Return an explicit signal that lets the MachineSpec choose the next state.
  - Keep sequencing outside the tool implementation and in machine.yaml.
  requirements:
    input:
    - must consume parameters from tool input, prior Result, or configured command/domain state
    output:
    - must emit one declared signal and return machine-readable output when available
    errors:
    - must emit CommandError for infrastructure failures and preserve domain failures as declared signals
  non_goals:
  - Does not choose the next workflow step; machine.yaml owns sequencing.
  - Does not hide unrelated tool execution behind this word.
  errors:
  - signal: CommandError
    condition: required input, configuration, or runtime state is invalid
    message_shape: 'read: <error>'
    state_after_failure: no additional workflow step is executed by this tool
  relationships:
    before:
    - machine-selected predecessor
    after:
    - machine-selected successor
