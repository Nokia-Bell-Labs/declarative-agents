id: sm-evaluator
title: Evaluator Agent Semantic Model

purpose: |
  The evaluator uses a two-level nested state machine architecture.

  The session-level machine (agents/evaluator/machine.yaml) iterates
  over all combinations of (harness, model, sample, gridpoint, rep)
  defined in a suite YAML. For each combination it invokes a nested
  core.Loop that runs the per-point pipeline.

  The point-level machine (agents/evaluator/point.yaml) orchestrates
  a single evaluation point: it creates a point directory, copies the
  sample workspace/docs, initializes and commits a git baseline, snapshots
  the experiment configuration, invokes the generator agent as a subprocess,
  checks the results, and collects metrics. It is a deterministic
  pipeline that sequences atomic tools — no LLM calls.

  The former `agent eval` subcommand has been removed. Evaluation is
  now fully driven by `--machine agents/evaluator/machine.yaml`.

declarative_boundary: |
  The evaluator program definition is the pair of state machines
  (agents/evaluator/machine.yaml and agents/evaluator/point.yaml),
  the selected tools (agents/evaluator/tools.yaml), and the tool
  declarations/overrides loaded at startup. Suite YAML is not a third
  program-definition mechanism. It is input data consumed by evaluator
  tools:

  - parse_suite_config parses and validates suite metadata.
  - discover_suite_samples resolves samples from suite input data.
  - expand_eval_grid materializes concrete grid points.
  - init_eval_session creates the session output directory and resolves
    runtime defaults.
  - report_suite_summary reports the completed setup before iteration.
  - run_agent consumes each harness entry as subprocess input data
    (binary plus flags) for the current point.
  - dump_config snapshots the resolved harness, model, machine/tools, and
    prompt/profile configuration into experiment.yaml for reproducibility.

configuration:
  machine: agents/evaluator/machine.yaml
  point_machine: agents/evaluator/point.yaml
  session_tools: agents/evaluator/tools.yaml
  point_tools: agents/evaluator/tools-point.yaml
  tool_declarations:
    - tools/builtin.yaml
    - agents/evaluator/builtin.yaml

# --- Session-level machine ---

session_states:
  - name: Idle
    meaning: Initial state before the suite is loaded.
  - name: ParsingSuiteConfig
    meaning: Reading and validating suite YAML metadata.
  - name: DiscoveringSuiteSamples
    meaning: Discovering samples from the resolved suite samples directory.
  - name: ExpandingEvalGrid
    meaning: Expanding suite grid parameters into concrete grid points.
  - name: InitializingEvalSession
    meaning: Creating the session output directory and resolving runtime defaults.
  - name: ReportingSuiteSummary
    meaning: Reporting suite point counts before iteration begins.
  - name: AdvancingPoint
    meaning: Advancing the iterator to the next (harness, model, sample, gridpoint, rep).
  - name: RunningPoint
    meaning: Executing the per-point pipeline via a nested core.Loop.
  - name: Reporting
    meaning: Printing session summary (pass/fail/timeout counts, total duration).
  - name: Done
    meaning: Terminal. All points evaluated and reported.
  - name: Failed
    meaning: Terminal. Infrastructure error prevented evaluation.

session_signals:
  - name: Seed
    trigger: Loop initialization.
  - name: SuiteConfigParsed
    trigger: Suite YAML metadata parsed and validated.
  - name: SuiteSamplesDiscovered
    trigger: Suite samples discovered.
  - name: EvalGridExpanded
    trigger: Suite grid expanded into concrete grid points.
  - name: EvalSessionInitialized
    trigger: Session output directory and runtime defaults initialized.
  - name: SuiteLoaded
    trigger: Suite setup summary reported.
  - name: PointReady
    trigger: Iterator advanced to a new grid point.
  - name: PointDone
    trigger: Per-point pipeline completed (any outcome).
  - name: AllPointsDone
    trigger: Grid iterator exhausted.
  - name: SessionReported
    trigger: Summary printed.
  - name: CommandError
    trigger: Infrastructure-level error.

session_lifecycle: |
  1. Idle → ParsingSuiteConfig: parse_suite_config
  2. ParsingSuiteConfig → DiscoveringSuiteSamples: discover_suite_samples
  3. DiscoveringSuiteSamples → ExpandingEvalGrid: expand_eval_grid
  4. ExpandingEvalGrid → InitializingEvalSession: init_eval_session
  5. InitializingEvalSession → ReportingSuiteSummary: report_suite_summary
  6. ReportingSuiteSummary → AdvancingPoint: next_point
  7. AdvancingPoint → RunningPoint: run_point  (if PointReady)
  8. RunningPoint → AdvancingPoint: next_point  (loop back)
  9. AdvancingPoint → Reporting: report_session  (if AllPointsDone)
  10. Reporting → Done

session_diagram: |
  ```mermaid
  stateDiagram-v2
    [*] --> Idle
    Idle --> ParsingSuiteConfig: Seed / parse_suite_config
    ParsingSuiteConfig --> DiscoveringSuiteSamples: SuiteConfigParsed / discover_suite_samples
    DiscoveringSuiteSamples --> ExpandingEvalGrid: SuiteSamplesDiscovered / expand_eval_grid
    ExpandingEvalGrid --> InitializingEvalSession: EvalGridExpanded / init_eval_session
    InitializingEvalSession --> ReportingSuiteSummary: EvalSessionInitialized / report_suite_summary
    ReportingSuiteSummary --> AdvancingPoint: SuiteLoaded / next_point
    AdvancingPoint --> RunningPoint: PointReady / run_point
    RunningPoint --> AdvancingPoint: PointDone / next_point
    AdvancingPoint --> Reporting: AllPointsDone / report_session
    Reporting --> Done: SessionReported
    ParsingSuiteConfig --> Failed: CommandError
    DiscoveringSuiteSamples --> Failed: CommandError
    ExpandingEvalGrid --> Failed: CommandError
    InitializingEvalSession --> Failed: CommandError
    ReportingSuiteSummary --> Failed: CommandError
    AdvancingPoint --> Failed: CommandError
    RunningPoint --> Failed: CommandError
    Reporting --> Failed: CommandError
  ```

session_tools:
  - parse_suite_config
  - discover_suite_samples
  - expand_eval_grid
  - init_eval_session
  - report_suite_summary
  - next_point
  - run_point
  - report_session

# --- Point-level machine ---

point_states:
  - name: Idle
    meaning: Initial state before evaluation begins.
  - name: CreatingPointDir
    meaning: Creating the per-point artifact directory and recording trace path.
  - name: CopyingSampleWorkspace
    meaning: Copying sample workspace files into the point directory.
  - name: CopyingSampleDocs
    meaning: Copying optional sample docs into the point directory.
  - name: InitializingWorkspaceRepo
    meaning: Initializing the point workspace git repository.
  - name: StagingWorkspaceBaseline
    meaning: Staging all point workspace files for the baseline commit.
  - name: CommittingWorkspaceBaseline
    meaning: Creating the baseline git commit for the point workspace.
  - name: SnapshotConfig
    meaning: Serializing the full experiment configuration into experiment.yaml.
  - name: RunningAgent
    meaning: The generator agent is running as a subprocess.
  - name: RunningOracleCheck
    meaning: Running deterministic oracle tests in the point workspace.
  - name: CollectingTraceTokens
    meaning: Reading trace.ndjson and extracting token usage.
  - name: CheckingAgentVersion
    meaning: Comparing configured harness version against trace metadata.
  - name: SummarizingPointResults
    meaning: Emitting aggregate result status from populated point context fields.
  - name: CollectingMetrics
    meaning: Writing evaluation metadata (exit code, duration, test results, tokens, convergence data) to meta.json.
  - name: Done
    meaning: Terminal. Evaluation point completed successfully.
  - name: Failed
    meaning: Terminal. An infrastructure error prevented evaluation.

point_signals:
  - name: Seed
    trigger: Loop initialization.
  - name: PointDirCreated
    trigger: Point artifact directory created and PointContext paths recorded.
  - name: SampleWorkspaceCopied
    trigger: Sample workspace copied into the point directory.
  - name: SampleDocsCopied
    trigger: Optional sample docs copied, or no docs were present.
  - name: WorkspaceRepoInitialized
    trigger: Git repository initialized in the point workspace.
  - name: WorkspaceBaselineStaged
    trigger: Baseline workspace files staged in the git index.
  - name: WorkspaceBaselineCommitted
    trigger: Baseline git commit created.
  - name: ConfigDumped
    trigger: Experiment configuration snapshot written to experiment.yaml.
  - name: HarnessFinished
    trigger: The generator agent exited normally (exit code 0).
  - name: HarnessFailed
    trigger: The generator agent exited with a non-zero exit code.
  - name: HarnessTimedOut
    trigger: The generator agent exceeded its time budget.
  - name: OracleCheckPassed
    trigger: Oracle tests passed.
  - name: OracleCheckFailed
    trigger: Oracle tests failed as a domain result, not an infrastructure error.
  - name: TraceTokensCollected
    trigger: Trace token extraction completed, including the missing-trace zero-token case.
  - name: AgentVersionChecked
    trigger: Configured and traced agent versions are compatible or version check was skipped.
  - name: AgentVersionMismatch
    trigger: Trace metadata reported an agent version different from the configured harness version.
  - name: ResultsCollected
    trigger: Point result summary completed.
  - name: MetricsCollected
    trigger: Metrics extraction completed.
  - name: CommandError
    trigger: Infrastructure-level error.

point_lifecycle: |
  1. Idle → CreatingPointDir: create_point_dir
  2. CreatingPointDir → CopyingSampleWorkspace: copy_sample_workspace
  3. CopyingSampleWorkspace → CopyingSampleDocs: copy_sample_docs
  4. CopyingSampleDocs → InitializingWorkspaceRepo: init_workspace_repo
  5. InitializingWorkspaceRepo → StagingWorkspaceBaseline: stage_workspace_baseline
  6. StagingWorkspaceBaseline → CommittingWorkspaceBaseline: commit_workspace_baseline
  7. CommittingWorkspaceBaseline → SnapshotConfig: dump_config
  8. SnapshotConfig → RunningAgent: run_agent
  9. RunningAgent → RunningOracleCheck: run_oracle_check (on any harness outcome)
  10. RunningOracleCheck → CollectingTraceTokens: collect_trace_tokens (on pass or fail)
  11. CollectingTraceTokens → CheckingAgentVersion: check_agent_version
  12. CheckingAgentVersion → SummarizingPointResults: summarize_point_results (checked or mismatch)
  13. SummarizingPointResults → CollectingMetrics: collect_metrics
  14. CollectingMetrics → Done

point_diagram: |
  ```mermaid
  flowchart LR
    A[create_point_dir] --> B[copy_sample_workspace]
    B --> C[copy_sample_docs]
    C --> D[init_workspace_repo]
    D --> E[stage_workspace_baseline]
    E --> F[commit_workspace_baseline]
    F --> G[dump_config]
    G --> H[run_agent]
    H -->|any outcome| I[run_oracle_check]
    I --> J[collect_trace_tokens]
    J --> K[check_agent_version]
    K --> L[summarize_point_results]
    L --> M[collect_metrics]
  ```

budget:
  session_max_iterations: 10000
  point_max_iterations: 20

point_tools:
  - create_point_dir
  - copy_sample_workspace
  - copy_sample_docs
  - init_workspace_repo
  - stage_workspace_baseline
  - commit_workspace_baseline
  - dump_config
  - run_agent
  - run_oracle_check
  - collect_trace_tokens
  - check_agent_version
  - summarize_point_results
  - collect_metrics

invariants:
  - The evaluator never calls an LLM directly
  - All agent outcomes (success, failure, timeout) proceed to run_oracle_check
  - Oracle failures are domain results and still proceed through trace, version, summary, and metrics collection
  - The workspace is a fresh temporary directory for each evaluation point
  - Metrics are collected even when the agent fails or times out
  - The session machine iterates sequentially through all grid points
  - Session and point machines have separate tool selections
  - run_point builds the nested point registry from agents/evaluator/tools-point.yaml
