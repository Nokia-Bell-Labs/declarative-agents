    purpose: External profile ownership and mounted-profile requirements owned by agent-core.
  - doc: docs/VISION.yaml
    purpose: Goals, boundaries, and success criteria.
  - doc: docs/SPECIFICATIONS.yaml
    purpose: Specification index for future requirements and semantic models.
  - doc: docs/road-map.yaml
    purpose: Release plan for profile extraction and mounted runtime usage.
  - doc: docs/constitutions/issue-format.yaml
    purpose: Required shape for future Beads issues.
  - doc: docs/specs/software-requirements/srd001-agent-functional-blocks.yaml
    purpose: Functional requirements for migrated profile families.
  - doc: docs/specs/semantic-models/multi-agent-profile-system.yaml
    purpose: Profile role groups, actor boundaries, and dependency directions.
  - doc: docs/specs/semantic-models/agent-role-taxonomy.yaml
    purpose: Per-profile role taxonomy for migration and validation work.
