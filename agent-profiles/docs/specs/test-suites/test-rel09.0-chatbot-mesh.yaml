id: test-rel09.0-chatbot-mesh
title: Test Suite for Release 09.0 Chatbot Mesh
release: "09.0"

overview: |
  This suite defines the profile-owned tracer bullets for the chatbot mesh: a
  persistent RAG server answering a vector-in query (srd013), an end-to-end
  chatbot turn that routes, embeds, fans out to two RAGs, composes, and answers
  with a degraded-RAG case (srd014), and a Helm deployment on a kind cluster that
  exercises the tiered hot swap (srd015). The cases are planned; the integration
  targets land with the implementation epics (#292 RAG server, #293/#294 chatbot,
  #296 deployment).

traces:
  - rel09.0-uc001-rag-server-query
  - rel09.0-uc002-chatbot-turn
  - rel09.0-uc003-mesh-deployment

preconditions:
  - agent-core is available as AGENT_CORE_ROOT or a sibling ../agent-core checkout, including HTTP trace propagation (agent-core rel08.0) where trace continuity is asserted.
  - A Chroma server and an Ollama (or external LLM) are reachable with the configured embedding and answer models.
  - A kind cluster is available and the rel06.0 binary-only runtime image is loadable for the deployment case.
  - agent-profiles owns the RAG server, chatbot, and deployment chart assets named by the tracers.

test_cases:
  - use_case: rel09.0-uc001-rag-server-query
    name: RAG server vector-in query tracer
    integration_target: mage integration:ragServer
    go_test: go test ./magefiles -run TestParseRagQueryResponse
    status: implemented
    description: |
      Integration.RagServer starts a Chroma container, seeds a collection by
      running the ingest profile, launches the rag-server as a long-running
      subprocess, embeds a query at Ollama for a matching-dimension vector, posts
      it to the machine_request query endpoint, and asserts the returned chunks
      with record ids and distances, the embedding-model metadata, a mapped 400
      for a wrong-dimension vector, a reachable monitor current_state, and a
      graceful lifecycle exit. Verified end to end against live Docker and Ollama;
      skips cleanly without them. No query embedding or LLM answering happens in
      the RAG server.
    inputs:
      rag_profile: agents/chroma/rag-server/profile.yaml
      chroma_rest: agents/chroma/rag-server/rest.yaml
      query_embeddings: Ollama-embedded query vector
      n_results: 3
    expected:
      query_endpoint_accepts_vector: true
      chunks_with_ids_and_distances: true
      metadata_names_embedding_model: true
      no_llm_answer_step: true
    traces:
      - rel09.0-uc001-rag-server-query S1
      - rel09.0-uc001-rag-server-query S2
      - rel09.0-uc001-rag-server-query S3
      - srd013-rag-server-agent AC2

  - use_case: rel09.0-uc002-chatbot-turn
    name: Chatbot turn end-to-end tracer with a degraded RAG
    integration_target: mage integration:chatbot
    go_test: go test ./magefiles -run 'TestCitedRecordNumbers|TestChatResponse'
    status: implemented
    reduction: single-RAG
    description: |
      Integration.Chatbot proves the single-RAG reduction of this use case (GH-306).
      It starts a Chroma container seeded by the ingest profile, launches the
      rag-server then the chatbot as long-running subprocesses, and drives the chat
      machine_request endpoint. A grounded turn returns a 200 answer grounded in the
      retrieved chunk (the answer states a corpus-only fact); a second turn with the
      rag-server stopped returns the degraded response shape (a 200, not a 500),
      also carrying prior turns as client-side history (R4). The chatbot span log is
      asserted to show the model answered (a genai chat span with output tokens),
      and the rag-server span log is asserted independently to show it served and
      exited. Verified end to end against live Docker and Ollama; skips cleanly
      without them.

      Planned for Epic #294 and the observability epic, not covered here: the $tool
      router with default fallback (R2) and the two-RAG fan-out with per-RAG
      degradation and embedding-model mismatch exclusion (R3); the ordered per-word
      dispatch subsequence embed -> rag -> compose -> invoke_llm and cross-agent
      trace continuity, both of which need the request-scoped machine_request runs
      to export their dispatch spans (today they run under a NoopTracer, so only the
      host lifecycle words and the genai chat span reach the process OTel file).
    inputs:
      chatbot_profile: agents/chatbot/profile.yaml
      rag_clients: [rag0]
      turn_message: corpus-answerable question, then a follow-up with history
      fault: rag-server stopped before the second turn
    expected:
      grounded_turn_answers_from_chunks: true
      grounded_turn_status_200: true
      degraded_turn_returns_200_not_500: true
      chatbot_trace_shows_model_answered: true
      rag_server_trace_shows_served_and_exited: true
      two_span_logs_asserted_independently: true
    traces:
      - rel09.0-uc002-chatbot-turn S1
      - rel09.0-uc002-chatbot-turn S2
      - srd014-chatbot-agent AC1

  - use_case: rel09.0-uc003-mesh-deployment
    name: Mesh Helm deployment and hot-swap tracer on kind
    integration_target: mage integration:meshDeploy
    status: planned
    description: |
      helm install the mesh on a kind cluster and exercise the tiered swap. The
      target proves one chart deploys the chatbot, two values-driven RAG pairs,
      the LLM, the Dolt backend, and the collector over rel06.0 images with
      ConfigMap profiles; the chatbot RAG clients are co-generated from the values
      list and the rendered rest.yaml passes ValidateDefinition; repointing a RAG
      is a Service change with no agent config change; and adding a RAG re-renders
      ConfigMaps and rolls out the chatbot with a Dolt checkpoint resume.
    inputs:
      chart: deploy/chatbot-mesh/
      values_rag_list: [rag-a, rag-b]
      swap_repoint: rag-a Service endpoint change
      swap_add: rag-c values entry
    expected:
      chart_deploys_full_mesh: true
      client_config_cogenerated: true
      rendered_rest_yaml_validates: true
      repoint_touches_no_agent_config: true
      add_rag_rollout_resumes_checkpoint: true
    traces:
      - rel09.0-uc003-mesh-deployment S1
      - rel09.0-uc003-mesh-deployment S2
      - rel09.0-uc003-mesh-deployment S3
      - srd015-chatbot-deployment AC2
      - srd015-chatbot-deployment AC3
