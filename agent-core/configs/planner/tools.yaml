# Tool selection for the planner agent.
# Lists the subset of declared tools this agent uses.
#
# Usage:
#   agent --tools-declaration configs/tools/builtin.yaml \
#         --tools-declaration configs/tools/exec.yaml \
#         --tools configs/planner/tools.yaml \
#         --machine configs/planner/machine.yaml

tools:
  # planning tools
  - extract_task
  - extract_all
  - assemble_prompt
  - parse_plan
  - create_issue
  # execution
  - execute_task
  - check_result
  # LLM tools
  - invoke_llm
  - reset_history
  # build/test (used by check_result validation)
  - build
  - vet
  - lint
  - test
  # git tools
  - stage_all
  - workspace_status
  - commit
  - rev_parse
  - diff_stat
  - log_oneline
  # issue tools
  - issue_create
  - issue_close
  - issue_list
