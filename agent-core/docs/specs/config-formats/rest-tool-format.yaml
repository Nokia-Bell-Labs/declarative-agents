implementation_status:
  implemented:
    - internal/tools/rest typed config structs.
    - internal/tools/rest YAML loader.
    - OpenAPI import compilation through github.com/getkin/kin-openapi/openapi3.
    - rest_await_event source-filter config through ToolDef config.
    - emit_signal lifecycle exit routes and exit_agent ToolDef config.
    - machine_request endpoint binding config.
    - filesystem resource words used by the Knowledge Manager request machine.
    - generic machine_request response trace fields for server, route, and request machine emitted directly by internal/tools/rest.
    - always-on Knowledge Manager conformance coverage for generic machine_request routes under plain go test.
  partial:
    - read_policy values outside first-available are rejected until implemented.
    - REST compensation mementos are captured, but rollback-time execution of configured REST compensation remains follow-up work.
  reserved:
    - top-level document_resources config. ValidateDefinition rejects this field.
    - machine_request.document_resources config. ValidateDefinition rejects this field.
    - lifecycle_control endpoint config.
  planned_follow_up:
    - agent-core-guhn.4: align formal release 03.0 suite cases with exact named Go tests for closed conformance behavior.
    - agent-core-guhn.5: execute configured REST compensation during rollback traversal.
