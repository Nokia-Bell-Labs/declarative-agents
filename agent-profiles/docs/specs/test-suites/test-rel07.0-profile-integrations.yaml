id: test-rel07.0-profile-integrations
title: Test Suite for Release 07.0 Profile Integrations
release: "07.0"

overview: |
  This suite defines profile-owned tracer bullets for concrete state machines
  and cross-profile boundaries. Release 06.0 proved that profiles can live in
  this repository and be consumed by agent-core. Release 07.0 proves selected
  profile relationships as use cases: documentation-curator UX, evaluator to
  generator, planner to generator, bench to evaluator, and monitor/control.

  The suite deliberately separates implemented, planned, and blocked evidence.
  A tracer is implemented only when agent-profiles owns the target, fixtures,
  and expected output evidence. Planned entries name target contracts and
  follow-up issues. Blocked entries must name the missing profile asset or
  fixture rather than accepting a fake pass.

traces:
  - rel07.0-uc001-documentation-curator-profile-ux
  - rel07.0-uc002-evaluator-generator-profile-boundary
  - rel07.0-uc003-planner-generator-profile-boundary
  - rel07.0-uc004-bench-evaluator-profile-boundary
  - rel07.0-uc005-monitor-control-profile-boundary

preconditions:
  - agent-core is available as AGENT_CORE_ROOT or as a sibling ../agent-core checkout.
  - agent-profiles owns all profile paths, fixtures, suites, and expected outputs named by the tracer.
  - Integration targets load concrete profiles through AGENT_PROFILES_ROOT or repository-relative paths.
  - agent-core remains responsible only for runtime execution and builtin capabilities.

test_cases:
  - use_case: rel07.0-uc001-documentation-curator-profile-ux
    name: Documentation curator profile UX and lifecycle tracer
    follow_up_issue: "#107"
    integration_target: mage integration:documentationCurator
    go_test: go test ./magefiles -run TestPrepareDocumentationCuratorIntegrationWritesEphemeralProfile
    status: implemented
    description: |
      Run the concrete Knowledge Manager/documentation-curator proof from
      agent-profiles. The target runs the shipped profile through an ephemeral
      profile overlay, proves machine_request document routes and profile-owned
      UI assets, records trace metadata, and shuts down through lifecycle
      control.
    inputs:
      profile: agents/knowledge-manager/documentation-curator/profile.yaml
      ux_config: agents/knowledge-manager/documentation-curator/ui/ux.yaml
      request_machine: agents/knowledge-manager/documentation-curator/request-machine.yaml
      fixture_docs: testdata/integration/rel07-documentation-curator/
    expected:
      terminal_signal: DocumentDetailReady
      trace_fields: [server, route, machine, terminal_signal, status]
      lifecycle_signal: ExitRequested
      terminal_state: Done
      listener_released: true
      target_owner: agent-profiles
    traces:
      - rel07.0-uc001-documentation-curator-profile-ux S1
      - rel07.0-uc001-documentation-curator-profile-ux S2
      - rel07.0-uc001-documentation-curator-profile-ux S3
      - rel07.0-uc001-documentation-curator-profile-ux S4
      - sm-agent-role-taxonomy documentation-curator

  - use_case: rel07.0-uc002-evaluator-generator-profile-boundary
    name: Evaluator runs generator as benchmark subject
    follow_up_issue: "#108"
    integration_target: mage integration:evaluatorGenerator
    go_test: go test ./magefiles -run TestAssertEvaluatorGeneratorOutputRequiresBoundaryEvidence
    status: implemented
    description: |
      Run evaluator with a tiny local suite whose subject profile is generator.
      The target creates point/session output proving child profile invocation,
      oracle accounting, trace evidence, and fixture-local result paths.
    inputs:
      evaluator_profile: agents/critic/profile.yaml
      subject_profile: agents/generator/profile.yaml
      suite: testdata/integration/rel07-evaluator-generator/suite.yaml
      expected_summary: testdata/integration/rel07-evaluator-generator/expected/summary.yaml
      output_dir: temporary evaluator results directory
    expected:
      child_profile: generator
      point_status_recorded: true
      session_summary_recorded: true
      oracle_accounting_recorded: true
      target_owner: agent-profiles
    traces:
      - rel07.0-uc002-evaluator-generator-profile-boundary S1
      - rel07.0-uc002-evaluator-generator-profile-boundary S2
      - rel07.0-uc002-evaluator-generator-profile-boundary S3
      - sm-multi-agent-profile-system dependency_directions evaluator->generator

  - use_case: rel07.0-uc003-planner-generator-profile-boundary
    name: Planner executes materialized work through generator
    follow_up_issue: "#109"
    integration_target: mage integration:plannerGenerator
    go_test: go test ./magefiles -run TestAssertPlannerGeneratorStateRequiresTraceAndTerminalState
    status: implemented
    description: |
      Run planner with a small requirement/task fixture and execute the
      materialized work through generator. The target records graph
      terminal state and child run outcome without writing real external issues.
    inputs:
      planner_profile: agents/planner/profile.yaml
      child_profile: agents/generator/profile.yaml
      graph_fixture: testdata/integration/rel07-planner-generator/graph.yaml
      workspace: testdata/integration/rel07-planner-generator/workspace
      expected_terminal_state: testdata/integration/rel07-planner-generator/expected/terminal-state.yaml
    expected:
      materialized_task_count: 1
      child_profile: generator
      graph_terminal_state_recorded: true
      child_run_outcome_recorded: true
      target_owner: agent-profiles
    traces:
      - rel07.0-uc003-planner-generator-profile-boundary S1
      - rel07.0-uc003-planner-generator-profile-boundary S2
      - rel07.0-uc003-planner-generator-profile-boundary S3
      - sm-multi-agent-profile-system dependency_directions planner->generator

  - use_case: rel07.0-uc004-bench-evaluator-profile-boundary
    name: Bench launches evaluator from a human action
    follow_up_issue: "#110"
    integration_target: mage integration:benchEvaluator
    go_test: go test ./magefiles -run TestAssertBenchEvaluatorEvidenceRequiresLaunchOutput
    status: implemented
    description: |
      Run a local bench harness that sends a fixture operator action and
      verifies evaluator launch evidence. This target proves the human boundary
      and evaluator launch request, not a full evaluator benchmark.
    inputs:
      bench_profile: agents/bench/profile.yaml
      evaluator_profile: agents/critic/profile.yaml
      launch_request: testdata/integration/rel07-bench-evaluator/request.yaml
      suite: testdata/integration/rel07-bench-evaluator/suite.yaml
      expected_launch: testdata/integration/rel07-bench-evaluator/expected/launch.yaml
    expected:
      human_action_received: true
      evaluator_profile_resolved: true
      launch_status_recorded: true
      evaluator_output_evidence_recorded: true
      target_owner: agent-profiles
    traces:
      - rel07.0-uc004-bench-evaluator-profile-boundary S1
      - rel07.0-uc004-bench-evaluator-profile-boundary S2
      - rel07.0-uc004-bench-evaluator-profile-boundary S3
      - sm-multi-agent-profile-system dependency_directions bench->evaluator

  - use_case: rel07.0-uc005-monitor-control-profile-boundary
    name: Monitor and control profile boundary
    follow_up_issue: "#111"
    integration_target: mage integration:monitorControl
    go_test: go test ./magefiles -run TestCollectMonitorControlEvidenceRecordsRoutesAndLifecycleBoundary
    status: implemented
    description: |
      Record profile-owned monitor/control boundary evidence from the concrete
      monitor and control YAML assets. The target proves monitor state routes,
      control exit routes, emit_signal HTTP boundaries, MachineSpec lifecycle
      routing, and monitor listener cleanup contracts.
    inputs:
      monitor_profile: agents/monitor/profile.yaml
      control_profile: agents/control/profile.yaml
      expected_evidence: testdata/integration/rel07-monitor-control/expected/evidence.yaml
    expected:
      monitor_state_exposed: true
      lifecycle_signal_routed: true
      listener_released: true
      http_handlers_enqueue_only: true
      target_owner: agent-profiles
    traces:
      - rel07.0-uc005-monitor-control-profile-boundary S1
      - rel07.0-uc005-monitor-control-profile-boundary S2
      - rel07.0-uc005-monitor-control-profile-boundary S3
      - sm-agent-role-taxonomy monitor
      - sm-agent-role-taxonomy control
