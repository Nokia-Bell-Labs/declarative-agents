tools:
- name: init_workspace_repo
  type: builtin
  init: init_workspace_repo
  visibility: internal
  emits:
  - WorkspaceRepoInitialized
  - CommandError
  description: Initialize a git repository in the current point workspace.
  category: word
  side_effects:
  - kind: filesystem_write
    target: point_workspace_git_metadata
    paths:
    - .git
    description: Creates git metadata in PointContext.PointDir.
  reversibility:
    classification: compensatable
    undo: remove_git_metadata_or_recreate_workspace
  undo:
    strategy: compensating_action
    description: Remove generated git metadata or recreate the point workspace from source artifacts.
  problem: The machine needs a declared word for initializing the point workspace repository without embedding that workflow step in Go control flow.
  goals:
  - Perform the init_workspace_repo action as one machine-selected word.
  - Return an explicit signal that lets the MachineSpec choose the next state.
  - Keep sequencing outside the tool implementation and in machine.yaml.
  requirements:
    input:
    - must consume parameters from tool input, prior Result, or configured command/domain state
    output:
    - must emit one declared signal and return machine-readable output when available
    errors:
    - must emit CommandError for infrastructure failures and preserve domain failures as declared signals
  non_goals:
  - Does not choose the next workflow step; machine.yaml owns sequencing.
  - Does not hide unrelated tool execution behind this word.
  errors:
  - signal: CommandError
    condition: required input, configuration, or runtime state is invalid
    message_shape: 'init_workspace_repo: <error>'
    state_after_failure: no additional workflow step is executed by this tool
  relationships:
    before:
    - machine-selected predecessor
    after:
    - machine-selected successor
  output:
    description: init_workspace_repo command result summary.
    schema:
      type: object
      properties:
        message:
          type: string
        signal:
          type: string
      required:
      - message
