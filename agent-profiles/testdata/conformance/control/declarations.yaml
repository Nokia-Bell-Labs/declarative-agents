tools:
  - name: launch_agent_control
    type: builtin
    init: rest_server_launch
    category: boundary
    description: Launch the generic REST agent control server.
    problem: Agent control needs profile-owned REST lifecycle endpoints without HTTP handlers running lifecycle behavior directly.
    goals:
      - Bind the configured agent_control server.
      - Register lifecycle control routes from trusted REST config.
      - Return server launch state to MachineSpec.
    requirements:
      input:
        - Tool config references the trusted agent_control REST server definition.
      output:
        - Output includes server name, bound address, route count, and binding kinds.
      errors:
        - Config decode, bind, route conflict, and schema failures emit CommandError.
    non_goals:
      - Does not call exit, pause, rollback, or signal injection from HTTP handler code.
      - Does not let runtime input replace REST server authority.
    emits: [ServerLaunched, CommandError]
    parameters:
      type: object
      properties: {}
    output:
      description: Control server launch result.
      schema:
        type: object
    side_effects:
      - kind: network_listen
        target: agent_control_server
        state: listener_started
    reversibility:
      classification: compensatable
      undo: rest_server_stop
    undo:
      strategy: compensating_action
      description: Stop the launched control server.
    errors:
      - signal: CommandError
        condition: Control server config, bind, or route setup failed.
    relationships:
      before: [await_agent_control]
    config:
      rest_ref: agent_control

  - name: await_agent_control
    type: builtin
    init: rest_await_event
    category: boundary
    description: Await one generic REST lifecycle control event.
    problem: Agent control needs one grammar-visible wait word for lifecycle events accepted by configured REST routes.
    goals:
      - Wait across the configured agent_control event source.
      - Return the selected lifecycle signal to MachineSpec.
      - Preserve route, payload, and correlation metadata for lifecycle words.
    requirements:
      input:
        - Tool config references trusted control event sources, route filters, signals, timeout, and stopped-server behavior.
      output:
        - Output includes source, route, signal, validated payload, request ID, and redacted diagnostics.
      errors:
        - Missing source, timeout, stopped source, queue, and payload decode failures emit declared signals.
    non_goals:
      - Does not execute lifecycle actions after selecting an event.
      - Does not restore consumed queue events after noop undo.
    emits: [ExitRequested, PauseRequested, RollbackRequested, AwaitTimedOut, ServerStopped, CommandError]
    parameters:
      type: object
      properties: {}
    output:
      description: Selected control event.
      schema:
        type: object
    side_effects:
      - kind: state_mutation
        target: rest_server_queue
        state: selected_event_consumed
    reversibility:
      classification: irreversible
      undo: noop
    undo:
      strategy: noop
      description: Queue restore is not implemented.
    errors:
      - signal: CommandError
        condition: Control source is missing or stopped with command_error policy.
    relationships:
      after: [launch_agent_control]
      before: [exit_agent]
    config:
      sources:
        - server: agent_control
          routes: [exit, pause, rollback]
          signals: [ExitRequested, PauseRequested, RollbackRequested]
      timeout: 30s
      stopped_behavior: emit_server_stopped
