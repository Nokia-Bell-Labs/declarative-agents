id: chatbot-mesh-example-specifications
title: Chatbot Mesh Example Specification Index

overview: |
  Specification index for the standalone chatbot mesh example. Three SRDs define
  the data-plane program: the RAG server agent (srd001), the chatbot agent
  (srd002), and the Helm deployment model (srd003). Six use cases exercise them
  across five releases (rel00.0 through rel04.0), each with a formal test suite.

  The example runs on the agent-core runtime and cites agent-core platform SRDs
  (srd028, srd030, srd033, srd034, srd035, srd036, and srd016 traceparent) as
  external references rather than indexing them here. The control plane
  (coordinator, creator, and the provisioning surface) is a deferred addition and
  is not part of this index.

