id: srd006-executor
title: Executor Agent Functional Block

context: |
  The executor is the mesh's deployment-plane actuator: the declarative agent that
  realizes the deployment API (srd003 R4) the creator (srd005) drives and the panel
  reads. It plays the reference-architecture Executor role (command-execution,
  rollback, validate-service): it validates a decided values patch against the
  chart's schema, applies it as a rollout, verifies the rollout, and rolls back on
  failure. It supersedes the standard-library Go provisioner with a state machine
  whose container carries the helm and kubectl CLIs, bound as exec tools, plus the
  write and read builtins.

  The executor acts; it decides nothing. The coordinator (srd004) decides the values
  changes and the creator (srd005) owns the instance lifecycle; the executor receives
  a decided, values-plane patch and realizes it. It edits deployment values and
  triggers rollouts only; it never submits a host, URL, method, or credential to a
  running agent (srd003 R4.2), the deployment-plane counterpart of agent-core srd028
  V30. Authority is set by declared, validated config, never by this control surface.
  The reusable request runtime, monitor, REST server, and exec tools stay in
  agent-core; the actuation surface, the validate-apply-verify machine, and the
  declared helm and kubectl bindings stay profile-owned.

problem: |
  The deployment API that patches values and rolls the mesh is standard-library Go
  that shells out to helm and kubectl (issue #429 recorded the exemption). The same
  actuation is expressible as a declarative agent -- a state machine binding the
  helm and kubectl CLIs present in its container -- with the values validation moved
  to the chart's native schema and the rollout phase read from a CLI exit code,
  needing no engine change. The requirements must name the actuation surface, the
  validate-then-apply and verify-then-rollback machine, the authority boundary, and
  the sanctioned image divergence, separately from the agent-core runtime.

goals:
  - G1: Model the executor as a persistent deployment-plane agent that exposes the state, apply, and rollout surface on the Service the provisioner served, so the creator's declared client and the panel are unchanged.
  - G2: Validate a submitted values patch against the chart's schema before applying, and apply it as a values-file rollout rather than per-field --set construction.
  - G3: Verify the rollout from a CLI status read and roll the release back on an apply or verify failure.
  - G4: Hold no chat authority; authenticate the actuation surface apart from chat and set authority by declared, validated config alone.
  - G5: Carry the helm and kubectl CLIs in the executor image as a recorded, sanctioned divergence from the binary-only image contract (srd003 R1.3).

requirements:
  R1:
    title: Actuation surface
    items:
      - R1.1: The executor SHALL expose the deployment API surface -- a read state endpoint, a POST apply endpoint bound as a request-scoped machine_request (agent-core srd030), and a read rollout endpoint -- on the Service name and port the provisioner served, so the creator's declared deployment_api client (srd005) and the provisioning panel are unchanged.
      - R1.2: The executor SHALL run a control server (health and lifecycle exit) and a monitor server (agent-core srd033), with loopback-configurable bind addresses.
      - R1.3: The apply endpoint SHALL bind one inbound apply request to one request-scoped run and map terminal signals to HTTP status.
      - R1.4: The deployment API surface SHALL use one versioned contract (deployment_api_contract) -- a schema_version-tagged apply request (the decided values-plane document), an apply response, and a rollout response -- that the executor, the creator's deployment_api client (srd005), the provisioning panel (reaching the surface only through the creator, GH-502), and the integration fake all consume, so no consumer sends or reads a field the executor does not define.
  R2:
    title: Validate then apply
    items:
      - R2.1: The executor SHALL validate a submitted values document -- the decided values-plane patch the caller supplies (R1.4) -- against the chart's values schema by a helm dry-run before applying, rejecting a non-conforming document with a client error and no rollout.
      - R2.2: The executor SHALL write the validated values document to a values file and apply it with helm upgrade --reuse-values --atomic, re-rendering the co-generated topology (srd003 R2), rather than constructing per-field --set arguments. The executor decides and authors no values (R5.1) -- the coordinator decides the values change (srd004 R3.1) and the creator forwards it (srd005 R2.2), so the decided document reaches the executor as the apply request's values-plane content.
      - R2.3: The apply request SHALL be values-plane only; the executor SHALL NOT submit a host, URL, method, or credential to a running agent (srd003 R4.2).
  R3:
    title: Verify and roll back
    items:
      - R3.1: After an apply, the executor SHALL verify the affected Deployment's rollout via kubectl rollout status and report the phase from its exit outcome.
      - R3.2: On an apply or verify failure, the executor SHALL roll the release back -- the atomic upgrade self-rolls-back, with an explicit helm rollback for a verify stall -- and report the failure.
      - R3.3: The rollout read SHALL read the Deployment object after the status poll and report its ready and desired replicas and revision with the phase; a read the cluster cannot serve SHALL return a gateway error rather than a phase, so a broken read is never reported as a progressing rollout.
  R4:
    title: Authority boundary
    items:
      - R4.1: The executor SHALL hold no chat authority; its actuation surface SHALL be authenticated apart from the chat path at the deployment plane (srd003 R4.5), and the apply path SHALL be reached only by the creator (srd005). This holds for operator-originated changes too, because the panel submits its intent to the coordinator (srd004 R1.5), which drives the creator, so no browser reaches the apply surface (srd003 R4.4).
      - R4.2: Authority SHALL be set by declared, validated config, never by this control surface (srd003 R4.3, agent-core srd028 V30); the executor SHALL accept no endpoint or credential for a running agent.
      - R4.3: REST authority SHALL live in the executor's declared rest.yaml; no runtime input SHALL supply transport authority.
      - R4.4: The apply surface SHALL be unreachable from any pod that is not the creator, enforced at the network layer rather than in the profile, because the declarative REST servers carry no inbound authentication. A rendered deployment that routes browser traffic at the apply surface SHALL be treated as a defect even where the policy blocks it, since route and policy then disagree and the surface is reachable the moment enforcement is relaxed.
  R5:
    title: Non-goals and packaging
    items:
      - R5.1: The executor SHALL NOT decide the values changes; that decision is the coordinator's (srd004 R3.1).
      - R5.2: The executor SHALL NOT select templates or own agent lifecycle; those are the creator's (srd005).
      - R5.3: The executor image SHALL carry the helm and kubectl CLIs alongside the runtime binary; this is a sanctioned divergence from the binary-only image contract (srd003 R1.3), recorded so the declarative-decomposition audit does not re-flag it.

deployment_api_contract:
  version: "1"
  description: |
    The single versioned contract the executor serves and the creator, the
    provisioning panel (through the creator, GH-502), and the integration fake
    consume (R1.4). Every request and response carries schema_version so a
    consumer can reject an unknown version. The apply request carries the decided
    values-plane document as content: the coordinator decides it (srd004 R3.1),
    the creator forwards it (srd005 R2.2), and the executor validates and applies
    it (R2.1, R2.2) -- the executor authors no values (R5.1) and no transport
    authority crosses the surface (R2.3, R4.2). The apply response fields are what
    the executor emits statically from a terminal state. The rollout response also
    carries ready, desired, and revision, read from the Deployment object rather
    than parsed out of CLI prose (R3.3), so the panel renders the counts it
    declares.
  apply_request:
    endpoint: POST /provisioning/api/apply
    fields:
      - {name: schema_version, type: string, required: true, note: the contract version, "1"}
      - {name: content, type: string, required: true, note: the decided values-plane overrides document (YAML) the executor writes and applies}
    constraints: Values-plane only; no host, URL, method, or credential for a running agent (R2.3, R4.2).
  apply_response:
    fields:
      - {name: schema_version, type: string, required: true}
      - {name: status, type: string, required: true, note: applied | rolled_back}
      - {name: error, type: string, required: false, note: present when the apply failed or the release was rolled back}
  rollout_response:
    endpoint: GET /provisioning/api/rollout
    fields:
      - {name: schema_version, type: string, required: true}
      - {name: phase, type: string, required: true, note: progressing | complete; absent on the 502, which carries status and error instead}
      - {name: ready, type: integer, required: true, note: ready replicas of the chatbot Deployment}
      - {name: desired, type: integer, required: true, note: desired replicas of the chatbot Deployment}
      - {name: revision, type: integer, required: true, note: the Deployment's current rollout revision}
      - {name: status, type: string, required: false, note: unavailable, on the 502 alone}
      - {name: error, type: string, required: false, note: rollout_read_failed, on the 502 alone}

acceptance_criteria:
  - id: AC1
    criterion: The executor exposes the state, apply, and rollout surface on the provisioner's Service name and port with the apply endpoint bound as a request-scoped machine_request, alongside control and monitor servers on loopback-configurable addresses, and every request and response carries the schema_version-tagged deployment_api_contract that the creator, panel, and integration fake share.
    traces: [R1.1, R1.2, R1.3, R1.4]
  - id: AC2
    criterion: A submitted values document is validated against the chart's values schema by a helm dry-run and, when valid, written to a values file and applied with helm upgrade --reuse-values --atomic -- values-plane only, with no per-field --set construction and no endpoint submitted to a running agent.
    traces: [R2.1, R2.2, R2.3]
  - id: AC3
    criterion: The rollout is verified via kubectl rollout status and its phase reported with the Deployment's ready and desired replicas and revision, a read the cluster cannot serve returns a gateway error rather than a phase, and an apply or verify failure rolls the release back and reports the failure.
    traces: [R3.1, R3.2, R3.3]
  - id: AC4
    criterion: The actuation surface is authenticated apart from chat and reached only by the creator, authority is set by declared validated config and never by this surface (agent-core srd028 V30), and REST authority lives in the profile with no runtime-supplied transport authority.
    traces: [R4.1, R4.2, R4.3]
  - id: AC6
    criterion: The apply surface is unreachable from any non-creator pod, enforced at the network layer, and a rendered route pointing browser traffic at it is a defect even where the policy blocks it.
    traces: [R4.1, R4.4]
    tests:
      - "test-rel06.0-executor: The panel route reaches only the authorized surface"
      - "test-rel06.0-executor: The rendered chart routes provisioning to the coordinator"
  - id: AC5
    criterion: Deciding the values (coordinator) and template selection or lifecycle (creator) are non-goals, and the executor image carries helm and kubectl as a recorded, sanctioned divergence from the binary-only image contract.
    traces: [R5.1, R5.2, R5.3]

depends_on:
  - srd_id: srd003-chatbot-deployment
    symbols_used: [R2, R3, R4]
  - srd_id: srd005-creator
    symbols_used: [R3, R5]

platform_dependencies:
  # agent-core runtime contracts this agent builds on. External references, owned
  # by agent-core, not part of this example's corpus.
  - srd_id: srd029-rest-server-tools
    provider: agent-core
    symbols_used: [R1]
  - srd_id: srd030-machine-request-rest-binding
    provider: agent-core
    symbols_used: [R1]
  - srd_id: srd033-monitor-rest-api
    provider: agent-core
    symbols_used: [R1]
  - srd_id: srd021-agent-cli-exec-tool
    provider: agent-core
    symbols_used: [R2, R3]
  - srd_id: srd028-rest-client-tools
    provider: agent-core
    symbols_used: [V30]

implementation_status:
  planned:
    - >-
      The executor profile (agents/executor) -- its apply/control/monitor servers,
      the validate-apply-verify-rollback request machine, and the declared helm and
      kubectl exec bindings -- the chart values.schema.json that carries the values
      validation, and the executor Deployment, image, and NetworkPolicy that replace
      the provisioner, are built for release rel06.0; the Go provisioner is removed
      and issue #429's deployment-plane exemption no longer applies. The rollout
      read endpoint (GET /provisioning/api/rollout) shipped; issue #466 delivered
      rollout only and was closed. The remaining planned work is the live
      on-cluster rollout (built image, integration:executor) and the state read
      endpoint (GET /provisioning/api/state), which the executor profile does not
      yet serve -- it needs the agent-core raw file-read binding tracked by issue
      #468. Until the state endpoint lands, the provisioning panel cannot load its
      MeshView from the executor (ux/app/src/provisioningApi.ts fetches
      /provisioning/api/state, which returns no route).

diagrams:
  requirements_trace: |
    ```mermaid
    flowchart LR
      Problem["Problem: The deployment API is imperative Go; the same actuation is a declarative agent binding container CLIs"] --> Goals["Goals: Executor Agent Functional Block"]
      Goals --> R1["R1: Actuation surface"]
      Goals --> R2["R2: Validate then apply"]
      Goals --> R3["R3: Verify and roll back"]
      Goals --> R4["R4: Authority boundary"]
      Goals --> R5["R5: Non-goals and packaging"]
      R1 --> AC1["AC1: state/apply/rollout surface, control + monitor servers"]
      R2 --> AC2["AC2: schema dry-run then values-file apply"]
      R3 --> AC3["AC3: rollout verify and rollback"]
      R4 --> AC4["AC4: authenticated apart from chat, authority by declared config"]
      R5 --> AC5["AC5: not the decision or LCM; sanctioned CLI image"]
    ```
  actuation_machine: |
    ```mermaid
    flowchart LR
      Apply["POST /provisioning/api/apply (creator)"] --> Validate["Validate: helm upgrade --dry-run --atomic -f overrides.yaml"]
      Validate -->|Valid| ApplyStep["Apply: helm upgrade --atomic --wait -f overrides.yaml --reuse-values"]
      Validate -->|Invalid| Reject["400"]
      ApplyStep -->|Applied| Verify["Verify: kubectl rollout status deploy/chatbot"]
      ApplyStep -->|CommandError| Rollback["helm rollback"]
      Verify -->|HealthReported| Done["200"]
      Verify -->|RolloutStalled| Rollback
      Rollback --> Failed["500"]
    ```
