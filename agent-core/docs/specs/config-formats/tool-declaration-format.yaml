id: cfg-tool-declaration-format
title: Tool Declaration Format (builtin.yaml / exec.yaml)

purpose: |
  Defines the YAML schema for declaring tools that agents can use.
  Tool declarations describe what a tool does, how it is invoked, and
  what parameters it accepts. Two tool types exist: builtin tools
  (compiled into the agent binary) and exec tools (external executables).

schema:
  - field: name
    type: string
    required: true
    description: |
      Unique tool identifier. Referenced by tool selection files
      (tools.yaml), machine transition actions, and LLM tool-call
      output. Must be unique across all loaded declaration files.

  - field: type
    type: string
    required: false
    description: |
      Tool type discriminator. Either "builtin" (compiled-in Go
      function) or "exec" (external executable). Defaults to "exec"
      when omitted.

  - field: category
    type: string
    required: false
    description: |
      Tool vocabulary category used by contract validation and authoring
      guidance. Known categories are word, sentence, boundary, and
      stateful_internal. Boundary tools intentionally cross a program
      boundary, such as invoking an LLM, spawning an agent subprocess, or
      running a nested state machine. If omitted, validation categorizes
      internal tools as internal, external builtins as external_builtin,
      and exec tools as exec.

  - field: description
    type: string
    required: false
    description: |
      Human-readable description of the tool's purpose and behavior.
      Included in the tool schema sent to the LLM so it can decide
      when and how to use the tool. Recommended but not enforced by
      validateToolDefs.

  - field: problem
    type: string
    required: false
    description: |
      Contract field describing the vocabulary gap this tool fills.
      It should explain why this tool exists as a single word in the
      agent language. This is not currently sent to the LLM manifest.

  - field: goals
    type: "[]string"
    required: false
    description: |
      Contract field listing measurable success goals for the tool.
      Goals describe what a correct implementation makes possible.

  - field: requirements
    type: object
    required: false
    description: |
      Contract field grouping observable "must" statements by
      input, output, side_effects, undo, and errors. These sections
      define the developer-facing requirements for the tool as a
      deterministic vocabulary word.

  - field: non_goals
    type: "[]string"
    required: false
    description: |
      Contract field listing behavior this tool deliberately does
      not provide. Non-goals help the agent choose between overlapping
      tools and avoid using one word as a hidden workflow.

  - field: parameters
    type: object
    required: false
    description: |
      JSON Schema describing the tool's input parameters. This schema
      is sent to the LLM for function-calling and is used for input
      validation at runtime. Omitted for builtin tools that take no
      parameters (e.g. parse_response, done). Exec tools may include
      parameter extensions (see parameter_extensions) that are stripped
      before sending to the LLM.

  - field: visibility
    type: string
    required: false
    description: |
      Controls whether the tool appears in the LLM's tool list.
      "external" (default) — visible to the LLM and available for
      tool calls. "internal" — hidden from the LLM; can only be
      invoked by machine transitions (e.g. invoke_llm, parse_response).

  - field: emits
    type: "[]string"
    required: false
    description: |
      Declarative signal contract for the tool. Lists the Result.Signal
      values the tool may return, such as ToolDone, ToolFailed, CommandError,
      or domain-specific signals like PointReady and AllPointsDone. Startup
      validation checks action tools with emits metadata against the loaded
      machine: emitted signals must be declared by the machine, and each
      emitted signal must have a transition from the action's target state
      unless that target state is terminal.

  - field: output
    type: object
    required: false
    description: |
      Contract field describing the structured output produced by the
      tool. Contains optional description and schema fields. The schema
      is JSON Schema-compatible and describes the machine-readable output
      contract. This does not yet change core.Result.Output, which remains
      the human-readable/runtime string channel during migration.

  - field: side_effects
    type: string or list
    required: false
    description: |
      Contract field declaring world mutations beyond the returned output.
      The legacy scalar string form is still accepted for compatibility
      and may be appended to the LLM-visible description. New declarations
      should use the structured list form with entries containing kind,
      target, paths, state, and description. Examples of kind include
      filesystem_write, state_mutation, external_api_call, subprocess,
      and none.

  - field: reversibility
    type: object
    required: false
    description: |
      Contract field classifying whether effects can be undone.
      classification is one of reversible, compensatable, or irreversible.
      undo describes the undo/compensation mechanism. requires_confirmation
      marks tools that require explicit approval before use.

  - field: undo
    type: object
    required: false
    description: |
      Contract field describing how to reverse or compensate for the
      tool's effects. Contains strategy, description, and requires fields.
      This complements reversibility by naming the concrete rollback
      mechanism, such as noop, conversation_truncate, workspace_restore,
      or compensating_action.

  - field: errors
    type: "[]object"
    required: false
    description: |
      Contract field describing expected failure modes. Each entry can
      declare signal, condition, message_shape, and state_after_failure.
      This lets developers and agents understand what state the world is
      in after a failed command.

  - field: relationships
    type: object
    required: false
    description: |
      Contract field documenting common composition neighbors and
      overlapping tools. before lists tools that typically precede this
      tool, after lists tools that typically consume this tool's output,
      and overlaps explains similar tools and how they differ. These are
      guidance, not execution constraints.

builtin_fields:
  - field: init
    type: string
    required: true
    description: |
      Factory name in the BuiltinRegistry. Maps to a Go constructor
      that creates the tool instance at startup (e.g. "file_read",
      "invoke_llm", "parse_response").

  - field: config
    type: object
    required: false
    description: |
      Tool-specific configuration passed to the factory function.
      Decoded into typed Go structs via DecodeToolConfig at registration
      time. Type mismatches produce errors mentioning the tool name.
      Structure varies per tool: ChildAgentConfig for launch_eval,
      execute_task, and self_invoke (decoded into execute.Config at
      runtime), LLMToolConfig for invoke_llm, LoadSuiteConfig for
      load_suite, RunPointConfig for run_point, ServeUIToolConfig for
      serve_ui. See cfg-llm-config-format for invoke_llm details.

exec_fields:
  - field: binary
    type: string
    required: true
    description: |
      Executable name or path. Resolved via PATH at runtime.

  - field: args
    type: "[]string"
    required: false
    description: |
      Base arguments prepended to every invocation. Parameter values
      from the LLM's tool call are appended after these.

  - field: precondition
    type: string
    required: false
    description: |
      A named precondition that must be satisfied before the tool can
      run (e.g. "git_repo" requires the workspace to be a git
      repository).

  - field: output_cap
    type: int
    required: false
    description: |
      Maximum number of output lines captured from the tool's stdout.
      Excess lines are truncated to keep LLM context manageable.

  - field: includes
    type: string
    required: false
    scope: file-level (not per-tool)
    description: |
      A file-level field on the tool declarations file (not on
      individual tool entries). Specifies a path to another tool
      file whose declarations are merged before the current file's
      tools. Used for composing tool sets from shared definitions.

parameter_extensions:
  description: |
    Exec tools support custom JSON Schema extensions on individual
    parameter properties. These extensions control how parameter values
    are mapped to CLI arguments when invoking the external executable.
    All extensions are stripped from the schema before it is sent to the
    LLM, so the model never sees CLI-level details.
  fields:
    - field: flag
      type: string
      description: |
        CLI flag mapping. The parameter value is passed as this flag
        (e.g. "--path" causes the value to be passed as --path <value>).

    - field: positional
      type: bool
      description: |
        When true, the parameter value is passed as a positional
        argument rather than a named flag.

    - field: bool_flag
      type: bool
      description: |
        Boolean flag marker. When true and the parameter value is
        true, the CLI flag from the "flag" field is included in the
        command (e.g. flag: "--all", bool_flag: true).

    - field: default
      type: string
      description: |
        Default value used when the LLM omits the parameter. Applied
        before CLI argument construction.

declaration_files:
  - file: configs/tools/builtin.yaml
    tool_count: 37
    description: |
      37 builtin tool declarations covering file operations (read,
      write, edit, find, list_files), the LLM pipeline (parse_response,
      report_parse_error, reset_history), completion (done),
      compatibility aggregate validation (validate),
      control (nudge_reread, self_invoke), planner tools (extract_task,
      extract_all, assemble_prompt, parse_plan, create_issue,
      execute_task, check_result), evaluator session tools (load_suite,
      next_point, run_point, report_session), evaluator per-point tools
      (create_point_dir, copy_sample_workspace, copy_sample_docs,
      init_workspace_repo, stage_workspace_baseline,
      commit_workspace_baseline, dump_config, run_agent, check_results,
      collect_metrics), bench tools (serve_ui, launch_eval), and spec
      validation tools (load_corpus, validate_specs, format_report).
      Note: invoke_llm is declared per-agent in configs/*/llm/*.yaml,
      not in this file.

  - file: configs/tools/exec.yaml
    tool_count: 16
    description: |
      16 exec tool declarations for Go build tools (build, vet, lint,
      test), git operations (stage_all, workspace_status, commit,
      rev_parse, diff_stat, log_oneline, git_init), and bd issue
      management (issue_create, issue_close, issue_list).

  - file: "configs/*/llm/*.yaml"
    description: |
      Per-model invoke_llm declarations with config blocks specifying
      model name, provider, endpoint URL, and prompts. Each agent
      directory contains its own llm/ subdirectory with one file per
      model variant. See cfg-llm-config-format for details.

inline_pattern: |
  All agents now use the declaration+selection split. Tool declarations
  live in shared files (configs/tools/builtin.yaml, configs/tools/exec.yaml)
  and each agent's tools.yaml contains only tool names (selection).
  This ensures a single source of truth for tool schemas and config.

contract_validation: |
  Tool vocabulary contract fields are validated incrementally. During
  migration, ValidateToolContracts can run in warn-only mode over selected
  tools and return structured findings with tool name, field, severity,
  category, message, and remediation. Strict mode escalates missing required
  contract fields to errors for tests or future startup enforcement. Internal
  tools are excluded by default unless IncludeInternal is set. When category
  is declared, validation reports that explicit category (for example,
  boundary) instead of falling back to internal, external_builtin, or exec.

structured_output_strategy: |
  Tool output has two layers during migration:

  1. Runtime string output: core.Result.Output remains the human-readable
     command output used by existing machine transitions, parse-error repair,
     logs, and tests.
  2. Declarative output contract: tool declarations may provide output.schema
     to describe the machine-readable data shape the tool should eventually
     produce.

  output.schema is not injected into the LLM-facing input schema and does not
  change command execution. It lets developers document success shape, failure
  shape, and downstream composition expectations before migrating individual
  commands to a structured result field such as Result.Data. When Result.Data
  is added later, existing output.schema declarations should be reused rather
  than redesigned.

