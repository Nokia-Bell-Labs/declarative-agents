id: sm-bench
title: Bench Agent Semantic Model

purpose: |
  The bench is an interactive agent that serves a web UI for browsing
  experiment results, launching new evaluations, and comparing model
  performance across harness/LLM combinations. Unlike other agents,
  its input source is a human operator via HTTP rather than an LLM.

  serve_ui is the bench equivalent of invoke_llm — it blocks waiting
  for human input through the web UI. The state machine routes the
  user's action signal identically to how the generator routes LLM
  response signals.

configuration:
  machine: configs/bench/machine.yaml
  tools: configs/bench/tools.yaml
  tool_declarations:
    - configs/bench/serve_ui.yaml
    - configs/tools/builtin.yaml

states:
  - name: Idle
    meaning: Initial state before the web server starts.
  - name: Serving
    meaning: |
      The web UI is running and waiting for user input. serve_ui
      blocks on an action channel until the user triggers an action
      (launch experiment, shutdown, etc.). This is the main resting
      state — the agent returns here after each completed action.
  - name: Launching
    meaning: |
      An experiment is being executed. launch_eval has spawned
      agent eval as a subprocess and is blocking until it completes.
      The web UI remains accessible for monitoring progress.
  - name: Done
    meaning: Terminal. The user requested shutdown.
  - name: Failed
    meaning: Terminal. An infrastructure error occurred during experiment launch.

signals:
  - name: Seed
    trigger: Agent startup.
  - name: ExperimentRequested
    trigger: User clicked Launch in the web UI.
  - name: Shutdown
    trigger: User requested shutdown or Ctrl+C.
  - name: EvalCompleted
    trigger: The agent eval subprocess exited successfully.
  - name: EvalFailed
    trigger: The agent eval subprocess exited with an error.
  - name: CommandError
    trigger: Infrastructure-level error.

lifecycle: |
  1. Idle → Serving (Seed): serve_ui starts the HTTP server and blocks
  2. Serving → Launching (ExperimentRequested): launch_eval spawns agent eval
  3. Launching → Serving (EvalCompleted/EvalFailed): return to serve_ui
  4. Serving → Done (Shutdown): clean exit

  The agent loops between Serving and Launching. Each cycle:
  serve_ui blocks → user acts → state machine routes → tool executes →
  result feeds back to serve_ui. Same loop as the generator's
  invoke_llm → parse → tool → invoke_llm cycle.

pipeline_diagram: |
  ```mermaid
  flowchart TD
    A[Idle] -->|Seed| B[Serving]
    B -->|ExperimentRequested| C[Launching]
    C -->|EvalCompleted| B
    C -->|EvalFailed| B
    B -->|Shutdown| D[Done]
    C -->|CommandError| E[Failed]
  ```

tools_required:
  builtin:
    - serve_ui (blocks on human input via web UI)
    - launch_eval (spawns agent eval subprocess)

invariants:
  - The bench never calls an LLM directly
  - The HTTP server persists across serve_ui invocations (goroutine in BenchState)
  - User actions are the only input source — serve_ui is the human equivalent of invoke_llm
  - The web UI remains accessible during experiment execution for progress monitoring
  - All experiment execution reuses the existing agent eval pipeline
