id: rel01.0-uc002-evaluator-benchmark
title: Evaluator runs generator across models and collects results

summary: |
  The agent binary, configured with the evaluator session machine
  (configs/evaluator/machine.yaml), loads a suite YAML that defines a
  grid of (harness, model, sample, gridpoint, rep) combinations. A
  session-level state machine iterates over the grid; for each point,
  a nested core.Loop runs the 5-step per-point pipeline: prepare
  workspace, dump config, run the generator as a subprocess, check
  results, and collect metrics. Results are written to a structured
  directory tree for analysis by the bench UI or CLI reporting tools.

actor: Developer benchmarking model performance

trigger: |
  The developer runs:
    agent --machine configs/evaluator/machine.yaml \
          --tools configs/evaluator/tools.yaml \
          --tools-declaration configs/tools/builtin.yaml \
          --input suites/my-suite.yaml \
          --output eval-results --reps 3

flow:
  - F1: The session machine enters LoadingSuite; load_suite parses the suite YAML, discovers samples, expands the grid, and creates the session output directory (srd019).
  - F2: The session machine enters AdvancingPoint; next_point returns the first (harness, model, sample, gridpoint, rep) combination (srd019).
  - F3: The session machine enters RunningPoint; run_point launches a nested core.Loop with the point machine (configs/evaluator/point.yaml) (srd005, sm-evaluator).
  - F4: prepare_workspace creates a temporary directory, copies sample files, and initializes git (srd019).
  - F5: dump_config serializes the full experiment configuration into experiment.yaml for reproducibility (srd019).
  - F6: run_agent spawns the generator binary as a subprocess with OTel traceparent propagation (srd016, srd019).
  - F7: check_results examines exit code and test output to classify the outcome as pass/fail/timeout (srd019).
  - F8: collect_metrics reads the trace file to extract token counts, iteration counts, and tool progression (srd019).
  - F9: The nested loop completes; control returns to the session machine which loops back to next_point.
  - F10: When the grid is exhausted, next_point emits AllPointsDone; report_session prints the summary.
  - F11: Results are written to eval-results/<suite>/<timestamp>/<point-id>/ with meta.json and trace.ndjson (srd019).

touchpoints:
  - T1: "srd005-agentic-loop -- Loop drives both session and point state machines"
  - T2: "srd006-yaml-machine-config -- session and point machine.yaml loading"
  - T3: "srd016-traceparent -- W3C traceparent propagation to subprocess"
  - T4: "srd019-eval-harness -- suite parsing, grid eval, all eval tools, result analysis"
  - T5: "sm-evaluator -- two-level state machine: session states, point states, signals, lifecycle"

success_criteria:
  - id: S1
    criterion: Suite YAML is parsed and expanded into a (harness, model, sample, gridpoint, rep) grid.
    traces:
      - srd019-eval-harness AC1
  - id: S2
    criterion: Each grid point runs the 5-step per-point pipeline to completion via nested core.Loop.
    traces:
      - srd019-eval-harness AC2
  - id: S3
    criterion: Generator subprocess receives OTel traceparent for trace correlation.
    traces:
      - srd016-traceparent AC1
  - id: S4
    criterion: Results include experiment.yaml config dump for reproducibility.
    traces:
      - srd019-eval-harness AC3
  - id: S5
    criterion: Pass/fail/timeout classification is correct based on exit code and test output.
    traces:
      - srd019-eval-harness AC4
  - id: S6
    criterion: Metrics are collected even when the generator fails or times out.
    traces:
      - srd019-eval-harness AC5
  - id: S7
    criterion: Session summary correctly reports total, passed, failed, and timed-out counts.
    traces:
      - sm-evaluator session_lifecycle

out_of_scope:
  - Real-time progress streaming during evaluation.
  - Parallel grid point execution (points run sequentially).
  - Result visualization (handled by bench, see rel01.0-uc003).

semantic_model: sm-evaluator
