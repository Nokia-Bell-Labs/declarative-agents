srd_to_use_case_mapping:
  - use_case: rel00.0-uc001-domain-agent-integration
    srd: srd001-core-types
    why_required: Domain agent uses State, Signal, Command, Result, Cost, Builder types from pkg/core.
    coverage: Full. Covers AC1 through AC5 via SC1 through SC8.
  - use_case: rel00.0-uc001-domain-agent-integration
    srd: srd002-state-machine
    why_required: Domain agent builds a TransitionTable and StateMachine to drive the loop.
    coverage: Full. Covers AC1 through AC4 via SC2 and test cases.
  - use_case: rel00.0-uc001-domain-agent-integration
    srd: srd003-command-dispatch
    why_required: Dispatch wraps every command execution with tracing, timeout, and recovery.
    coverage: Full. Covers AC1 through AC3 via SC6 and test cases.
  - use_case: rel00.0-uc001-domain-agent-integration
    srd: srd004-tool-registry
    why_required: Domain agent registers tools in a Registry and generates manifests.
    coverage: Full. Covers AC1 through AC5 via SC1 and test cases.
  - use_case: rel00.0-uc001-domain-agent-integration
    srd: srd005-agentic-loop
    why_required: Domain agent calls Loop with LoopParams to run the agentic loop.
    coverage: Full. Covers AC1 through AC6 via SC3, SC4, SC5 and test cases.
  - use_case: rel00.0-uc001-domain-agent-integration
    srd: srd006-yaml-machine-config
    why_required: Domain agent can define state machines via YAML using ParseMachineSpec and BuildTransitionTable.
    coverage: Full. Covers AC1 through AC4 via SC2, SC7 and test cases.
  - use_case: rel00.0-uc001-domain-agent-integration
    srd: srd007-tracer-interface
    why_required: Domain agent supplies a concrete Tracer implementation satisfying the port interface.
    coverage: Full. Covers AC1 and AC2 via SC8.
  - use_case: rel00.0-uc001-domain-agent-integration
    srd: srd008-telemetry
    why_required: Domain agent uses pkg/telemetry to set up OTel providers, create root spans, and adapt Trace to the Tracer interface.
    coverage: Full. Covers AC1 through AC9 via SC8 and telemetry initialization.

coverage_gaps: |
  The original eight core SRDs (srd001-srd008) have full use case
  touchpoints and formal YAML test suite coverage in release 00.0.
  SRDs srd009-srd023 cover additional packages and have Go test
  coverage (522 test functions across 16 packages) but no formal
  YAML test suites.

  Packages without SRDs:
  - pkg/execute — agent subprocess execution with process groups
  - pkg/extract — task extraction from requirement graphs
  - pkg/graph — requirement DAG construction and traversal
  - pkg/materialize — plan-to-issue materialization
  - pkg/pipeline — planner pipeline tools
  - pkg/plan — implementation plan parsing
  - pkg/worktree — git worktree lifecycle
  - pkg/subprocess — subprocess execution utilities
  - pkg/stl eval harness — 14 eval_*.go files implementing workspace
    preparation, agent execution, result checking, metrics collection,
    convergence analysis, trace reading, and config dumping
  - cmd/agent — unified binary orchestration, tool registration, LLM
    config loading, session-level eval machine
  - pkg/bench — state-machine-driven web UI with serve_ui and
    launch_eval tools (configured via --machine configs/bench/machine.yaml)

  srd013 (STL) needs expansion to cover eval tools (prepare_workspace,
  run_agent, check_results, collect_metrics, dump_config), nudge_reread,
  validate, done as standalone builtin, and YAML-based tool registration.

  Agent configurations are documented as semantic models:
  - docs/specs/semantic-models/generator.yaml (sm-generator)
  - docs/specs/semantic-models/evaluator.yaml (sm-evaluator)
  - docs/specs/semantic-models/planner.yaml (sm-planner)
  - docs/specs/semantic-models/validator.yaml (sm-validator)
  - docs/specs/semantic-models/bench.yaml (sm-bench)
