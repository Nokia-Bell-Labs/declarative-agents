tools:
- name: load_corpus
  type: builtin
  init: load_corpus
  visibility: internal
  config:
    suite_paths:
    - /opt/agent-core/tools/builtin/spec-validation/spec-corpus-charter.yaml
  emits:
  - ToolDone
  - CommandError
  description: Load the specification corpus from the project directory.
  category: stateful_internal
  side_effects:
  - kind: state_mutation
    target: validation_state
    state: corpus_loaded
    description: Loads specification documents into validation state.
  reversibility:
    classification: reversible
    undo: validation_state_restore
  undo:
    strategy: session_state_restore
    description: Restore validation state to the snapshot before loading the corpus.
  problem: The machine needs a declared word for loading the specification corpus without embedding that workflow step in Go control flow.
  goals:
  - Perform the load_corpus action as one machine-selected word.
  - Return an explicit signal that lets the MachineSpec choose the next state.
  - Keep sequencing outside the tool implementation and in machine.yaml.
  requirements:
    input:
    - must consume parameters from tool input, prior Result, or configured command/domain state
    output:
    - must emit one declared signal and return machine-readable output when available
    errors:
    - must emit CommandError for infrastructure failures and preserve domain failures as declared signals
  non_goals:
  - Does not choose the next workflow step; machine.yaml owns sequencing.
  - Does not hide unrelated tool execution behind this word.
  errors:
  - signal: CommandError
    condition: required input, configuration, or runtime state is invalid
    message_shape: 'load_corpus: <error>'
    state_after_failure: no additional workflow step is executed by this tool
  relationships:
    before:
    - machine-selected predecessor
    after:
    - machine-selected successor
  output:
    description: load_corpus command result summary.
    schema:
      type: object
      properties:
        message:
          type: string
        signal:
          type: string
      required:
      - message
