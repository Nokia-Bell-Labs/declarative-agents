tools:
  - name: checkpoint_history
    type: exec
    category: boundary
    visibility: internal
    binary: agent
    args: [history]
    emits: [ToolDone, ToolFailed]
    description: "Render checkpoint history for a checkpoint through the lifecycle runtime."
    problem: |
      Operators need checkpoint history as a machine action, not as a special
      root command path.
    goals:
      - "Read one checkpoint history digest."
      - "Return ToolDone when the digest is printed."
      - "Return ToolFailed when the checkpoint cannot be resolved or loaded."
    requirements:
      input:
        - "must receive a state store directory"
        - "must receive a checkpoint id or latest"
      output:
        - "must print the checkpoint history digest"
      side_effects:
        - "must not mutate checkpoint state"
      undo:
        - "must be a no-op"
      errors:
        - "must fail when the checkpoint cannot be resolved"
    non_goals:
      - "Does not roll back checkpoint state."
      - "Does not resume execution."
    output:
      description: "Human-readable checkpoint history digest."
      schema:
        type: object
        properties:
          checkpoint:
            type: string
          history:
            type: string
        required: [history]
    side_effects:
      - kind: state_read
        target: checkpoint_store
        description: "Reads checkpoint JSON from the configured StateStore."
    reversibility:
      classification: reversible
      undo: noop
      requires_confirmation: false
    undo:
      strategy: noop
      description: "History inspection does not mutate state."
    errors:
      - signal: ToolFailed
        condition: "checkpoint cannot be resolved or loaded"
        message_shape: "no checkpoints found | load checkpoint <id>: <error>"
        state_after_failure: "checkpoint store unchanged"
    relationships:
      before: []
      after: [checkpoint_rollback]
      overlaps:
        - tool: checkpoint_rollback
          difference: "checkpoint_history reads checkpoint history; checkpoint_rollback rewrites checkpoint state."
    parameters:
      type: object
      properties:
        state_store_dir:
          type: string
          description: "StateStore directory containing checkpoint JSON."
          flag: --state-store-dir
          default: ".agent-state"
        checkpoint:
          type: string
          description: "Checkpoint ID, or latest."
          flag: --checkpoint
          default: latest

  - name: checkpoint_rollback
    type: exec
    category: boundary
    visibility: internal
    binary: agent
    args: [rollback]
    emits: [ToolDone, ToolFailed]
    description: "Roll back a checkpoint to a target iteration through the lifecycle runtime."
    problem: |
      Operators need rollback as a machine action with explicit inputs, not as
      a special root command path.
    goals:
      - "Resolve and load one checkpoint."
      - "Rewrite it to the target iteration."
      - "Restore workspace state when the rollback target carries a workspace ref."
    requirements:
      input:
        - "must receive a state store directory"
        - "must receive a checkpoint id or latest"
        - "must receive a target iteration"
      output:
        - "must print the new checkpoint id"
      side_effects:
        - "must persist a rewritten checkpoint"
        - "may restore the workspace when a workspace ref is present"
      undo:
        - "must document that rollback recovery requires an operator-selected checkpoint"
      errors:
        - "must fail when target iteration is invalid or checkpoint restore fails"
    non_goals:
      - "Does not resume the agent after rollback."
      - "Does not invent missing undo mementos."
    output:
      description: "Rollback result summary."
      schema:
        type: object
        properties:
          original_checkpoint:
            type: string
          new_checkpoint:
            type: string
          workspace_ref:
            type: string
        required: [new_checkpoint]
    side_effects:
      - kind: state_mutation
        target: checkpoint_store
        state: rewritten_checkpoint_saved
        description: "Persists a new checkpoint representing the rollback target."
      - kind: filesystem_write
        target: workspace_directory
        state: restored_when_ref_present
        description: "May restore the workspace to the target checkpoint ref."
    reversibility:
      classification: compensatable
      undo: compensating_action
      requires_confirmation: true
    undo:
      strategy: compensating_action
      description: "Operator can choose another checkpoint or resume from the original checkpoint."
      payload: boundary_compensation
      requires: [checkpoint_id, operator_decision]
    errors:
      - signal: ToolFailed
        condition: "rollback fails to resolve, rewrite, save, or restore workspace state"
        message_shape: "rollback <component>: <error>"
        state_after_failure: "checkpoint store and workspace may be partially changed if workspace restore fails after save"
    relationships:
      before: [checkpoint_history]
      after: []
      overlaps:
        - tool: checkpoint_history
          difference: "checkpoint_rollback mutates checkpoint/workspace state; checkpoint_history only reads."
    parameters:
      type: object
      properties:
        state_store_dir:
          type: string
          description: "StateStore directory containing checkpoint JSON."
          flag: --state-store-dir
          default: ".agent-state"
        checkpoint:
          type: string
          description: "Checkpoint ID, or latest."
          flag: --checkpoint
          default: latest
        to_iteration:
          type: string
          description: "Target history iteration."
          flag: --to-iteration
          default: "0"
        directory:
          type: string
          description: "Managed workspace directory for workspace restore."
          flag: --directory
          default: "."
