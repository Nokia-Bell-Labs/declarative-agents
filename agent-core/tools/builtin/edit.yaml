tools:
- name: edit
  type: builtin
  category: word
  init: file_edit
  emits:
  - EditDone
  - ToolFailed
  description: Replace the first occurrence of an exact string in a file. Use read first to see the current content, then
    provide the exact old_string to match.
  output:
    description: Edit result describing the changed file and replacement count.
    schema:
      type: object
      properties:
        path:
          type: string
        replacements:
          type: integer
        ambiguous_matches:
          type: integer
      required:
      - path
      - replacements
  parameters:
    type: object
    properties:
      path:
        type: string
        description: File path relative to workspace root
      old_string:
        type: string
        description: Exact text to find
      new_string:
        type: string
        description: Replacement text
    required:
    - path
    - old_string
    - new_string
  side_effects:
  - kind: filesystem_write
    target: workspace_file
    description: Replaces text in one workspace file.
  reversibility:
    classification: reversible
    undo: workspace_restore
  undo:
    strategy: workspace_restore
    description: Restore the workspace to the ref captured before or after the edit.
    requires:
    - Workspace
