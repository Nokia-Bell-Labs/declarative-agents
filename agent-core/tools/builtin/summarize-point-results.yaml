tools:
- name: summarize_point_results
  type: builtin
  init: summarize_point_results
  visibility: internal
  emits:
  - ResultsCollected
  - CommandError
  description: Summarize previously collected point oracle, trace, and version state.
  category: word
  side_effects:
  - kind: state_read
    target: point_context
    description: Reads PointContext test, token, and version fields without mutating them.
  reversibility:
    classification: reversible
    undo: noop
  undo:
    strategy: noop
    description: Summarization is read-only and has no effects to reverse.
  problem: The machine needs a declared word for summarizing evaluator point results without embedding that workflow step in Go control flow.
  goals:
  - Perform the summarize_point_results action as one machine-selected word.
  - Return an explicit signal that lets the MachineSpec choose the next state.
  - Keep sequencing outside the tool implementation and in machine.yaml.
  requirements:
    input:
    - must consume parameters from tool input, prior Result, or configured command/domain state
    output:
    - must emit one declared signal and return machine-readable output when available
    errors:
    - must emit CommandError for infrastructure failures and preserve domain failures as declared signals
  non_goals:
  - Does not choose the next workflow step; machine.yaml owns sequencing.
  - Does not hide unrelated tool execution behind this word.
  errors:
  - signal: CommandError
    condition: required input, configuration, or runtime state is invalid
    message_shape: 'summarize_point_results: <error>'
    state_after_failure: no additional workflow step is executed by this tool
  relationships:
    before:
    - machine-selected predecessor
    after:
    - machine-selected successor
  output:
    description: summarize_point_results command result summary.
    schema:
      type: object
      properties:
        message:
          type: string
        signal:
          type: string
      required:
      - message
