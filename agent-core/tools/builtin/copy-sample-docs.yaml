tools:
- name: copy_sample_docs
  type: builtin
  init: copy_sample_docs
  visibility: internal
  emits:
  - SampleDocsCopied
  - CommandError
  description: Copy optional sample docs into the current point directory, or no-op when the sample has no docs.
  category: word
  side_effects:
  - kind: filesystem_write
    target: point_docs
    paths:
    - doc
    description: Copies sample docs into PointContext.PointDir/doc when docs exist.
  reversibility:
    classification: reversible
    undo: workspace_restore
  undo:
    strategy: workspace_restore
    description: Restore copied point documentation from a previous workspace ref.
    requires:
    - Workspace
  problem: The machine needs a declared word for copying sample documentation without embedding that workflow step in Go control flow.
  goals:
  - Perform the copy_sample_docs action as one machine-selected word.
  - Return an explicit signal that lets the MachineSpec choose the next state.
  - Keep sequencing outside the tool implementation and in machine.yaml.
  requirements:
    input:
    - must consume parameters from tool input, prior Result, or configured command/domain state
    output:
    - must emit one declared signal and return machine-readable output when available
    errors:
    - must emit CommandError for infrastructure failures and preserve domain failures as declared signals
  non_goals:
  - Does not choose the next workflow step; machine.yaml owns sequencing.
  - Does not hide unrelated tool execution behind this word.
  errors:
  - signal: CommandError
    condition: required input, configuration, or runtime state is invalid
    message_shape: 'copy_sample_docs: <error>'
    state_after_failure: no additional workflow step is executed by this tool
  relationships:
    before:
    - machine-selected predecessor
    after:
    - machine-selected successor
  output:
    description: copy_sample_docs command result summary.
    schema:
      type: object
      properties:
        message:
          type: string
        signal:
          type: string
      required:
      - message
