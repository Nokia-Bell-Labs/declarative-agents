# The multi-RAG fan-out words: one rag_queryN per declared RAG server plus the
# compose that assembles the surviving per-source chunk lists into the grounding
# prompt. This file is the two-RAG local default; a values-driven deploy renders it
# (and request-machine.yaml) for N RAGs from the ragUnits list, keeping the fan-out
# breadth and the RAG topology from one source (srd003 R2, GH-372). Kept separate
# from request-declarations.yaml so only this small file varies with the RAG count.
tools:
  - name: rag_query0
    type: builtin
    init: rest_client_invoke
    visibility: internal
    category: boundary
    description: Query the first RAG server with the message vector.
    problem: The chatbot fans the one message embedding out to each declared RAG server for grounding chunks.
    goals:
      - Thread the message embedding into the first RAG server query.
      - Return the retrieved chunk ids, documents, distances, and embedding model.
    requirements:
      input:
        - The query embedding is selected from embed_query through command-state $from() addressing.
      output:
        - Output includes the retrieved chunk ids, documents, distances, and the RAG embedding model.
      errors:
        - Network, timeout, schema, and mapping failures emit CommandError so the turn degrades to the next RAG.
        - A 400 embedding-space mismatch (srd001 R2.3) emits QueryRejected so this source is excluded from the composed chunks.
    non_goals:
      - Does not author the query vector.
      - Does not accept runtime method, URL, host, or auth overrides.
    parameters:
      type: object
      properties:
        query_embeddings: {type: array}
    emits: [QueryResponded, QueryRejected, CommandError]
    output:
      description: Mapped RAG server query result.
      schema:
        type: object
        properties:
          ids: {type: array}
          documents: {type: array}
          distances: {type: array}
          embedding_model: {type: string}
    side_effects:
      - kind: external_api
        target: rag_server.query
        state: read_only
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Querying the RAG server does not mutate state.
    config:
      rest_ref: rag0
      operation: rag0_query

  - name: rag_query1
    type: builtin
    init: rest_client_invoke
    visibility: internal
    category: boundary
    description: Query the second RAG server with the same message vector.
    problem: The chatbot fans the one message embedding out to each declared RAG server for grounding chunks.
    goals:
      - Thread the same message embedding into the second RAG server query.
      - Return the retrieved chunk ids, documents, distances, and embedding model.
    requirements:
      input:
        - The query embedding is selected from embed_query through command-state $from() addressing.
      output:
        - Output includes the retrieved chunk ids, documents, distances, and the RAG embedding model.
      errors:
        - Network, timeout, schema, and mapping failures emit CommandError so the turn degrades with the remaining chunks.
        - A 400 embedding-space mismatch (srd001 R2.3) emits QueryRejected so this source is excluded from the composed chunks.
    non_goals:
      - Does not author the query vector.
      - Does not accept runtime method, URL, host, or auth overrides.
    parameters:
      type: object
      properties:
        query_embeddings: {type: array}
    emits: [QueryResponded, QueryRejected, CommandError]
    output:
      description: Mapped RAG server query result.
      schema:
        type: object
        properties:
          ids: {type: array}
          documents: {type: array}
          distances: {type: array}
          embedding_model: {type: string}
    side_effects:
      - kind: external_api
        target: rag_server.query
        state: read_only
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Querying the RAG server does not mutate state.
    config:
      rest_ref: rag1
      operation: rag1_query

  - name: compare_model0
    type: builtin
    init: value_predicate
    visibility: internal
    category: response
    description: Compare the first RAG's reported embedding model with the query embedding's model.
    problem: |
      A 400 from the RAG server only catches a vector the collection rejects, which is a
      dimension mismatch. Two models of the same width produce a 200, so without this
      comparison the turn composes chunks retrieved in a different embedding space than
      the query (srd002 R3.3).
    goals:
      - Compare the query embedding model identity with the model this RAG reported.
      - Emit a distinct signal for a matching and a differing identity so exclusion is a visible transition.
    requirements:
      input:
        - Both operands are read from prior steps through command-state $from() addressing.
      output:
        - Output records the verdict and both compared identities.
      errors:
        - An unresolved operand emits CommandError, so the source degrades rather than being silently kept.
    non_goals:
      - Does not drop the chunks itself; the machine routes past the keep word for a differing identity.
      - Does not call any provider.
    parameters:
      type: object
      properties: {}
      additionalProperties: false
    emits: [ModelMatched, ModelDiffered, CommandError]
    output:
      description: The embedding-model comparison verdict.
      schema:
        type: object
        properties:
          verdict: {type: string}
          left: {type: string}
          right: {type: string}
    side_effects: []
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Comparing two command-state values has no durable effect.
    config:
      left: $from(declare_query_model).model
      op: eq
      right: $from(rag_query0).mapped.embedding_model
      operand_type: string
      satisfied: ModelMatched
      unsatisfied: ModelDiffered

  - name: keep_chunks0
    type: builtin
    init: compose
    visibility: internal
    category: response
    description: Keep the first RAG's chunks for composition after its embedding model matched.
    problem: |
      A machine transition alone cannot exclude a source, because rag_query0's chunks stay
      addressable in command state after a differing identity. The machine dispatches this
      word only on the matching path, so the composed prompt reads chunks through a label
      that exists only for a source that survived (srd002 R3.3).
    goals:
      - Republish the first RAG's chunks under a label that exists only when the source survived.
      - Leave an excluded or degraded source unresolved, which compose renders empty.
    requirements:
      input:
        - The chunks are selected from rag_query0 through command-state $from() addressing.
      output:
        - Output is a JSON object whose documents field carries the surviving chunks.
      errors:
        - Reached only after a matching comparison, so the selector resolves.
    non_goals:
      - Does not order, cap, or rewrite chunks.
      - Does not decide whether the source survived; compare_model0 and the machine do.
    parameters:
      type: object
      properties: {}
      additionalProperties: false
    emits: [ChunksKept0]
    output:
      description: The surviving chunks from the first RAG.
      schema:
        type: object
        properties:
          documents: {type: array}
    side_effects: []
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Republishing chunks has no durable effect.
    config:
      signal: ChunksKept0
      inputs:
        documents: $from(rag_query0).mapped.documents
      template: |
        {"documents": {{ documents }}, "outcome": "composed", "reason": ""}

