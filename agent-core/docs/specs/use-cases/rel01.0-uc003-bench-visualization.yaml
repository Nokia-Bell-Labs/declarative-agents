id: rel01.0-uc003-bench-visualization
title: Bench serves web UI for evaluation result exploration

summary: |
  The agent, configured with the external bench profile, starts a
  state-machine-driven web server for browsing experiment results, inspecting
  source code, and launching new evaluations. The serve_ui tool blocks
  on user input via HTTP (analogous to invoke_llm blocking on LLM
  responses), and the launch_eval tool spawns the configured evaluator profile
  as a child agent process. The evaluator profile owns the session machine it
  runs.

actor: Developer analyzing benchmark results

trigger: |
  The developer runs:
    agent --profile "$AGENT_PROFILES_ROOT/bench/profile.yaml"

  The serve_ui tool reads data_dir, configs_dir, source_dir, profiles_dir,
  and addr from its config block in the profile-selected tool declarations.

flow:
  - F1: The agent parses CLI flags and loads the external bench profile, resolving the bench machine, tool selection, and tool declarations relative to the profile file (cfg-runtime-contract).
  - F2: The bench state machine is loaded from the profile-resolved bench/machine.yaml path (srd006).
  - F3: BenchState is initialized with ServerConfig (data dir, configs dir, profiles dir, source dir, UI assets) (srd020).
  - F4: serve_ui and launch_eval builtin factories are registered. Tool config values come from the config block in the tool declaration YAML (srd013).
  - F5: core.Loop drives the bench state machine. Idle → Serving via serve_ui starts the HTTP server in a goroutine and blocks on the action channel (srd005, bench/machine.yaml).
  - F6: The React SPA loads in the browser. The user browses sessions, inspects traces, opens launch controls, and reads source code via REST APIs (srd020).
  - F7: GET /api/v1/sessions returns experiment sessions with pass/fail/timeout counts. The user drills into session details, point traces, and experiment configs (srd020).
  - F8: The user opens the Launch page and submits an experiment configuration. POST /api/v1/actions sends an ExperimentRequested action (srd020).
  - F9: serve_ui unblocks with the action. The state machine transitions Serving → Launching, and launch_eval spawns the configured evaluator profile as a child agent process (srd021, bench/machine.yaml, bench/builtin.yaml).
  - F10: When the subprocess completes, EvalCompleted transitions Launching → Serving. serve_ui blocks again, waiting for the next user action (bench/machine.yaml).

touchpoints:
  - T1: "srd005-agentic-loop R4, R5 -- LoopParams and Loop drive the bench state machine"
  - T2: "srd006-yaml-machine-config R1, R2, R3, R4 -- bench machine.yaml loading, validation, and table building"
  - T3: "srd020-bench-web-ui R1, R2, R3, R4, R5, R6, R7, R8 -- HTTP server, bench REST APIs, SPA routing, embedded assets, and documentation boundary"
  - T4: "bench/machine.yaml -- states, signals, serve_ui/launch_eval lifecycle"
  - T5: "srd019-eval-harness R0, R1, R2, R3 -- launch_eval reuses the profile-driven evaluator pipeline"
  - T6: "bench/profile.yaml -- profile-relative bench runtime entry point under AGENT_PROFILES_ROOT"
  - T7: "srd021-agent-cli-exec-tool R1, R2, R3, R4 -- child agent profile invocation, trace propagation, process result mapping"

success_criteria:
  - id: S1
    criterion: The web UI serves from embedded assets and all SPA routes resolve without 404.
    traces:
      - srd020-bench-web-ui AC1
  - id: S2
    criterion: Session, point, trace, and experiment APIs return correct data from the results directory.
    traces:
      - srd020-bench-web-ui AC2
  - id: S3
    criterion: Source code and config APIs serve content from disk, and bench docs routes are absent.
    traces:
      - srd020-bench-web-ui AC4
  - id: S4
    criterion: User actions from the web UI drive state machine transitions via serve_ui.
    traces:
      - srd020-bench-web-ui AC4
  - id: S5
    criterion: Launching an experiment spawns the evaluator profile child process and returns to serving on completion.
    traces:
      - srd020-bench-web-ui AC4

out_of_scope:
  - User authentication or multi-tenancy.
  - Editing configurations through the UI.
  - Real-time streaming of in-progress evaluations.

machine_config: bench/machine.yaml
test_suite_trace: test-rel01.0
