id: srd006-bench
title: Bench Functional Block

context: |
  The bench profile is a human-operated evaluation launcher. It serves a web UI
  for experiment browsing, launches evaluator runs, and returns to serving after
  each evaluator outcome. This SRD owns the bench family requirements that
  srd001-agent-functional-blocks previously held as block R6.

  The block names the contract the bench presents to the rest of the profile
  system. Experiment execution launches the evaluator profile; the bench does not
  own evaluation session logic.

problem: |
  The bench family needs its own requirements document so that changes to bench
  UI or launch behavior do not churn a shared cross-family file. The requirements
  must name profile-owned bench UI behavior separately from the evaluator profile
  and agent-core bench tools.

goals:
  - G1: Model the bench profile as a human-operated evaluation launcher functional block.
  - G2: Record the bench actor boundary, inputs, tool selections, runtime dependencies, outputs, and terminal outcomes.
  - G3: Keep bench UI behavior profile-owned while delegating evaluation session logic to the evaluator profile.

requirements:
  R1:
    title: Behavior model
    items:
      - R1.1: The bench profile must model a human-operated web UI block that serves experiment browsing, launches evaluator runs, and returns to serving after each evaluator outcome.
      - R1.2: The bench actor boundary is a human HTTP operator, not an LLM.
      - R1.3: Bench relationships must show that experiment execution launches the evaluator profile rather than owning evaluation session logic.
  R2:
    title: Inputs, tools, and runtime dependencies
    items:
      - R2.1: Bench inputs must include a human UI action and an experiment configuration.
      - R2.2: The bench profile must select the bench UI and evaluator launch tool families.
      - R2.3: Bench runtime dependencies are the agent-core bench tools and the evaluator profile.
  R3:
    title: Outputs and outcomes
    items:
      - R3.1: Bench outputs must include a served UI, an evaluator run request, and a launch status.
      - R3.2: Bench terminal outcomes must be Done or Failed.

non_goals:
  - Define Go package APIs for the agent-core bench tools.
  - Reimplement evaluator session logic inside the bench profile.
  - Own cross-profile dependency-direction invariants; those stay in srd001.

acceptance_criteria:
  - id: AC1
    criterion: The bench profile is described as a human-operated launcher that delegates to evaluator rather than a Go package.
    traces: [R1.1, R1.2, R1.3]
  - id: AC2
    criterion: Bench inputs, selected tool families, and runtime dependencies are named and separated from agent-core runtime capability.
    traces: [R2.1, R2.2, R2.3]
  - id: AC3
    criterion: Bench outputs and terminal outcomes are checkable by mounted execution or integration targets.
    traces: [R3.1, R3.2]

depends_on:
  - srd_id: srd001-agent-functional-blocks
    symbols_used: [R1]

diagrams:
  requirements_trace: |
    ```mermaid
    flowchart LR
      Problem["Problem: Bench family needs its own requirements..."] --> Goals["Goals: Bench Functional Block"]
      Goals --> R1["R1: Behavior model"]
      Goals --> R2["R2: Inputs, tools, and runtime dependencies"]
      Goals --> R3["R3: Outputs and outcomes"]
      R1 --> AC1["AC1: Human-operated launcher delegating to evaluator"]
      R2 --> AC2["AC2: Inputs, tools, dependencies named"]
      R3 --> AC3["AC3: Outputs and outcomes checkable"]
    ```
