# LEGACY FILE — not loaded at runtime.
#
# This file is the original exec tool declaration set that predated the
# current tools/exec.yaml. It contains additional tools (branch_*, worktree_*,
# issue_claim) that are not yet migrated to tools/exec.yaml. The canonical
# exec tool declarations are in tools/exec.yaml.
#
# Retained as a reference for tools that may be promoted to the canonical set.
# See also: tools/builtin.yaml (canonical builtins), agents/*/tools.yaml
# (per-agent tool selection).

tools:
  # --- build tools ---
  - name: build
    binary: go
    args: [build, "./..."]
    description: "Compile all Go packages with go build ./... Returns compiler errors on failure."

  - name: vet
    binary: go
    args: [vet, "./..."]
    description: "Run go vet ./... on the workspace. Reports suspicious constructs."

  - name: lint
    binary: golangci-lint
    args: [run, "./..."]
    description: "Run golangci-lint run ./... on the Go workspace."

  - name: test
    binary: go
    args: [test, "-count=1"]
    description: "Run go test -count=1 on the workspace. Returns test output including pass/fail results."
    output_cap: 200
    parameters:
      type: object
      properties:
        package:
          type: string
          description: "Go package path (default ./...)"
          positional: true
          default: "./..."

  # --- git tools (atomic verbs) ---
  - name: stage_all
    binary: git
    args: [add, -A]
    description: "Stage all changes including untracked files (git add -A)."
    precondition: git_repo
    side_effects: "moves all working tree changes to the index"

  - name: workspace_status
    binary: git
    args: [status, --porcelain]
    description: "Report git workspace state: changed files with status codes (M/A/D/??)."
    precondition: git_repo

  - name: commit
    binary: git
    args: [commit]
    description: "Create a git commit from staged changes. Fails if nothing is staged."
    precondition: git_repo
    side_effects: "creates a commit object on the current branch"
    parameters:
      type: object
      properties:
        message:
          type: string
          description: "Commit message"
          flag: -m
      required: [message]

  - name: rev_parse
    binary: git
    args: [rev-parse, --short, HEAD]
    description: "Return the short hash of HEAD."
    precondition: git_repo

  - name: branch_create
    binary: git
    args: [branch]
    description: "Create a new branch at HEAD. Does not switch to it."
    precondition: git_repo
    side_effects: "creates a new branch ref"
    parameters:
      type: object
      properties:
        name:
          type: string
          description: "Branch name"
          positional: true
      required: [name]

  - name: branch_delete
    binary: git
    args: [branch, -D]
    description: "Force-delete a branch. Irreversible."
    precondition: git_repo
    side_effects: "removes a branch ref"
    parameters:
      type: object
      properties:
        name:
          type: string
          description: "Branch name"
          positional: true
      required: [name]

  - name: branch_list
    binary: git
    args: [branch, --list]
    description: "List branches matching a pattern."
    precondition: git_repo
    parameters:
      type: object
      properties:
        pattern:
          type: string
          description: "Branch name pattern (glob)"
          positional: true

  - name: branch_current
    binary: git
    args: [branch, --show-current]
    description: "Return the name of the current branch."
    precondition: git_repo

  - name: worktree_add
    binary: git
    args: [worktree, add, -b]
    description: "Create a git worktree with a new branch."
    precondition: git_repo
    side_effects: "creates a new branch and a new working directory"
    parameters:
      type: object
      properties:
        branch:
          type: string
          description: "New branch name"
          positional: true
        path:
          type: string
          description: "Worktree directory path"
          positional: true
      required: [branch, path]

  - name: worktree_remove
    binary: git
    args: [worktree, remove, --force]
    description: "Remove a git worktree directory. Uncommitted changes are lost."
    precondition: git_repo
    side_effects: "removes the worktree directory"
    parameters:
      type: object
      properties:
        path:
          type: string
          description: "Worktree directory path"
          positional: true
      required: [path]

  - name: worktree_list
    binary: git
    args: [worktree, list]
    description: "List all git worktrees."
    precondition: git_repo

  - name: diff_stat
    binary: git
    args: [diff, --stat]
    description: "Show a summary of uncommitted changes (files changed, insertions, deletions)."
    precondition: git_repo

  - name: log_oneline
    binary: git
    args: [log, --oneline, -10]
    description: "Show the last 10 commits as one-line summaries."
    precondition: git_repo

  # --- issue tools ---
  - name: issue_create
    binary: bd
    args: [create, --json]
    description: "Create a new beads issue. Returns the issue ID."
    side_effects: "writes to .beads/issues.jsonl and .beads/interactions.jsonl"
    parameters:
      type: object
      properties:
        title:
          type: string
          description: "Issue title"
          flag: --title
        body:
          type: string
          description: "Issue body/description"
          flag: --body
        type:
          type: string
          description: "Issue type (default: task)"
          flag: -t
        priority:
          type: string
          description: "Priority level (default: P2)"
          flag: -p
        deps:
          type: string
          description: "Comma-separated dependency issue IDs"
          flag: --deps
      required: [title]

  - name: issue_close
    binary: bd
    args: [close]
    description: "Close an issue by ID."
    side_effects: "sets issue status to closed in .beads/issues.jsonl"
    parameters:
      type: object
      properties:
        id:
          type: string
          description: "Issue ID to close"
          positional: true
      required: [id]

  - name: issue_list
    binary: bd
    args: [list]
    description: "List beads issues. Defaults to open issues only."
    parameters:
      type: object
      properties:
        all:
          type: boolean
          description: "Include closed issues"
          flag: --all
          bool_flag: true

  - name: issue_claim
    binary: bd
    args: [update]
    description: "Claim an issue: set status to in_progress and assign to current user."
    side_effects: "modifies issue status in .beads/issues.jsonl"
    parameters:
      type: object
      properties:
        id:
          type: string
          description: "Issue ID to claim"
          positional: true
        claim:
          type: boolean
          description: "Claim flag"
          flag: --claim
          bool_flag: true
          default: "true"
      required: [id]
