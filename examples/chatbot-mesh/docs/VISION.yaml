id: chatbot-mesh-example
title: "Chatbot Mesh: A Standalone Declarative Agent Example"

executive_summary: |
  The chatbot mesh is a copyable example program. It shows what a mesh of
  declarative agents can do: a browser-facing chatbot that routes a question to
  a chat model, fans one embedding out to several retrieval-augmented generation
  (RAG) servers, composes an answer from the surviving sources' chunks, exposes
  per-agent and cross-agent observability, and deploys as one Helm chart with an
  in-cluster model tier.

  The example is a standalone program, not a standalone runtime. It runs on the
  published agent-core image: the agents are YAML profiles the runtime loads, and
  the example cites agent-core platform requirements as external references
  rather than restating them. Copy the `examples/chatbot-mesh/` directory and it
  runs against the agent-core runtime with no dependency on the other profiles in
  this repository.

  The example spans the data plane -- the chatbot, the RAG servers, a corpus-ingest
  agent that seeds the vector store, observability, and Helm deployment -- and the
  control plane: a coordinator that sequences a provisioning intent, a creator that
  manages agent lifecycle, and the provisioning surface (the deployment API and its
  panel). The control plane is release rel05.0.

problem: |
  A framework claim is easier to trust when one artifact demonstrates it end to
  end. Spread across a shared profile catalog, the chatbot mesh is hard to read
  as a single program and hard to lift into another project: its agents sit in
  two family trees, its user interface is buried under one agent, and its Helm
  chart lives apart from the profiles it deploys.

  We want a reader to open one directory and see a complete declarative agent
  program: the agents, their user interface, their deployment, and their own
  specifications. We want that directory to be copyable, so it can seed a new
  project without carrying the rest of the catalog.

what_this_does: |
  This directory collects the mesh as a self-governing project. The `agents/`
  tree holds the chatbot, the RAG server, and the corpus-ingest seed agent, each
  self-contained. The `ux/` tree holds the single-page application and its UX
  config. The `helm/` tree holds the deployment chart. The `docs/` tree holds this
  vision, the architecture, the road map, and the example's own software
  requirements, use cases, and test suites.

  The example carries its own build entry. A magefile validates the example's
  specification corpus and runs the mesh integration targets, so the example
  governs and tests itself without the surrounding repository.

why_we_build_this: |
  A standalone example makes the framework's value legible. A reader sees that
  agent behavior is YAML a shared runtime loads, that a multi-agent topology is
  configuration rather than bespoke code, and that the same profiles run locally
  and in a cluster.

  Self-containment lets the example travel. Chroma retrieval config, the seed
  agent, and the deployment chart live with the mesh, so copying the folder
  copies a working program. Shared retrieval config that belongs to other
  examples stays with those examples.

success_criteria:
  standalone_program: |
    The example runs on the published agent-core image and references no profile
    outside `examples/chatbot-mesh/`. Its only external dependencies are the
    agent-core runtime and its documented platform requirements.
  self_contained_data_plane: |
    The chatbot, the RAG server, and the corpus-ingest seed agent run end to end
    from this directory. Chroma retrieval config is owned by the mesh, not shared
    from another family.
  self_governing_docs: |
    The example owns its VISION, ARCHITECTURE, road map, software requirements,
    use cases, and test suites. Its magefile audit validates that corpus.
  clear_layout: |
    Helm and UX each live in their own top-level directory, so a reader locates
    the deployment and the interface without searching under an agent.
  portable_deployment: |
    One Helm chart deploys the mesh on a fresh cluster, including an in-cluster
    model tier, with values-driven RAG pairs and co-generated client config.

not:
  - We do not own the agent-core runtime, its Go packages, or its builtin tools;
    the example is a program that runs on that runtime.
  - We do not restate agent-core platform requirements (REST client tools,
    machine_request binding, monitor, mounted profiles, checkpoint, command-state,
    traceparent); we cite them as external references.
  - We do not share Chroma retrieval config with the knowledge-manager corpus
    demo; the mesh owns its own copy.
  - We do not invert co-generation in this cut. The Helm chart renders the
    chatbot client config, user interface, and fan-out from values; making the
    profile the source is a separate follow-up.

canonical_documents:
  - docs/ARCHITECTURE.yaml
  - docs/road-map.yaml
  - docs/specs/software-requirements/srd001-rag-server-agent.yaml
  - docs/specs/software-requirements/srd002-chatbot-agent.yaml
  - docs/specs/software-requirements/srd003-chatbot-deployment.yaml
  - README.md

platform_references:
  note: |
    These agent-core requirements are the runtime contracts the example builds
    on. They are external references, owned by agent-core, not restated here.
  requirements:
    - agent-core srd028 (REST client tools)
    - agent-core srd030 (machine_request REST binding)
    - agent-core srd033 (monitor REST API)
    - agent-core srd034 (external mounted agent profiles)
    - agent-core srd035 and srd036 (checkpoint port and persistence)
    - agent-core srd038 (command-state store and $from selectors)
    - agent-core srd016 (W3C traceparent propagation)
