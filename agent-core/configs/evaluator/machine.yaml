# State machine for a single evaluation point.
# Sequences: prepare workspace → run agent → check results → collect metrics.
#
# Usage:
#   agent --machine configs/evaluator/machine.yaml \
#         --tools-declaration configs/tools/builtin.yaml \
#         --tools-declaration configs/tools/exec.yaml \
#         --tools configs/evaluator/tools.yaml

name: evaluator
initial_state: Idle

budget:
  max_iterations: 20

states:
  - Idle
  - CreatingWorkspace
  - InitRepo
  - StagingFiles
  - CommittingBaseline
  - RunningAgent
  - CheckingResults
  - CollectingMetrics
  - Done
  - Failed

terminal_states:
  - Done
  - Failed

signals:
  - Seed
  - ToolDone
  - CommandError
  - WorkspaceReady
  - HarnessFinished
  - HarnessFailed
  - HarnessTimedOut
  - ResultsCollected
  - MetricsCollected

transitions:
  # --- workspace preparation ---
  # Create the point directory and copy sample files
  - state: Idle
    signal: Seed
    next: CreatingWorkspace
    action: copy_dir

  # Initialize git in the workspace
  - state: CreatingWorkspace
    signal: ToolDone
    next: InitRepo
    action: git_init

  # Stage all files
  - state: InitRepo
    signal: ToolDone
    next: StagingFiles
    action: stage_all

  # Commit the baseline
  - state: StagingFiles
    signal: ToolDone
    next: CommittingBaseline
    action: commit

  # --- run the agent under test ---
  - state: CommittingBaseline
    signal: ToolDone
    next: RunningAgent
    action: run_agent

  # --- check and collect ---
  - state: RunningAgent
    signal: HarnessFinished
    next: CheckingResults
    action: check_results

  - state: RunningAgent
    signal: HarnessFailed
    next: CheckingResults
    action: check_results

  - state: RunningAgent
    signal: HarnessTimedOut
    next: CheckingResults
    action: check_results

  - state: CheckingResults
    signal: ResultsCollected
    next: CollectingMetrics
    action: collect_metrics

  - state: CollectingMetrics
    signal: MetricsCollected
    next: Done

  # --- error handling ---
  - state: CreatingWorkspace
    signal: CommandError
    next: Failed

  - state: InitRepo
    signal: CommandError
    next: Failed

  - state: StagingFiles
    signal: CommandError
    next: Failed

  - state: CommittingBaseline
    signal: CommandError
    next: Failed

  - state: RunningAgent
    signal: CommandError
    next: Failed

  - state: CheckingResults
    signal: CommandError
    next: Failed

  - state: CollectingMetrics
    signal: CommandError
    next: Failed
