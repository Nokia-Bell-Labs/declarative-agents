    summary: One chart deploys the mesh on a kind cluster with values-to-config
      co-generation, a Service repoint, and an add-RAG rollout that resumes from
      the Dolt checkpoint, provisioned through a separately-authenticated API.
    status: implemented
    path: docs/specs/use-cases/rel09.3-uc001-mesh-deployment.yaml
  - id: rel09.4-uc001-control-plane-provisioning
    title: A Provisioning Intent Flows Chatbot to Coordinator to Creator and Serves
    summary: A user's add-a-source intent flows from the chatbot to the coordinator,
      which sequences ingest via the creator and decides the values changes; the
      creator executes the checkpoint-resume rollout through the deployment API and
      reports health; the new source serves, with deployment-API authority held by
      the creator alone.
    status: specified
    path: docs/specs/use-cases/rel09.4-uc001-control-plane-provisioning.yaml
  - id: rel09.5-uc001-in-cluster-llm-tier
    title: A Fresh-Cluster Install Answers a Turn With No External LLM Dependency
    summary: A default helm install deploys the Ollama subchart with model preload
      and readiness gating so a fresh cluster is self-contained; ollama.enabled=false
