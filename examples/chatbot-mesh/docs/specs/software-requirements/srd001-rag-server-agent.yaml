id: srd001-rag-server-agent
title: RAG Server Agent Functional Block

context: |
  The RAG server agent re-hosts the Chroma reader as a persistent
  retrieval service. The reader's deterministic chain -- chroma_ready,
  ollama_ready, embed_query, create-or-get collection, chroma_query, answer -- is
  a one-shot machine run today. The RAG server keeps the same retrieval chain but
  places it behind a machine_request query endpoint (agent-core srd030), so each
  inbound query is a request-scoped machine run against a long-lived process.

  Two contract changes distinguish the server from the reader. First, the query
  API is vector-in: the caller supplies query_embeddings rather than question
  text, because in the chatbot mesh one embedding fans out to N RAG servers and
  re-embedding per server would waste work and risk embedding-space drift.
  Second, the LLM answering step moves out: the RAG server returns retrieved
  chunks (ids, distances, metadata), and the chatbot agent composes and answers.
  The RAG server is a retrieval boundary, not an answering agent.

  The reusable HTTP runtime, machine_request binding, monitor server, and
  embedding transport stay in agent-core. The Chroma REST definitions, the
  collection identity, the served database, the query endpoint mapping, and the
  bind addresses stay profile-owned.

problem: |
  The mesh needs a persistent RAG service with a stable, vector-in query contract
  and observable, controllable lifetime, without rewriting the reader or folding
  answering into the retrieval boundary. The requirements must name the service
  shape, the vector-in query contract and embedding-model metadata, the
  one-agent-one-corpus rule, the unchanged ingest path, and the optional text-in
  fallback, separately from the agent-core request and monitor runtime.

goals:
  - G1: Model a persistent RAG service that hosts the Chroma reader retrieval chain behind a machine_request query endpoint with monitor and control servers.
  - G2: Define a vector-in query contract that returns chunks with the collection's embedding-model metadata so callers detect embedding-space mismatch.
  - G3: Fix one agent to one served Chroma database and collection set, with multiple RAGs modeled as multiple instances rather than in-agent multiplexing.
  - G4: Keep the corpus-ingest seed agent as the unchanged loading path and scope srd001 to serving.
  - G5: Keep the query endpoint mapping, collection identity, served database, and bind addresses profile-owned while agent-core supplies the request, monitor, and embedding runtime.

requirements:
  R1:
    title: Service shape
    items:
      - R1.1: The RAG server SHALL expose a machine_request query endpoint (agent-core srd030) that binds one inbound HTTP request to one request-scoped run of the retrieval machine and maps terminal signals to HTTP status.
      - R1.2: The RAG server SHALL run a monitor server exposing the srd033 read-only views and SSE stream over cached monitor state.
      - R1.3: The RAG server SHALL run a control server exposing lifecycle exit and a health check.
      - R1.4: The query, monitor, and control server bind addresses SHALL be loopback-configurable inputs rather than agent-authored values.
      - R1.5: The retrieval machine SHALL reuse the Chroma reader chain up to chroma_query -- chroma_ready, ollama_ready (for the text-in fallback only), create-or-get collection, and chroma_query -- without the invoke_llm answering step.
  R2:
    title: Vector-in query contract
    items:
      - R2.1: The query endpoint SHALL accept query_embeddings (a caller-supplied embedding vector) and a configured or request-supplied n_results, and SHALL NOT require question text on the mesh query path.
      - R2.2: The query response SHALL return retrieved chunks with their record ids, distances, and metadata.
      - R2.3: The query response metadata SHALL name the served collection's embedding model, so a caller can detect an embedding-space mismatch between its query vector and the collection.
      - R2.4: The query endpoint SHALL thread query_embeddings into the chroma_query body using the single-token vector reshape (srd028 R12.5 / command_state), because a raw vector cannot be authored by a model.
  R3:
    title: One agent, one corpus
    items:
      - R3.1: A single RAG server agent SHALL serve exactly one Chroma database and its collection set; it SHALL NOT multiplex across databases or embedding models within one process.
      - R3.2: A mesh of N RAG sources SHALL be N RAG server agent instances, each addressed as its own service, rather than one agent selecting among corpora at request time.
  R4:
    title: Ingest boundary
    items:
      - R4.1: The corpus-ingest seed agent SHALL remain the unchanged loading path for the served collection; srd001 SHALL define serving only and SHALL NOT alter ingest behavior.
      - R4.2: The served Chroma database and collection SHALL be treated as an external precondition loaded out of band, surfaced through chroma_ready rather than created by the query path.
  R5:
    title: Optional text-in fallback
    items:
      - R5.1: A text-in query operation (embed the question locally through embed_query, then chroma_query) MAY be declared for standalone use of a single RAG server outside the mesh.
      - R5.2: The text-in fallback SHALL be disabled in the mesh topology, where callers supply query_embeddings, so one embedding fans out to every RAG source unchanged.

non_goals:
  - Define Go package APIs for the agent-core request, monitor, or embedding runtime.
  - Compose or answer over retrieved chunks; the chatbot agent (srd002) owns answering.
  - Change the corpus-ingest seed agent's ingest machine or its loading behavior.
  - In-agent multiplexing across databases, collections, or embedding models.
  - Durable per-session query state; the query path is request-scoped and stateless.

acceptance_criteria:
  - id: AC1
    criterion: The RAG server is described as a persistent service hosting the reader retrieval chain behind a machine_request query endpoint, with monitor and control servers and loopback-configurable bind addresses.
    traces: [R1.1, R1.2, R1.3, R1.4, R1.5]
  - id: AC2
    criterion: The vector-in query contract is specified with query_embeddings and n_results in, chunks with ids/distances/metadata out, the served collection's embedding-model name in the metadata, and the single-token vector reshape into chroma_query.
    traces: [R2.1, R2.2, R2.3, R2.4]
  - id: AC3
    criterion: The one-agent-one-corpus rule and the multiple-instances model for N RAG sources are stated, with no in-agent multiplexing.
    traces: [R3.1, R3.2]
  - id: AC4
    criterion: The corpus-ingest seed agent is named as the unchanged loading path and the served collection as an external precondition, scoping srd001 to serving.
    traces: [R4.1, R4.2]
  - id: AC5
    criterion: The optional text-in fallback is specified as declarable for standalone use and disabled in the mesh topology so one embedding fans out unchanged.
    traces: [R5.1, R5.2]

platform_dependencies:
  # agent-core runtime contracts this agent builds on. External references, owned
  # by agent-core, not part of this example's corpus.
  - srd_id: srd030-machine-request-rest-binding
    provider: agent-core
    symbols_used: [R1]
  - srd_id: srd033-monitor-rest-api
    provider: agent-core
    symbols_used: [R1]
  - srd_id: srd028-rest-client-tools
    provider: agent-core
    symbols_used: [R12]

related_agents:
  - agent: corpus-ingest
    role: The in-example seed agent that loads the served Chroma collection. The
      RAG server serves what corpus-ingest ingests and does not alter its loading
      behavior; the served collection is an external precondition.

implementation_status:
  done:
    - >-
      The rag-server agent implements the persistent vector-in query service: a
      machine_request query endpoint over the Chroma reader chain, monitor and
      control servers, query_embeddings in, chunks with embedding-model metadata
      out, and wrong-dimension vectors mapped to a 400. Verified end to end
      against a live Chroma.
  planned:
    - >-
      Request-supplied n_results (fixed at the configured default today) and the
      optional text-in fallback (R5).

