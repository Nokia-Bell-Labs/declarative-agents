tools:
  # --- build tools ---
  - name: build
    binary: go
    args: [build, "./..."]
    description: "Compile all Go packages with go build ./... Returns compiler errors on failure."

  - name: vet
    binary: go
    args: [vet, "./..."]
    description: "Run go vet ./... on the workspace. Reports suspicious constructs."

  - name: lint
    binary: golangci-lint
    args: [run, "./..."]
    description: "Run golangci-lint run ./... on the Go workspace."

  - name: test
    binary: go
    args: [test, "-count=1"]
    description: "Run go test -count=1 on the workspace. Returns test output including pass/fail results. Defaults to ./... (all packages)."
    output_cap: 200
    params:
      - name: package
        positional: true
        default: "./..."
        description: "Go package path (default ./...)"

  # --- git tools (atomic verbs) ---
  - name: stage_all
    binary: git
    args: [add, -A]
    description: "Stage all changes including untracked files (git add -A)."
    precondition: git_repo
    side_effects: "moves all working tree changes to the index"

  - name: workspace_status
    binary: git
    args: [status, --porcelain]
    description: "Report git workspace state: changed files with status codes (M/A/D/??)."
    precondition: git_repo

  - name: commit
    binary: git
    args: [commit]
    description: "Create a git commit from staged changes. Fails if nothing is staged."
    precondition: git_repo
    side_effects: "creates a commit object on the current branch"
    params:
      - name: message
        flag: -m
        required: true
        description: "Commit message"

  - name: rev_parse
    binary: git
    args: [rev-parse, --short, HEAD]
    description: "Return the short hash of HEAD."
    precondition: git_repo

  - name: branch_create
    binary: git
    args: [branch]
    description: "Create a new branch at HEAD. Does not switch to it."
    precondition: git_repo
    side_effects: "creates a new branch ref"
    params:
      - name: name
        positional: true
        required: true
        description: "Branch name"

  - name: branch_delete
    binary: git
    args: [branch, -D]
    description: "Force-delete a branch. Irreversible."
    precondition: git_repo
    side_effects: "removes a branch ref"
    params:
      - name: name
        positional: true
        required: true
        description: "Branch name"

  - name: branch_list
    binary: git
    args: [branch, --list]
    description: "List branches matching a pattern."
    precondition: git_repo
    params:
      - name: pattern
        positional: true
        description: "Branch name pattern (glob)"

  - name: branch_current
    binary: git
    args: [branch, --show-current]
    description: "Return the name of the current branch."
    precondition: git_repo

  - name: worktree_add
    binary: git
    args: [worktree, add, -b]
    description: "Create a git worktree with a new branch."
    precondition: git_repo
    side_effects: "creates a new branch and a new working directory"
    params:
      - name: branch
        positional: true
        required: true
        description: "New branch name"
      - name: path
        positional: true
        required: true
        description: "Worktree directory path"

  - name: worktree_remove
    binary: git
    args: [worktree, remove, --force]
    description: "Remove a git worktree directory. Uncommitted changes are lost."
    precondition: git_repo
    side_effects: "removes the worktree directory"
    params:
      - name: path
        positional: true
        required: true
        description: "Worktree directory path"

  - name: worktree_list
    binary: git
    args: [worktree, list]
    description: "List all git worktrees."
    precondition: git_repo

  - name: diff_stat
    binary: git
    args: [diff, --stat]
    description: "Show a summary of uncommitted changes (files changed, insertions, deletions)."
    precondition: git_repo

  - name: log_oneline
    binary: git
    args: [log, --oneline, -10]
    description: "Show the last 10 commits as one-line summaries."
    precondition: git_repo

  # --- issue tools ---
  - name: issue_create
    binary: bd
    args: [create, --json]
    description: "Create a new beads issue. Returns the issue ID."
    side_effects: "writes to .beads/issues.jsonl and .beads/interactions.jsonl"
    params:
      - name: title
        flag: --title
        required: true
        description: "Issue title"
      - name: body
        flag: --body
        description: "Issue body/description"
      - name: type
        flag: -t
        description: "Issue type (default: task)"
      - name: priority
        flag: -p
        description: "Priority level (default: P2)"
      - name: deps
        flag: --deps
        description: "Comma-separated dependency issue IDs"

  - name: issue_close
    binary: bd
    args: [close]
    description: "Close an issue by ID."
    side_effects: "sets issue status to closed in .beads/issues.jsonl"
    params:
      - name: id
        positional: true
        required: true
        description: "Issue ID to close"

  - name: issue_list
    binary: bd
    args: [list]
    description: "List beads issues. Defaults to open issues only."
    params:
      - name: all
        flag: --all
        bool_flag: true
        description: "Include closed issues"

  - name: issue_claim
    binary: bd
    args: [update]
    description: "Claim an issue: set status to in_progress and assign to current user."
    side_effects: "modifies issue status in .beads/issues.jsonl"
    params:
      - name: id
        positional: true
        required: true
        description: "Issue ID to claim"
      - name: claim
        flag: --claim
        bool_flag: true
        default: "true"
