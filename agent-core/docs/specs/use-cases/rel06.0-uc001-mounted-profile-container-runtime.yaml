id: rel06.0-uc001-mounted-profile-container-runtime
title: Runtime container runs a mounted agent profile

summary: A release maintainer builds the Agent Core runtime image, mounts profile assets from an external checkout, starts `agent` with a mounted `profile.yaml`, and verifies that the final image does not depend on copied generator or evaluator profile trees.

actor: Release maintainer validating the external profile container contract

trigger: The repository migration moves agent behavior toward an agent-profiles ownership boundary, so the container contract must prove mounted profile paths before profile trees leave agent-core.

flow:
  - F1: The maintainer builds the Agent Core runtime image from the agent-core repository.
  - F2: The maintainer checks out or unpacks agent-profiles beside the runtime workspace.
  - F3: "The maintainer runs the container with the agent-profiles checkout mounted at `/profiles`."
  - F4: "The maintainer mounts the target workspace at `/work`."
  - F5: "The maintainer starts `agent --profile /profiles/generator/profile.yaml --directory /work`."
  - F6: "The runtime resolves profile-relative `machine.yaml`, `tools.yaml`, local declarations, REST definitions, LLM config, and UI config from the mounted profile tree."
  - F7: "The runtime resolves shared core-owned tool declarations from `/opt/agent-core/tools` or another explicit tool root."
  - F8: "The maintainer runs an evaluator proof with `agent --profile /profiles/evaluator/profile.yaml --request /work/suites/suite.yaml --output /work/eval-results --directory /work`."
  - F9: "The proof output records the mounted profile path and does not require `/opt/agent-core/agents/generator` or `/opt/agent-core/agents/evaluator`."

touchpoints:
  - T1: "srd034-external-agent-profiles R1, AC1 -- runtime-owned asset boundary"
  - T2: "srd034-external-agent-profiles R2, AC2 -- profile-owned asset boundary"
  - T3: "srd034-external-agent-profiles R3, AC3 -- mounted profile container contract"
  - T4: "srd034-external-agent-profiles R4, AC4 -- proof commands"
  - T5: "Dockerfile -- final runtime image contents"
  - T6: "mage docker -- release image build wrapper"

success_criteria:
  - id: S1
    criterion: The final runtime image contains the `agent` binary and core-owned tool assets but does not require copied generator or evaluator profile trees.
    traces:
      - srd034-external-agent-profiles AC1
      - srd034-external-agent-profiles AC3
  - id: S2
    criterion: "`agent --profile /profiles/generator/profile.yaml --directory /work` loads profile-local files from the mounted profile checkout."
    traces:
      - srd034-external-agent-profiles AC2
      - srd034-external-agent-profiles AC4
  - id: S3
    criterion: "The evaluator proof mounts profile assets and runtime data separately, writes output under `/work`, and records the mounted evaluator profile path."
    traces:
      - srd034-external-agent-profiles AC3
      - srd034-external-agent-profiles AC4
  - id: S4
    criterion: Proof output fails or reports a missing mount when the requested mounted profile path is absent instead of falling back to baked-in generator or evaluator assets.
    traces:
      - srd034-external-agent-profiles AC3

out_of_scope:
  - Publishing an agent-profiles release artifact.
  - Moving existing profile directories in this documentation issue.
  - Providing build tools for workspace exec words in the base runtime image.
  - Changing REST, monitor, lifecycle, or Knowledge Manager behavior.

config_format: cfg-runtime-contract
