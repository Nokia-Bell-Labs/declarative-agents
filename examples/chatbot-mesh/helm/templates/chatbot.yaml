{{- $fullname := include "chatbot-mesh.fullname" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-chatbot
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: chatbot
spec:
  replicas: {{ .Values.chatbot.replicas }}
  selector:
    matchLabels:
      {{- include "chatbot-mesh.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: chatbot
  template:
    metadata:
      labels:
        {{- include "chatbot-mesh.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: chatbot
      annotations:
        # Roll the chatbot when its co-generated profile ConfigMap changes, so a
        # values-driven RAG add/remove re-renders the profile and rolls the pod
        # (srd015 R3.2). The lifecycle hook below drains active request machines
        # before this pod exits. Repointing a RAG does not touch the ConfigMap,
        # so it does not roll the chatbot (R3.1).
        checksum/profiles: {{ include (print $.Template.BasePath "/profiles-configmap.yaml") . | sha256sum }}
    spec:
      # The chat endpoint allows 130 seconds per request and its declared
      # shutdown allows 135 seconds to drain. Kubernetes must not SIGKILL the
      # old pod before that contract can finish (GH-812).
      terminationGracePeriodSeconds: 150
      {{- if or .Values.validateProfiles .Values.ollama.enabled }}
      initContainers:
        {{- if .Values.validateProfiles }}
        # Fail the rollout before the chatbot serves if the co-generated rest.yaml
        # is invalid (srd015 R2.2). Validate-only: loads and validates the profile,
        # machine, and REST definitions, then exits 0/1 without binding servers.
        - name: validate-config
          image: {{ include "chatbot-mesh.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--profile"
            - "{{ .Values.profiles.mountPath }}/agents/chatbot/profile.yaml"
            - "--validate-config"
          volumeMounts:
            - {name: profiles, mountPath: {{ .Values.profiles.mountPath }}, readOnly: true}
        {{- end }}
        {{- include "chatbot-mesh.llmReadyInit" . | nindent 8 }}
      {{- end }}
      containers:
        - name: chatbot
          image: {{ include "chatbot-mesh.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--profile"
            - "{{ .Values.profiles.mountPath }}/agents/chatbot/profile.yaml"
            - "--directory"
            - "{{ .Values.profiles.workMountPath }}"
            {{- with include "chatbot-mesh.doltDSN" . }}
            - "--dolt-dsn"
            - {{ . | quote }}
            {{- end }}
            {{- with include "chatbot-mesh.otlpEndpoint" . }}
            - "--otel-otlp-endpoint"
            - {{ . | quote }}
            - "--otel-service-name"
            - "chatbot"
            {{- end }}
          env:
            # The staged tool declarations reach the LLM provider through this
            # reference. The chart co-generates the REST client's base_url, but
            # the declarations are mounted verbatim, so their localhost default
            # is correct only where the agent shares a host with Ollama, which a
            # pod never does (srd013 R5.7, GH-728).
            - name: OLLAMA_URL
              value: {{ include "chatbot-mesh.llmURL" . | quote }}
            # The local profile resolves ux/app/dist from the checkout. Packaged
            # assets are mounted under the profiles ConfigMap instead.
            - name: CHATBOT_UI_ROOT
              value: {{ printf "%s/ux/app/dist" .Values.profiles.mountPath | quote }}
            # declare_query_model puts the query embedding model identity into
            # command state for the per-RAG comparison, and it lives in the
            # verbatim-mounted request declarations. Without this its packaged
            # default would be compared against a deployment that embedded with a
            # different model, excluding every source. The co-generated
            # embed_query request body reads the same value (srd002 R3.3, GH-765).
            - name: CHATBOT_EMBEDDING_MODEL
              value: {{ .Values.chatbot.embeddingModel | quote }}
            # The mounted declarations keep local-development defaults, while a
            # chart deployment selects every required LLM from ollama.models.
            # With one chat model both answer words use it; with several, the
            # fast word uses the first and the deep word uses the last.
            - name: CHATBOT_ROUTER_MODEL
              value: {{ .Values.ollama.models.router | quote }}
            - name: CHATBOT_FAST_MODEL
              value: {{ first .Values.ollama.models.chat | quote }}
            - name: CHATBOT_DEEP_MODEL
              value: {{ last .Values.ollama.models.chat | quote }}
          ports:
            - {name: chat, containerPort: {{ .Values.chatbot.ports.chat }}}
            - {name: control, containerPort: {{ .Values.chatbot.ports.control }}}
            - {name: monitor, containerPort: {{ .Values.chatbot.ports.monitor }}}
          lifecycle:
            preStop:
              exec:
                # Ask the host machine to execute its declared shutdown path,
                # then keep the preStop hook alive until the process has closed
                # its control listener. SIGTERM arrives only after this hook.
                command:
                  - /bin/sh
                  - -c
                  - |
                    set -eu
                    base="http://127.0.0.1:{{ .Values.chatbot.ports.control }}/api/lifecycle"
                    wget -qO- --header='Content-Type: application/json' \
                      --post-data='{"reason":"kubernetes rollout","status":"success"}' \
                      "$base/exit" >/dev/null
                    while wget -qO- "$base/health" >/dev/null 2>&1; do
                      sleep 1
                    done
          readinessProbe:
            httpGet: {path: /api/lifecycle/health, port: control}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.chatbot.resources | nindent 12 }}
          volumeMounts:
            - {name: profiles, mountPath: {{ .Values.profiles.mountPath }}, readOnly: true}
            - {name: work, mountPath: {{ .Values.profiles.workMountPath }}}
      volumes:
        {{- include "chatbot-mesh.profilesVolume" . | nindent 8 }}
        - name: work
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-chatbot
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: chatbot
spec:
  selector:
    {{- include "chatbot-mesh.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: chatbot
  ports:
    - {name: chat, port: {{ .Values.chatbot.ports.chat }}, targetPort: chat}
    - {name: control, port: {{ .Values.chatbot.ports.control }}, targetPort: control}
    - {name: monitor, port: {{ .Values.chatbot.ports.monitor }}, targetPort: monitor}
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullname }}-chatbot
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: chatbot
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          {{- if .Values.controlPlane.enabled }}
          # The provisioning panel submits its intent same-origin at /provisioning,
          # so its POST apply avoids the GET-only monitor_proxy and no call crosses
          # origin (srd003 R4.1). Matched before / so the chatbot never sees a
          # provisioning request.
          #
          # The backend is the coordinator, not the executor. Routing browser
          # traffic at the executor's apply Service was GH-502: the executor
          # NetworkPolicy admits only creator-labelled pods, so an ingress
          # controller could never reach it and the shipped route was dead wherever
          # policy is enforced. The intent now enters at the coordinator, which
          # orchestrates the creator, which alone calls the apply surface
          # (srd003 R4.4, srd004 R1.5, srd006 R4.1).
          #
          # Gated on controlPlane rather than executor: without the coordinator
          # there is no legitimate provisioning intake, and rendering a route to a
          # surface the policy blocks is what made the defect invisible.
          - path: /provisioning
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-coordinator
                port: {name: intent}
          {{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-chatbot
                port: {name: chat}
{{- end }}
