id: chatbot-ui
title: Chatbot Agent UI
source_owner: agents/chatbot
routes:
  - id: chat
    path: /chat
    label: Chat
    action: chat_send
    resource: chat
  - id: observability
    path: /observability
    label: Observability
    action: observability_view
    resource: monitor
    planned: true
  - id: provisioning
    path: /provisioning
    label: Provisioning
    action: provisioning_view
    resource: provisioning
    planned: true
sidebar:
  title: Chatbot
  groups:
    chat:
      label: Chat
      order: 0
    observability:
      label: Observability
      order: 1
    provisioning:
      label: Provisioning
      order: 2
actions:
  chat_send:
    ui_action: chat_send
    request_machine_action: chat
    route: chat
    endpoint: /api/v1/chat
    method: POST
  observability_view:
    ui_action: observability_view
    route: observability
    planned: true
  provisioning_view:
    ui_action: provisioning_view
    route: provisioning
    planned: true
presentation:
  history_client_side: true
  source_citations: true
  degraded_indicator: true
