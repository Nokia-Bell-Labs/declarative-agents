name: coordinator
purpose: |-
  The coordinator profile hosts the mesh control plane's workflow orchestrator as a
  persistent service. It launches a machine_request intent server, a control server,
  and a monitor server, then idles in AwaitingControl until a lifecycle exit event is
  enqueued, at which point it exits the agent and stops the servers. Each inbound
  provisioning intent runs a request-scoped machine (request-machine.yaml): it
  delegates a corpus-ingest run per intent to the creator, decides the values patch,
  and delegates the rollout to the creator, aggregating status for the provisioning
  panel. The coordinator decides and sequences; every instance operation is a declared
  client request to the creator (srd004). It holds no deployment-API credentials and
  runs no instances directly.
invariants:
  - REST authority lives in this profile's rest.yaml; no runtime input supplies transport authority.
  - The creator is a declared rest.yaml client; every instance operation is a request to it, never a direct deployment-API call.
  - The coordinator holds no deployment-API credentials; its intent endpoint is served on a separate service and port, reached apart from the chat path (the authentication boundary is deployment-realized).
initial_state: Idle
budget:
  max_iterations: 10000
states:
  - {name: Idle, meaning: Initial state before the coordinator servers start.}
  - {name: LaunchingRequests, meaning: The machine_request intent server is starting.}
  - {name: LaunchingControl, meaning: The control server is starting.}
  - {name: LaunchingMonitor, meaning: The monitor server is starting.}
  - {name: AwaitingControl, meaning: Serving; waiting for a lifecycle exit event.}
  - {name: Exiting, meaning: Routing ExitRequested to exit_agent.}
  - {name: StoppingMonitor, meaning: Stopping the monitor server.}
  - {name: StoppingRequests, meaning: Stopping the intent server.}
  - {name: Failed, meaning: Terminal. A server or boundary word failed.}
  - {name: Done, meaning: Terminal. Clean shutdown after a lifecycle exit.}
terminal_states:
  - Done
  - Failed
signals:
  - {name: Seed, trigger: Agent startup.}
  - {name: ServerLaunched, trigger: A server launched.}
  - {name: ExitRequested, trigger: A lifecycle exit event was enqueued.}
  - {name: AgentExited, trigger: exit_agent completed.}
  - {name: ServerStopped, trigger: A server stopped.}
  - {name: AwaitTimedOut, trigger: No lifecycle event arrived before the await timeout.}
  - {name: CommandError, trigger: A server or boundary word failed.}
transitions:
  - {state: Idle,              signal: Seed,           next: LaunchingRequests, action: launch_coordinator_requests}
  - {state: LaunchingRequests, signal: ServerLaunched, next: LaunchingControl,   action: launch_coordinator_control}
  - {state: LaunchingRequests, signal: CommandError,   next: Failed}
  - {state: LaunchingControl,  signal: ServerLaunched, next: LaunchingMonitor,   action: launch_monitor_rest}
  - {state: LaunchingControl,  signal: CommandError,   next: Failed}
  - {state: LaunchingMonitor,  signal: ServerLaunched, next: AwaitingControl,    action: await_coordinator_control}
  - {state: LaunchingMonitor,  signal: CommandError,   next: Failed}
  - {state: AwaitingControl,   signal: ExitRequested,  next: Exiting,            action: exit_agent}
  - {state: AwaitingControl,   signal: AwaitTimedOut,  next: AwaitingControl,    action: await_coordinator_control}
  - {state: AwaitingControl,   signal: ServerStopped,  next: Failed}
  - {state: AwaitingControl,   signal: CommandError,   next: Failed}
  - {state: Exiting,           signal: AgentExited,    next: StoppingMonitor,    action: stop_monitor_rest}
  - {state: Exiting,           signal: CommandError,   next: Failed}
  - {state: StoppingMonitor,   signal: ServerStopped,  next: StoppingRequests,   action: stop_coordinator_requests}
  - {state: StoppingMonitor,   signal: CommandError,   next: Failed}
  - {state: StoppingRequests,  signal: ServerStopped,  next: Done}
  - {state: StoppingRequests,  signal: CommandError,   next: Failed}
