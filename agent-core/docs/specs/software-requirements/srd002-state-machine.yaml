id: srd002-state-machine
title: State Machine

problem: |
  The agentic loop drives behavior through state transitions. Each
  (State, Signal) pair maps to a next state and an action that builds
  the next Command. Without a formal state machine, transition logic
  scatters across if/else chains. Agent-core provides a static
  transition table and a Step function that centralizes all transition
  logic.

goals:
  - G1: Static transition table mapping (State, Signal) pairs to (NextState, ActionFunc).
  - G2: Step function performing a single lookup and returning the next state and command.
  - G3: Domain-supplied terminal state predicate.

requirements:
  R1:
    title: Transition types
    items:
      - R1.1: ActionFunc is func(Result) Command. It builds the next Command from the previous Result.
      - R1.2: TransitionInput holds State and Signal as the lookup key.
      - R1.3: TransitionValue holds NextState (State) and Action (ActionFunc). Action is nil for terminal transitions.
      - R1.4: TransitionTable is map[TransitionInput]TransitionValue.

  R2:
    title: TerminalFunc
    items:
      - R2.1: TerminalFunc is func(State) bool, supplied by the domain layer.
      - R2.2: The state machine does not define which states are terminal. That is the domain's responsibility.

  R3:
    title: StateMachine struct
    items:
      - R3.1: StateMachine holds a TransitionTable and a TerminalFunc. Both are captured at construction time.
      - R3.2: NewStateMachine(table TransitionTable, isTerminal TerminalFunc) creates a StateMachine.
      - R3.3: Step(current State, sig Signal, res Result) returns (State, Command, error). Missing entries return State("Failed") and an error.
      - R3.4: When Action is nil (terminal transition), Step returns nil Command and no error.
      - R3.5: IsTerminal(State) delegates to the domain-supplied TerminalFunc.

non_goals:
  - Dynamic table modification during a run.
  - Persistence of state machine state between runs.
  - Cycle detection or deadlock analysis.

acceptance_criteria:
  - id: AC1
    criterion: ActionFunc, TransitionInput, TransitionValue, and TransitionTable are exported types.
    traces: [R1.1, R1.2, R1.3, R1.4]

  - id: AC2
    criterion: TerminalFunc is func(State) bool, supplied by the domain.
    traces: [R2.1, R2.2]

  - id: AC3
    criterion: StateMachine.Step performs lookup, calls ActionFunc, returns next state and Command. Missing entries return Failed state and error. Terminal transitions return nil Command.
    traces: [R3.1, R3.2, R3.3, R3.4]

  - id: AC4
    criterion: StateMachine.IsTerminal delegates to TerminalFunc.
    traces: [R3.5]

depends_on:
  - srd_id: srd001-core-types
    symbols_used: [State, Signal, Result, Command]
