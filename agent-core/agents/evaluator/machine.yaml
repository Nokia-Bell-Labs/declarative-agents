# Session-level state machine for the evaluator.
# Drives grid iteration over (harness, model, sample, rep) points.
# Each point runs the per-point pipeline via a nested core.Loop
# using agents/evaluator/point.yaml.

name: evaluator-session
initial_state: Idle

budget:
  max_iterations: 10000

states:
  - Idle
  - ParsingSuiteConfig
  - DiscoveringSuiteSamples
  - ExpandingEvalGrid
  - InitializingEvalSession
  - ReportingSuiteSummary
  - AdvancingPoint
  - RunningPoint
  - Reporting
  - Done
  - Failed

terminal_states:
  - Done
  - Failed

signals:
  - Seed
  - CommandError
  - SuiteConfigParsed
  - SuiteSamplesDiscovered
  - EvalGridExpanded
  - EvalSessionInitialized
  - SuiteLoaded
  - PointReady
  - PointDone
  - AllPointsDone
  - SessionReported

transitions:
  - state: Idle
    signal: Seed
    next: ParsingSuiteConfig
    action: parse_suite_config

  - state: ParsingSuiteConfig
    signal: SuiteConfigParsed
    next: DiscoveringSuiteSamples
    action: discover_suite_samples

  - state: DiscoveringSuiteSamples
    signal: SuiteSamplesDiscovered
    next: ExpandingEvalGrid
    action: expand_eval_grid

  - state: ExpandingEvalGrid
    signal: EvalGridExpanded
    next: InitializingEvalSession
    action: init_eval_session

  - state: InitializingEvalSession
    signal: EvalSessionInitialized
    next: ReportingSuiteSummary
    action: report_suite_summary

  - state: ReportingSuiteSummary
    signal: SuiteLoaded
    next: AdvancingPoint
    action: next_point

  - state: AdvancingPoint
    signal: PointReady
    next: RunningPoint
    action: run_point

  - state: RunningPoint
    signal: PointDone
    next: AdvancingPoint
    action: next_point

  - state: AdvancingPoint
    signal: AllPointsDone
    next: Reporting
    action: report_session

  - state: Reporting
    signal: SessionReported
    next: Done

  # --- error handling ---
  - state: ParsingSuiteConfig
    signal: CommandError
    next: Failed

  - state: DiscoveringSuiteSamples
    signal: CommandError
    next: Failed

  - state: ExpandingEvalGrid
    signal: CommandError
    next: Failed

  - state: InitializingEvalSession
    signal: CommandError
    next: Failed

  - state: ReportingSuiteSummary
    signal: CommandError
    next: Failed

  - state: AdvancingPoint
    signal: CommandError
    next: Failed

  - state: RunningPoint
    signal: CommandError
    next: Failed

  - state: Reporting
    signal: CommandError
    next: Failed
