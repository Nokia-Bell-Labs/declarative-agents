  - version: "07.1"
    name: Per-family SRDs and profile coverage
    description: |
      Release 07.1 gives each profile family its own requirements contract and
      validates the completed 07.0 tracer bullets without renumbering existing
      use cases. The requirements layer moves from one shared SRD holding ten
      blocks to one SRD per family, with srd001 keeping only the cross-cutting
      ownership boundary and dependency-direction invariants.

      The release also adds per-family boundary use cases and a test suite for
      the jurist, lifecycle, and rest families, which were previously validated
      only by the generic rel06.0 mounted-profile and profile-validation use
      cases. Each new use case names the actor boundary, inputs, outputs, and
      terminal outcomes for its family and traces to the family SRD.
    status: in-progress
    planned_work:
      - id: gh-193
        summary: Split srd001-agent-functional-blocks into per-family SRDs (srd002-generator through srd011-knowledge-manager) and retarget existing traces.
        status: done
      - id: gh-194
        summary: Add per-family boundary use cases and a test suite for the jurist, lifecycle, and rest profiles.
        status: done
      - id: gh-195
        summary: Add an executable per-family OpenTelemetry conformance suite (mage conformance) covering all ten profile families against srd002-srd011.
        status: done
      - id: gh-229
        summary: Exercise the shipped profile.yaml wrappers and their variants behaviorally in conformance instead of synthesized reconstructions — copy-and-patch only harness-controlled fields (addresses, ports, corpus dirs, iteration budget) — and record per-family and per-variant coverage (shipped-behavioral vs load-and-wiring) with reasons.
        status: done
    deliverables:
      - docs/specs/software-requirements/srd002-generator.yaml through
        srd011-knowledge-manager.yaml define per-family functional blocks.
      - docs/specs/software-requirements/srd001-agent-functional-blocks.yaml
        keeps the profile ownership boundary and cross-profile
        dependency-direction invariants.
      - docs/specs/use-cases/rel07.1-uc001-jurist-profile-boundary.yaml,
        rel07.1-uc002-lifecycle-profile-boundary.yaml, and
        rel07.1-uc003-rest-profile-boundary.yaml add per-family boundary use
        cases for the previously uncovered families.
      - docs/specs/test-suites/test-rel07.1-profile-boundaries.yaml validates the
        three boundary use cases against the family SRD acceptance criteria.
      -       docs/specs/test-suites/test-rel07.1-profile-conformance.yaml records the
        executable per-family conformance suite that runs each family through the
        agent-core CLI and asserts on captured OpenTelemetry traces. Every case
        runs the shipped profile.yaml wrapper (or a named shipped variant),
        copying it only to patch harness-controlled fields; the generator and
        rest families additionally run their shipped variants and carry an
        ungated load-and-wiring companion. Coverage is annotated per family and
        per variant (shipped-behavioral vs load-and-wiring).
    use_cases:
      - id: rel07.1-uc001-jurist-profile-boundary
        summary: Jurist deterministic, LLM-free charter validation boundary.
        status: specified
      - id: rel07.1-uc002-lifecycle-profile-boundary
        summary: Lifecycle history, rollback, and approval machine-action boundary.
        status: specified
      - id: rel07.1-uc003-rest-profile-boundary
        summary: REST client and server boundary words and the ollama-* variant.
        status: specified
    test_suites:
      - id: test-rel07.1-profile-boundaries
        summary: Boundary use-case validation for the jurist, lifecycle, and rest families.
        status: specified
      - id: test-rel07.1-profile-conformance
        summary: Executable per-family OpenTelemetry conformance for all ten families, all implemented shipped-behavioral (runs the shipped profile.yaml/variant, copy-and-patch only harness-controlled fields). Generator (with qwen27b/qwen35b variants), the planner behavioral run, and the rest ollama-profile variant are Ollama-gated; lifecycle suspend/resume and history/rollback are Dolt-gated; rest proves its inbound webhook server boundary over the shipped REST config (client head proven at the agent-core package level). Generator, planner, and rest carry ungated load-and-wiring companions.
        status: implemented
    proof:
      - mage validate
      - AGENT_CORE_ROOT=/path/to/agent-core mage conformance
    deferred:
      - Profile-owned Mage integration targets that execute the jurist,
        lifecycle, and rest boundary fixtures, mirroring
        magefiles/integration_*.go for the covered families, and that trace to
        rel07.1-uc001/uc002/uc003 S1-S3. These are distinct from the delivered
        mage conformance suite, which asserts SRD acceptance criteria per family
        (srd005-jurist, srd009-lifecycle, srd007-rest) plus the role taxonomy, so
        the conformance cases are executable evidence at the SRD layer but do not
        by themselves satisfy the boundary use cases. The gap is concrete
        for rest, whose client read/create/await head is not run in a profile
        machine (conformance proves only the inbound webhook server boundary; the
        client async await_operation polling is proven at the agent-core package
        level), and the lifecycle conformance evidence is Dolt-gated. Until the
        boundary integration targets that trace uc001/uc002/uc003 S1-S3 land, the
        three use cases and their test-rel07.1-profile-boundaries cases stay
        status specified rather than implemented; promoting them on conformance
        evidence alone would overstate rest and hide the Dolt gate.
      - Running the full rest client create/await head inside a profile machine
        (rel07.1-uc003), which needs inter-tool input shaping so REST client
        steps satisfy the declared-only runtime input contract. The rest
        conformance case proves the inbound webhook server boundary to Succeeded;
        the client async await_operation polling (#205) is delivered in agent-core
        and proven at the package level. Planner conformance (#211) is delivered —
        agent-core gained a load_graph pipeline word that seeds the requirement
        graph before extraction. Lifecycle history/rollback conformance (#209) is
        delivered — agent-core routes the --request checkpoint id and to_iteration
        into a target-pinned checkpoint backend and the tool configs.

  - version: "08.0"
    name: Chroma corpus agents
    description: |
      Two profile-owned agents use a local Chroma vector database as a retrieval
      boundary: an ingest profile that loads a repository corpus into a Chroma
      collection, and a reader profile that answers a question grounded in the
      retrieved chunks. Both are pure agent-profiles configuration over existing
      agent-core words -- REST client words, list_resource, read_resource, and
      invoke_llm. The ingest is a model-driven loop: the model lists the corpus
      and selects each file, and the machine sequences the deterministic embed
      and add steps after each read (#251).

      Chroma does not embed text server-side over its raw HTTP API (spike #239),
      so the agents compute embeddings at a local Ollama provider (an
      /api/embeddings REST word) and thread the resulting vector into the Chroma
      add and query bodies. Provider embedding, not server-side embedding, is the
      design. The
      threading uses the agent-core previous-Result parameter capability
      delivered by #245 (srd028-rest-client-tools R12): body_source
      previous_result selects the vector through input_mapping, carry_forward
      echoes the source text and id, and a single-token array element reshapes
      the flat vector into the nested array Chroma expects. No embedding vector is
      authored by a model.
    status: done
    planned_work:
      - id: gh-230
        summary: Chroma corpus agents epic -- srd012, release 08.0 docs, profiles, and integration test.
        status: done
      - id: gh-240
        summary: Add srd012-chroma-corpus-agents SRD.
        status: done
      - id: gh-241
        summary: Add release 08.0 roadmap, use cases, test suite, and SPECIFICATIONS entries.
        status: done
      - id: gh-242
        summary: Add the profile-owned Chroma and Ollama REST assets and the ingest profile.
        status: done
      - id: gh-243
        summary: Add the Chroma reader profile.
        status: done
      - id: gh-244
        summary: Add the mage integration:chroma target and tracer test.
        status: done
      - id: gh-250
        summary: Fix the runtime and reader defects found by running the agents end-to-end.
        status: done
      - id: gh-251
        summary: Redesign the ingest as a model-driven loop that actually loads the corpus.
        status: done
    use_cases:
      - id: rel08.0-uc001-corpus-ingest
        summary: Ingest profile lists and reads a corpus under model control, embeds at Ollama, and threads vectors into Chroma add.
        status: implemented
      - id: rel08.0-uc002-corpus-query
        summary: Reader profile embeds a question, threads the vector into Chroma query, and answers grounded in retrieved chunks.
        status: implemented
    test_suites:
      - id: test-rel08.0-chroma-corpus
        summary: Profile-owned tracer for Chroma ingest and query with provider embedding threaded into Chroma.
        status: implemented
    proof:
      - mage validate
      - AGENT_CORE_ROOT=/path/to/agent-core mage integration:chroma (requires a running Chroma server and a reachable Ollama with the configured models)
    success_markers:
      - The ingest and reader profiles are pure agent-profiles configuration over existing agent-core words.
      - Every Chroma add and query carries an agent-supplied embedding vector threaded from the Ollama embed word, never a model-authored or server-side vector.
      - The reader answer is grounded in chunks retrieved through embed_query -> chroma_query -> invoke_llm.
      - The Chroma and Ollama servers are external preconditions surfaced through chroma_ready and ollama_ready, not started by the agent.

  # Renumber decision (GH-332): the original single "09.0 Chatbot mesh" release
  # carried three use cases across five epics (#292-#296), and the observability
  # epic (#295) had no use case. Release 09 is broken into one release per epic so
  # implementation traces one-to-one, and the too-broad rel09.0-uc002-chatbot-turn
  # is split -- its single-RAG reduction stays in 09.0 (the core-loop epic #293),
  # and its router/fan-out/degradation criteria move to 09.1 (the routing epic
  # #294). The rel09.0 use cases were status planned when this decision was made;
  # the use-case and test-suite files are renamed to their staged ids by the
  # follow-on spec issue GH-333, which also authors the observability (09.2),
  # control-plane (09.4), and alignment (10.0) tracers. Each release below maps
  # epics to use cases to a test suite one-to-one-to-one.

  - version: "09.0"
    name: RAG server and single-RAG chatbot turn
    description: |
      Release 09.0 is the core loop of the chatbot mesh: a persistent RAG server
      agent (srd013, vector-in) that answers a query_embeddings request with
      chunks and embedding-model metadata, and a browser-facing chatbot agent
      (srd014) whose request-scoped turn embeds the message once, queries a single
      RAG, composes a grounded prompt through command-state $from(), and answers,
      degrading to a mapped 200 when the RAG fails. Epics #292 (RAG server) and
      #293 (chatbot core loop).
    status: implemented
    srds:
      - srd013-rag-server-agent
      - srd014-chatbot-agent
    use_cases:
      - id: rel09.0-uc001-rag-server-query
        summary: Persistent RAG server answers a vector-in query_embeddings request and returns chunks with embedding-model metadata.
        status: implemented
      - id: rel09.0-uc002-chatbot-turn
        summary: Single-RAG chat turn embeds once, queries one RAG, composes via $from(), answers, and degrades to a 200 when the RAG fails.
        status: implemented
    test_suites:
      - id: test-rel09.0-chatbot-mesh
        summary: Profile-owned tracers for the RAG server query and the single-RAG chatbot turn with a degraded RAG.
        status: implemented

  - version: "09.1"
    name: Routing and multi-RAG fan-out
    description: |
      Release 09.1 extends the chatbot turn (srd014 R2, R3) with the LLM $tool
      router that classifies a question to one chat-LLM word, and the sequential
      multi-RAG fan-out that embeds once and queries N RAGs, each degraded
      (CommandError) or embedding-mismatch-excluded (QueryRejected) source routing
      on as a visible machine transition, compose assembling the surviving
      per-source chunks. Epic #294.
    status: implemented
    srds:
      - srd014-chatbot-agent
    use_cases:
      - id: rel09.1-uc001-routed-fanout
        summary: A routed chat turn dispatches one chat-LLM word via $tool and fans the one embedding out to two RAGs, citing both corpora and degrading when one fails.
        status: implemented
    test_suites:
      - id: test-rel09.1-routing-fanout
        summary: Tracers for the $tool router word dispatch, the two-RAG fan-out over disjoint corpora, and the degraded and embedding-mismatch paths.
        status: implemented

  - version: "09.2"
    name: Observability
    description: |
      Release 09.2 is the observability surface (srd014 R5.1, R5.3): a per-agent
      monitor panel fed by each agent's monitor read_state and SSE stream through
      the chatbot's same-origin monitor_proxy, and a cross-agent trace waterfall
      that renders a turn's connected trace from the Jaeger query API, real
      because the request-scoped machine exports its spans and propagates
      traceparent to the RAG servers. Epic #295.
    status: implemented
    srds:
      - srd014-chatbot-agent
    use_cases:
      - id: rel09.2-uc001-observability
        summary: The observability panel shows each agent's run state and event stream and renders a selected turn's connected cross-agent trace as a span waterfall.
        status: implemented
    test_suites:
      - id: test-rel09.2-observability
        summary: Tracers for the per-agent monitor panels over monitor_proxy and the cross-agent trace waterfall from the trace backend.
        status: implemented

  - version: "09.3"
    name: Mesh deployment and tiered swap
    description: |
      Release 09.3 deploys the mesh as one Helm chart (srd015) with values-driven
      RAG pairs, co-generated chatbot client config and N-RAG fan-out from one
      source, a tiered hot swap (repoint is a Service change; add-RAG re-renders
      and rolls the chatbot with a Dolt checkpoint resume), OTLP observability,
      and a provisioning deployment API. Epic #296.
    status: implemented
    srds:
      - srd015-chatbot-deployment
    use_cases:
      - id: rel09.3-uc001-mesh-deployment
        summary: One Helm chart deploys the mesh on a kind cluster with values-to-config co-generation, a Service repoint, and an add-RAG rollout with checkpoint resume, provisioned through a separately-authenticated deployment API.
        status: implemented
    test_suites:
      - id: test-rel09.3-mesh-deployment
        summary: Tracers for the kind deploy smoke, the co-generation drift lock, the repoint and add-RAG swaps, and the provisioning deployment API.
        status: implemented

  - version: "09.4"
    name: Control plane
    description: |
      Release 09.4 adds the mesh control plane: a Coordinator agent (srd016) that
      sequences directory ingestion and reconfiguration and to which the UX agent
      delegates provisioning intents, and a Creator agent (srd017) for agent
      lifecycle management (template selection, instance creation, checkpoint-resume
      restarts, health monitoring) acting on the coordinator's requests. The
      provisioning and deployment swap surfaces of #296 land behind these roles.
      Authored by GH-329.
    status: planned
    srds:
      - srd016-coordinator
      - srd017-creator
    use_cases:
      - id: rel09.4-uc001-control-plane-provisioning
        summary: The coordinator sequences a reconfiguration the UX agent delegates, and the creator materializes and health-monitors the agent instances, resuming from checkpoints on restart.
        status: planned
    test_suites:
      - id: test-rel09.4-control-plane
        summary: Tracers for the coordinator's reconfiguration sequencing and the creator's instance lifecycle and checkpoint-resume restart.
        status: planned

  - version: "10.0"
    name: Reference-architecture role alignment
    description: |
      Release 10.0 aligns the agents/ role catalog with the autogenic-systems
      reference architecture (roles per ITU-T Y.3502 / TM Forum IG1251): the
      evaluator family is renamed to critic and the generator family to executor
      (the reference role names they implement), the chroma family moves under
      knowledge-manager as corpus-ingest and corpus-reader (a role, not a vendor
      database), and the rest, control, and lifecycle profile directories -- which
      are conformance grammar fixtures rather than roles -- move to
      testdata/conformance beside testdata/integration. After this release agents/
      reads as a role catalog. Epic #323 (issues #325-#328, #330).
    status: planned
    proof_commands:
      - "mage validate  # profile wiring holds over the renamed tree"
      - "mage conformance  # conformance fixtures pass under testdata/conformance"
      - "go test ./...  # agent-core critic-session/critic-point builtin tool dirs"
      - "grep -r 'agents/evaluator\\|agents/generator\\|agents/chroma\\|agents/rest/\\|agents/control/\\|agents/lifecycle/' -- returns no stale path outside retained historical release records"
    srds:
      - srd013-rag-server-agent
      - srd014-chatbot-agent
    use_cases:
      - id: rel10.0-uc001-role-catalog-alignment
        summary: The agents/ tree is renamed and moved to match the reference role catalog (evaluator->critic, generator->executor, chroma->corpus-ingest/corpus-reader, conformance fixtures->testdata/conformance) with profile wiring and conformance intact.
        status: planned
    test_suites:
      - id: test-rel10.0-role-alignment
        summary: Tracers that mage validate and mage conformance pass over the renamed tree and that no stale agents/ path reference survives.
        status: planned
