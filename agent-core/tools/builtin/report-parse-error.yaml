tools:
- name: report_parse_error
  type: builtin
  init: report_parse_error
  visibility: internal
  emits:
  - ToolDone
  - BudgetExhausted
  description: Report a parse error back to the LLM for correction.
  category: word
  side_effects:
  - kind: command_state
    description: Increments the parse retry counter and emits BudgetExhausted when the configured retry limit is reached.
  reversibility:
    classification: reversible
    undo: parse_retry_counter_restore
  undo:
    strategy: parse_retry_counter_restore
    description: Restores the parse retry counter snapshot captured before reporting the parse error.
  problem: The machine needs a declared word for feeding parse failure context back to the model conversation without embedding that workflow step in Go control flow.
  goals:
  - Perform the report_parse_error action as one machine-selected word.
  - Return an explicit signal that lets the MachineSpec choose the next state.
  - Keep sequencing outside the tool implementation and in machine.yaml.
  requirements:
    input:
    - must consume parameters from tool input, prior Result, or configured command/domain state
    output:
    - must emit one declared signal and return machine-readable output when available
    errors:
    - must emit CommandError for infrastructure failures and preserve domain failures as declared signals
  non_goals:
  - Does not choose the next workflow step; machine.yaml owns sequencing.
  - Does not hide unrelated tool execution behind this word.
  errors:
  - signal: CommandError
    condition: required input, configuration, or runtime state is invalid
    message_shape: 'report_parse_error: <error>'
    state_after_failure: no additional workflow step is executed by this tool
  relationships:
    before:
    - machine-selected predecessor
    after:
    - machine-selected successor
  output:
    description: report_parse_error command result summary.
    schema:
      type: object
      properties:
        message:
          type: string
        signal:
          type: string
      required:
      - message
