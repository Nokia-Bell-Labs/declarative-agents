# Tool definitions for the apply state machine.
# Used with: agent --machine configs/apply/machine.yaml --tools configs/apply/tools.yaml

tools:
  # --- apply-specific tools (builtin) ---
  - name: load_apply_tasks
    type: builtin
    init: load_apply_tasks
    visibility: internal
    description: "Load tasks from a YAML file specified via --prompt-string."

  - name: create_worktree
    type: builtin
    init: create_worktree
    visibility: internal
    description: "Create a git worktree for materialization."

  - name: next_apply_task
    type: builtin
    init: next_apply_task
    visibility: internal
    description: "Advance to the next task. Emits TaskExtracted or AllDone."

  - name: assemble_apply_prompt
    type: builtin
    init: assemble_apply_prompt
    visibility: internal
    description: "Build the planning prompt for the current task with SRD context."

  - name: parse_apply_plan
    type: builtin
    init: parse_apply_plan
    visibility: internal
    description: "Parse the LLM response as an implementation plan YAML."

  - name: materialize_issue
    type: builtin
    init: materialize_issue
    visibility: internal
    description: "Materialize the parsed plan as a bd issue in the worktree."

  # --- shared LLM tools (builtin, internal) ---
  - name: invoke_llm
    type: builtin
    init: invoke_llm
    visibility: internal
    description: "Invoke the LLM with the current conversation history."

  - name: reset_history
    type: builtin
    init: reset_history
    visibility: internal
    description: "Clear the conversation history and restart the LLM context."
