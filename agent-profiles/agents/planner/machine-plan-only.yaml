name: planner-plan-only
purpose: |-
  The planner is a pipeline agent that decomposes a requirement graph
  into tasks, generates implementation plans via LLM, materializes
  them as issues, executes them by invoking the generator agent, and
  validates the results. It loops over the requirement graph until
  all tasks are done, all are blocked, or a batch limit is reached.

  Variant: plan-only materializes issues but does not execute generator tasks.
configuration:
  machine: agents/planner/machine.yaml
  tools: agents/planner/tools.yaml
  llm_configs: agents/planner/llm/*.yaml
  tool_declarations:
  - tools/builtin.yaml
  - tools/exec.yaml
  variants:
  - agents/planner/machine-passthrough.yaml
  - agents/planner/machine-plan-only.yaml
invariants:
- Conversation history is reset between tasks
- Each task gets a fresh prompt with SRD context
- Failed tasks can be retried before moving on
- Graph nodes are marked done/failed to track progress
- The planner terminates when no more tasks are extractable
lifecycle: |-
  1. Idle → Extracting: extract_task from requirement graph
  2. Extracting → Resetting: task extracted, clear LLM history
  3. Resetting → PromptAssembly: assemble_prompt with SRD context
  4. PromptAssembly → PlanInvoking: invoke_llm for plan generation
  5. PlanInvoking → PlanParsing: parse_plan from LLM response
  6. PlanParsing → Materializing: create_issue (bd create)
  7. Materializing → Executing: execute_task (run generator agent)
  8. Executing → Vetting → Building → Testing: validation pipeline
  9. Testing → CheckingResult: evaluate pass/fail
  10. CheckingResult → Extracting: success or retries exhausted, next task
  10a. CheckingResult → Resetting: retry available, re-plan

  The outer loop (Extracting → ... → CheckingResult → Extracting)
  repeats until the graph is fully resolved.
pipeline_diagram: |-
  ```mermaid
  flowchart TD
    A[Idle] -->|Seed| B[Extracting]
    B -->|TaskExtracted| C[Resetting]
    C --> D[PromptAssembly]
    D --> E[PlanInvoking]
    E --> F[PlanParsing]
    F --> G[Materializing]
    G --> H[Executing]
    H --> I[Vet / Build / Test]
    I --> J[CheckingResult]
    J -->|Success| B
    J -->|Retry| C
    B -->|AllDone| K[Completed]
    B -->|AllBlocked| L[Stalled]
    B -->|BatchLimit| M[Paused]
  ```
initial_state: Idle
budget:
  max_consecutive_parse_errors: 5
states:
- name: Idle
  meaning: Initial state before planning begins.
- name: Loading
  meaning: Loading the specification corpus and building the requirement graph.
- name: Extracting
  meaning: |
    Selecting the next ready task from the requirement graph.
    May terminate if all tasks are done, blocked, or batch limit reached.
- name: Resetting
  meaning: Clearing conversation history before a new task's LLM call.
- name: PromptAssembly
  meaning: Building the task context and SRD references into a prompt.
- name: PlanInvoking
  meaning: Calling the LLM to generate an implementation plan.
- name: PlanParsing
  meaning: Parsing the LLM response as a YAML implementation plan.
- name: Materializing
  meaning: Creating an issue (bd create) from the parsed plan.
- name: Completed
  meaning: Terminal. All tasks in the graph are done.
- name: Stalled
  meaning: Terminal. Remaining tasks are blocked by failed dependencies.
- name: Paused
  meaning: Terminal. Batch limit reached — resume later.
- name: Failed
  meaning: Terminal. An unrecoverable error occurred.
terminal_states:
- Completed
- Stalled
- Paused
- Failed
signals:
- name: Seed
  trigger: Loop initialization.
- name: GraphLoaded
  trigger: The requirement graph was loaded and seeded into pipeline state.
- name: TaskExtracted
  trigger: A task was extracted from the requirement graph.
- name: AllDone
  trigger: All tasks in the graph are done.
- name: Blocked
  trigger: Remaining tasks are blocked by failed dependencies.
- name: BatchLimitReached
  trigger: Batch limit reached — resume later.
- name: ToolDone
  trigger: A tool executed successfully.
- name: LLMResponded
  trigger: The LLM returned a response.
- name: PlanReady
  trigger: The LLM response was parsed as a valid implementation plan.
- name: ParseFailed
  trigger: The LLM response could not be parsed as a valid plan.
- name: Materialized
  trigger: An issue was created from the plan.
- name: MaterializeFailed
  trigger: Issue creation failed.
- name: CommandError
  trigger: Infrastructure-level error.
transitions:
- state: Idle
  signal: Seed
  next: Loading
  action: load_graph
- state: Loading
  signal: GraphLoaded
  next: Extracting
  action: extract_task
- state: Loading
  signal: CommandError
  next: Failed
- state: Extracting
  signal: TaskExtracted
  next: Resetting
  action: reset_history
- state: Extracting
  signal: AllDone
  next: Completed
- state: Extracting
  signal: Blocked
  next: Stalled
- state: Extracting
  signal: BatchLimitReached
  next: Paused
- state: Extracting
  signal: CommandError
  next: Failed
- state: Resetting
  signal: ToolDone
  next: PromptAssembly
  action: assemble_prompt
- state: Resetting
  signal: CommandError
  next: Failed
- state: PromptAssembly
  signal: ToolDone
  next: PlanInvoking
  action: invoke_llm
- state: PromptAssembly
  signal: CommandError
  next: Failed
- state: PlanInvoking
  signal: LLMResponded
  next: PlanParsing
  action: parse_plan
- state: PlanInvoking
  signal: CommandError
  next: Failed
- state: PlanParsing
  signal: PlanReady
  next: Materializing
  action: create_issue
- state: PlanParsing
  signal: ParseFailed
  next: Extracting
  action: extract_task
- state: PlanParsing
  signal: CommandError
  next: Failed
- state: Materializing
  signal: Materialized
  next: Extracting
  action: extract_task
- state: Materializing
  signal: MaterializeFailed
  next: Failed
- state: Materializing
  signal: CommandError
  next: Failed
