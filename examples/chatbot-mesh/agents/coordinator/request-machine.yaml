name: coordinator-provisioning-request
purpose: |-
  One request-scoped run of a provisioning intent. The machine_request intent
  endpoint seeds this machine with the intent body: the full desired mesh state as
  a values-plane document (values), and the RAG name, target collection, embedding
  model, and directory to add as a knowledge source. The coordinator delegates a
  corpus-ingest run for the directory to the creator (request_ingest); when the
  creator reports the ingest met the requested source, the coordinator forwards the
  desired values document to the creator (request_rollout), threading it from the
  carried intent. The terminal Reconfigured signal maps the aggregated status to the
  HTTP response. Every instance operation is a request to the creator; the
  coordinator orchestrates but holds no deployment-API authority.

  An operator apply from the provisioning panel changes values without adding a
  source, so it has no directory to ingest and enters on SeedValues, skipping the
  ingest leg. Which leg a run took is readable from the machine rather than hidden
  in a word, because the endpoint chooses the seed (srd004 R1.6; GH-680).

  The two legs reach the rollout through different words because the desired
  document reaches them differently: request_rollout reads it from the intent
  creator_ingest carried forward, while request_rollout_values reads it off the
  seed. The values leg drove request_rollout until GH-755, so its selector found
  no carried intent and every panel apply failed in request rendering.
initial_state: AwaitingRequest
budget:
  max_iterations: 8
states:
  - {name: AwaitingRequest, meaning: Seeded by the trusted intent endpoint with the provisioning intent body.}
  - {name: Ingesting, meaning: The creator is running the corpus-ingest for the requested directory and verifying the collection count.}
  - {name: Reconfiguring, meaning: The coordinator forwarded the desired values document and the creator is executing the request-draining rollout.}
  - {name: Reconfigured, meaning: Terminal. The rollout completed and the aggregated status is ready for the HTTP response.}
  - {name: Rejected, meaning: Terminal. The creator reported the ingest did not meet the requested source.}
  - {name: Failed, meaning: Terminal. A creator boundary word failed.}
terminal_states:
  - Reconfigured
  - Rejected
  - Failed
signals:
  - {name: Seed, trigger: The intent endpoint starts a request-scoped run that adds a knowledge source.}
  - {name: SeedValues, trigger: The apply endpoint starts a request-scoped run that only changes values.}
  - {name: IngestReported, trigger: The creator reported the ingest met the requested source and returned the collection count.}
  - {name: Rejected, trigger: The creator reported the ingest did not meet the requested source.}
  - {name: Reconfigured, trigger: The creator reported the rollout completed and returned the health.}
  - {name: CommandError, trigger: A creator boundary word failed.}
transitions:
  - {state: AwaitingRequest, signal: Seed,           next: Ingesting,     action: request_ingest}
  - {state: AwaitingRequest, signal: SeedValues,     next: Reconfiguring, action: request_rollout_values}
  - {state: AwaitingRequest, signal: CommandError,   next: Failed}
  - {state: Ingesting,       signal: IngestReported, next: Reconfiguring, action: request_rollout}
  - {state: Ingesting,       signal: Rejected,       next: Rejected}
  - {state: Ingesting,       signal: CommandError,   next: Failed}
  - {state: Reconfiguring,   signal: Reconfigured,   next: Reconfigured}
  - {state: Reconfiguring,   signal: CommandError,   next: Failed}
