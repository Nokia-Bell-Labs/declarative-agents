name: lifecycle-approval
purpose: |-
  Reference approval-gate lifecycle machine.
  The first run suspends before a risky action. A later run resumes the saved
  checkpoint with an Approved or Rejected signal.
configuration:
  machine: testdata/conformance/lifecycle/approval/machine.yaml
  tools: testdata/conformance/lifecycle/approval/tools.yaml
invariants:
- Suspend is a machine action, not a hidden CLI branch.
- Approved resume continues through an explicit machine signal.
- Rejected resume stops without running the approved path.
lifecycle: |-
  1. Idle -> AwaitingApproval (Seed): run suspend.
  2. AwaitingApproval -> ApplyingApproval (Approved): run done.
  3. ApplyingApproval -> Succeeded (TaskCompleted): approved path completed.
  4. AwaitingApproval -> Rejected (Rejected): approval was denied.
initial_state: Idle
budget:
  max_iterations: 5
states:
- name: Idle
  meaning: Initial state before the approval gate.
- name: AwaitingApproval
  meaning: The first run suspended and waits for an operator signal.
- name: ApplyingApproval
  meaning: The approved path is running after resume.
- name: Succeeded
  meaning: Terminal. The approved path completed.
- name: Rejected
  meaning: Terminal. The operator rejected the risky action.
- name: Failed
  meaning: Terminal. Suspend or resume failed.
terminal_states:
- Succeeded
- Rejected
- Failed
signals:
- name: Seed
  trigger: Loop initialization.
- name: AwaitApproval
  trigger: suspend requested an approval checkpoint.
- name: Approved
  trigger: Operator approved the suspended action during resume.
- name: Rejected
  trigger: Operator rejected the suspended action during resume.
- name: TaskCompleted
  trigger: done completed the approved path.
- name: CommandError
  trigger: Runtime or command infrastructure failed.
transitions:
- state: Idle
  signal: Seed
  next: AwaitingApproval
  action: suspend
- state: AwaitingApproval
  signal: AwaitApproval
  next: AwaitingApproval
- state: AwaitingApproval
  signal: Approved
  next: ApplyingApproval
  action: done
- state: AwaitingApproval
  signal: Rejected
  next: Rejected
- state: AwaitingApproval
  signal: CommandError
  next: Failed
- state: ApplyingApproval
  signal: TaskCompleted
  next: Succeeded
