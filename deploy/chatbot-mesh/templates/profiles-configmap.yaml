{{- $fullname := include "chatbot-mesh.fullname" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullname }}-profiles
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: profiles
data:
  {{- range $path, $_ := .Files.Glob "profiles/**" }}
  {{- $key := $path | trimPrefix "profiles/" | replace "/" "__" }}
  {{- if and (ne $key "agents__chatbot__rest.yaml") (ne $key "agents__chatbot__ui__ux.yaml") }}
  {{ $key }}: |-
    {{- $.Files.Get $path | nindent 4 }}
  {{- end }}
  {{- end }}
  # Co-generated from .Values.ragUnits (srd015 R2), overriding the packaged keys so
  # the chatbot client config derives from the same list as the RAG topology and
  # cannot drift. Emitted unconditionally so `helm template` renders them without a
  # packaging step.
  agents__chatbot__rest.yaml: |-
    {{- include "chatbot-mesh.chatbotRest" . | nindent 4 }}
  agents__chatbot__ui__ux.yaml: |-
    {{- include "chatbot-mesh.chatbotUX" . | nindent 4 }}
