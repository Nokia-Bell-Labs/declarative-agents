package_specification_coverage: |
  `go list ./...` defines the current Go package set. Coverage is layered
  by design. Engine, telemetry, model, prompt, STL, CLI, and spec graph packages
  map directly to srd001-srd018, srd022-srd026, or both. That direct mapping
  covers internal/runtime/core, internal/observability, internal/model,
  the internal/tools package family with internal/tools/stl as a temporary
  facade, internal/support/cli, and pkg/spec behavior.

  Configured-agent packages are covered at the release layer. cmd/agent is
  governed by cfg-runtime-contract, release 01.0 use cases, lifecycle use cases,
  test-rel01.0, and Go tests. internal/evaluation and internal/evaluation/bench
  are covered by srd019, srd020, rel01.0 evaluator and bench use cases,
  test-rel01.0, and package tests. internal/support/execute is covered by
  srd021, srd022 AC6, evaluator use cases, and child-agent tests.

  Planning and subprocess packages are cross-cutting support packages.
  Planner packages are covered by planner machine configs,
  sm-tool-language, sm-tool-vocabulary-audit, and package tests.
  internal/support/subprocess is covered by STL delegation, child-agent
  execution, and execute or STL integration tests.

  Package roots such as internal/model, internal/observability,
  internal/planning, internal/runtime, internal/support, and internal/tools do
  not define standalone runtime behavior. internal/evaluation/bench/ui embeds
  React assets behind the bench API. internal/knowledge/documentation/ui embeds
  React assets behind the documentation-curator host.

  Remaining gaps are narrow. Browser-level bench UI proof remains manual or
  skipped until an automated browser harness joins the quality gate. Planner
  SRDs are optional unless planner behavior becomes a stable product surface
  outside profile configs.

