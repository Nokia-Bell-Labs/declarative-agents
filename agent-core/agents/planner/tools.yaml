# Tool selection for the planner agent.
# Shared across all planner machine variants (full, passthrough, plan-only).
# Each tool is a direct transition action in at least one variant.
#
# Usage:
#   agent --tools-declaration tools/builtin.yaml \
#         --tools-declaration agents/planner/builtin.yaml \
#         --tools-declaration tools/exec.yaml \
#         --tools agents/planner/tools.yaml \
#         --machine agents/planner/machine.yaml

tools:
  # Planning phase (plan-only + full)
  - extract_task         # action: full, plan-only
  - extract_all          # action: passthrough
  - assemble_prompt      # action: full, plan-only
  - parse_plan           # action: full, plan-only
  - create_issue         # action: full, plan-only

  # Execution phase (full + passthrough)
  - execute_task         # action: full, passthrough
  - check_result         # action: full, passthrough

  # LLM (full, plan-only)
  - invoke_llm           # action: full, plan-only
  - reset_history        # action: full, plan-only

  # Build/test — direct transition actions in full + passthrough
  - build
  - vet
  - test
