id: agent-profiles-specifications
title: Agent Profiles Specification Index

overview: |
  This index starts the specification corpus for profile-owned agent assets.
  Foundation documents come first because the migration needs a stable
  ownership boundary before assets move.

  With the first migration complete, srd001 defines migrated profile families
  as functional blocks instead of runtime packages. The semantic models record
  role boundaries, dependency directions, and validation views.

  Release 06.0 now has formal use cases and a test suite for the checked-in
  profile repository workflow. Those entries connect profile validation,
  mounted container smoke execution, profile bundle tagging, and agent-core
  integration consumption back to the SRD and semantic models.
  The traceability gap is closed.

  Release 07.0 defines profile-owned integration tracer bullets for concrete
  state machines and profile-to-profile boundaries. These use cases move
  beyond repository migration proof: they name documentation-curator UX,
  evaluator to generator, planner to generator, bench to evaluator, and
  monitor/control evidence that must live with the profile assets.

  A reader can now start at the SRD, follow the semantic model role entries,
  reach the two mounted-profile use cases, and land on named commands such as
  mage validate, mage containerSmoke, mage tag, and the agent-core integration
  targets that set AGENT_PROFILES_ROOT.

roadmap_summary:
  - version: "00.1"
    name: Repository bootstrap
    status: done
    scope: |
      Replace the template README, add the foundation docs needed for future
      structured issues, migrate profile assets, add release tagging, and
      validate mounted-profile references.
  - version: "06.0"
    name: External agent profiles and mounted runtime assets
    status: done
    scope: |
      Profile-owned agent assets, demos, and integration fixtures now live in
      this repository. agent-core consumes them from AGENT_PROFILES_ROOT,
      /profiles, or release bundles. Formal use cases and test suites now name
      executable proof for the completed migration path.
  - version: "07.0"
    name: Profile-owned integration tracer bullets
    status: planned
    scope: |
      Define and implement profile-owned tracer bullets for concrete profile
      state machines, profile-to-profile execution, and human/operator
      boundaries. The documentation in this release names the target contracts;
      follow-up implementation issues add the Mage or Go targets.

