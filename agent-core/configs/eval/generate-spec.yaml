# GenerateSpec for unrolling evaluator experiment points into a linear
# state machine. Each point runs: prepare → agent → check → metrics.
# The done_action runs a final summarize step after all points complete.
#
# Usage: feed this spec (with vars expanded per-point) to
# core.GenerateLinearMachine to produce a flat MachineSpec.
name: eval
points:
  - steps:
      - prepare_workspace
      - run_agent
      - check_results
      - collect_metrics
    vars:
      sample: "example-sample"
      model: "example-model"
done_action: summarize
