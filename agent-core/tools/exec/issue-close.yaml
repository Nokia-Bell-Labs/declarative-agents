tools:
- name: issue_close
  type: exec
  binary: bd
  args:
  - close
  description: Close an issue by ID.
  category: boundary
  side_effects:
  - kind: filesystem_write
    target: beads_store
    paths:
    - .beads
    description: Changes issue status in the Beads store.
  reversibility:
    classification: compensatable
    undo: reopen_issue_or_workspace_restore
  undo:
    strategy: compensating_action
    description: Capture the previous issue status and compensate by reopening it or restoring the workspace ref.
    payload: boundary_compensation
    captures:
    - issue_id
    - previous_issue_status
    - workspace_paths
    requires:
    - issue_id
    - previous_issue_status
  parameters:
    type: object
    properties:
      id:
        type: string
        description: Issue ID to close
        positional: true
    required:
    - id
