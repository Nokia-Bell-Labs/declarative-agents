  - tools/builtin/evaluator-session/ (planned grouped declarations)
  - tools/builtin/evaluator-point/ (planned grouped declarations)
  - tools/builtin/bench/ (planned grouped declarations)
  - tools/builtin/spec-validation/ (planned grouped declarations)
  - tools/builtin.yaml (compatibility bundle)
  - tools/builtin/all.yaml (planned compatibility bundle)
  - internal/support/execute/execute.go
  - internal/tools/catalog/ (planned ToolDef and config decoding)
  - internal/tools/control/ (planned child-agent boundary tools)
