tools:
  - name: get_payment
    type: builtin
    init: rest_client_get
    category: boundary
    description: Read one payment through the configured REST client.
    problem: The sample needs a read word whose HTTP authority stays in REST config.
    goals:
      - Resolve the payments client and payment resource read operation.
      - Return configured REST read signals to MachineSpec.
    requirements:
      input:
        - Runtime input supplies only declared payment path parameters.
      output:
        - Output reports operation identity, status, and mapped payment fields.
      errors:
        - Definition, schema, network, timeout, and mapping failures emit CommandError.
    non_goals:
      - Does not accept runtime method, URL, host, or auth overrides.
    parameters:
      type: object
      properties:
        params: {type: object}
    emits: [RESTResourceRead, RESTMissing, RESTDomainFailed, CommandError]
    output:
      description: Mapped REST payment read result.
      schema:
        type: object
        properties:
          operation: {type: string}
          status: {type: integer}
          body: {type: object}
    side_effects:
      - kind: external_api
        target: payments.payment
        state: read_only
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Payment reads do not mutate local or remote state.
    errors:
      - signal: CommandError
        condition: REST config, schema, network, timeout, or response mapping failure.
        state_after_failure: No REST command state changes.
    relationships:
      before: [create_payment]
    config:
      rest_ref: payments
      resource: payment
      operation: get

  - name: create_payment
    type: builtin
    init: rest_client_send
    category: boundary
    description: Submit an asynchronous payment create request.
    problem: The sample needs send and await as separate grammar-visible words.
    goals:
      - Submit the configured async payment operation.
      - Store request state for await_payment.
    requirements:
      input:
        - Runtime input matches the configured create payment schema.
      output:
        - Output includes request ID, operation ID, and correlation metadata.
      errors:
        - Schema, network, timeout, or async state failures emit CommandError.
    non_goals:
      - Does not wait for final payment completion.
    parameters:
      type: object
      properties:
        params: {type: object}
    emits: [RESTAccepted, CommandError]
    output:
      description: Async REST submission result.
      schema:
        type: object
        properties:
          request_id: {type: string}
          operation: {type: string}
          correlation: {type: string}
    side_effects:
      - kind: external_api
        target: payments.payment
        state: payment_submitted
      - kind: state_mutation
        target: rest_command_state
        state: async_request_recorded
    reversibility:
      classification: compensatable
      undo: cancelPayment
    undo:
      strategy: compensating_action
      description: Cancel the payment when the configured service supports it.
    errors:
      - signal: CommandError
        condition: REST config, schema, network, timeout, or async state failure.
        state_after_failure: Async state is recorded only after accepted submission.
    relationships:
      after: [get_payment]
      before: [await_payment]
    config:
      rest_ref: payments
      operation: create_payment

  - name: await_payment
    type: builtin
    init: rest_client_await
    category: boundary
    description: Await the configured asynchronous payment request.
    problem: Async completion must remain visible to the machine.
    goals:
      - Resolve stored payment request state.
      - Map completion, missing, domain failure, and timeout into declared signals.
    requirements:
      input:
        - Runtime input identifies an async request by configured request state.
      output:
        - Output includes request ID, operation, status, and mapped response data.
      errors:
        - Missing async state, timeout, status, and mapping failures are explicit.
    non_goals:
      - Does not submit a new payment request.
    parameters:
      type: object
      properties:
        request_id: {type: string}
    emits: [RESTResponded, RESTDomainFailed, RESTMissing, RESTAwaitTimedOut, CommandError]
    output:
      description: Async REST completion result.
      schema:
        type: object
        properties:
          request_id: {type: string}
          operation: {type: string}
          status: {type: integer}
    side_effects:
      - kind: state_mutation
        target: rest_command_state
        state: async_request_consumed
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Await does not mutate remote state.
    errors:
      - signal: CommandError
        condition: Async state, timeout, transport, status mapping, or response mapping failure.
        state_after_failure: Async state follows the configured retention policy.
    relationships:
      after: [create_payment]
      before: [launch_payment_webhooks]
    config:
      rest_ref: payments
      operation: create_payment

  - name: launch_payment_webhooks
    type: builtin
    init: rest_server_launch
    category: boundary
    description: Launch configured payment webhook routes.
    problem: Inbound REST routes need profile-owned authority.
    goals:
      - Bind the configured webhook server.
      - Register OpenAPI-backed payment webhook routes.
    requirements:
      input:
        - Tool config references one trusted REST server definition.
      output:
        - Output includes server name, address, route count, and binding kinds.
      errors:
        - Config, bind, route conflict, and schema failures emit CommandError.
    non_goals:
      - Does not let HTTP handlers choose MachineSpec actions.
    parameters:
      type: object
      properties: {}
    emits: [ServerLaunched, CommandError]
    output:
      description: REST server launch result.
      schema:
        type: object
        properties:
          server: {type: string}
          address: {type: string}
          route_count: {type: integer}
    side_effects:
      - kind: external_api
        target: payments_webhooks
        state: listener_started
      - kind: state_mutation
        target: rest_server_state
        state: server_registered
    reversibility:
      classification: compensatable
      undo: rest_server_stop
    undo:
      strategy: compensating_action
      description: Stop the owned listener through stop_payment_webhooks.
    errors:
      - signal: CommandError
        condition: Config decode, bind, route conflict, or schema failure.
        state_after_failure: Partial launch cleans up owned listener state.
    relationships:
      after: [await_payment]
      before: [await_payment_webhook, stop_payment_webhooks]
    config:
      rest_ref: payments_webhooks

  - name: await_payment_webhook
    type: builtin
    init: rest_server_await
    category: boundary
    description: Await a queued payment webhook event.
    problem: Inbound HTTP events need a grammar-visible wait word.
    goals:
      - Consume one configured webhook event.
      - Return PaymentWebhookReceived to MachineSpec.
    requirements:
      input:
        - Tool config references one trusted REST server definition.
      output:
        - Output includes route, signal, request ID, and validated payload.
      errors:
        - Missing server, timeout, closed queue, and payload decode failures are explicit.
    non_goals:
      - Does not run hidden workflow steps from HTTP handler code.
    parameters:
      type: object
      properties: {}
    emits: [PaymentWebhookReceived, AwaitTimedOut, ServerStopped, CommandError]
    output:
      description: REST inbound event result.
      schema:
        type: object
        properties:
          route: {type: string}
          signal: {type: string}
          payload: {type: object}
    side_effects:
      - kind: state_mutation
        target: rest_server_queue
        state: event_consumed
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Await does not mutate remote state.
    errors:
      - signal: CommandError
        condition: Missing server, queue closed, timeout, or payload decode failure.
        state_after_failure: Queue state follows server policy.
    relationships:
      after: [launch_payment_webhooks]
      before: [stop_payment_webhooks]
    config:
      rest_ref: payments_webhooks

  - name: stop_payment_webhooks
    type: builtin
    init: rest_server_stop
    category: boundary
    description: Stop configured payment webhook routes.
    problem: REST listeners need explicit grammar-visible shutdown.
    goals:
      - Resolve the configured payment webhook server.
      - Stop owned listener state according to shutdown policy.
    requirements:
      input:
        - Tool config references one trusted REST server definition.
      output:
        - Output includes server name, address, drained count, and shutdown status.
      errors:
        - Missing server, shutdown timeout, or drain failures emit CommandError.
    non_goals:
      - Does not roll back remote HTTP clients.
    parameters:
      type: object
      properties: {}
    emits: [ServerStopped, CommandError]
    output:
      description: REST server stop result.
      schema:
        type: object
        properties:
          server: {type: string}
          address: {type: string}
          status: {type: string}
    side_effects:
      - kind: external_api
        target: payments_webhooks
        state: listener_stopped
      - kind: state_mutation
        target: rest_server_state
        state: server_stopped
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Relaunch is a separate MachineSpec action.
    errors:
      - signal: CommandError
        condition: Missing server, shutdown timeout, cleanup failure, or drain failure.
        state_after_failure: Server state reports partial shutdown when cleanup fails.
    relationships:
      after: [launch_payment_webhooks, await_payment_webhook]
    config:
      rest_ref: payments_webhooks
