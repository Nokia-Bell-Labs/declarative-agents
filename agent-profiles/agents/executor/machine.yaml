name: executor
purpose: |-
  The executor is a coding agent that solves programming tasks by
  iteratively composing LLM calls with tool execution. It reads files,
  writes code, runs builds and tests, and converges on a solution that
  passes validation.
configuration:
  machine: agents/executor/machine.yaml
  tools: agents/executor/tools.yaml
  llm_configs: agents/executor/llm/*.yaml
  tool_declarations:
  - tools/builtin.yaml
  - tools/exec.yaml
invariants:
- Every tool result is fed back to the LLM before the next reasoning step
- File edits trigger a re-read nudge to prevent stale context
- The done tool always triggers validation before declaring success
- Parse failures are reported to the LLM for self-correction
- report_parse_error emits BudgetExhausted after max_consecutive_parse_errors
- Infrastructure errors (CommandError) are terminal — no recovery
lifecycle: |-
  1. Idle → Composing (Seed): invoke_llm with the task prompt
  2. Composing → Parsing (LLMResponded): parse_response extracts tool call
  3. Parsing → Composing (ToolDone via $tool): dispatched tool result
     feeds back — the $tool sentinel resolves the tool name from the
     parsed LLM output at dispatch time
  4. Composing → Composing (ToolDone): invoke_llm sends tool result to LLM
  5. Composing → Composing (EditDone): nudge_reread after file edits
  6. Composing → Composing (ToolFailed): invoke_llm sends failure to LLM
  7. Parsing → Composing (ParseFailed): report_parse_error to LLM,
     or BudgetExceeded when max_consecutive_parse_errors is reached
  8. Parsing → ValidatingBuild (TaskCompleted): parse_response recognized
     the done tool — machine-declared validation starts with build
  9. ValidatingBuild → ValidatingLint (ToolDone): lint runs after build
  10. ValidatingLint → ValidatingTest (ToolDone): test runs after lint
  11. ValidatingTest → Succeeded (ToolDone)
  12. Any validation ToolFailed → Failed
  13. Composing → BudgetExceeded (BudgetExhausted)

  The agent loops between Composing and Parsing, making tool calls
  (read, write, edit, find, list_files, build, test, lint) until
  the LLM calls done. After done, machine-declared validation determines
  success. CommandError in Composing, Parsing, or any validation state
  transitions to Failed.
pipeline_diagram: |-
  ```mermaid
  flowchart TD
    A[Idle] -->|Seed| B[Composing]
    B -->|LLMResponded| C[Parsing]
    C -->|ToolDone| D[Dispatch Tool]
    D --> B
    B -->|EditDone| E[Nudge Reread]
    E --> B
    C -->|ParseFailed| F[Report Error]
    F --> B
    C -->|TaskCompleted| G[ValidatingBuild]
    G -->|ToolDone| K[ValidatingLint]
    K -->|ToolDone| L[ValidatingTest]
    L -->|ToolDone| H[Succeeded]
    G -->|ToolFailed| I[Failed]
    K -->|ToolFailed| I
    L -->|ToolFailed| I
    B -->|BudgetExhausted| J[BudgetExceeded]
  ```
initial_state: Idle
budget:
  max_iterations: 100
  max_consecutive_parse_errors: 5
states:
- name: Idle
  meaning: Initial state before any work begins.
- name: Composing
  meaning: |
    The LLM is being invoked or a tool result is being fed back.
    This is the main working state where the agent reasons about
    the task and decides what to do next.
- name: Parsing
  meaning: |
    The raw LLM response is being parsed to extract tool calls.
    If parsing fails, the error is reported back to the LLM.
- name: ValidatingBuild
  meaning: |
    The agent has declared the task complete (done tool). The build
    validation command is running.
- name: ValidatingLint
  meaning: |
    Build passed. The lint validation command is running.
- name: ValidatingTest
  meaning: |
    Lint passed. The test validation command is running.
- name: Succeeded
  meaning: Terminal. Validation passed — the task is complete.
- name: Failed
  meaning: Terminal. An unrecoverable error or validation failure occurred.
- name: BudgetExceeded
  meaning: Terminal. Iteration or token budget was exhausted.
terminal_states:
- Succeeded
- Failed
- BudgetExceeded
signals:
- name: Seed
  trigger: Loop initialization.
- name: LLMResponded
  trigger: The LLM returned a response (invoke_llm completed).
- name: ToolDone
  trigger: A tool executed successfully.
- name: ToolFailed
  trigger: A tool executed but reported failure (recoverable).
- name: ParseFailed
  trigger: The LLM response could not be parsed as a valid tool call.
- name: TaskCompleted
  trigger: The LLM called the done tool, declaring the task finished.
- name: CommandError
  trigger: Infrastructure-level error (not a tool failure).
- name: BudgetExhausted
  trigger: Iteration or token budget limit reached.
- name: EditDone
  trigger: A file edit tool completed — triggers re-read nudge.
transitions:
- state: Idle
  signal: Seed
  next: Composing
  action: invoke_llm
- state: Composing
  signal: LLMResponded
  next: Parsing
  action: parse_response
- state: Parsing
  signal: ToolDone
  next: Composing
  action: $tool
- state: Parsing
  signal: TaskCompleted
  next: ValidatingBuild
  action: build
- state: Parsing
  signal: ParseFailed
  next: Composing
  action: report_parse_error
- state: Composing
  signal: ToolDone
  next: Composing
  action: invoke_llm
- state: Composing
  signal: EditDone
  next: Composing
  action: nudge_reread
- state: Composing
  signal: ToolFailed
  next: Composing
  action: invoke_llm
- state: ValidatingBuild
  signal: ToolDone
  next: ValidatingLint
  action: lint
- state: ValidatingBuild
  signal: ToolFailed
  next: Failed
- state: ValidatingLint
  signal: ToolDone
  next: ValidatingTest
  action: test
- state: ValidatingLint
  signal: ToolFailed
  next: Failed
- state: ValidatingTest
  signal: ToolDone
  next: Succeeded
- state: ValidatingTest
  signal: ToolFailed
  next: Failed
- state: Composing
  signal: CommandError
  next: Failed
- state: Parsing
  signal: CommandError
  next: Failed
- state: ValidatingBuild
  signal: CommandError
  next: Failed
- state: ValidatingLint
  signal: CommandError
  next: Failed
- state: ValidatingTest
  signal: CommandError
  next: Failed
- state: Composing
  signal: BudgetExhausted
  next: BudgetExceeded
