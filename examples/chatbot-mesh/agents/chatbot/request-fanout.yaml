      - Does not call any provider.
    parameters:
      type: object
      properties: {}
      additionalProperties: false
    emits: [SourceMarked0]
    output:
      description: This source's outcome for the response metadata.
      schema:
        type: object
        properties:
          outcome: {type: string}
          reason: {type: string}
    side_effects: []
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Recording an outcome has no durable effect.
    config:
      signal: SourceMarked0
      inputs: {}
      template: |
        {"outcome": "excluded", "reason": "vector_rejected"}

  - name: mark_degraded0
    type: builtin
    init: compose
    visibility: internal
    category: response
    description: Record that the first RAG failed and the turn degraded without it.
    problem: |
      srd002 R3.2 requires a per-RAG failure to be noted in the response metadata rather than left as a silently thinner answer.
    goals:
      - Record this source's outcome under a label the response metadata reads.
      - Keep the outcome a visible machine transition rather than an inference the client makes.
    requirements:
      input:
        - The outcome is fixed by the transition that dispatched this word; no selector is read.
      output:
        - Output is a JSON object naming the outcome and its reason.
      errors:
