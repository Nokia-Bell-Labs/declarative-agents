tools:
  - name: ollama_list_models
    type: builtin
    init: rest_client_invoke
    category: boundary
    description: List local Ollama models through the configured REST client.
    problem: The Ollama proof needs one model-visible REST word whose HTTP authority stays in REST config.
    goals:
      - Resolve the Ollama REST client and listOllamaModels operation.
      - Return configured REST response signals to MachineSpec.
      - Keep model output grounded in the live /api/tags response.
    requirements:
      input:
        - Runtime input supplies no transport authority or request parameters.
      output:
        - Output reports operation identity, status, and mapped Ollama model data.
      errors:
        - Definition, schema, network, timeout, and mapping failures emit CommandError.
    non_goals:
      - Does not expose Ollama generation, pull, delete, or mutation endpoints.
      - Does not accept runtime method, URL, host, auth, redirect, or destination overrides.
    parameters:
      type: object
      properties: {}
      additional_properties: false
    emits: [RESTResponded, RESTDomainFailed, CommandError]
    output:
      description: Mapped Ollama model listing result.
      schema:
        type: object
        properties:
          operation: {type: string}
          status: {type: integer}
          body: {type: object}
    side_effects:
      - kind: external_api
        target: ollama.models
        state: read_only
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Listing local Ollama models does not mutate local or remote state.
    errors:
      - signal: CommandError
        condition: REST config, schema, network, timeout, or response mapping failure.
        state_after_failure: No REST command state changes.
    relationships:
      overlaps:
        - tool: invoke_llm
          difference: invoke_llm asks a model; ollama_list_models queries Ollama's REST model inventory.
    config:
      rest_ref: ollama
      operation: listOllamaModels
