# Small-footprint values for the in-cluster LLM-tier kind smoke (rel09.5, GH-338).
# The LLM tier is enabled with CPU-only small models so the preload and readiness
# gate run on a disposable kind cluster without a GPU. This diverges from GPU
# production sizing by design (srd015 R6.4, recorded limitation).
image:
  pullPolicy: IfNotPresent

chatbot:
  embeddingModel: all-minilm
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits: {cpu: 500m, memory: 512Mi}

ragUnits:
  - name: rag0
    collection: corpus
    embeddingModel: all-minilm
    replicas: 1

ragServer:
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits: {cpu: 500m, memory: 512Mi}

chroma:
  storage: 256Mi
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits: {cpu: 500m, memory: 512Mi}

dolt:
  storage: 256Mi

ingress:
  enabled: false

provisioner:
  enabled: false

# The in-cluster LLM tier: CPU-only small models (no GPU), tiny storage.
ollama:
  enabled: true
  models:
    embedding: all-minilm
    chat: ["qwen2.5:0.5b"]
    router: qwen2.5:0.5b
  persistence:
    size: 2Gi
  resources:
    requests: {cpu: 200m, memory: 512Mi}
    limits: {cpu: "2", memory: 4Gi}
  gpu:
    count: 0
