id: rel07.0-uc001-command-state-threading
title: A REST word selects a non-adjacent prior word's output by label and resumes mid-chain

summary: |
  A profile author composes a three-word REST chain: an embed-shaped word, a
  transform word, and a query-shaped word. The query word reaches back past the
  transform word to the embed word's output through body_source command_state and
  $from(...) selectors. The run suspends mid-chain and resumes in a fresh process
  with the command-state store rehydrated from persisted output, so the query
  word resolves the same label after restart.

actor: Agent profile author composing a multi-word REST workflow

trigger: |
  A workflow needs a later word to consume an earlier, non-adjacent word's output
  without threading it through every intervening word.

flow:
  - F1: Word 1 (embed-shaped) runs and records its output in the execution log; the command-state store presents that output as a read-only forward view keyed by (run_id, step_index) (srd038 R1).
  - F2: Word 2 (transform) runs next; its presence does not change how word 3 addresses word 1.
  - F3: Word 3 (query-shaped) declares body_source command_state and selects word 1's fields through input_mapping $from(<label>).<path> selectors, resolving by label with most-recent-wins and no absolute indices (srd038 R2, srd028 R13).
  - F4: The store hands word 3 only the fields it selected into declared params; no transport authority or receipt is addressable (srd038 R3).
  - F5: The run suspends after word 1 and resumes in a fresh process; the store rehydrates from the srd036 tool_outputs plane so word 3 resolves the same label (srd038 R1).

touchpoints:
  - T1: "srd038-command-state-store R1 -- read-only forward view over the execution log, rehydrated from tool_outputs after restart"
  - T2: "srd038-command-state-store R2 -- $from label addressing, most-recent-wins, run-scoped, no absolute indices"
  - T3: "srd038-command-state-store R3 -- declared-param-only authority boundary; no transport, no receipts"
  - T4: "srd028-rest-client-tools R13 -- REST body_source command_state consumes the store through $from selectors"

success_criteria:
  - id: S1
    criterion: The third word's request body carries the first word's vector as a nested array selected by label past the intervening word.
    traces:
      - srd038-command-state-store AC2
      - srd028-rest-client-tools AC12
  - id: S2
    criterion: The store exposes only selected declared params; a selector naming transport authority, an undeclared target, or a receipt is rejected.
    traces:
      - srd038-command-state-store AC3
      - srd028-rest-client-tools AC12
  - id: S3
    criterion: A run suspended after the first word resumes in a fresh process and the third word resolves the same label from the rehydrated store.
    traces:
      - srd038-command-state-store AC1
  - id: S4
    criterion: Duplicate labels within the run resolve to the most recent matching step.
    traces:
      - srd038-command-state-store AC2
  - id: S5
    criterion: A field removed by response redaction is never readable by a later word, whether the run is live or resumed.
    traces:
      - srd038-command-state-store AC5

failure_scenarios:
  - id: E1
    scenario: Word 3 references a label that no step produced.
    expected: A typed unresolved-label error names the label; no empty value is yielded (srd038 R1.5).
  - id: E2
    scenario: After restart the store cannot rehydrate the label's step.
    expected: Word 3 fails to resolve and the run reports the error rather than reading an empty value.
  - id: E3
    scenario: A selector names an authentication header.
    expected: The selector is rejected before the request is built (srd028 R13.3).

out_of_scope:
  - Cross-run addressing.
  - Non-REST consumers of the store.
  - The persistence schema split and revert reaping (covered by rel07.0-uc002).

test_suite_trace: test-rel07.0-command-state
