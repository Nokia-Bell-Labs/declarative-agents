id: sm-evaluator
title: Evaluator Agent Semantic Model

purpose: |
  The evaluator uses a two-level nested state machine architecture.

  The session-level machine (configs/evaluator/machine.yaml) iterates
  over all combinations of (harness, model, sample, gridpoint, rep)
  defined in a suite YAML. For each combination it invokes a nested
  core.Loop that runs the per-point pipeline.

  The point-level machine (configs/evaluator/point.yaml) orchestrates
  a single evaluation point: it prepares a workspace, snapshots the
  experiment configuration, invokes the generator agent as a subprocess,
  checks the results, and collects metrics. It is a deterministic
  pipeline that sequences five tools — no LLM calls.

  The former `agent eval` subcommand has been removed. Evaluation is
  now fully driven by `--machine configs/evaluator/machine.yaml`.

declarative_boundary: |
  The evaluator program definition is the pair of state machines
  (configs/evaluator/machine.yaml and configs/evaluator/point.yaml),
  the selected tools (configs/evaluator/tools.yaml), and the tool
  declarations/overrides loaded at startup. Suite YAML is not a third
  program-definition mechanism. It is input data consumed by evaluator
  tools:

  - load_suite parses and validates the suite, resolves samples, expands
    the grid, and creates the session.
  - run_agent consumes each harness entry as subprocess input data
    (binary plus flags) for the current point.
  - dump_config snapshots the resolved harness, model, machine/tools, and
    prompt/profile configuration into experiment.yaml for reproducibility.

configuration:
  machine: configs/evaluator/machine.yaml
  point_machine: configs/evaluator/point.yaml
  session_tools: configs/evaluator/tools.yaml
  point_tools: configs/evaluator/tools-point.yaml
  tool_declarations:
    - configs/tools/builtin.yaml
    - configs/evaluator/builtin.yaml

# --- Session-level machine ---

session_states:
  - name: Idle
    meaning: Initial state before the suite is loaded.
  - name: LoadingSuite
    meaning: Parsing the suite YAML, discovering samples, expanding the grid.
  - name: AdvancingPoint
    meaning: Advancing the iterator to the next (harness, model, sample, gridpoint, rep).
  - name: RunningPoint
    meaning: Executing the per-point pipeline via a nested core.Loop.
  - name: Reporting
    meaning: Printing session summary (pass/fail/timeout counts, total duration).
  - name: Done
    meaning: Terminal. All points evaluated and reported.
  - name: Failed
    meaning: Terminal. Infrastructure error prevented evaluation.

session_signals:
  - name: Seed
    trigger: Loop initialization.
  - name: SuiteLoaded
    trigger: Suite YAML parsed and session directory created.
  - name: PointReady
    trigger: Iterator advanced to a new grid point.
  - name: PointDone
    trigger: Per-point pipeline completed (any outcome).
  - name: AllPointsDone
    trigger: Grid iterator exhausted.
  - name: SessionReported
    trigger: Summary printed.
  - name: CommandError
    trigger: Infrastructure-level error.

session_lifecycle: |
  1. Idle → LoadingSuite: load_suite
  2. LoadingSuite → AdvancingPoint: next_point
  3. AdvancingPoint → RunningPoint: run_point  (if PointReady)
  4. RunningPoint → AdvancingPoint: next_point  (loop back)
  5. AdvancingPoint → Reporting: report_session  (if AllPointsDone)
  6. Reporting → Done

session_diagram: |
  ```mermaid
  stateDiagram-v2
    [*] --> Idle
    Idle --> LoadingSuite: Seed / load_suite
    LoadingSuite --> AdvancingPoint: SuiteLoaded / next_point
    AdvancingPoint --> RunningPoint: PointReady / run_point
    RunningPoint --> AdvancingPoint: PointDone / next_point
    AdvancingPoint --> Reporting: AllPointsDone / report_session
    Reporting --> Done: SessionReported
    LoadingSuite --> Failed: CommandError
    AdvancingPoint --> Failed: CommandError
    RunningPoint --> Failed: CommandError
    Reporting --> Failed: CommandError
  ```

session_tools:
  - load_suite
  - next_point
  - run_point
  - report_session

# --- Point-level machine ---

point_states:
  - name: Idle
    meaning: Initial state before evaluation begins.
  - name: PreparingWorkspace
    meaning: Creating temporary directory, initializing git, copying sample files.
  - name: SnapshotConfig
    meaning: Serializing the full experiment configuration into experiment.yaml.
  - name: RunningAgent
    meaning: The generator agent is running as a subprocess.
  - name: CheckingResults
    meaning: Examining exit code, test results, and trace output.
  - name: CollectingMetrics
    meaning: Writing evaluation metadata (exit code, duration, test results, tokens, convergence data) to meta.json.
  - name: Done
    meaning: Terminal. Evaluation point completed successfully.
  - name: Failed
    meaning: Terminal. An infrastructure error prevented evaluation.

point_signals:
  - name: Seed
    trigger: Loop initialization.
  - name: WorkspaceReady
    trigger: Workspace preparation completed.
  - name: ConfigDumped
    trigger: Experiment configuration snapshot written to experiment.yaml.
  - name: HarnessFinished
    trigger: The generator agent exited normally (exit code 0).
  - name: HarnessFailed
    trigger: The generator agent exited with a non-zero exit code.
  - name: HarnessTimedOut
    trigger: The generator agent exceeded its time budget.
  - name: ResultsCollected
    trigger: Result checking completed.
  - name: MetricsCollected
    trigger: Metrics extraction completed.
  - name: CommandError
    trigger: Infrastructure-level error.

point_lifecycle: |
  1. Idle → PreparingWorkspace: prepare_workspace
  2. PreparingWorkspace → SnapshotConfig: dump_config
  3. SnapshotConfig → RunningAgent: run_agent
  4. RunningAgent → CheckingResults: check_results (on any outcome)
  5. CheckingResults → CollectingMetrics: collect_metrics
  6. CollectingMetrics → Done

point_diagram: |
  ```mermaid
  flowchart LR
    A[prepare_workspace] --> B[dump_config]
    B --> C[run_agent]
    C -->|any outcome| D[check_results]
    D --> E[collect_metrics]
  ```

budget:
  session_max_iterations: 10000
  point_max_iterations: 20

point_tools:
  - prepare_workspace
  - dump_config
  - run_agent
  - check_results
  - collect_metrics

invariants:
  - The evaluator never calls an LLM directly
  - All agent outcomes (success, failure, timeout) proceed to check_results
  - The workspace is a fresh temporary directory for each evaluation point
  - Metrics are collected even when the agent fails or times out
  - The session machine iterates sequentially through all grid points
  - Session and point machines have separate tool selections
  - run_point builds the nested point registry from configs/evaluator/tools-point.yaml
