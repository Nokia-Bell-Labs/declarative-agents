id: agent-core-roadmap
title: Agent Core Release Road Map

releases:
  - version: "00.0"
    name: Core engine and supporting packages
    description: |
      Import the generic agentic loop engine from the generator project and add
      the support packages that make it usable as a library.
    status: done
    srds:
      - srd001-core-types
      - srd002-state-machine
      - srd003-command-dispatch
      - srd004-tool-registry
      - srd005-agentic-loop
      - srd006-yaml-machine-config
      - srd007-tracer-interface
      - srd008-telemetry
      - srd009-ollama-adapter
      - srd010-conversation
      - srd011-prompt-schema
      - srd012-system-prompt-template
      - srd013-standard-tool-library
      - srd014-spec-graph
      - srd015-genai-semconv
      - srd016-traceparent
      - srd017-llm-extensions
      - srd018-cli-flag-contract
    use_cases:
      - id: rel00.0-uc001-domain-agent-integration
        summary: Domain agent imports agent-core and runs an agentic loop
        status: done
      - id: rel00.0-uc002-spec-corpus-validation
        summary: Maintainer validates the specification corpus graph
        status: done

  - version: "01.0"
    name: Unified agent binary and configuration-driven architecture
    description: |
      Consolidate generator behavior into the cmd/agent binary. Planner and
      evaluator behavior move there too, but YAML profiles still choose the
      active machine and selected tools. Profile-driven machines and selected
      tool declarations become the normal runtime path. Model configuration,
      planner packages, evaluator support, bench UI support, native Mage
      targets, and Go tests round out the release.
    status: done
    srds:
      - srd019-eval-harness
      - srd020-bench-web-ui
      - srd021-agent-cli-exec-tool
      - srd022-builtin-tools
      - srd023-cli-exec-tools
      - srd024-blocking-input-tools
    use_cases:
      - id: rel01.0-uc001-generator-coding
        summary: Generator agent solves Go coding tasks using YAML config
        status: done
      - id: rel01.0-uc002-evaluator-benchmark
        summary: Evaluator runs generator across models and collects results
        status: done
      - id: rel01.0-uc003-bench-visualization
        summary: Bench serves web UI for evaluation result exploration
        status: done

  - version: "02.0"
    name: Rollback lifecycle and tool language documentation
    description: |
      Runtime checkpoint behavior is implemented. Suspend, resume, and rollback
      foundations are implemented too. Lifecycle profiles expose checkpoint
      history and rollback through first-class STL builtin tools. Remaining
      work covers documentation cleanup and the planned internal/tools package
      split.
    status: in_progress
    srds:
      - srd025-rollback-lifecycle
      - srd026-lifecycle-tools
    use_cases:
      - id: rel02.0-uc001-approval-suspend-resume
        summary: Agent suspends at approval gate and resumes from checkpoint
        status: planned
      - id: rel02.0-uc002-history-rollback
        summary: User inspects history and rolls back after a bad tool action
        status: done
      - id: rel02.0-uc003-tool-authoring
        summary: Developer authors a new tool as a vocabulary word
        status: planned
      - id: rel02.0-uc004-sentence-tool-migration
        summary: Developer migrates a sentence-shaped tool into machine-composed words
        status: planned
    follow_up:
      - id: agent-core-vk8j
        summary: Reorganize standard tool library packages and tool declarations
        status: in_progress

  - version: "03.0"
    name: Declarative REST client and server tools
    description: |
      REST client and REST server tools are declarative boundary tool families.
      Outbound words call configured upstreams; inbound words launch from agent
      profiles and bind configured addresses. Generic await words can fan in
      events across configured server queues, including lifecycle control
      requests that route through MachineSpec. OpenAPI documents and REST
      definitions live with configuration. The runtime package is
      internal/tools/rest. net/http supplies client and server behavior.
      OpenAPI 3 loading uses kin-openapi. Shared REST definitions and async
      inbox support are implemented, while generated Go clients and servers are
      excluded.
    status: in_progress
    srds:
      - srd027-rest-tool-runtime
      - srd028-rest-client-tools
      - srd029-rest-server-tools
    semantic_models:
      - sm-rest-tool-language
    config_formats:
      - cfg-rest-tool-format
    planned_use_cases:
      - id: rel03.0-uc001-rest-client-sync
        summary: Grammar invokes configured REST client resource words
        status: done
      - id: rel03.0-uc002-rest-client-async
        summary: Grammar sends and awaits an asynchronous REST client operation
        status: done
      - id: rel03.0-uc003-rest-server-signals
        summary: Grammar receives inbound REST server signals
        status: done
      - id: rel03.0-uc004-openapi-import
        summary: OpenAPI import defines REST operations and endpoint bindings
        status: done
      - id: rel03.0-uc005-ollama-openapi-model-listing
        summary: Qwen agent lists Ollama models through an OpenAPI REST tool
        status: done
      - id: rel03.0-uc006-documentation-curator
        summary: Knowledge Manager serves documentation curator UX and REST tools
        status: done
    planned_test_suites:
      - id: test-rel03.0-rest-tools
        summary: Formal tests for REST runtime, client tools, server tools, generic event fan-in, lifecycle exit routing, OpenAPI import, Ollama E2E proof, and documentation-curator ownership
        status: done
