rest:
  version: v1
  auth:
    none:
      type: none
  limits:
    local_rag_client:
      timeout: 10s
      read_timeout: 10s
      max_request_bytes: 1048576
      max_response_bytes: 1048576
      redirect:
        mode: none
      network:
        schemes: [http]
        # The Chroma host is the egress allowlist entry; a values-driven deploy
        # sets CHROMA_HOST to the Chroma Service DNS name (srd003 R2), defaulting
        # to loopback for a local run.
        hosts: [${CHROMA_HOST:-127.0.0.1}]
        ports: [8000]
    local_rag_requests:
      timeout: 10s
      read_timeout: 5s
      max_request_bytes: 1048576
      max_response_bytes: 1048576
      redirect:
        mode: none
      network:
        schemes: [http]
        hosts: [127.0.0.1, localhost]
        ports: [18085]
        # A Service routes to the pod IP, so the deploy binds 0.0.0.0 (RAG_BIND_HOST);
        # the public-listener guard is opted into here, and stays loopback locally.
        allow_public_listener: true
    local_rag_control:
      timeout: 30s
      read_timeout: 5s
      max_request_bytes: 16384
      max_response_bytes: 65536
      redirect:
        mode: none
      network:
        schemes: [http]
        hosts: [127.0.0.1, localhost]
        ports: [18086]
        allow_public_listener: true
    local_rag_monitor:
      timeout: 5s
      read_timeout: 5s
      max_request_bytes: 4096
      max_response_bytes: 1048576
      redirect:
        mode: none
      network:
        schemes: [http]
        hosts: [127.0.0.1, localhost]
        ports: [18087]
        allow_public_listener: true

  clients:
    chroma:
      base_url: ${CHROMA_URL:-http://127.0.0.1:8000}
      auth_ref: none
      limits_ref: local_rag_client
      operations:
        heartbeat:
          method: GET
          path: /api/v2/heartbeat
          params:
            body_source: none
          success: {status: [200], signal: ChromaReady}
          side_effects:
            - kind: external_api
              target: chroma.heartbeat
              state: read_only
          reversibility:
            classification: reversible
            undo: noop
        rag_resolve_collection:
          method: POST
          path: /api/v2/tenants/default_tenant/databases/default_database/collections
          params:
            body_schema:
              type: object
              required: [query_embeddings]
              properties:
                query_embeddings: {type: array}
            body_source: previous_result
            input_mapping:
              query_embeddings: $.query_embeddings
            carry_forward: [query_embeddings]
          body:
            name: ${RAG_COLLECTION:-corpus}
            get_or_create: true
          success: {status: [200, 201], signal: CollectionReady}
          response:
            output:
              collection_id: $.id
          side_effects:
            - kind: external_api
              target: chroma.collection
              state: collection_upserted
          reversibility:
            classification: reversible
            undo: noop
        rag_query:
          method: POST
          path: /api/v2/tenants/default_tenant/databases/default_database/collections/{collection}/query
          params:
            path:
              collection: {type: string}
            body_schema:
              type: object
              required: [query_embeddings]
              properties:
                query_embeddings: {type: array}
            body_source: previous_result
            input_mapping:
              collection: $.mapped.collection_id
              query_embeddings: $.carried.query_embeddings
          body:
            query_embeddings: ["{{ params.query_embeddings }}"]
            n_results: 5
            include: ["documents", "distances", "metadatas"]
          success: {status: [200], signal: QueryResponded}
          failures:
            - {status: [400, 422], signal: QueryRejected}
          response:
            output:
              ids: $.ids
              documents: $.documents
              distances: $.distances
          side_effects:
            - kind: external_api
              target: chroma.query
              state: read_only
          reversibility:
            classification: reversible
            undo: noop

  servers:
    chroma_rag_requests:
      address: ${RAG_BIND_HOST:-127.0.0.1}:18085
      limits_ref: local_rag_requests
      endpoints:
        query:
          method: POST
          path: /api/v1/rag/query
          binding: machine_request
          request:
            body_schema:
              type: object
              required: [query_embeddings]
              properties:
                query_embeddings: {type: array}
                n_results: {type: integer}
          machine_request:
            profile: profile.yaml
            machine: request-machine.yaml
            timeout: 10s
            request:
              body:
                query_embeddings: $.query_embeddings
                n_results: $.n_results
            response:
              terminal_signals:
                QueryResponded:
                  status: 200
                  content_type: application/json
                  body:
                    ids: $.mapped.ids
                    documents: $.mapped.documents
                    distances: $.mapped.distances
                    embedding_model: ${RAG_EMBEDDING_MODEL:-qwen3-embedding:8b}
                QueryRejected:
                  status: 400
                  content_type: application/json
                  body:
                    error: query_rejected
                    detail: the query embedding was rejected by the collection (for example an embedding-space or dimension mismatch)
                CommandError:
                  status: 500
                  content_type: application/json
                  body:
                    error: command_error
                    stage: $.failure_stage
                    message: $.message
                    operation: $.operation

    chroma_rag_control:
      address: ${RAG_BIND_HOST:-127.0.0.1}:18086
      limits_ref: local_rag_control
      queue:
        name: chroma_rag_control
        capacity: 8
        timeout: 30s
      shutdown:
        timeout: 5s
        drain_policy: drain_then_stop
      endpoints:
        exit:
          method: POST
          path: /api/lifecycle/exit
          binding: emit_signal
          signal: ExitRequested
          request:
            body_schema:
              type: object
              properties:
                reason: {type: string}
                status: {type: string}
          response:
            output:
              accepted: "true"
        health:
          method: GET
          path: /api/lifecycle/health
          binding: health

    monitor:
      address: ${RAG_BIND_HOST:-127.0.0.1}:18087
      limits_ref: local_rag_monitor
      queue:
        name: chroma_rag_monitor
        capacity: 8
        overflow: reject
        timeout: 100ms
      shutdown:
        timeout: 2s
        drain_policy: drain
        stop_listeners: true
        unblock_await_signal: ServerStopped
      endpoints:
        machine_spec:  {method: GET, path: /monitor/machine,       binding: read_state,    monitor_view: machine_spec}
        current_state: {method: GET, path: /monitor/state,         binding: read_state,    monitor_view: current_state}
        tools:         {method: GET, path: /monitor/tools,         binding: read_state,    monitor_view: tools}
        metrics:       {method: GET, path: /monitor/metrics,       binding: read_state,    monitor_view: metrics}
        recent_events: {method: GET, path: /monitor/events,        binding: read_state,    monitor_view: events}
        event_stream:  {method: GET, path: /monitor/events/stream, binding: stream_events, monitor_view: events}
        control_exit:
          method: POST
          path: /monitor/control/exit
          binding: emit_signal
          signal: ExitRequested
          request:
            body_schema:
              type: object
              properties:
                reason: {type: string}
          response:
            output:
              accepted: "true"
