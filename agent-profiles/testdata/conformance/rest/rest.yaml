rest:
  version: v1
  auth:
    none:
      type: none
  limits:
    local_demo:
      timeout: 2s
      read_timeout: 2s
      max_request_bytes: 65536
      max_response_bytes: 65536
      redirect:
        mode: none
      network:
        schemes: [http, https]
        hosts: [127.0.0.1, localhost, payments.example.invalid]
  retry_policies:
    safe_async:
      attempts: 2
      backoff: fixed
      initial_delay: 10ms
      retry_status: [429, 500, 502, 503]
      retry_network_errors: true
      require_idempotency: true
  openapi:
    payments:
      path: openapi/payments.yaml
      base_url: https://payments.example.invalid
      expose: [getPayment, createPayment]
      bind:
        receivePaymentWebhook: payment_webhook
      side_effects:
        createPayment:
          - kind: external_api
            target: payments.payment
            state: payment_created
      reversibility:
        createPayment:
          classification: compensatable
          undo: cancelPayment
  clients:
    payments:
      base_url: https://payments.example.invalid
      auth_ref: none
      limits_ref: local_demo
      retry_ref: safe_async
      resources:
        payment:
          path: /payments/{id}
          operations:
            get:
              method: GET
              params:
                path:
                  id: {type: string}
              success: {status: [200], signal: RESTResourceRead}
              failures:
                - status: [404]
                  signal: RESTMissing
                - status: [409]
                  signal: RESTDomainFailed
                  domain_error_code: payment_conflict
              response:
                output:
                  id: $.id
                  state: $.state
                resource_id: $.id
                redact: [headers.authorization]
      operations:
        create_payment:
          openapi_operation_id: createPayment
          success: {status: [202], signal: RESTAccepted}
          async:
            request_id: $.id
            correlation: $.correlation_id
            idempotency_token: "{{ params.order_id }}"
            await_operation: getPayment
            timeout: 2s
            state_retention: consume
          side_effects:
            - kind: external_api
              target: payments.payment
              state: payment_submitted
          reversibility:
            classification: compensatable
            undo: cancelPayment
  servers:
    payments_webhooks:
      address: 127.0.0.1:0
      limits_ref: local_demo
      queue:
        name: payments
        capacity: 8
        overflow: reject
        timeout: 2s
      shutdown:
        timeout: 2s
        drain_policy: drain
        stop_listeners: true
        unblock_await_signal: ServerStopped
      endpoints:
        payment_webhook:
          binding: emit_signal
          signal: PaymentWebhookReceived
          queue:
            name: payments
          response:
            output:
              accepted: "true"
