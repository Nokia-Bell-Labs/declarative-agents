srd_index:
  - id: srd001-rag-server-agent
    title: RAG Server Agent Functional Block
    summary: Persistent vector-in retrieval service behind a machine_request query endpoint.
    path: docs/specs/software-requirements/srd001-rag-server-agent.yaml
  - id: srd002-chatbot-agent
    title: Chatbot Agent Functional Block
    summary: Browser-facing agent whose request-scoped turn routes, fans out to RAG servers, composes, and answers.
    path: docs/specs/software-requirements/srd002-chatbot-agent.yaml
  - id: srd003-chatbot-deployment
    title: Chatbot Mesh Deployment Model
    summary: One Helm chart with values-driven RAG pairs, co-generated client config, tiered hot swap, and an in-cluster LLM tier.
    path: docs/specs/software-requirements/srd003-chatbot-deployment.yaml

