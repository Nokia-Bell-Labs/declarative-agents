id: srd039-mock-endpoint-binding
title: Mock REST Endpoint Binding

problem: |
  Scenario-driven agent tests need dependency mocks. A digital-twin profile
  stands in for a real upstream service by serving canned REST responses, so a
  subject agent can be exercised hermetically: no live Chroma, Ollama, or
  Kubernetes, and every dependency response is controlled by the test scenario.

  The REST server runtime already declares endpoints with bindings such as
  static_assets, redirect, and machine_request. None of those covers the mock
  role declaratively: static_assets cannot vary status codes or script a
  failure on the second call, and machine_request requires authoring a machine
  for what is a fixed lookup. Tests also need to verify that the subject
  actually called its dependency with the right request, which requires the
  mock to record what it received and serve that record back to a validator.

goals:
  - G1: Define a mock endpoint binding that serves canned responses from fixture data.
  - G2: Define the fixture format, with routes keyed by method and path and ordered response scripts.
  - G3: Define a request log the mock records and serves so validators can assert the subject's outbound calls.
  - G4: Define validation so malformed fixtures fail configuration validation and server startup, not the first request.
  - G5: Keep the binding concurrency-safe and deterministic.

requirements:
  R1:
    title: Binding scope
    items:
      - R1.1: REST server endpoints SHALL support a mock binding that serves responses from fixture data without dispatching a machine transition.
      - R1.2: The mock binding SHALL follow the shared REST server runtime rules of srd029-rest-server-tools for listener lifecycle, ports, and telemetry.
      - R1.3: Mock fixture data SHALL come from a fixture file path declared in the endpoint configuration, with environment expansion applied per the shared REST definition loading rules, or from inline routes in the endpoint configuration.
      - R1.4: Fixture data SHALL load when the server starts, not per request.

  R2:
    title: Fixture format
    items:
      - R2.1: A fixture SHALL declare routes keyed by HTTP method and literal path.
      - R2.2: Each route SHALL declare an ordered list of one or more responses, each with a status code and optional headers and body.
      - R2.3: The Nth request to a route SHALL receive the Nth response; after the list is exhausted, the last response SHALL repeat.
      - R2.4: A request that matches no route SHALL receive a 404 response and SHALL be recorded in the request log as a miss.
      - R2.5: Response bodies SHALL be literal content; the binding SHALL NOT template or compute bodies from the request.

  R3:
    title: Request log
    items:
      - R3.1: The mock SHALL record every received request in order, capturing method, path, headers, and body.
      - R3.2: A declared log endpoint SHALL serve the recorded requests as structured JSON, including whether each request matched a route.
      - R3.3: The request log SHALL be scoped to the server instance and reset when the server starts.

  R4:
    title: Validation
    items:
      - R4.1: A fixture with an unknown HTTP method, an empty response list, or a duplicate method-and-path route SHALL fail validation with a named error.
      - R4.2: Fixture validation SHALL run under --validate-config and at server startup; a malformed fixture SHALL prevent the server from serving.

  R5:
    title: Concurrency and determinism
    items:
      - R5.1: Per-route response sequencing and the request log SHALL be safe under concurrent requests.
      - R5.2: For a serial request sequence, responses and log order SHALL be deterministic.

non_goals:
  - Request matching beyond method and literal path; body and header matchers are validator-side assertions over the request log.
  - Response templating, latency injection, or proxying to a real upstream.
  - A client-side mock; the binding serves inbound requests only.
  - Persistence of the request log across server restarts.

acceptance_criteria:
  - id: AC1
    criterion: A server endpoint declared with the mock binding serves the fixture's literal responses for a matching route in declared order over the shared REST server runtime, and repeats the last response after the script is exhausted.
    traces: [R1.1, R1.2, R1.3, R1.4, R2.1, R2.2, R2.3, R2.5]
  - id: AC2
    criterion: A request matching no fixture route receives a 404 and appears in the request log as a miss.
    traces: [R2.4, R3.1]
  - id: AC3
    criterion: The log endpoint returns the received requests in order with method, path, headers, and body, sufficient for a validator to assert what the subject sent.
    traces: [R3.1, R3.2, R3.3]
  - id: AC4
    criterion: A malformed fixture fails --validate-config and server startup with a named error before any request is served.
    traces: [R4.1, R4.2]
  - id: AC5
    criterion: Concurrent requests to scripted routes neither skip nor duplicate script positions, and a serial sequence is deterministic.
    traces: [R5.1, R5.2]
