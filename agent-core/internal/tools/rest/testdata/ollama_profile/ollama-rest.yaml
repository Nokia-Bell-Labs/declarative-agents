rest:
  version: v1
  auth:
    none:
      type: none
  limits:
    local_ollama:
      timeout: 30s
      read_timeout: 30s
      max_request_bytes: 1024
      max_response_bytes: 1048576
      redirect:
        mode: none
      network:
        schemes: [http]
        hosts: [127.0.0.1]
        ports: [11434]
  openapi:
    ollama:
      path: openapi/ollama.yaml
      base_url: http://127.0.0.1:11434
      expose:
        - listOllamaModels
      side_effects:
        listOllamaModels:
          - kind: external_api
            target: ollama.models
            state: read_only
      reversibility:
        listOllamaModels:
          classification: reversible
          undo: noop
  clients:
    ollama:
      base_url: http://127.0.0.1:11434
      auth_ref: none
      limits_ref: local_ollama
