tools:
- name: lint
  type: exec
  binary: golangci-lint
  args:
  - run
  - ./...
  emits:
  - ToolDone
  - ToolFailed
  description: Run golangci-lint run ./... on the Go workspace.
  category: boundary
  problem: The generator and planner machines need the golangci-lint run validation step as an explicit boundary word rather than a hidden aggregate validation sequence.
  goals:
  - Run `golangci-lint run` in the configured workspace.
  - Emit ToolDone on a zero exit status and ToolFailed on a non-zero exit status.
  - Return captured command output for the next machine step or LLM feedback.
  requirements:
    input:
    - must run in the configured workspace root
    - may accept an optional package/path parameter when declared in parameters
    output:
    - must include exit status and captured stdout/stderr or combined output
    - must emit ToolDone for success and ToolFailed for command failure
    side_effects:
    - must execute one child process using the configured binary and args
    undo:
    - must not require rollback beyond workspace restore when the underlying command writes artifacts
    errors:
    - must emit CommandError when the process cannot be started
  non_goals:
  - Does not decide whether validation is complete.
  - Does not run other validation tools.
  output:
    description: golangci-lint run process result and captured output.
    schema:
      type: object
      properties:
        exit_code:
          type: integer
        stdout:
          type: string
        stderr:
          type: string
        output:
          type: string
        elapsed_ms:
          type: integer
      required:
      - exit_code
      - output
  side_effects:
  - kind: child_process
    target: go_toolchain
    state: read_only
    description: Runs `golangci-lint run` as a child process. Read-only because the
      command only reports findings and leaves no repository mutation to reverse.
  - kind: filesystem_read
    target: workspace
    description: Reads Go source, module, and test files from the workspace.
  reversibility:
    classification: reversible
    undo: noop
    requires_confirmation: false
  errors:
  - signal: CommandError
    condition: the command cannot be started or the workspace is invalid
    message_shape: 'lint: <error>'
    state_after_failure: workspace unchanged by agent-core
  - signal: ToolFailed
    condition: the command exits non-zero
    message_shape: <captured command output>
    state_after_failure: workspace unchanged by agent-core
  relationships:
    before:
    - done
    - execute_task
    after:
    - check_result
    - invoke_llm
    overlaps:
    - tool: validate
      difference: lint runs one validation command; validate is a compatibility aggregator.
  undo:
    strategy: noop
    description: Validation command has no direct repository mutations to reverse.
