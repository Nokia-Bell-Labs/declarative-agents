# REST builtin declarations.
tools:
  - name: rest_client_get
    type: builtin
    init: rest_client_get
    category: boundary
    description: Read a configured REST resource through trusted REST config.
    problem: The agent needs a REST read word whose HTTP authority stays in profile configuration.
    goals:
      - Resolve one configured client resource read.
      - Return a grammar signal from configured status mappings.
    requirements:
      input:
        - Runtime input must contain only declared path, query, header, or body values.
      output:
        - Output must report operation identity, status, and mapped response fields when implemented.
      errors:
        - Unknown REST refs, schema failures, transport failures, and mapping failures emit CommandError.
    non_goals:
      - Does not let runtime input choose URL, method, host, auth, or redirect policy.
    parameters:
      type: object
      properties:
        params:
          type: object
          description: Declared operation parameters.
    emits: [RESTResourceRead, RESTMissing, RESTDomainFailed, CommandError]
    output:
      description: Structured REST read result.
      schema:
        type: object
        properties:
          operation: {type: string}
          status: {type: integer}
          resource_id: {type: string}
          body: {type: object}
    metrics:
      instruments:
        - name: rest.http_status_code
          kind: gauge
          unit: "1"
          description: HTTP status returned by one configured REST operation.
          value_source: http_status_code
          attributes: [operation]
        - name: rest.retry_count
          kind: counter
          unit: "{retry}"
          description: Retries attempted for one configured REST operation.
          value_source: retry_count
          attributes: [operation]
        - name: rest.request_bytes
          kind: histogram
          unit: By
          description: Serialized request body size for one configured REST operation.
          value_source: request_bytes
          attributes: [operation]
        - name: rest.response_bytes
          kind: histogram
          unit: By
          description: Response body bytes read from one configured REST operation.
          value_source: response_bytes
          attributes: [operation]
      attributes:
        - name: operation
          source: configured_operation
          cardinality: bounded
          allowed_values: [get]
          redaction: none
    side_effects:
      - kind: external_api
        target: configured_rest_client
        state: read_only
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: REST reads do not mutate local or remote state.
    errors:
      - signal: CommandError
        condition: REST definition, schema, auth, network, timeout, or mapping failure.
        message_shape: "rest_client_get: <stage>: <redacted diagnostic>"
        state_after_failure: No REST command state changes.
    relationships:
      before: [rest_client_set, rest_client_create, rest_client_delete]
      overlaps:
        - tool: rest_client_invoke
          difference: Use rest_client_get for resource reads and invoke for RPC-shaped actions.
    config:
      rest_ref: ""
      resource: ""
      operation: get

  - name: rest_client_set
    type: builtin
    init: rest_client_set
    category: boundary
    description: Update a configured REST resource through trusted REST config.
    problem: The agent needs a resource update word with declared side effects and compensation.
    goals:
      - Resolve one configured resource update operation.
      - Preserve update authority in REST config.
    requirements:
      input:
        - Runtime input must match declared operation parameters and body schema.
      output:
        - Output must report operation identity, status, and mapped response fields when implemented.
      errors:
        - Unknown REST refs, schema failures, transport failures, and mapping failures emit CommandError.
    non_goals:
      - Does not perform arbitrary PATCH, PUT, POST, or DELETE requests from runtime input.
    parameters:
      type: object
      properties:
        params: {type: object}
    emits: [RESTResourceWritten, RESTMissing, RESTDomainFailed, CommandError]
    output:
      description: Structured REST write result.
      schema:
        type: object
        properties:
          operation: {type: string}
          status: {type: integer}
          resource_id: {type: string}
          body: {type: object}
    side_effects:
      - kind: external_api
        target: configured_rest_client
        state: resource_updated
    reversibility:
      classification: compensatable
      undo: configured_compensation
    undo:
      strategy: compensating_action
      description: Use configured compensation or previous-state restore when available.
    errors:
      - signal: CommandError
        condition: REST definition, schema, auth, network, timeout, or mapping failure.
        message_shape: "rest_client_set: <stage>: <redacted diagnostic>"
        state_after_failure: Remote state changes only when the configured request reached the service.
    relationships:
      after: [rest_client_get]
      before: [rest_client_get]
    config:
      rest_ref: ""
      resource: ""
      operation: set

  - name: rest_client_create
    type: builtin
    init: rest_client_create
    category: boundary
    description: Create a configured REST resource through trusted REST config.
    problem: The agent needs resource creation with visible external side effects.
    goals:
      - Resolve one configured resource create operation.
      - Capture created-resource identity when response mapping declares it.
    requirements:
      input:
        - Runtime input must match declared operation parameters and body schema.
      output:
        - Output must report operation identity, status, resource ID, and mapped response fields when implemented.
      errors:
        - Unknown REST refs, schema failures, transport failures, and mapping failures emit CommandError.
    non_goals:
      - Does not generate service-specific Go clients.
    parameters:
      type: object
      properties:
        params: {type: object}
    emits: [RESTResourceWritten, RESTDomainFailed, CommandError]
    output:
      description: Structured REST create result.
      schema:
        type: object
        properties:
          operation: {type: string}
          status: {type: integer}
          resource_id: {type: string}
          body: {type: object}
    side_effects:
      - kind: external_api
        target: configured_rest_client
        state: resource_created
    reversibility:
      classification: compensatable
      undo: configured_compensation
    undo:
      strategy: compensating_action
      description: Use configured delete or deactivate compensation when resource identity is available.
    errors:
      - signal: CommandError
        condition: REST definition, schema, auth, network, timeout, or mapping failure.
        message_shape: "rest_client_create: <stage>: <redacted diagnostic>"
        state_after_failure: Remote state may contain a submitted resource.
    relationships:
      before: [rest_client_get, rest_client_delete]
    config:
      rest_ref: ""
      resource: ""
      operation: create

  - name: rest_client_delete
    type: builtin
    init: rest_client_delete
    category: boundary
    description: Delete or deactivate a configured REST resource.
    problem: The agent needs destructive resource operations to remain explicit in the tool language.
    goals:
      - Resolve one configured resource delete operation.
      - Report missing-resource and domain-failure signals separately.
    requirements:
      input:
        - Runtime input must match declared operation parameters.
      output:
        - Output must report operation identity, status, and mapped delete summary when implemented.
      errors:
        - Unknown REST refs, schema failures, transport failures, and mapping failures emit CommandError.
    non_goals:
      - Does not permit undeclared destructive destinations.
    parameters:
      type: object
      properties:
        params: {type: object}
    emits: [RESTResourceWritten, RESTMissing, RESTDomainFailed, CommandError]
    output:
      description: Structured REST delete result.
      schema:
        type: object
        properties:
          operation: {type: string}
          status: {type: integer}
          resource_id: {type: string}
          body: {type: object}
    side_effects:
      - kind: external_api
        target: configured_rest_client
        state: resource_deleted
    reversibility:
      classification: compensatable
      undo: configured_compensation
    undo:
      strategy: compensating_action
      description: Use configured restore or recreate compensation when prior state is available.
    errors:
      - signal: CommandError
        condition: REST definition, schema, auth, network, timeout, or mapping failure.
        message_shape: "rest_client_delete: <stage>: <redacted diagnostic>"
        state_after_failure: Remote state may have removed or deactivated a resource.
    relationships:
      after: [rest_client_get]
    config:
      rest_ref: ""
      resource: ""
      operation: delete

  - name: rest_client_invoke
    type: builtin
    init: rest_client_invoke
    category: boundary
    description: Invoke a configured RPC-shaped REST operation.
    problem: The agent needs action-shaped REST calls without service-specific adapters.
    goals:
      - Resolve one configured operation from REST definitions.
      - Keep RPC authority in trusted config.
    requirements:
      input:
        - Runtime input must match the configured operation request binding.
      output:
        - Output must report operation identity, status, and mapped domain outcome when implemented.
      errors:
        - Unknown REST refs, schema failures, transport failures, and mapping failures emit CommandError.
    non_goals:
      - Does not replace resource get, set, create, or delete words.
    parameters:
      type: object
      properties:
        params: {type: object}
    emits: [RESTResponded, RESTAccepted, RESTDomainFailed, RESTMissing, CommandError]
    output:
      description: Structured REST invoke result.
      schema:
        type: object
        properties:
          operation: {type: string}
          status: {type: integer}
          domain_error_code: {type: string}
          body: {type: object}
    side_effects:
      - kind: external_api
        target: configured_rest_client
        state: configured_operation_invoked
    reversibility:
      classification: compensatable
      undo: configured_compensation
    undo:
      strategy: compensating_action
      description: Noop unless the REST operation declares compensation.
    errors:
      - signal: CommandError
        condition: REST definition, schema, auth, network, timeout, or mapping failure.
        message_shape: "rest_client_invoke: <stage>: <redacted diagnostic>"
        state_after_failure: Remote state depends on configured operation semantics.
    relationships:
      overlaps:
        - tool: rest_client_get
          difference: Use invoke for RPC-shaped operations, not resource reads.
    config:
      rest_ref: ""
      operation: ""

  - name: rest_client_send
    type: builtin
    init: rest_client_send
    category: boundary
    description: Start a configured asynchronous REST operation.
    problem: Long-running REST operations need visible send and await grammar steps.
    goals:
      - Resolve an async REST operation.
      - Record request identity for a later await word.
    requirements:
      input:
        - Runtime input must match the configured async operation request binding.
      output:
        - Output must include request ID, operation ID, and correlation metadata when implemented.
      errors:
        - Missing async metadata, schema failures, transport failures, and mapping failures emit CommandError.
    non_goals:
      - Does not wait for final REST completion.
    parameters:
      type: object
      properties:
        params: {type: object}
    emits: [RESTAccepted, CommandError]
    output:
      description: Structured async submission result.
      schema:
        type: object
        properties:
          request_id: {type: string}
          operation: {type: string}
          correlation: {type: string}
          idempotency_token: {type: string}
    side_effects:
      - kind: external_api
        target: configured_rest_client
        state: async_request_submitted
      - kind: state_mutation
        target: rest_command_state
        state: async_request_recorded
    reversibility:
      classification: compensatable
      undo: configured_compensation
    undo:
      strategy: compensating_action
      description: Cancel or compensate when the configured operation supports it.
    errors:
      - signal: CommandError
        condition: REST definition, schema, auth, network, timeout, or async state failure.
        message_shape: "rest_client_send: <stage>: <redacted diagnostic>"
        state_after_failure: Async state is recorded only after accepted submission.
    relationships:
      before: [rest_client_await]
    config:
      rest_ref: ""
      operation: ""

  - name: rest_client_await
    type: builtin
    init: rest_client_await
    category: boundary
    description: Await completion of a configured asynchronous REST operation.
    problem: Async REST completion needs a separate grammar-visible wait word.
    goals:
      - Resolve stored async request state.
      - Map final completion, missing, timeout, and domain failure into declared signals.
    requirements:
      input:
        - Runtime input must identify configured async request state.
      output:
        - Output must include request ID, operation ID, status, and mapped response data when implemented.
      errors:
        - Missing async state, timeout, transport, and mapping failures emit CommandError or declared timeout signals.
    non_goals:
      - Does not submit a new REST request unless the configured await operation requires polling.
    parameters:
      type: object
      properties:
        request_id: {type: string}
        correlation: {type: string}
    emits: [RESTResponded, RESTDomainFailed, RESTMissing, RESTAwaitTimedOut, CommandError]
    output:
      description: Structured async completion result.
      schema:
        type: object
        properties:
          request_id: {type: string}
          operation: {type: string}
          status: {type: integer}
          body: {type: object}
    side_effects:
      - kind: state_mutation
        target: rest_command_state
        state: async_request_consumed
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Await does not mutate remote state.
    errors:
      - signal: CommandError
        condition: Async state, timeout, transport, status mapping, or response mapping failure.
        message_shape: "rest_client_await: <stage>: <redacted diagnostic>"
        state_after_failure: Async state remains according to configured retention policy.
    relationships:
      after: [rest_client_send]
    config:
      rest_ref: ""
      operation: ""

  - name: rest_server_launch
    type: builtin
    init: rest_server_launch
    category: boundary
    description: Launch configured REST server routes without blocking on requests.
    problem: Inbound HTTP routes need profile-owned authority and visible launch grammar.
    goals:
      - Resolve one configured REST server.
      - Register configured routes and listener state when implemented.
      - Support configured machine_request endpoints that run request-scoped MachineSpec sentences.
    requirements:
      input:
        - Tool config must reference one trusted REST server definition.
      output:
        - Output must include server name, bound address, route count, and binding kinds when implemented.
      errors:
        - Config, bind, route conflict, machine_request setup, or schema failures emit CommandError.
    non_goals:
      - Does not let HTTP handlers choose hidden MachineSpec actions.
      - Does not let runtime HTTP input choose profile, machine, tools, declarations, credentials, URLs, or filesystem roots.
    parameters:
      type: object
      properties: {}
    emits: [ServerLaunched, CommandError]
    output:
      description: Structured server launch result.
      schema:
        type: object
        properties:
          server: {type: string}
          address: {type: string}
          route_count: {type: integer}
          bindings: {type: array, items: {type: string}}
    side_effects:
      - kind: network_listen
        target: configured_rest_server
        state: listener_started
      - kind: state_mutation
        target: rest_server_state
        state: server_registered
    reversibility:
      classification: compensatable
      undo: rest_server_stop
    undo:
      strategy: compensating_action
      description: Stop the owned server listener through rest_server_stop.
    errors:
      - signal: CommandError
        condition: Config decode, bind, route conflict, machine_request setup, or schema failure.
        message_shape: "rest_server_launch: <stage>: <redacted diagnostic>"
        state_after_failure: Partial launch cleans up owned listener state.
    relationships:
      before: [rest_server_await, rest_server_stop]
    config:
      rest_ref: ""

  - name: rest_server_await
    type: builtin
    init: rest_server_await
    category: boundary
    description: Await inbound events from a configured REST server queue.
    problem: Inbound HTTP events need a grammar-visible wait word.
    goals:
      - Consume one configured inbound event.
      - Return the event signal declared by the endpoint.
    requirements:
      input:
        - Tool config must reference one trusted REST server definition.
      output:
        - Output must include event source, route, signal, request ID, and redacted payload when implemented.
      errors:
        - Missing server, timeout, closed queue, or payload decode failures emit declared error signals.
    non_goals:
      - Does not run workflow steps from HTTP handler code.
    parameters:
      type: object
      properties: {}
    emits: [AwaitTimedOut, ServerStopped, CommandError]
    output:
      description: Structured inbound event result.
      schema:
        type: object
        properties:
          server: {type: string}
          route: {type: string}
          signal: {type: string}
          request_id: {type: string}
          payload: {type: object}
    side_effects:
      - kind: state_mutation
        target: rest_server_queue
        state: event_consumed
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Await does not mutate remote state.
    errors:
      - signal: CommandError
        condition: Missing server, queue closed, timeout, or payload decode failure.
        message_shape: "rest_server_await: <stage>: <redacted diagnostic>"
        state_after_failure: Queue state remains according to server policy.
    relationships:
      after: [rest_server_launch]
      before: [rest_server_stop]
    config:
      rest_ref: ""

  - name: rest_await_event
    type: builtin
    init: rest_await_event
    category: boundary
    description: Await one inbound REST event from configured server sources.
    problem: Machines need one wait word that can receive events from several configured REST server queues.
    goals:
      - Wait across configured REST server event sources.
      - Return exactly one selected event signal to MachineSpec.
      - Keep source, route, and signal filters declarative.
    requirements:
      input:
        - Tool config must list trusted server sources and optional route or signal filters.
      output:
        - Output must include source, route, method, signal, payload, and request ID.
      errors:
        - Missing sources, missing servers, stopped-source policy failures, and timeout conditions emit declared signals.
    non_goals:
      - Does not execute workflow actions inside HTTP handlers or the aggregator.
      - Does not let runtime input choose URLs, methods, listeners, or authentication.
    parameters:
      type: object
      properties: {}
    emits: [AwaitTimedOut, ServerStopped, CommandError]
    output:
      description: Structured selected REST event.
      schema:
        type: object
        properties:
          source: {type: string}
          route: {type: string}
          method: {type: string}
          signal: {type: string}
          request_id: {type: string}
          payload: {type: object}
    side_effects:
      - kind: state_mutation
        target: rest_server_queue
        state: selected_event_consumed
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Await does not mutate remote state; queue restore is not implemented.
    errors:
      - signal: CommandError
        condition: Missing sources, unknown configured server, queue closed, stopped-source failure, or payload decode failure.
        message_shape: "rest_await_event: <stage>: <redacted diagnostic>"
        state_after_failure: Filtered events remain queued in REST server state.
    relationships:
      after: [rest_server_launch]
      before: [rest_server_stop]
      overlaps:
        - tool: rest_server_await
          difference: Use rest_await_event for multi-source fan-in and rest_server_await for one server queue.
    config:
      rest_ref: ""
      sources: []
      timeout: 30s
      stopped_behavior: emit_server_stopped

  - name: rest_server_stop
    type: builtin
    init: rest_server_stop
    category: boundary
    description: Stop a configured REST server and drain or fail queued events.
    problem: REST listeners need explicit grammar-visible shutdown.
    goals:
      - Resolve one configured REST server.
      - Stop owned listener state according to shutdown policy when implemented.
    requirements:
      input:
        - Tool config must reference one trusted REST server definition.
      output:
        - Output must include server name, address, drained count, dropped count, and shutdown status when implemented.
      errors:
        - Missing server, shutdown timeout, or drain failures emit CommandError.
    non_goals:
      - Does not roll back remote HTTP clients that already submitted requests.
    parameters:
      type: object
      properties: {}
    emits: [ServerStopped, CommandError]
    output:
      description: Structured server stop result.
      schema:
        type: object
        properties:
          server: {type: string}
          address: {type: string}
          drained_events: {type: integer}
          dropped_events: {type: integer}
          status: {type: string}
    side_effects:
      - kind: network_listener_shutdown
        target: configured_rest_server
        state: listener_stopped
      - kind: state_mutation
        target: rest_server_state
        state: server_stopped
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Relaunch is a separate MachineSpec action.
    errors:
      - signal: CommandError
        condition: Missing server, shutdown timeout, cleanup failure, or drain failure.
        message_shape: "rest_server_stop: <stage>: <redacted diagnostic>"
        state_after_failure: Server state reports partial shutdown when cleanup fails.
    relationships:
      after: [rest_server_launch, rest_server_await]
    config:
      rest_ref: ""
