tools:
- name: parse_plan
  type: builtin
  init: parse_plan
  description: Parse the LLM YAML response into an ImplementationPlan.
  visibility: internal
  emits:
  - PlanReady
  - ParseFailed
  - CommandError
  category: stateful_internal
  side_effects:
  - kind: state_mutation
    target: pipeline_state
    state: current_plan_parsed
    description: Sets the parsed implementation plan on pipeline state.
  reversibility:
    classification: reversible
    undo: pipeline_state_restore
  undo:
    strategy: session_state_restore
    description: Restore the pipeline state snapshot captured before parsing.
  problem: The machine needs a declared word for parsing an implementation plan without embedding that workflow step in Go control flow.
  goals:
  - Perform the parse_plan action as one machine-selected word.
  - Return an explicit signal that lets the MachineSpec choose the next state.
  - Keep sequencing outside the tool implementation and in machine.yaml.
  requirements:
    input:
    - must consume parameters from tool input, prior Result, or configured command/domain state
    output:
    - must emit one declared signal and return machine-readable output when available
    errors:
    - must emit CommandError for infrastructure failures and preserve domain failures as declared signals
  non_goals:
  - Does not choose the next workflow step; machine.yaml owns sequencing.
  - Does not hide unrelated tool execution behind this word.
  errors:
  - signal: CommandError
    condition: required input, configuration, or runtime state is invalid
    message_shape: 'parse_plan: <error>'
    state_after_failure: no additional workflow step is executed by this tool
  relationships:
    before:
    - machine-selected predecessor
    after:
    - machine-selected successor
  output:
    description: parse_plan command result summary.
    schema:
      type: object
      properties:
        message:
          type: string
        signal:
          type: string
      required:
      - message
