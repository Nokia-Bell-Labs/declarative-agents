id: test-rel01.0
title: Test Suite for Release 01.0 Unified Agent Runtime
release: "01.0"

traces:
  - rel01.0-uc001-generator-coding
  - rel01.0-uc002-evaluator-benchmark
  - rel01.0-uc003-bench-visualization

preconditions:
  - Go toolchain installed and repository packages buildable.
  - bin/agent is buildable through mage build or the integration target helper.
  - Ollama is available for live generator and evaluator integration targets.
  - qwen3.6:35b-mlx is available for mage integration:uc001.
  - qwen3.6:35b-mlx and qwen3.6:27b-mlx are available for mage integration:uc002.
  - Bench visualization requires an eval-results directory and a free port; mage integration:uc003 records the current skip behavior.

test_cases:
  - use_case: rel01.0-uc001-generator-coding
    name: Generator profile loads machine and validation sequence
    go_test: TestGeneratorConfig_MachineLoads
    inputs:
      profile: agents/generator/profile.yaml
      machine: agents/generator/machine.yaml
      validation_actions: [build, lint, test]
    expected:
      machine_loaded: true
      terminal_states: [Succeeded, Failed, BudgetExceeded]
      validation_sequence: build_then_lint_then_test
    traces:
      - srd006-yaml-machine-config AC3
      - srd013-standard-tool-library AC2

  - use_case: rel01.0-uc001-generator-coding
    name: Generator selected tools load from YAML declarations
    go_test: TestGeneratorConfig_ToolsLoad
    inputs:
      tools: agents/generator/tools.yaml
      declarations:
        - tools/builtin
        - tools/exec
    expected:
      selected_tools_include:
        - read
        - write
        - edit
        - build
        - lint
        - test
        - invoke_llm
        - parse_response
        - done
    traces:
      - srd013-standard-tool-library AC1
      - srd022-builtin-tools AC1
      - srd023-cli-exec-tools AC4

  - use_case: rel01.0-uc001-generator-coding
    name: Generator transition table validates selected tool emits
    go_test: TestGeneratorConfig_TransitionTable
    inputs:
      machine: agents/generator/machine.yaml
      selected_tools: agents/generator/tools.yaml
    expected:
      transition_table_builds: true
      selected_tool_emits_handled: true
      succeeded_is_terminal: true
    traces:
      - srd006-yaml-machine-config AC3
      - srd022-builtin-tools AC4

  - use_case: rel01.0-uc001-generator-coding
    name: Qwen profile strips thinking blocks and extracts tool envelope
    go_test: mage integration:uc001
    inputs:
      profile: agents/generator/profile.yaml
      sample: testdata/integration/uc001-generator-coding
      model: qwen3.6:35b-mlx
    expected:
      qwen_profile_selected: true
      thinking_blocks_stripped: true
      tool_call_envelope_extracted: true
    traces:
      - srd009-ollama-adapter AC1
      - srd017-llm-extensions AC1
      - srd017-llm-extensions AC2
      - srd017-llm-extensions AC3

  - use_case: rel01.0-uc001-generator-coding
    name: Generator solves sample and passes validation
    go_test: mage integration:uc001
    inputs:
      profile: agents/generator/profile.yaml
      workspace: testdata/integration/uc001-generator-coding
      validation: build_lint_test
    expected:
      run_status: succeeded
      oracle_tests_pass: true
      workspace_changes_validated: true
    traces:
      - srd005-agentic-loop AC5
      - srd013-standard-tool-library AC2

  - use_case: rel01.0-uc002-evaluator-benchmark
    name: Evaluator session machine loads from profile config
    go_test: TestEvaluatorConfig_SessionMachineLoads
    inputs:
      profile: agents/evaluator/profile.yaml
      machine: agents/evaluator/machine.yaml
    expected:
      machine_loaded: true
      terminal_states: [Done, Failed]
      transitions_present: true
    traces:
      - srd006-yaml-machine-config AC3
      - srd019-eval-harness AC0

  - use_case: rel01.0-uc002-evaluator-benchmark
    name: Evaluator session tools load from selected declarations
    go_test: TestEvaluatorConfig_ToolsLoad
    inputs:
      tools: agents/evaluator/tools.yaml
      declarations:
        - agents/evaluator/builtin.yaml
        - tools/builtin
    expected:
      selected_tools_include:
        - parse_suite_config
        - discover_suite_samples
        - expand_eval_grid
        - init_eval_session
        - report_suite_summary
        - next_point
        - run_point
        - report_session
    traces:
      - srd019-eval-harness AC0
      - srd022-builtin-tools AC1
      - srd022-builtin-tools AC5

  - use_case: rel01.0-uc002-evaluator-benchmark
    name: Evaluator session transition table validates emitted signals
    go_test: TestEvaluatorConfig_TransitionTable
    inputs:
      machine: agents/evaluator/machine.yaml
      selected_tools: agents/evaluator/tools.yaml
    expected:
      transition_table_builds: true
      emitted_signals_have_transitions: true
      done_and_failed_terminal: true
    traces:
      - srd006-yaml-machine-config AC3
      - srd022-builtin-tools AC4

  - use_case: rel01.0-uc002-evaluator-benchmark
    name: Evaluator point machine prepares isolated workspace
    go_test: TestEvaluatorConfig_PointTransitionTable
    inputs:
      point_machine: agents/evaluator/point.yaml
      point_tools: agents/evaluator/tools-point.yaml
    expected:
      workspace_tools_selected: true
      run_agent_selected: true
      point_terminal_states: [Done, Failed]
    traces:
      - srd019-eval-harness AC2
      - srd021-agent-cli-exec-tool AC3

  - use_case: rel01.0-uc002-evaluator-benchmark
    name: Evaluator setup tools expand suite grid and initialize session
    go_test: TestEvaluatorSessionSetupToolSequence
    inputs:
      suite: synthetic_profile_or_harness_suite
      grid: effort_low_high
      repetitions: 2
    expected:
      suite_parsed: true
      samples_discovered: true
      grid_points: 2
      reported_points: 4
    traces:
      - srd019-eval-harness AC0
      - srd019-eval-harness AC1

  - use_case: rel01.0-uc002-evaluator-benchmark
    name: Evaluator profile suite iterates generator profiles
    go_test: TestNextPointIteratesProfiles
    inputs:
      profiles:
        - agents/generator/profile-qwen35b.yaml
        - agents/generator/profile-qwen27b.yaml
      samples: discovered_samples
    expected:
      first_profile_selected: true
      second_profile_selected: true
      all_points_done_signal: true
    traces:
      - srd019-eval-harness AC1
      - srd019-eval-harness AC2

  - use_case: rel01.0-uc002-evaluator-benchmark
    name: Evaluator integration writes result directory
    go_test: mage integration:uc002
    inputs:
      profile: agents/evaluator/profile.yaml
      suite: testdata/integration/uc002-evaluator-benchmark/suite.yaml
      output: eval-results
    expected:
      generator_profiles_run: true
      result_entries_created: true
      meta_and_experiment_files_available: true
    traces:
      - srd019-eval-harness AC1
      - srd019-eval-harness AC2
      - srd016-traceparent AC1

  - use_case: rel01.0-uc002-evaluator-benchmark
    name: Point result tools classify output and collect metrics
    go_test: TestSummarizePointResultsUsesCollectedState
    inputs:
      point_context: collected_trace_and_oracle_state
      metrics: duration_and_outcome
    expected:
      summary_uses_collected_state: true
      outcome_classified: true
      metrics_available_on_failure: true
    traces:
      - srd019-eval-harness AC2
      - srd019-eval-harness AC4

  - use_case: rel01.0-uc003-bench-visualization
    name: Bench profile loads state machine
    go_test: TestBenchConfig_MachineLoads
    inputs:
      profile: agents/bench/profile.yaml
      machine: agents/bench/machine.yaml
    expected:
      machine_loaded: true
      terminal_states: [Done, Failed]
      serve_and_launch_states_present: true
    traces:
      - srd006-yaml-machine-config AC3
      - srd020-bench-web-ui AC1

  - use_case: rel01.0-uc003-bench-visualization
    name: Bench tools load serve_ui and launch_eval
    go_test: TestBenchConfig_ToolsLoad
    inputs:
      tools: agents/bench/tools.yaml
      declarations: agents/bench/builtin.yaml
    expected:
      serve_ui_selected: true
      launch_eval_selected: true
    traces:
      - srd020-bench-web-ui AC1
      - srd022-builtin-tools AC1
      - srd024-blocking-input-tools AC6

  - use_case: rel01.0-uc003-bench-visualization
    name: Bench transition table validates UI action flow
    go_test: TestBenchConfig_TransitionTable
    inputs:
      machine: agents/bench/machine.yaml
      selected_tools: agents/bench/tools.yaml
    expected:
      serving_action: serve_ui
      launching_action: launch_eval
      emitted_signals_have_transitions: true
    traces:
      - srd005-agentic-loop AC5
      - srd020-bench-web-ui AC4
      - srd022-builtin-tools AC4

  - use_case: rel01.0-uc003-bench-visualization
    name: launch_eval accepts profile-first evaluator config
    go_test: TestLaunchEvalFactoryAcceptsProfileConfig
    inputs:
      tool: launch_eval
      profile: agents/evaluator/profile.yaml
    expected:
      profile_config_accepted: true
      legacy_machine_flags_not_required: true
    traces:
      - srd020-bench-web-ui AC4
      - srd021-agent-cli-exec-tool AC2
      - srd022-builtin-tools AC6

  - use_case: rel01.0-uc003-bench-visualization
    name: Bench integration target records manual UI preconditions
    go_test: mage integration:uc003
    inputs:
      eval_results_dir: required
      free_port: required
    expected:
      current_target_status: skipped
      skip_reason_documents_manual_preconditions: true
      no_automated_ui_success_claim: true
    traces:
      - srd020-bench-web-ui AC3
      - srd024-blocking-input-tools AC1
