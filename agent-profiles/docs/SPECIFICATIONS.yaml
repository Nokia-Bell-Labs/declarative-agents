    title: Knowledge Manager Functional Block
    summary: Documentation-curator UX and REST workflow boundary, inputs, tool
      selections, runtime dependencies, outputs, and terminal outcomes.
    status: implemented
    path: docs/specs/software-requirements/srd011-knowledge-manager.yaml
  - id: srd012-chroma-corpus-agents
    title: Chroma Corpus Agents Functional Block
    summary: Ingest and reader Chroma retrieval boundary, REST vocabulary,
      provider-embedding threading (srd028 R12), inputs, tool selections, server
      lifecycle precondition, and terminal outcomes.
    status: implemented
    path: docs/specs/software-requirements/srd012-chroma-corpus-agents.yaml
  - id: srd013-rag-server-agent
    title: RAG Server Agent Functional Block
    summary: Persistent RAG service that hosts the srd012 reader retrieval chain
      behind a machine_request query endpoint (srd030) with monitor (srd033) and
      control servers; a vector-in query_embeddings contract returning chunks
      with the collection's embedding-model metadata; one agent per served
      corpus; the srd012 ingest path unchanged; and an optional text-in fallback
      disabled in the mesh.
    status: implemented
    path: docs/specs/software-requirements/srd013-rag-server-agent.yaml
  - id: srd014-chatbot-agent
    title: Chatbot Agent Functional Block
    summary: Browser-facing agent whose each chat turn is a request-scoped machine
      (route, embed, RAG fan-out, compose, answer) with non-adjacent data flowing
      by command-state $from() (srd038); an LLM $tool router with a normative
      misparse fallback; sequential multi-RAG fan-out with per-RAG degradation and
      embedding-space mismatch exclusion; stateless-v1 sessions; a three-panel
      ux.yaml over a static_assets SPA; and a preserved transport-authority
      boundary.
    status: planned
    path: docs/specs/software-requirements/srd014-chatbot-agent.yaml
  - id: srd015-chatbot-deployment
    title: Chatbot Mesh Deployment and Provisioning Model
    summary: One Helm chart deploying the chatbot, N values-driven RAG (agent +
      Chroma) pairs, the LLM, the Dolt backend, and the OTel collector over
      rel06.0 binary-only images with ConfigMap-mounted profiles; values-to-config
      co-generation of the chatbot RAG clients (ValidateDefinition-checked);
      tiered hot swap (Service repoint, values re-render plus checkpoint-resume
      rollout); a config-plane provisioning boundary (deployment-plane counterpart
      of srd028 V30); and OTLP/trace-backend observability wiring.
    status: planned
    path: docs/specs/software-requirements/srd015-chatbot-deployment.yaml
  - id: srd016-coordinator
    title: Coordinator Agent Functional Block
    summary: The mesh control plane's workflow orchestrator; the UX agent delegates
      a provisioning intent to it, and it sequences the ingestion and reconfiguration
      workflows, decides the values and config changes, resolves conflicts, and
      aggregates status, delegating every instance operation to the creator through
      a declared client and holding no deployment-API authority. Relocated to
      examples/chatbot-mesh as srd004-coordinator (GH-430); the example is canonical.
    status: planned
    path: docs/specs/software-requirements/srd016-coordinator.yaml
  - id: srd017-creator
    title: Creator Agent Functional Block
    summary: The mesh control plane's agent lifecycle management agent; acting on the
      coordinator's requests it selects templates, creates child ingest runs, executes
      checkpoint-resume rollout restarts through the deployment API, terminates
      instances, and verifies health, holding the deployment-API authority alone and
      passing no endpoint or credential into a running agent. Relocated to
      examples/chatbot-mesh as srd005-creator (GH-430); the example is canonical.
    status: planned
    path: docs/specs/software-requirements/srd017-creator.yaml

