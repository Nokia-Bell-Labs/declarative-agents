# Tool selection for the generator agent.
# Lists the subset of declared tools this agent uses.
#
# Usage:
#   agent --tools-declaration configs/tools/builtin.yaml \
#         --tools-declaration configs/tools/exec.yaml \
#         --tools configs/generator/tools.yaml \
#         --machine configs/generator/machine.yaml

tools:
  # file tools
  - read
  - write
  - edit
  - find
  - list_files
  # LLM tools
  - invoke_llm
  - parse_response
  - report_parse_error
  - reset_history
  # validation
  - validate
  - nudge_reread
  # completion
  - done
  # build/test (used by validate)
  - build
  - vet
  - lint
  - test
