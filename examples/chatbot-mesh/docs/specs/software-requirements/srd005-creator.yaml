id: srd005-creator
title: Creator Agent Functional Block

context: |
  The creator is the mesh's agent lifecycle management (LCM) agent: it makes
  running instances match what the coordinator (srd004) decided. Acting on the
  coordinator's requests, it selects the profile and rendered config for an
  instance (template selection), spawns corpus-ingest child runs (instance
  creation), restarts reconfigured agents via checkpoint-resume rollouts
  (termination and creation with resume, srd003 R3.2), verifies post-rollout health
  (health monitoring), and handles resource allocation. It plays the
  reference-architecture Creator role (template-selection, instance-creation,
  health-monitoring, termination, resource-allocation), the acting half of the
  Agent Lifecycle Management component.

  The creator acts; the coordinator decides. The creator makes no workflow or
  values decision -- it receives a decided instance operation and realizes it. It
  alone holds deployment-API credentials, authenticated apart from the chat path,
  and it never passes an endpoint or credential into a running agent. The reusable
  request runtime, monitor reads, and REST client transport stay in agent-core; the
  instance-request endpoint, the template resolution, and the declared deployment-API
  and monitor clients stay profile-owned.

problem: |
  A decided reconfiguration -- add a RAG, restart an agent with resume, ingest a
  directory -- must be realized against real instances: resolving a role to a
  profile and rendered config under the mounted-profile contract, spawning child
  runs, executing a checkpoint-resume rollout through the deployment API, and
  verifying health afterward. The mesh needs an agent that performs those
  mechanics behind one boundary, holds the deployment-API authority alone, and
  reports health back to the coordinator, without deciding what to change. The
  requirements must name the instance-request boundary, template selection, the
  instance operations, health monitoring, and the authority boundary, separately
  from the agent-core runtime.

goals:
  - G1: Model the creator as a persistent LCM agent that binds a decided instance operation from the coordinator to a request-scoped run.
  - G2: Resolve a requested role to its profile path and rendered ConfigMap under the rel06.0 mounted-profile contract (agent-core srd034), so an instance runs one image with a supplied profile.
  - G3: Perform instance operations -- create child ingest runs, execute checkpoint-resume rollouts of reconfigured agents through the deployment API, and terminate instances.
  - G4: Verify post-operation health via monitor reads and report it to the coordinator.
  - G5: Hold the deployment-API authority alone, authenticated apart from chat, and never hand an endpoint or credential to a running agent.

requirements:
  R1:
    title: Instance-request boundary
    items:
      - R1.1: The creator SHALL expose a machine_request instance endpoint (agent-core srd030) that binds one decided instance operation from the coordinator (srd004) to one request-scoped run and maps terminal signals to HTTP status.
      - R1.2: The creator SHALL run a monitor server (agent-core srd033) and a control server (health + lifecycle exit), with loopback-configurable bind addresses.
      - R1.3: The instance endpoint SHALL accept a declared operation (create, restart, terminate, ingest) with its role and parameters, and SHALL NOT accept an already-resolved endpoint or credential for a running agent from the coordinator.
  R2:
    title: Template selection
    items:
      - R2.1: The creator SHALL resolve a requested role to its profile path and rendered ConfigMap under the rel06.0 mounted-profile contract (agent-core srd034), so an instance runs the shared image with a supplied profile rather than a baked-in program.
      - R2.2: The creator SHALL NOT author the rendered config; it consumes the co-generated values-to-config output (srd003 R2) the deployment API produces.
  R3:
    title: Instance operations
    items:
      - R3.1: The creator SHALL create child agent runs -- a corpus-ingest instance per requested directory -- and return each run's outcome. For an ingest, the outcome SHALL measure the change in the target collection's document count across that child run, not the collection's accumulated total. A run whose post-run count does not exceed its pre-run count SHALL be rejected as an ingest shortfall, including an unchanged re-ingest; idempotent storage state does not satisfy a request to contribute documents.
      - R3.2: The creator SHALL execute a checkpoint-resume rollout of a reconfigured agent through the deployment API (srd003 R3.2), so the agent resumes from its Dolt checkpoint via --dolt-dsn and --resume-checkpoint rather than cold-starting.
      - R3.3: The creator SHALL terminate an instance on request and handle resource allocation for a created instance.
  R4:
    title: Health monitoring
    items:
      - R4.1: After a create, restart, or terminate, the creator SHALL verify the instance's health via monitor reads (agent-core srd033) before reporting the operation complete.
      - R4.2: The creator SHALL report per-operation health and outcome to the coordinator, which aggregates it for the provisioning panel (srd004 R1.3).
  R5:
    title: Authority boundary
    items:
      - R5.1: The creator alone SHALL hold the deployment-API credentials; the coordinator (srd004) and the chatbot (srd002) SHALL NOT.
      - R5.2: The creator SHALL authenticate its instance endpoint and its deployment-API client apart from the chat path (srd003 R4 lineage).
      - R5.3: The creator SHALL NOT pass an endpoint, URL, method, or credential into a running agent; authority is set by declared, validated config, never by a running control surface (agent-core srd028 V30).
      - R5.4: The creator SHALL expose no browser-facing surface. Its instance endpoint is reached only by the coordinator (R1.1) and the operator reaches the mesh through the coordinator's intent endpoint (srd004 R1.5), so the creator remains the sole caller of the apply surface (srd006 R4.1) for coordinator-originated and operator-originated changes alike.
  R6:
    title: Non-goals
    items:
      - R6.1: The creator SHALL NOT decide what to change. The desired-state decision is the operator's, made through the provisioning panel, and the coordinator orchestrates realizing it (srd004 R3.1). The creator forwards a decided values document from either origin and authors neither.
      - R6.2: The creator SHALL NOT hold values co-generation authority; the deployment values are co-generated by the chart (srd003 R2) and applied through the deployment API.

acceptance_criteria:
  - id: AC1
    criterion: The creator is described as a persistent LCM agent with a machine_request instance endpoint from the coordinator, monitor and control servers, and loopback-configurable bind addresses, accepting no resolved endpoint or credential.
    traces: [R1.1, R1.2, R1.3]
  - id: AC2
    criterion: Template selection resolves a role to a profile path and rendered ConfigMap under the mounted-profile contract without authoring the config.
    traces: [R2.1, R2.2]
  - id: AC3
    criterion: The instance operations -- child ingest runs measured by their document-count delta, checkpoint-resume rollout restarts through the deployment API, and termination with resource allocation -- are specified; a zero-delta run is rejected even when the collection was already populated or the same directory was ingested before.
    traces: [R3.1, R3.2, R3.3]
  - id: AC4
    criterion: Post-operation health verification via monitor reads is reported to the coordinator for the provisioning panel.
    traces: [R4.1, R4.2]
  - id: AC5
    criterion: The creator alone holds the deployment-API credentials, authenticates apart from chat, and never hands an endpoint or credential to a running agent; deciding what to change and values co-generation authority are non-goals.
    traces: [R5.1, R5.2, R5.3, R6.1, R6.2]
  - id: AC6
    criterion: The creator exposes no browser-facing surface and stays the sole caller of the apply surface, forwarding a decided values document whether the coordinator or the operator originated it.
    traces: [R5.4, R6.1]
    tests:
      - "test-rel06.0-executor: The panel route reaches only the authorized surface"

depends_on:
  - srd_id: srd004-coordinator
    symbols_used: [R1, R3, R4]
  - srd_id: srd003-chatbot-deployment
    symbols_used: [R2, R3, R4]

platform_dependencies:
  # agent-core runtime contracts this agent builds on. External references, owned
  # by agent-core, not part of this example's corpus.
  - srd_id: srd030-machine-request-rest-binding
    provider: agent-core
    symbols_used: [R1]
  - srd_id: srd033-monitor-rest-api
    provider: agent-core
    symbols_used: [R4]
  - srd_id: srd034-external-agent-profiles
    provider: agent-core
    symbols_used: [R2]
  - srd_id: srd028-rest-client-tools
    provider: agent-core
    symbols_used: [V30]

implementation_status:
  implemented:
    - >-
      The creator profile (agents/creator): its instance endpoint, the
      values-plane rollout client to the deployment API (apply_instance), the
      rollout health verification (verify_health, R4), the deployed-values state
      read the provisioning panel loads through (read_state, srd006 R1.5), and the
      authority boundary (R5) -- the creator is the mesh's only declared
      deployment-API client. mage integration:controlPlane drives the panel's
      values apply through coordinator -> creator -> deployment API against the
      real agents and a recording fake, asserting the decided document crosses
      each hop and that no endpoint or credential does.
    - >-
      The corpus-ingest child run (R3.1) shipped with GH-762: POST /api/v1/ingest
      runs a corpus-ingest child agent over the requested directory through
      agent-core's agent-as-child-CLI contract (srd021) -- the creator runs the
      agent binary its image already carries against the child profile, so no
      agent-core change was needed -- then resolves the ingested collection and
      reads its count to report what the run actually wrote. That read is not
      redundant with the child's exit code: corpus-ingest reaches its own Succeeded
      terminal on CountReady whatever the count, so a run that ingested nothing
      still exits zero. The ingest is its own endpoint and machine leg because
      initial_signal is per-endpoint and a machine cannot branch on a body field,
      which is why an ingest posted at /instance could only ever take the
      values-apply leg (GH-755).
    - >-
      Rejecting an ingest that wrote no documents (AC3's shortfall half) shipped
      with GH-763, once agent-core's value predicate word (srd041) made the
      comparison expressible. GH-772 made that comparison measure the run rather
      than the collection: the creator resolves the collection and reads its count
      before the child, reads it again afterward, and uses command state to compare
      the post-run count with the pre-run baseline. A zero delta answers 422 and
      reaches the coordinator's Rejected leg even when the collection was already
      populated. An unchanged re-ingest is deliberately a shortfall: the operation
      promises a run contribution, not merely an already-satisfied storage state.
      The corpus-ingest contract remains unchanged for its other callers. A count
      that will not resolve reaches IngestFailed rather than IngestRejected,
      because a broken read is not an empty corpus.
  planned:
    - >-
      Ingesting into a caller-named collection. The coordinator sends a collection
      with its intent, but it does not reach the child: agent-core exec tools pass
      no environment (srd021) and the corpus-ingest profile hardcodes its
      collection name, so the child always writes that profile's own collection,
      which is also the one the creator reads back. The endpoint accepts the field
      so the declared intent stays whole; honouring it needs the child profile
      parameterized first.

