id: agent-core-specifications
title: Agent Core Specification Index

overview: |
  Specification index for the agent-core framework. Thirty-four SRDs
  define the generic agentic loop engine and its supporting packages across
  seven releases. Release 04.0 implements embedded monitoring. The 00.0 release
  owns the engine foundation and its support packages. In 01.0, configured
  runtime behavior expands into evaluator and bench contracts. Tool
  declarations also belong to that release. Rollback lifecycle contracts
  belong to 02.0. Declarative REST runtime contracts belong to 03.0. REST
  client and server contracts sit in the same release. Profile migration and
  mounted-profile runtime contracts belong to 06.0, where the mounted-profile
  use case and profile-migration suite now name implemented proof commands.
  Twenty-one use cases exercise the SRDs across the seven releases. Eight formal YAML test suites cover 210 acceptance test
  cases across releases 00.0 through 06.0; additional
  coverage comes from Go test functions across all packages (run
  `go test ./... -v` for current counts).

  The monitor release adds embedded runtime monitoring. Current code defines
  the monitor store, recorder, metric validation, disabled mode, OpenTelemetry
  metric export, REST/OpenAPI reads from cached monitor state, live cmd/agent
  startup wiring, workflow labels, and the Release 04.0 proof.

  SRD release assignments are range based. Release 00.0 covers srd001
  through srd018. Release 01.0 covers srd019 through srd024. Release
  02.0 covers srd025 and srd026. Release 03.0 covers srd027 through
  srd031. Release 04.0 covers srd032 and srd033. Release 06.0 covers
  srd034.

  Source-of-truth note.
  - roll-backs.md and tools-as-dsl.md are historical design notes. Their
    requirements have been consolidated into srd025, cfg-tool-authoring-standard,
    sm-rollback-lifecycle, and sm-tool-language. Release 02.0 use cases and
    formal test suites carry the scenario coverage. Future requirements changes
    should update those canonical documents first.

