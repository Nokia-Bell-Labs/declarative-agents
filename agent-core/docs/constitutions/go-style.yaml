# Go Style Constitution

id: go-style
title: Go Style Constitution
purpose: 'We use this constitution for Go source, tests, and magefiles in Agent Core.

  It mirrors the local Cursor rule and adds repository-specific package,

  lifecycle, and configuration guidance.

  '
copyright_header: "Every Go file starts with this header before the package declaration:\n\n  // Copyright (c) 2026 Nokia.\
  \ All rights reserved.\n"
implementation_strategy: 'Write all source files before running build or test commands. Plan the full

  change, edit files in dependency order, then compile and test once. Avoid

  compile-fix loops that change one missing import or symbol at a time.

  '
package_layout:
  cmd: Entry points and adapter wiring. Keep main packages small.
  internal: Private implementation packages for runtime, model, tools, evaluation, planning, observability, and support.
  pkg: Public API. In this repo, pkg/spec is the public specification parser and validator surface.
  magefiles: Build tooling. Keep targets small and named by concern.
  agents: YAML profiles, machines, tool selections, and boundary configs.
  tools: Shared builtin and exec tool declarations.
interfaces:
  rules:
  - Define package boundaries with small interfaces when a parent package depends on a sub-package behavior.
  - Accept interfaces as parameters.
  - Return structs.
  - Keep interfaces to one to three methods.
  - Do not use interface{} or any in parameters, returns, or struct fields except at standard library serialization boundaries.
design_patterns:
- name: Strategy
  use: Multiple implementations of the same behavior selected by config.
- name: Command
  use: Runtime actions that execute, report a Result, and may undo or compensate.
- name: Facade
  use: Thin adapter over a subsystem when callers should not know internal steps.
- name: Factory
  use: NewXxx constructors and builtin factory registration.
- name: Decorator
  use: Tracing, timing, retries, and other cross-cutting behavior.
- name: Builder
  use: Optional construction parameters or core.Builder command creation.
- name: Adapter
  use: Wrapping external APIs, subprocesses, telemetry, or model clients.
- name: Observer
  use: Channels or callbacks for lifecycle and async notification when needed.
errors:
  rules:
  - Use guard clauses.
  - 'Wrap errors with context using fmt.Errorf("doing X: %w", err).'
  - Return errors for runtime conditions.
  - Panic only for programming contract violations.
  - Do not panic on I/O, user input, YAML data, subprocess failure, or model responses.
  - Do not silently discard errors except best-effort cleanup with a comment.
naming:
  exported: PascalCase
  unexported: camelCase
  cli_flags: kebab-case
  binary_constants: binXxx
  factories: NewXxx
  receivers: one or two lowercase letters, consistent for the type
  packages: short domain nouns, not util, common, helpers, or misc
file_organization:
  file_names:
    rule: Name files by concern, not by kind.
    forbidden:
    - types.go
    - helpers.go
    - utils.go
  declaration_order:
  - constants and package-level variables
  - types
  - constructors
  - exported functions and methods
  - unexported helpers
  - main, for cmd packages
  imports:
    groups:
    - standard library
    - external modules
    - internal packages
    rule: Separate groups with blank lines and let gofmt or goimports order within groups.
functions:
  max_lines: 40
  parameter_rule: Group more than three related parameters into a config struct.
  responsibility_rule: Each function does one thing.
  split_points:
  - validation
  - parsing
  - formatting
  - I/O
  - branch-specific behavior
files:
  max_production_lines: 500
  split_rule: Split large files by responsibility before adding unrelated behavior.
configuration:
  rules:
  - Runtime agent behavior belongs in YAML profiles, machines, tools, and tool declarations.
  - cmd/agent SHALL take its program shape from argv flags (for example --profile) and from files those flags reference. Do not use os.Getenv for runtime configuration channels such as profile roots, core install prefixes, or workspace defaults.
  - Do not add mode-specific branches to cmd/agent when a profile, machine, or ToolDef can express the behavior.
  - Use typed config structs when decoding ToolDef config.
  - Keep compatibility paths explicit and tested.
  - Sanctioned exception to the no-os.Getenv rule, outside cmd/agent, is the substitution feature in internal/tools/rest/envexpand.go (os.LookupEnv expands ${VAR:-default} references in mounted REST definitions from chart-injected values, not an ad-hoc config channel). magefiles/ may read build or CI env where no configuration alternative exists.
tool_language:
  rules:
  - MachineSpec owns workflow sequencing.
  - ToolDef owns the contract for one vocabulary word.
  - Boundary tools must declare side effects, emitted signals, and undo or compensation.
  - New workflow behavior should prefer machine.yaml transitions over compound Go tools.
  - 'Deployment-plane authority lives in the executor agent (srd006), a declarative
    profile that binds helm and kubectl as exec words behind an authenticated apply
    API. The creator agent (srd005) drives that API; the executor alone wields the
    cluster credentials and helm/kubectl binaries, keeping that authority out of the
    general declarative runtime (which carries no credential resolver). Because the
    executor is itself an agent profile rather than a bespoke Go service, no
    executable-arm exception to executables-are-agents is needed; the recurring
    declarative-decomposition audit checks that deployment logic stays in the executor
    profile.'
  - 'Sanctioned home for LLM transport (tool-contract pattern, design-patterns 04):
    internal/model/llm/ is the model-client adapter layer, and the http.Client
    construction in internal/tools/llm/invoke.go that wires it is exempt from the
    rest-tool-carries-transport rule. LLM inference is a distinct transport concern --
    streaming responses, per-request model options (options.go), and provider-specific
    request and response shapes -- that the declarative rest tool (fixed operations,
    no streaming, no dynamic options) does not model. internal/model/llm/ is a
    deliberate pluggable-provider abstraction (ollama today, other providers behind the
    same interfaces). invoke_llm''s response parsing is already a separate tool, the
    right shape; only the inference transport lives in the adapter. The recurring
    declarative-decomposition audit cites this instead of re-flagging invoke.go and the
    ollama adapter.'
testing:
  rules:
  - Use table-driven tests with named rows and t.Run.
  - Call t.Parallel() first in tests that are safe to parallelize.
  - Do not call t.Parallel() in tests that call os.Chdir or mutate global state.
  - Call t.Helper() first in every test helper.
  - Cover contracts and observable behavior, not implementation details.
comments:
  exported_symbols: Godoc comment starts with the symbol name.
  unexported_symbols: Comment only when the reason is not obvious from names.
  requirement_ids: Reference SRD or requirement IDs when a comment explains a specific contract.
review_checklist:
- No new duplicated logic.
- No scattered binary names, paths, URLs, or repeated labels.
- Every error is handled or intentionally discarded with a comment.
- New functions stay at or below 40 lines.
- New production files stay near or below 500 lines.
- Exported symbols have Godoc comments.
- Tests cover observable behavior.
- Profile-driven behavior stays in YAML unless Go code is the required runtime boundary.
references:
- .cursor/rules/go-style.mdc
- docs/ARCHITECTURE.yaml
- docs/specs/semantic-models/tool-language.yaml
- docs/specs/config-formats/runtime-contract.yaml
