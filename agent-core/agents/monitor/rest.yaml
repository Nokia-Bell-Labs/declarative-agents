rest:
  version: v1
  limits:
    local_monitor:
      timeout: 2s
      read_timeout: 2s
      max_request_bytes: 4096
      max_response_bytes: 1048576
      network:
        hosts: [127.0.0.1, localhost]
  servers:
    monitor:
      address: 127.0.0.1:18083
      limits_ref: local_monitor
      queue:
        name: monitor
        capacity: 8
        overflow: reject
        timeout: 100ms
      shutdown:
        timeout: 2s
        drain_policy: drain
        stop_listeners: true
        unblock_await_signal: ServerStopped
      endpoints:
        machine_spec:
          method: GET
          path: /monitor/machine
          binding: read_state
          monitor_view: machine_spec
        current_state:
          method: GET
          path: /monitor/state
          binding: read_state
          monitor_view: current_state
        tools:
          method: GET
          path: /monitor/tools
          binding: read_state
          monitor_view: tools
        metrics:
          method: GET
          path: /monitor/metrics
          binding: read_state
          monitor_view: metrics
        recent_events:
          method: GET
          path: /monitor/events
          binding: read_state
          monitor_view: events
        event_stream:
          method: GET
          path: /monitor/events/stream
          binding: stream_events
          monitor_view: events
        openapi:
          method: GET
          path: /monitor/openapi
          binding: static_metadata
          monitor_view: openapi
        control_exit:
          method: POST
          path: /monitor/control/exit
          binding: emit_signal
          signal: ExitRequested
          request:
            body_schema:
              type: object
              properties:
                reason:
                  type: string
          response:
            output:
              accepted: "true"
