id: documentation-curator-ui
title: Knowledge Manager Documentation UI
source_owner: agents/knowledge-manager/documentation-curator
routes:
  - id: docs_index
    path: /docs
    label: Documentation
    action: doc_list
    resource: docs
  - id: docs_detail
    path: /docs/*
    label: Document Detail
    action: doc_get
    resource: docs
sidebar:
  title: Documentation
  groups:
    overview:
      label: Overview
      order: 0
    release:
      label: Releases
      order: 1
    semantic-model:
      label: Semantic Models
      order: 2
    config-format:
      label: Config Formats
      order: 3
    srd:
      label: Software Requirements
      order: 4
    use-case:
      label: Use Cases
      order: 5
    test-suite:
      label: Test Suites
      order: 6
actions:
  list_documents:
    ui_action: doc_list
    request_machine_action: doc_list_resource
    route: docs_index
  read_document:
    ui_action: doc_get
    request_machine_action: doc_read_resource
    route: docs_detail
  validate_document:
    ui_action: doc_validate
    route: docs_detail
  suggest_changes:
    ui_action: doc_suggest_changes
    route: docs_detail
  approve_patch:
    ui_action: doc_patch_approve
    route: docs_detail
  reject_patch:
    ui_action: doc_patch_reject
    route: docs_detail
  reopen_patch:
    ui_action: doc_patch_reopen
    route: docs_detail
presentation:
  raw_yaml_toggle: true
  state_diagram: true
  config_viewer: true
  source_viewer: true
