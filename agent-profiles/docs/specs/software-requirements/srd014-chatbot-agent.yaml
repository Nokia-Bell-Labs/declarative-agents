id: srd014-chatbot-agent
title: Chatbot Agent Functional Block

context: |
  The chatbot agent is the browser-facing agent of the mesh. It follows the
  srd011 documentation-curator layout: a rest.yaml with static_assets,
  machine_request, monitor, and control servers; a ui/ directory holding a built
  single-page app; and a ux.yaml actor configuration that places the panels.

  Each chat turn is a request-scoped machine run. A turn routes to one chat-LLM
  word and RAG set through an LLM classifier (the $tool indirection), embeds the
  query once, fans out that one embedding to the declared RAG server agents
  (srd013, vector-in), composes a grounded prompt from the returned chunks and
  the original query, and invokes the chosen chat-LLM word; the terminal signal
  maps to the HTTP chat response. Non-adjacent data -- the original query, the
  routing decision, the retrieved chunks -- reaches later steps by command-state
  $from() addressing (agent-core srd038), not by threading carry_forward through
  every intervening word.

  The reusable HTTP runtime, static-asset host, machine_request binding, monitor,
  and command-state store stay in agent-core. The turn machine, the router
  classifier prompt, the RAG and LLM client declarations, the SPA, and the ux.yaml
  panel placement stay profile-owned.

problem: |
  The mesh needs a browser-facing agent that turns a chat request into a routed,
  retrieval-grounded answer over N RAG sources, with observable per-turn behavior
  and no server-side session coupling. The requirements must name the turn machine
  shape and its command-state data flow, the router and its fallback, the
  multi-RAG fan-out and degradation rules, the stateless-v1 session decision, the
  three-panel UX surface, and the transport-authority boundary, separately from
  the agent-core runtime.

goals:
  - G1: Model each chat turn as a request-scoped machine that routes, embeds, fans out to RAG servers, composes, and answers, with non-adjacent data flowing by command-state $from().
  - G2: Define the LLM router that selects a chat-LLM word through the $tool indirection with a normative misparse fallback.
  - G3: Define sequential multi-RAG fan-out with per-RAG degradation and embedding-space mismatch exclusion.
  - G4: Fix stateless-v1 sessions (browser sends history) and record durable sessions as a follow-on non-goal.
  - G5: Declare the three-panel UX surface in ux.yaml over a static_assets-served SPA, deferring panel content to their own requirements.
  - G6: Keep RAG and LLM endpoints declared rest.yaml clients so nothing in the turn machine or UX can alter transport authority.

requirements:
  R1:
    title: Turn machine shape and data flow
    items:
      - R1.1: A chat turn SHALL run a request-scoped machine (agent-core srd030) that sequences route, embed_query, RAG fan-out, compose, and the chosen invoke_llm word, mapping the terminal signal to the HTTP chat response.
      - R1.2: The original query, the routing decision, and the retrieved chunks SHALL reach the compose and answer steps through command-state $from() addressing (agent-core srd038), not through carry_forward chains across intervening words. The compose step SHALL use the agent-core compose builtin, which renders a grounding template from $from(label).path selectors, so invoke_llm receives one composed prompt without carry_forward for the non-adjacent message hop.
      - R1.3: embed_query SHALL embed the incoming query once, and the single resulting vector SHALL be the fan-out input to every selected RAG server.
  R2:
    title: LLM router
    items:
      - R2.1: The router SHALL make one classifier LLM call whose response is parsed to a $tool selection over the declared chat-LLM words (and, where configured, the selected RAG set).
      - R2.2: The declared tool set for the router SHALL be the chat-LLM words; the router SHALL NOT select any word outside that declared set.
      - R2.3: A misparse or an out-of-set selection SHALL fall back to a configured default chat-LLM word rather than fail the turn.
  R3:
    title: Multi-RAG fan-out and degradation
    items:
      - R3.1: The turn SHALL query the declared RAG clients for the selected set; v1 fan-out SHALL be sequential over those clients.
      - R3.2: A per-RAG query failure SHALL degrade rather than fail the turn, so the answer SHALL be composed from the remaining chunks and the failure SHALL be noted in the response metadata.
      - R3.3: A RAG whose reported embedding model (srd013 R2.3) does not match the query embedding's model SHALL be excluded from the composed chunks and the exclusion SHALL be reported in the response metadata.
  R4:
    title: Stateless sessions
    items:
      - R4.1: The chat turn SHALL be stateless in v1, so the browser SHALL send the conversation history with each turn and the agent SHALL NOT keep a server-side session store.
      - R4.2: Durable Dolt-backed sessions SHALL be an explicit follow-on and SHALL NOT be part of the v1 contract.
  R5:
    title: UX surface
    items:
      - R5.1: The agent SHALL declare three panels -- chat, observability, and provisioning -- in ux.yaml, following the srd011 UX placement precedent.
      - R5.2: static_assets SHALL serve the built SPA that renders the panels; the SPA build and panel content requirements SHALL be owned by their own issues, not this SRD.
  R6:
    title: Transport-authority boundary
    items:
      - R6.1: RAG and LLM endpoints SHALL be declared rest.yaml clients with fixed authority; the turn machine and the UX SHALL NOT feed hosts, URLs, methods, or credentials into a running request (agent-core srd028 V30 lineage).
      - R6.2: Router and RAG selection SHALL choose among declared words and declared clients only, never a runtime-supplied endpoint.

non_goals:
  - Define Go package APIs for the agent-core request, static-asset, monitor, or command-state runtime.
  - Server-side session persistence; durable Dolt-backed sessions are a recorded follow-on (R4.2).
  - Panel content and SPA implementation; those are owned by the chat-panel and observability-panel issues.
  - Parallel or concurrent RAG fan-out; v1 is sequential (R3.1).
  - In-agent RAG multiplexing; each RAG source is its own srd013 instance.

acceptance_criteria:
  - id: AC1
    criterion: The chat turn is described as a request-scoped machine (route, embed, fan-out, compose, answer) with the original query, routing decision, and chunks flowing by command-state $from() rather than carry_forward chains, and one embedding fanned out to every selected RAG.
    traces: [R1.1, R1.2, R1.3]
  - id: AC2
    criterion: The router is specified as one classifier call parsed to a $tool selection over the declared chat-LLM words, with a normative fallback to a configured default word on misparse or out-of-set selection.
    traces: [R2.1, R2.2, R2.3]
  - id: AC3
    criterion: Sequential multi-RAG fan-out is specified with per-RAG failure degradation and embedding-model mismatch exclusion, both reported in the response metadata.
    traces: [R3.1, R3.2, R3.3]
  - id: AC4
    criterion: Stateless-v1 sessions (browser-sent history, no server store) and the durable-session follow-on are stated as requirements and non-goals rather than prose.
    traces: [R4.1, R4.2]
  - id: AC5
    criterion: The three-panel ux.yaml surface over a static_assets-served SPA is declared, with panel content and SPA build deferred to their own issues.
    traces: [R5.1, R5.2]
  - id: AC6
    criterion: The transport-authority boundary is stated so declared rest.yaml clients hold authority and neither the turn machine nor the UX can supply a runtime endpoint.
    traces: [R6.1, R6.2]

depends_on:
  - srd_id: srd011-knowledge-manager
    symbols_used: [R1]
  - srd_id: srd013-rag-server-agent
    symbols_used: [R2]
  - srd_id: srd001-agent-functional-blocks
    symbols_used: [R1]
  - srd_id: srd030-machine-request-rest-binding
    symbols_used: [R1]
  - srd_id: srd033-monitor-rest-api
    symbols_used: [R1]
  - srd_id: srd038-command-state-store
    symbols_used: [R1, R2]

implementation_status:
  done:
    - Turn machine and single-RAG data flow (R1, GH-304): the agents/chatbot profile hosts a chat machine_request endpoint whose request-scoped turn sequences embed_query, rag_query (to the srd013 RAG server), compose_prompt, and invoke_llm. The original message reaches compose through command-state $from(embed_query).carried.input and the retrieved chunks through $from(rag_query).mapped.documents, with no carry_forward for the non-adjacent message hop; embed_query embeds the message once. A RAG failure degrades to a mapped 200 (compose renders empty chunks, the model answers ungrounded) rather than a 500. Verified end to end against a live Chroma, RAG server, and Ollama, where a seeded corpus yields a grounded answer citing the record id and a downed RAG server yields the degraded response.
    - Chat panel and three-panel shell (R5.1, R5.2, GH-305): ui/ux.yaml declares the chat, observability, and provisioning routes; ui/app is a Vite and React SPA built to ui/app/dist and served by the chatbot_chat static_assets endpoint. The chat panel keeps history client-side and sends it with each turn (R4.1), renders the answer, extracts the cited record ids as source chips, and shows an ungrounded indicator when a turn cites none. The observability and provisioning panels are reserved placeholders in the shell.
    - LLM $tool router (R2.1, R2.2, R2.3, GH-307): after compose the turn runs a route word (a small classifier reading the original question through user_prompt_from) whose response parse_route parses to one chat-LLM word, and a $tool transition dispatches the chosen word (invoke_llm_fast or invoke_llm_deep). The declared vocabulary is exactly the two chat-LLM words (external visibility); a router misparse, an out-of-vocabulary pick, or a router error falls back to the default word invoke_llm_fast. The chosen chat-LLM word reads the composed prompt through user_prompt_from $from(compose_prompt) and runs answer_only so it produces a grounded answer rather than re-selecting a tool. Verified end to end against a live Chroma, RAG server, and Ollama, where a factual question routes to the fast model and an analytical question to the deep model, both grounded, and a downed RAG server still returns the degraded 200. Depends on GH-349 (invoke_llm user_prompt_from) and GH-351 (request-local tool state and answer_only for machine_request $tool routing).
    - Sequential multi-RAG fan-out (R3.1, R3.2, R3.3, GH-308, GH-365): after embed the turn queries rag_query0 then rag_query1, each threading the one embedding through command-state $from(embed_query). Degradation and exclusion are machine transitions, not a merge word: a RAG whose query fails routes on via CommandError (degraded, R3.2), and a RAG that rejects the query embedding returns a 400 the client maps to QueryRejected, which routes on distinctly (excluded, R3.3, srd013 R2.3); each RAG's outcome stays in command state. compose then renders the grounding prompt from the surviving $from(rag_query0)/$from(rag_query1).mapped.documents, each under its own [rag0]/[rag1] header, an unresolved source rendering empty; per-source top-k is bounded upstream by the RAG query n_results (srd013 R2.1), so no ordering or capping word is needed. GH-365 removed the domain-specific rag_merge builtin (GH-354) from agent-core, keeping the substrate domain-agnostic; the behavior is preserved and relocated to visible machine structure. Verified end to end against a live Chroma, two RAG servers over disjoint corpora, and Ollama, where a spanning question draws chunks from both RAGs and a stopped second RAG still returns a 200 answered from the remaining RAG. Sequential is the v1 contract; concurrent fan-out (async await-any) is a follow-on. The per-RAG degraded and excluded outcomes stay in command state for the response-metadata follow-on.
    - Observability panel v1 (part of R5.1, GH-311): the observability route renders one live sub-panel per monitored agent (chatbot, rag0, rag1 from ui/ux.yaml monitored_agents), each showing the agent's run state, a metric-sample counter, and a feed of run-event state transitions, fed by that agent's monitor read_state and SSE stream. The SPA reads every agent's monitor through the chatbot's same-origin monitor_proxy binding (agent-core GH-358), so no read crosses origin. A turn-correlation bar records each chat turn's time window and highlights the events observed during a selected turn across every sub-panel. Verified in a browser against the live mesh, where a routed two-RAG turn shows the full embed to answer transition trace in the chatbot panel and the query cycles in each rag-server panel. Request-id-tagged correlation is a follow-on that needs the monitor run events to carry the request id.
    - Observability panel v2 cross-agent trace waterfall (part of R5.1, GH-312): the chat machine_request response carries the turn's trace_id (agent-core), and selecting a turn renders its connected cross-agent trace as a span waterfall grouped and colored by service.name, fetched from the trace backend (Jaeger query API) same-origin through the monitor_proxy jaeger upstream. The connected trace is real because the request-scoped machine now exports its spans under the machine_request span and propagates traceparent to the RAG servers (agent-core GH-362, building on GH-310). The panel degrades to a backend-missing notice when the trace backend is absent, leaving the v1 monitor panels live. Verified in a browser against a live Jaeger, where a routed turn's waterfall shows the chatbot spans (embed, rag_query0/1, compose, router, answer) with the rag-server's machine_request and its chroma client spans nested under the chatbot's rag_query0. Integration.Chatbot asserts one connected trace id across the chatbot and each rag-server span log.
    - Provisioning panel (part of R5.1, GH-315): the provisioning route renders the mesh view (RAG cards with add, remove, and repoint edits, the LLM endpoint, and the interesting parameters grouped per srd015), a diff preview of the pending edits, and rollout progress polled after an apply. It drives the deployment API only (srd015 R4) at the same-origin /provisioning path, holding the apply token in memory apart from the chat path; it never submits a host or URL to a running agent. The SPA is a Vite and React build to ui/app/dist; the panel builds clean (tsc and vite). The three-panel shell (chat, observability, provisioning) is now complete (R5.1).
  planned:
    - Concurrent multi-RAG fan-out via the async await-any pattern (R3 follow-on). The routing decision (chosen word and rationale) and the degraded and excluded RAG labels in the response metadata, and a structured sources field (today the panel infers grounding from the answer text, since the machine_request response mapper reads only the terminal word output).

