# Bench-local builtin overrides.
# Adds mode-specific config to tools declared in configs/tools/builtin.yaml.
# Pass after the shared declaration:
#   --tools-declaration configs/tools/builtin.yaml \
#   --tools-declaration configs/bench/builtin.yaml

tools:
  - name: serve_ui
    type: builtin
    init: serve_ui
    visibility: internal
    emits: [ExperimentRequested, Shutdown, CommandError]
    description: "Start the bench web UI server and block waiting for user actions (bench equivalent of invoke_llm)."
    config:
      addr: ":8080"
      data_dir: eval-results
      configs_dir: configs
      docs_dir: docs
      profiles_dir: pkg/llm/profiles

  - name: launch_eval
    type: builtin
    init: launch_eval
    visibility: internal
    emits: [EvalCompleted, EvalFailed, CommandError]
    description: "Spawn a child agent as a subprocess to run an experiment."
    config:
      machine: configs/evaluator/machine.yaml
      tools: configs/evaluator/tools.yaml
      tools_declarations:
        - configs/tools/builtin.yaml
        - configs/evaluator/builtin.yaml
