{{- if .Values.controlPlane.enabled }}
{{- $fullname := include "chatbot-mesh.fullname" . -}}
{{- $tokenSecret := .Values.controlPlane.creator.deploymentApiTokenSecret.name | default (printf "%s-executor" $fullname) -}}
# --- Creator: the control plane's agent lifecycle manager (srd005). It reaches the
# executor deployment API (srd006), which is authenticated apart from chat by a
# NetworkPolicy; the optional token mount below supports an operator-supplied auth
# proxy in front of the executor. ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-creator
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: creator
spec:
  replicas: {{ .Values.controlPlane.creator.replicas }}
  selector:
    matchLabels:
      {{- include "chatbot-mesh.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: creator
  template:
    metadata:
      labels:
        {{- include "chatbot-mesh.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: creator
    spec:
      containers:
        - name: creator
          image: {{ include "chatbot-mesh.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--profile"
            - "{{ .Values.profiles.mountPath }}/agents/creator/profile.yaml"
            - "--directory"
            - "{{ .Values.profiles.workMountPath }}"
            {{- with include "chatbot-mesh.otlpEndpoint" . }}
            - "--otel-otlp-endpoint"
            - {{ . | quote }}
            - "--otel-service-name"
            - "creator"
            {{- end }}
          # The creator reaches the executor deployment API (srd006). The executor's
          # apply surface is network-authenticated (NetworkPolicy), so no bearer is
          # required; the optional token mount below (the #392 file-mount pattern)
          # supplies a credential only when an operator fronts the executor with an
          # auth proxy. It binds 0.0.0.0 so its Services route to the pod.
          env:
            - {name: CREATOR_BIND_HOST, value: "0.0.0.0"}
            # The deployment API is the executor agent (srd006); the creator's client
            # reaches its apply Service.
            - {name: DEPLOYMENT_API_URL, value: "http://{{ $fullname }}-executor:{{ .Values.executor.ports.apply }}"}
            - {name: PROVISIONER_HOST, value: "{{ $fullname }}-executor"}
            - {name: DEPLOYMENT_API_TOKEN_FILE, value: "/etc/creator-tokens/deployment-api"}
          ports:
            - {name: instance, containerPort: {{ .Values.controlPlane.creator.ports.instance }}}
            - {name: control, containerPort: {{ .Values.controlPlane.creator.ports.control }}}
            - {name: monitor, containerPort: {{ .Values.controlPlane.creator.ports.monitor }}}
          readinessProbe:
            httpGet: {path: /api/lifecycle/health, port: control}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.controlPlane.creator.resources | nindent 12 }}
          volumeMounts:
            - {name: profiles, mountPath: {{ .Values.profiles.mountPath }}, readOnly: true}
            - {name: work, mountPath: {{ .Values.profiles.workMountPath }}}
            - {name: deployment-api-token, mountPath: /etc/creator-tokens, readOnly: true}
      volumes:
        {{- include "chatbot-mesh.profilesVolume" . | nindent 8 }}
        - name: work
          emptyDir: {}
        - name: deployment-api-token
          secret:
            secretName: {{ $tokenSecret }}
            optional: true
            items:
              - key: {{ .Values.controlPlane.creator.deploymentApiTokenSecret.key }}
                path: deployment-api
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-creator
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: creator
spec:
  selector:
    {{- include "chatbot-mesh.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: creator
  ports:
    - {name: instance, port: {{ .Values.controlPlane.creator.ports.instance }}, targetPort: instance}
    - {name: control, port: {{ .Values.controlPlane.creator.ports.control }}, targetPort: control}
    - {name: monitor, port: {{ .Values.controlPlane.creator.ports.monitor }}, targetPort: monitor}
{{- if .Values.controlPlane.creator.networkPolicy.enabled }}
---
# The instance endpoint is reached only by the coordinator (srd005 R1.1, R5.4).
# Until GH-685 this port carried no policy at all, so anything in the cluster could
# ask the creator to act -- and the creator is the only pod the executor admits to
# its apply surface (srd006 R4.1), which made an unconstrained instance port the
# widest remaining path to apply. The GH-682 kind proof measured exactly that: an
# ingress-controller pod reached this port before this policy existed.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-creator
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: creator
spec:
  podSelector:
    matchLabels:
      {{- include "chatbot-mesh.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: creator
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "chatbot-mesh.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: coordinator
      ports:
        - {protocol: TCP, port: instance}
{{- end }}
{{- end }}
