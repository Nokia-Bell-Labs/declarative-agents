# The rag-server ships fixed listeners: query on 18085, lifecycle control and
# health on 18086. The rig therefore pins the address instead of allocating
# one, probes health on the control listener, and validators drive the query
# listener through SUBJECT_URL.
subject_address: 127.0.0.1:18085
subject_health_path: http://127.0.0.1:18086/api/lifecycle/health
# The rag-server's client limits allow only Chroma's real port, so the twin
# is pinned to stand exactly where Chroma stands.
fixture_address:
  chroma: 127.0.0.1:8000
