tools:
- name: checkpoint_history
  type: builtin
  contract: migrated
  init: checkpoint_history
  visibility: internal
  emits:
  - ToolDone
  - CommandError
  description: Read a run's execution history from the Dolt checkpoint backend.
  category: stateful_internal
  problem: |
    Operators need a run's execution history as a machine action, not as a
    special root command path.
  goals:
  - Read one run's ordered execution history from Dolt commit history.
  - Return ToolDone when the digest is printed.
  - Return CommandError when the run cannot be resolved or loaded.
  requirements:
    input:
    - must receive the resolved checkpoint backend (the Dolt adapter by default).
    - must receive a run id or use latest.
    output:
    - must print the execution history digest.
    side_effects:
    - must not mutate persisted state.
    undo:
    - must be a no-op and return an empty receipt.
    errors:
    - must fail when the run cannot be resolved or its history loaded.
  non_goals:
  - Does not roll back persisted state.
  - Does not resume execution.
  parameters:
    type: object
    properties:
      run:
        type: string
        description: Run id, or latest.
        default: latest
  output:
    description: Human-readable execution history digest.
    schema:
      type: object
      properties:
        run:
          type: string
        history:
          type: string
      required:
      - history
  side_effects:
  - kind: state_read
    target: checkpoint_backend
    description: Reads the run's execution_steps, tool_outputs, and receipts from Dolt commit history through the checkpoint port Load.
  reversibility:
    classification: reversible
    undo: noop
    receipt: empty
    requires_confirmation: false
  undo:
    strategy: noop
    description: History inspection does not mutate state; it returns an empty receipt.
  errors:
  - signal: CommandError
    condition: run cannot be resolved or its history loaded
    message_shape: "no runs found | load run <id>: <error>"
    state_after_failure: checkpoint backend unchanged
  relationships:
    before: []
    after:
    - checkpoint_rollback
    overlaps:
    - tool: checkpoint_rollback
      difference: "checkpoint_history reads Dolt commit history; checkpoint_rollback reverts the run branch and replays receipts."
