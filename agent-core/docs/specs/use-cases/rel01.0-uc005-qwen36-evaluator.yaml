id: rel01.0-uc005-qwen36-evaluator
title: Evaluator benchmarks Qwen 3.6 across parameter sizes

summary: |
  The evaluator agent, configured with the session machine, runs a
  minimal benchmark suite that exercises Qwen 3.6 in both 8b and 35b
  parameter sizes. The suite uses the same sample workspace as the
  generator integration test (uc004). Each grid point runs the
  generator as a subprocess, checks results, and collects metrics.

actor: Developer or CI benchmarking Qwen 3.6

trigger: |
  The developer (or mage integration:uc005) runs:
    agent --machine agents/evaluator/machine.yaml \
          --tools agents/evaluator/tools.yaml \
          --tools-declaration tools/builtin.yaml \
          --tools-declaration agents/evaluator/builtin.yaml \
          --input testdata/integration/uc005-qwen-evaluator/suite.yaml \
          --output <temp-dir>/eval-results

preconditions:
  - Ollama is running at localhost:11434
  - Both qwen3.6:8b-mlx and qwen3.6:35b-mlx models are pulled
  - The agent binary is built (bin/agent)
  - The sample workspace from uc004 is available

flow:
  - F1: cmd/agent loads the evaluator session machine and tool declarations including agents/evaluator/builtin.yaml (srd006, srd022).
  - F2: parse_suite_config reads the suite YAML specifying the generator harness and two Qwen models (8b, 35b) (srd019).
  - F3: discover_suite_samples finds the sample workspace in the suite's samples_dir (srd019).
  - F4: expand_eval_grid produces grid points — one per (model, sample) combination, yielding at least 2 points (srd019).
  - F5: init_eval_session creates the output directory structure under eval-results/ (srd019).
  - F6: For each grid point, run_point launches the nested point machine which prepares a workspace, runs the generator subprocess with the grid point's model, and checks results (srd005, srd019).
  - F7: The generator subprocess receives OTel traceparent for trace correlation (srd016).
  - F8: collect_metrics writes meta.json with point outcome, duration, and model metadata (srd019).
  - F9: After all points complete, report_session prints the summary (srd019).

touchpoints:
  - T1: "srd005-agentic-loop -- Loop drives both session and nested point machines"
  - T2: "srd006-yaml-machine-config -- evaluator session and point machine loading"
  - T3: "srd016-traceparent -- W3C traceparent propagation to generator subprocess"
  - T4: "srd019-eval-harness -- suite parsing, grid expansion, point execution, metrics collection"
  - T5: "agents/evaluator/*.yaml -- two-level state machine lifecycle"

success_criteria:
  - id: S1
    criterion: Suite is parsed and expanded into a grid with at least 2 points (8b and 35b).
    traces:
      - srd019-eval-harness AC1
  - id: S2
    criterion: Each grid point runs the generator subprocess to completion.
    traces:
      - srd019-eval-harness AC2
  - id: S3
    criterion: Result directory contains meta.json and experiment.yaml for each point.
    traces:
      - srd019-eval-harness AC3
  - id: S4
    criterion: Session summary reports correct total, passed, and failed counts.
    traces:
      - srd019-eval-harness AC5

out_of_scope:
  - Multi-sample workspaces (single sample is sufficient for integration testing).
  - Result visualization (handled by bench, see rel01.0-uc003).
  - Performance regression analysis.

machine_configs:
  - agents/evaluator/machine.yaml
  - agents/evaluator/point.yaml
