tools:
- name: next_point
  type: builtin
  init: next_point
  visibility: internal
  emits:
  - PointReady
  - AllPointsDone
  - CommandError
  description: Advance to the next evaluation point in the grid. Returns PointReady or AllPointsDone.
  category: stateful_internal
  side_effects:
  - kind: state_mutation
    target: eval_session_state
    state: current_point_advanced
    description: Advances the evaluator session cursor to the next grid point.
  reversibility:
    classification: reversible
    undo: session_state_restore
  undo:
    strategy: session_state_restore
    description: Restore the evaluator session cursor from a prior snapshot.
  problem: The machine needs a declared word for advancing the evaluator point iterator without embedding that workflow step in Go control flow.
  goals:
  - Perform the next_point action as one machine-selected word.
  - Return an explicit signal that lets the MachineSpec choose the next state.
  - Keep sequencing outside the tool implementation and in machine.yaml.
  requirements:
    input:
    - must consume parameters from tool input, prior Result, or configured command/domain state
    output:
    - must emit one declared signal and return machine-readable output when available
    errors:
    - must emit CommandError for infrastructure failures and preserve domain failures as declared signals
  non_goals:
  - Does not choose the next workflow step; machine.yaml owns sequencing.
  - Does not hide unrelated tool execution behind this word.
  errors:
  - signal: CommandError
    condition: required input, configuration, or runtime state is invalid
    message_shape: 'next_point: <error>'
    state_after_failure: no additional workflow step is executed by this tool
  relationships:
    before:
    - machine-selected predecessor
    after:
    - machine-selected successor
  output:
    description: next_point command result summary.
    schema:
      type: object
      properties:
        message:
          type: string
        signal:
          type: string
      required:
      - message
