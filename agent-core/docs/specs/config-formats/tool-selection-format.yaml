id: cfg-tool-selection-format
title: Tool Selection Format (tools.yaml)

purpose: |
  Defines the simple name-list format used by each agent's tools.yaml
  to select which declared tools are available to that agent. This
  separates tool declaration (what a tool is and how it works) from
  tool selection (which tools a specific agent can use), enabling
  tool reuse across agents with different toolsets.

schema:
  - field: tools
    type: "[]string"
    required: true
    description: |
      List of tool names to make available to the agent. Each name
      must match a tool declared by the selected profile's
      tool_config_dirs and tool_declarations, or by compatibility
      declaration flags. Unknown names cause a startup error.

cli_mapping:
  description: |
    Preferred startup uses an agent profile. The profile points at one
    or more tools.yaml selection files, tool_config_dirs containing
    individual declaration YAML files, and optional explicit
    tool_declarations such as agent-local LLM or override files.
    Compatibility startup can still pass the equivalent paths through
    CLI flags.
  flags:
    - flag: --profile
      repeatable: false
      description: |
        Preferred agent entry point. The profile supplies tool selection
        files, declaration directories, and explicit declaration files.
        Relative paths are resolved from the profile file.

    - flag: --tool-config-dir
      repeatable: true
      description: |
        Compatibility flag for directories such as tools/builtin/ and
        tools/exec/. The loader scans *.yaml files in name order and
        merges them with explicit declarations.

    - flag: --tools-declaration
      repeatable: true
      description: |
        Compatibility flag for explicit declaration files such as
        agents/generator/llm/default.yaml or agent-local builtin
        override files. Legacy aggregate files such as tools/builtin.yaml
        and tools/exec.yaml may still be loaded this way, but current
        profiles prefer individual declaration directories.

    - flag: --tools
      repeatable: false
      description: |
        Path to the tool selection file (tools.yaml). The agent will
        only have access to tools whose names appear in this file's
        tools list.

    - flag: (legacy mode)
      description: |
        When no --tools-declaration flag is provided, the --tools
        file is treated as a legacy full-definition file containing
        both declarations and selections inline. All current agents
        use the declaration+selection split.

selection_files:
  - file: agents/generator/tools.yaml
    tool_count: 15
    description: |
      Selects file operations (read, write, edit, find, list_files),
      build/test tools (build, vet, lint, test), and internal pipeline
      tools for the LLM-driven coding loop (invoke_llm, parse_response,
      report_parse_error, reset_history, nudge_reread, done). Final
      validation order is declared directly in machine.yaml as
      build → lint → test.

  - file: agents/evaluator/tools.yaml
    tool_count: 8
    description: |
      Selects session-level tools for agents/evaluator/machine.yaml:
      parse_suite_config, discover_suite_samples, expand_eval_grid,
      init_eval_session, report_suite_summary, next_point, run_point,
      and report_session.

  - file: agents/evaluator/tools-point.yaml
    tool_count: 13
    description: |
      Selects per-point tools for agents/evaluator/point.yaml:
      create_point_dir, copy_sample_workspace, copy_sample_docs,
      init_workspace_repo, stage_workspace_baseline,
      commit_workspace_baseline, dump_config, run_agent,
      run_oracle_check, collect_trace_tokens, check_agent_version,
      summarize_point_results, and collect_metrics. Loaded by run_point
      to build the nested point registry.

  - file: agents/planner/tools.yaml
    tool_count: 12
    description: |
      Selects planning tools (extract_task, extract_all,
      assemble_prompt, parse_plan, create_issue, execute_task,
      check_result), LLM tools (invoke_llm, reset_history),
      and direct build/test transition tools (build, vet, test).

  - file: agents/jurist/tools.yaml
    tool_count: 3
    description: |
      Name-only selection of 3 tools (load_corpus, validate_specs,
      format_report). Declarations are loaded from the profile's
      shared builtin declaration directory.

  - file: agents/bench/tools.yaml
    tool_count: 2
    description: |
      Selects the two bench agent tools: serve_ui (blocks on
      user input via web UI) and launch_eval (spawns the configured
      evaluator profile as a child process). Shared declarations are
      loaded from tools/builtin/ and bench-specific config comes from
      agents/bench/builtin.yaml.

related_documents:
  - cfg-tool-declaration-format
  - srd013
  - srd022
  - srd023

implementation: internal/tools/stl/exectool.go
