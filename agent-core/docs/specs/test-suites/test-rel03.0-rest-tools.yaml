      - srd029-rest-server-tools AC7
      - srd029-rest-server-tools AC9

  - use_case: rel03.0-uc004-openapi-import
    name: OpenAPI import exposes allowlisted operations
    go_test: TestRESTOpenAPI_ImportAllowlist
    status: done
