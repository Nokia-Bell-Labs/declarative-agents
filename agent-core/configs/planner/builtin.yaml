# Planner-local builtin overrides.
# Adds mode-specific config to tools declared in configs/tools/builtin.yaml.
# Pass after the shared declaration:
#   --tools-declaration configs/tools/builtin.yaml \
#   --tools-declaration configs/planner/builtin.yaml

tools:
  - name: execute_task
    type: builtin
    init: execute_task
    description: "Execute the current task via the code generator agent."
    visibility: internal
    emits: [ExecutionDone, ExecutionFailed, CommandError]
    config:
      machine: configs/generator/machine.yaml
      tools: configs/generator/tools.yaml
      tools_declarations:
        - configs/tools/builtin.yaml
        - configs/tools/exec.yaml
