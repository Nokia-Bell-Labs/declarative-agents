# Planner-local builtin overrides.
# Adds mode-specific config to tools declared in tools/builtin.yaml.
# Pass after the shared declaration:
#   --tools-declaration tools/builtin.yaml \
#   --tools-declaration agents/planner/builtin.yaml

tools:
  - name: execute_task
    type: builtin
    init: execute_task
    description: "Execute the current task via the code generator agent."
    visibility: internal
    emits: [ExecutionDone, ExecutionFailed, CommandError]
    category: boundary
    problem: |
      The planner needs a boundary word that hands the current planned task
      to the generator program. This is not an ordinary deterministic word
      because it starts another agent process whose state machine and tools
      can mutate the workspace.
    goals:
      - "Run the configured generator machine for exactly the current planner task."
      - "Propagate profile and trace configuration into the child agent invocation."
      - "Return enough execution status for the planner to decide retry, advance, or fail."
    requirements:
      input:
        - "must require profile in config, or legacy machine/tools/tools_declarations for compatibility-only declarations"
        - "must consume the current planner task and workspace directory from pipeline state"
      output:
        - "must emit ExecutionDone when the child agent exits successfully"
        - "must emit ExecutionFailed when the child agent exits without satisfying the task"
      side_effects:
        - "must spawn one child agent process"
        - "must allow the child agent to mutate the target workspace according to its own selected tools"
        - "must propagate trace context to the child process"
      undo:
        - "must rely on workspace checkpoints to restore child workspace mutations"
        - "must rely on pipeline history to restore planner command state"
      errors:
        - "must emit CommandError when required config is missing or the child process cannot be started"
    non_goals:
      - "Does not inspect or modify individual source files itself."
      - "Does not implement the generator workflow; the configured child machine does that."
      - "Does not guarantee rollback without an external workspace checkpoint."
    output:
      description: "Child generator execution status."
      schema:
        type: object
        properties:
          task_id:
            type: string
          exit_code:
            type: integer
          stdout:
            type: string
          stderr:
            type: string
          elapsed_ms:
            type: integer
          traceparent:
            type: string
        required: [exit_code]
    side_effects:
      - kind: child_agent_execution
        target: agent_cli
        description: "Starts the configured generator agent as a child process."
      - kind: filesystem_write
        target: workspace
        description: "The child agent may write files through its own selected tools."
      - kind: state_mutation
        target: planner_pipeline_state
        state: execution_result_recorded
        description: "Records child execution outcome for retry/advance decisions."
    reversibility:
      classification: compensatable
      undo: workspace_restore
      requires_confirmation: false
    undo:
      strategy: workspace_restore
      description: "Restore the workspace checkpoint captured before executing the child agent and restore planner state from history."
      requires: [workspace_checkpoint, planner_state_checkpoint]
    errors:
      - signal: CommandError
        condition: "config is missing, task state is invalid, or child process cannot be started"
        message_shape: "execute_task: <error>"
        state_after_failure: "workspace unchanged unless the child process already started"
      - signal: ExecutionFailed
        condition: "child agent exits with failure status"
        message_shape: "execute_task failed: <status/output>"
        state_after_failure: "workspace may contain child edits and must be restored from checkpoint if rollback is requested"
    relationships:
      before: [create_issue, extract_task, extract_all]
      after: [check_result, build, vet, test]
      overlaps:
        - tool: launch_eval
          difference: "launch_eval starts an evaluator session from bench; execute_task starts a generator for a planner task."
        - tool: run_point
          difference: "run_point invokes an in-process nested machine; execute_task spawns a child agent process."
    config:
      profile: agents/generator/profile.yaml
