{{- if .Values.executor.enabled }}
{{- $fullname := include "chatbot-mesh.fullname" . -}}
{{/*
The executor (srd006): the deployment-plane actuation agent that replaces the
standard-library Go provisioner as the deployment API (srd003 R4). It runs the
agent-core runtime with a mounted profile whose request-machine binds the helm and
kubectl CLIs in this image as exec words. It edits deployment values and triggers
rollouts only; it submits no endpoint or credential to a running agent.

Sanctioned image divergence (srd003 R1.3): the executor image carries helm and
kubectl and the chart at /chart alongside the runtime binary, diverging from the
binary-only runtime image because a deployment-plane agent needs its CLIs in its
container. Recorded here so the declarative-decomposition audit does not re-flag it.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $fullname }}-executor
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullname }}-executor
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
rules:
  # Read deployment state for the rollout verification (kubectl rollout status).
  - apiGroups: [""]
    resources: [configmaps, services]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, statefulsets]
    verbs: [get, list, watch]
  {{- if .Values.executor.allowApply }}
  # The apply path runs helm upgrade in-cluster, which manages the chart's objects
  # and the release Secret. Scoped to this namespace by the RoleBinding.
  - apiGroups: [""]
    resources: [configmaps, secrets, services]
    verbs: [create, update, patch, delete]
  - apiGroups: [apps]
    resources: [deployments, statefulsets]
    verbs: [create, update, patch]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullname }}-executor
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullname }}-executor
subjects:
  - kind: ServiceAccount
    name: {{ $fullname }}-executor
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-executor
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "chatbot-mesh.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: executor
  template:
    metadata:
      labels:
        {{- include "chatbot-mesh.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: executor
    spec:
      serviceAccountName: {{ $fullname }}-executor
      containers:
        - name: executor
          # The executor image bundles the runtime, helm, kubectl, and the chart at
          # /chart (srd003 R1.3 divergence). The exec words run `helm upgrade
          # chatbot-mesh /chart ...`, so the release name matches the chart name.
          image: "{{ .Values.executor.image.repository }}:{{ .Values.executor.image.tag }}"
          imagePullPolicy: {{ .Values.executor.image.pullPolicy }}
          args:
            - "--profile"
            - "{{ .Values.profiles.mountPath }}/agents/executor/profile.yaml"
            - "--directory"
            - "{{ .Values.profiles.workMountPath }}"
            {{- with include "chatbot-mesh.otlpEndpoint" . }}
            - "--otel-otlp-endpoint"
            - {{ . | quote }}
            - "--otel-service-name"
            - "executor"
            {{- end }}
          env:
            - {name: EXECUTOR_BIND_HOST, value: "0.0.0.0"}
          ports:
            - {name: apply, containerPort: {{ .Values.executor.ports.apply }}}
            - {name: control, containerPort: {{ .Values.executor.ports.control }}}
            - {name: monitor, containerPort: {{ .Values.executor.ports.monitor }}}
          readinessProbe:
            httpGet: {path: /api/lifecycle/health, port: control}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.executor.resources | nindent 12 }}
          volumeMounts:
            - {name: profiles, mountPath: {{ .Values.profiles.mountPath }}, readOnly: true}
            - {name: work, mountPath: {{ .Values.profiles.workMountPath }}}
      volumes:
        {{- include "chatbot-mesh.profilesVolume" . | nindent 8 }}
        - name: work
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-executor
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
spec:
  selector:
    {{- include "chatbot-mesh.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: executor
  ports:
    - {name: apply, port: {{ .Values.executor.ports.apply }}, targetPort: apply}
    - {name: control, port: {{ .Values.executor.ports.control }}, targetPort: control}
    - {name: monitor, port: {{ .Values.executor.ports.monitor }}, targetPort: monitor}
{{- if .Values.executor.networkPolicy.enabled }}
---
# Authenticated apart from the chat path (srd003 R4.1 / srd006 R4.1) at the network
# layer: only the creator (and coordinator) may reach the apply surface. agent-core
# REST servers carry no inbound auth, so the boundary is enforced here rather than in
# the profile.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-executor
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
spec:
  podSelector:
    matchLabels:
      {{- include "chatbot-mesh.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: executor
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "chatbot-mesh.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: creator
      ports:
        - {protocol: TCP, port: apply}
{{- end }}
{{- end }}
