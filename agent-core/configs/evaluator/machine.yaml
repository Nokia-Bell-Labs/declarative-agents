# Session-level state machine for the evaluator.
# Drives grid iteration over (harness, model, sample, rep) points.
# Each point runs the per-point pipeline via a nested core.Loop
# using configs/evaluator/point.yaml.

name: evaluator-session
initial_state: Idle

budget:
  max_iterations: 10000

states:
  - Idle
  - LoadingSuite
  - AdvancingPoint
  - RunningPoint
  - Reporting
  - Done
  - Failed

terminal_states:
  - Done
  - Failed

signals:
  - Seed
  - CommandError
  - SuiteLoaded
  - PointReady
  - PointDone
  - AllPointsDone
  - SessionReported

transitions:
  - state: Idle
    signal: Seed
    next: LoadingSuite
    action: load_suite

  - state: LoadingSuite
    signal: SuiteLoaded
    next: AdvancingPoint
    action: next_point

  - state: AdvancingPoint
    signal: PointReady
    next: RunningPoint
    action: run_point

  - state: RunningPoint
    signal: PointDone
    next: AdvancingPoint
    action: next_point

  - state: AdvancingPoint
    signal: AllPointsDone
    next: Reporting
    action: report_session

  - state: Reporting
    signal: SessionReported
    next: Done

  # --- error handling ---
  - state: LoadingSuite
    signal: CommandError
    next: Failed

  - state: AdvancingPoint
    signal: CommandError
    next: Failed

  - state: RunningPoint
    signal: CommandError
    next: Failed

  - state: Reporting
    signal: CommandError
    next: Failed
