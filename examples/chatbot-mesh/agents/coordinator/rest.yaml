rest:
  version: v1
  auth:
    none:
      type: none
  limits:
    local_creator_client:
      timeout: 130s
      read_timeout: 130s
      max_request_bytes: 1048576
      max_response_bytes: 1048576
      redirect:
        mode: none
      network:
        schemes: [http]
        # The creator host is the egress allowlist entry; a values-driven deploy sets
        # CREATOR_HOST to the creator Service DNS name, defaulting to loopback locally.
        hosts: [${CREATOR_HOST:-127.0.0.1}]
        ports: [18110]
    local_coordinator_intent:
      timeout: 130s
      read_timeout: 130s
      max_request_bytes: 1048576
      max_response_bytes: 1048576
      redirect:
        mode: none
      network:
        schemes: [http]
        hosts: [127.0.0.1, localhost]
        ports: [18100]
        allow_public_listener: true
    local_coordinator_control:
      timeout: 30s
      read_timeout: 5s
      max_request_bytes: 16384
      max_response_bytes: 65536
      redirect:
        mode: none
      network:
        schemes: [http]
        hosts: [127.0.0.1, localhost]
        ports: [18101]
        allow_public_listener: true
    local_coordinator_monitor:
      timeout: 5s
      read_timeout: 5s
      max_request_bytes: 4096
      max_response_bytes: 1048576
      redirect:
        mode: none
      network:
        schemes: [http]
        hosts: [127.0.0.1, localhost]
        ports: [18102]
        allow_public_listener: true

  clients:
    creator:
      base_url: ${CREATOR_URL:-http://127.0.0.1:18110}
      auth_ref: none
      limits_ref: local_creator_client
      operations:
        creator_ingest:
          # Delegate a corpus-ingest run for the requested directory to the creator
          # (srd004 R2.1). The creator verifies the collection count and returns it; a
          # count that does not meet the requested source is a 422 the creator returns,
          # mapped to IngestRejected so the coordinator does not advance to reconfigure.
          method: POST
          path: /api/v1/instance
          params:
            body_schema:
              type: object
              required: [directory, collection]
              properties:
                rag_name: {type: string}
                directory: {type: string}
                collection: {type: string}
                embedding_model: {type: string}
                values: {type: string}
            body_source: previous_result
            input_mapping:
              rag_name: $.rag_name
              directory: $.directory
              collection: $.collection
              embedding_model: $.embedding_model
              values: $.values
            carry_forward: [rag_name, collection, embedding_model, values]
          body:
            operation: ingest
            role: corpus-ingest
            directory: "{{ params.directory }}"
            collection: "{{ params.collection }}"
          success: {status: [200], signal: IngestReported}
          failures:
            - {status: [422], signal: Rejected}
          response:
            output:
              collection: $.collection
              count: $.count
          side_effects:
            - kind: external_api
              target: creator.instance
              state: instance_created
          reversibility:
            classification: reversible
            undo: noop
        creator_rollout:
          # Delegate the decided rollout to the creator (srd004 R3.2): the coordinator
          # forwards the caller's full desired mesh state as the values-plane document
          # (srd004 R3.1; srd006 R1.4 content), threaded here from the carried intent.
          # A values-plane list is replaced wholesale on apply, so the intent carries
          # the complete desired values, not a delta; the creator applies it through
          # the executor and returns the reported health.
          method: POST
          path: /api/v1/instance
          params:
            body_schema:
              type: object
              required: [values]
              properties:
                values: {type: string}
            body_source: previous_result
            input_mapping:
              values: $.carried.values
          body:
            operation: restart
            role: chatbot
            schema_version: "1"
            content: "{{ params.values }}"
          success: {status: [200], signal: Reconfigured}
          response:
            output:
              health: $.health
          side_effects:
            - kind: external_api
              target: creator.instance
              state: rollout_executed
          reversibility:
            classification: reversible
            undo: noop
        creator_rollout_status:
          # Read the rollout status the creator reads from the deployment API, so
          # the coordinator can aggregate progress for the panel (srd004 R1.3). A
          # read: it drives no instance operation and decides nothing. GH-684.
          method: GET
          path: /api/v1/rollout
          params:
            body_source: none
          success: {status: [200], signal: StatusRead}
          response:
            output:
              phase: $.phase
          side_effects:
            - kind: external_api
              target: creator.rollout
              state: read_only
          reversibility:
            classification: reversible
            undo: noop

  servers:
    coordinator_intent:
      # The intent endpoint is served on its own service and port, reached apart from
      # the chat path (srd004 R4.2); the mesh's authentication boundary is
      # deployment-realized (a separate ingress route, and the creator alone holds the
      # deployment-API credential, srd005 R5.1). No runtime input supplies transport
      # authority; the endpoint accepts a declared intent only (srd004 R1.2).
      address: ${COORDINATOR_BIND_HOST:-127.0.0.1}:18100
      limits_ref: local_coordinator_intent
      endpoints:
        provision:
          method: POST
          path: /api/v1/provision
          binding: machine_request
          request:
            # The intent carries the full desired mesh state as values: the operator's
            # panel serializes the complete desired values-plane document (the whole
            # ragUnits list, params, and LLM config) that the coordinator forwards to
            # the creator and executor (srd004 R3.1). rag_name, directory, and
            # collection name the new source to ingest before the rollout.
            body_schema:
              type: object
              required: [values, collection, directory]
              properties:
                values: {type: string}
                rag_name: {type: string}
                collection: {type: string}
                embedding_model: {type: string}
                directory: {type: string}
          machine_request:
            profile: profile.yaml
            machine: request-machine.yaml
            timeout: 130s
            request:
              body:
                values: $.values
                rag_name: $.rag_name
                collection: $.collection
                embedding_model: $.embedding_model
                directory: $.directory
            response:
              terminal_signals:
                Reconfigured:
                  status: 200
                  content_type: application/json
                  body:
                    status: reconfigured
                    health: $.mapped.health
                Rejected:
                  status: 422
                  content_type: application/json
                  body:
                    error: ingest_rejected
                    detail: the creator reported the ingest did not meet the requested source
                CommandError:
                  status: 500
                  content_type: application/json
                  body:
                    error: command_error
                    stage: $.failure_stage
                    message: $.message
                    operation: $.operation
        apply:
          # The provisioning panel's apply. It is the operator's desired-state
          # decision (srd004 R3.1) and enters the mesh here, the panel's only
          # provisioning intake (srd004 R1.5, srd003 R4.1). The panel does not reach
          # the deployment API; the coordinator orchestrates and the creator alone
          # calls the apply surface (srd003 R4.4, srd006 R4.1). GH-502.
          method: POST
          path: /provisioning/api/apply
          binding: machine_request
          request:
            # A values-only edit. The panel serializes the complete desired
            # values-plane document and names no new source, so collection and
            # directory are absent here and required on /api/v1/provision, which
            # ingests before rolling out (srd004 R1.6).
            body_schema:
              type: object
              required: [values]
              properties:
                values: {type: string}
          machine_request:
            profile: profile.yaml
            machine: request-machine.yaml
            timeout: 130s
            # Seeding on SeedValues skips the ingest leg. The same machine serves
            # both intents; the endpoint picks which leg by the seed it sends, so
            # the branch stays visible in the machine rather than inside a word.
            initial_signal: SeedValues
            request:
              body:
                values: $.values
            response:
              # Keyed by terminal state. The creator boundary words emit a fixed
              # signal vocabulary, so signal keying could not separate a rejected
              # reconfiguration from a failed one (agent-core srd030 R4.6, GH-615).
              terminal_states:
                Reconfigured:
                  status: 200
                  content_type: application/json
                  body:
                    status: reconfigured
                    health: $.mapped.health
                Rejected:
                  status: 422
                  content_type: application/json
                  body:
                    error: reconfiguration_rejected
                    detail: the creator rejected the desired values document
                Failed:
                  status: 500
                  content_type: application/json
                  body:
                    error: command_error
                    stage: $.failure_stage
                    message: $.message
                    operation: $.operation
        rollout:
          # The panel's rollout poll (srd004 R1.3). It reads progress here rather
          # than from the deployment API, which no browser may reach (srd003 R4.4).
          # Its own machine, because a poll is a read and must not enter the ingest
          # or rollout legs of the provisioning machine. GH-684.
          method: GET
          path: /provisioning/api/rollout
          binding: machine_request
          machine_request:
            profile: profile.yaml
            machine: rollout-machine.yaml
            timeout: 20s
            request:
              body: {}
            response:
              terminal_states:
                StatusRead:
                  status: 200
                  content_type: application/json
                  body:
                    schema_version: "1"
                    phase: $.mapped.phase
                # A poll that cannot read the status is an error, not a successful
                # unknown phase: the panel would otherwise show "progressing"
                # indefinitely while the read was broken.
                Failed:
                  status: 502
                  content_type: application/json
                  body:
                    error: rollout_read_failed
                    stage: $.failure_stage
                    message: $.message

    coordinator_control:
      address: ${COORDINATOR_BIND_HOST:-127.0.0.1}:18101
      limits_ref: local_coordinator_control
      queue:
        name: coordinator_control
        capacity: 8
        timeout: 30s
      shutdown:
        timeout: 5s
        drain_policy: drain_then_stop
      endpoints:
        exit:
          method: POST
          path: /api/lifecycle/exit
          binding: emit_signal
          signal: ExitRequested
          request:
            body_schema:
              type: object
              properties:
                reason: {type: string}
                status: {type: string}
          response:
            output:
              accepted: "true"
        health:
          method: GET
          path: /api/lifecycle/health
          binding: health

    monitor:
      address: ${COORDINATOR_BIND_HOST:-127.0.0.1}:18102
      limits_ref: local_coordinator_monitor
      queue:
        name: coordinator_monitor
        capacity: 8
        overflow: reject
        timeout: 100ms
      shutdown:
        timeout: 2s
        drain_policy: drain
        stop_listeners: true
        unblock_await_signal: ServerStopped
      endpoints:
        machine_spec:  {method: GET, path: /monitor/machine,       binding: read_state,    monitor_view: machine_spec}
        current_state: {method: GET, path: /monitor/state,         binding: read_state,    monitor_view: current_state}
        tools:         {method: GET, path: /monitor/tools,         binding: read_state,    monitor_view: tools}
        metrics:       {method: GET, path: /monitor/metrics,       binding: read_state,    monitor_view: metrics}
        recent_events: {method: GET, path: /monitor/events,        binding: read_state,    monitor_view: events}
        event_stream:  {method: GET, path: /monitor/events/stream, binding: stream_events, monitor_view: events}
        control_exit:
          method: POST
          path: /monitor/control/exit
          binding: emit_signal
          signal: ExitRequested
          request:
            body_schema:
              type: object
              properties:
                reason: {type: string}
          response:
            output:
              accepted: "true"
