# Tool selection for the generator agent.
# All tools are either direct transition actions or reachable via $tool
# dynamic dispatch (LLM-invoked).
#
# Usage:
#   agent --tools-declaration tools/builtin.yaml \
#         --tools-declaration tools/exec.yaml \
#         --tools agents/generator/tools.yaml \
#         --machine agents/generator/machine.yaml

tools:
  # File tools — LLM-invoked via $tool dispatch
  - read
  - write
  - edit
  - find
  - list_files

  # LLM tools — direct transition actions
  - invoke_llm           # action: Composing→Parsing
  - parse_response       # action: Parsing→(dispatch)
  - report_parse_error   # action: ParseFailed→Composing
  - reset_history        # action: (available for budget recovery)

  # Edit follow-up — direct transition action
  - nudge_reread         # action: after edits

  # Completion — emits TaskCompleted via parse_response
  - done

  # Validation sequence — direct transition actions after TaskCompleted
  - build
  # Vet remains $tool-reachable for the LLM, but is not part of the
  # machine-declared final validation sequence.
  - vet
  - lint
  - test
