id: cfg-runtime-contract
title: Machine + Tools Runtime Contract

purpose: |
  Documents the contract that governs how the agent binary assembles
  a running agent from declarative YAML configuration. Every agent
  mode (generator, planner, evaluator, bench, validate) follows the
  same contract — no mode-specific subcommands or procedural code paths
  exist. The binary is a universal runtime; behavior is determined
  entirely by the config files it receives.

invocation: |
  Preferred invocation:
    agent --profile agents/<agent>/profile.yaml \
          [--input <file>] [--output <dir>] \
          [--directory <path>] \
          [--state-store-dir <dir>] \
          [--resume-checkpoint <id>] [--resume-signal <signal>]

  Compatibility invocation:
    agent --machine <machine.yaml> \
          --tools <tools.yaml> [--tools <more-tools.yaml> ...] \
          [--tools-declaration <decl.yaml> ...] \
          [--tool-config-dir <dir> ...] \
          [--input <file>] [--output <dir>] \
          [--directory <path>] \
          [--state-store-dir <dir>] \
          [--resume-checkpoint <id>] [--resume-signal <signal>]

  Lifecycle profile invocations:
    agent --profile agents/lifecycle/history/profile.yaml \
          --state-store-dir <dir> \
          --input requests/history.yaml

    agent --profile agents/lifecycle/rollback/profile.yaml \
          --state-store-dir <dir> \
          --directory <workspace> \
          --input requests/rollback.yaml

  There is no lifecycle subcommand syntax. History and rollback behavior is
  selected by the profile's machine, tool selection, and builtin declarations.

  Preferred agent configuration flag:
    --profile            Path to an agent profile YAML. The profile supplies
                         machine, tools, tool_declarations, tool_config_dirs,
                         and optional directory. Relative paths are resolved
                         against the profile file's directory.

  Legacy configuration flags:
    --machine            Path to the state machine YAML (MachineSpec).
                         Deprecated for normal agent startup; use --profile.
    --tools              Path to a tool selection YAML. May be repeated.
                         Deprecated for normal agent startup; use --profile.
    --tools-declaration  One or more explicit tool declaration YAML files.
                         May be repeated. Deprecated for normal agent startup;
                         use --profile.
    --tool-config-dir    Directory containing individual tool declaration YAML
                         files. May be repeated. Directories are scanned for
                         *.yaml files and loaded in name order. Profiles should
                         normally provide these directories via tool_config_dirs.

  Legacy loading rules:
    When --tools-declaration or --tool-config-dir is present, --tools is
    treated as one or more name-only selection files and intersected with the
    loaded declarations. Otherwise a single --tools file is parsed as a full
    declaration file for backward compatibility.

  Optional universal flags:
    --input              Input file (e.g. suite YAML for evaluator).
    --output             Output directory (e.g. eval results).
    --directory          Workspace root for file tools and exec tools.
    --profiles-dir       Directory with model response-profile YAML overrides.
    --verbose-trace      Record boundary-tool input/output in OTel traces.
    --otel-log-file      OTel trace output file.
    --otel-parent-span   W3C traceparent for distributed tracing.
    --state-store-dir    Local FileStore root for lifecycle checkpoints.
    --resume-checkpoint  Checkpoint ID to load before re-entering the loop.
    --resume-signal      Signal used for the first resumed transition
                         (default: Approved).

  Lifecycle request input:
    History and rollback targets are lifecycle tool input data. A request file
    can name checkpoint: <id|latest>, to_iteration: <n>, and
    restore_workspace: true. The active lifecycle profile and ToolDef decide
    how that input maps to checkpoint_history or checkpoint_rollback config.

startup_sequence:
  - step: 1
    name: Apply profile
    description: |
      If --profile is provided, cmd/agent loads the AgentProfile and fills any
      unset CLI configuration fields from it. The profile supplies machine,
      tool selection files, explicit tool declarations, tool config
      directories, and optional workspace directory. Explicit CLI flags still
      take precedence, and deprecated legacy overrides emit warnings.
    implementation: catalog.LoadProfile, applyProfile

  - step: 2
    name: Load tool definitions
    description: |
      If --tools-declaration or --tool-config-dir is provided, load
      declarations from explicit files and directories, then load every --tools
      path as a name-only selection list, and compute the intersection
      (SelectTools). Otherwise, load the single --tools path as a full
      declaration file. Result: []ToolDef.
    implementation: catalog.LoadToolDeclarations, catalog.LoadToolDeclarationsFromDirs, catalog.LoadToolSelections, catalog.SelectTools

  - step: 3
    name: Preserve tool-owned boundary config
    description: |
      Tool definitions keep their config blocks until the selected factory
      decodes them. Boundary tools such as invoke_llm own model, endpoint,
      prompt, timeout, manifest_state, and provider-specific settings. The
      agent binary does not interpret those settings and does not create model
      clients as a startup step.
    implementation: catalog.ToolDef, catalog.DecodeToolConfig

  - step: 4
    name: Register tool factories
    description: |
      For each ToolDef, resolve and register a Builder in the
      core.Registry. Builtin tools are resolved via BuiltinRegistry
      (Go factories selected by the "init" field). Exec tools are
      wrapped as ExecBuilder instances. Tool config from the
      declaration YAML is passed to factories for parametrization.
    implementation: registry.RegisterUnifiedTools

  - step: 5
    name: Load machine and validate tool signal contracts
    description: |
      cmd/agent loads and validates the machine spec from the resolved profile
      machine path, or from legacy --machine when no profile is used,
      before entering the loop. This extracts budget defaults and validates
      declared tool emits metadata for tools used as named transition actions:
      emitted signals must be declared by the machine, and each emitted signal
      must have a transition from the action target state unless that target
      state is terminal.
    implementation: core.LoadMachineSpec, catalog.ValidateToolEmits

  - step: 6
    name: Configure lifecycle ports
    description: |
      Lifecycle behavior is opt-in. When --state-store-dir is absent,
      cmd/agent does not create a FileStore and checkpoint persistence is
      disabled. When present, cmd/agent creates a FileStore and passes it to
      LoopParams.StateStore and lifecycle-aware builtin factories. Lifecycle
      history and rollback profiles use the same StateStore path and register
      checkpoint_history or checkpoint_rollback through the normal builtin
      factory flow. Suspend
      checkpoints can include AgentSnapshot, conversation JSON from
      LoopHooks.SnapshotConversation, optional DomainState JSON, optional
      WorkspaceRef, and HistoryDigest entries. Each HistoryDigest can carry an
      UndoMemento captured from commands that implement UndoMementoProvider.
      Resume requires --state-store-dir and --resume-checkpoint; it loads the
      checkpoint, restores configured state layers, validates the current
      machine/tools, then re-enters core.Loop with resume seed fields.
    implementation: core.FileStore, core.ResumeFromCheckpoint, core.LoopHooks.SnapshotConversation

  - step: 7
    name: Run the loop
    description: |
      cmd/agent passes the already-loaded MachineSpec to core.Loop, and
      core.Loop builds the transition table mapping (state, signal) pairs
      to (next_state, Builder). Named actions are resolved from the registry;
      $tool resolves to a dynamic dispatch function. Path-only callers may
      still set MachineFile and let Loop load the spec itself, but the agent
      binary's startup path owns the single read used for budget defaults,
      emits validation, parse-error policy, and transition-table building.
      The loop then enters the initial state with a Seed signal and executes
      the run-to-completion finite state machine. Each transition fires its action's
      Builder.Build(result).Execute(), producing a new Result with a Signal
      that drives the next transition. The loop terminates when a terminal
      state is reached or a budget limit is exceeded.
    implementation: core.Loop, core.LoopParams.MachineSpec, core.BuildTransitionTable

tool_parametrization: |
  Tool behavior is configured through the "config" block in tool
  declaration YAML. The config map is passed to the BuiltinFactory
  at registration time (step 4). Factories read config values with
  typed config structs, making tools reusable across modes. Program-
  shaping child and nested invocation config is required and validated
  at registration time; child-agent boundaries prefer profile config,
  while machine/tool-selection/declaration fields are compatibility-only
  fallback config for older declarations.

  Examples:
    - invoke_llm reads "model", "provider_url", prompt fields, timeout fields,
      and manifest_state from its own config.
    - launch_eval reads "profile" from its config and invokes the child
      evaluator with --profile.
    - execute_task reads "profile" from its config and invokes the child
      generator with --profile.
    - parse_suite_config and evaluator session setup tools read "output_dir",
      "reps", and "timeout" from config.
    - run_point reads "point_machine" and "point_tools" to locate the
      nested machine YAML and build its point-specific registry.
    - serve_ui reads "addr", "data_dir", "configs_dir", etc.

suite_input_contract: |
  Evaluator suite YAML is input data to evaluator tools, not a program
  definition layer beside machine.yaml and tools.yaml. The evaluator session
  machine composes parse_suite_config, discover_suite_samples, expand_eval_grid,
  init_eval_session, and report_suite_summary to prepare suite input. run_agent
  consumes each harness entry as subprocess data (binary plus flags) for the
  current point. dump_config snapshots the resolved suite/harness/tool data
  into experiment.yaml for reproducibility.

  CLI flags such as --input and --output serve as universal runtime inputs.
  Model and provider selection comes from the selected boundary tool
  declaration, not from the agent binary.

nested_machines: |
  Some tools spawn nested core.Loop instances (run_point) or child
  agent processes (launch_eval, execute_task). The nested machine
  path is read from the tool's config block, not hardcoded.

  Nested core.Loop (same process):
    run_point reads config.point_machine and config.point_tools
    → builds a point-specific registry
    → core.Loop(LoopParams{MachineFile: ..., Registry: pointRegistry})

  Child process:
    launch_eval reads config.profile
    → subprocess.Run("agent", "--profile", ...)

    execute_task reads config.profile
    → subprocess.Run with the same flag

    Compatibility-only declarations may omit profile and instead provide
    config.machine, config.tools, and config.tools_declarations. In that case
    execute.Config falls back to --machine/--tools/--tools-declaration.

  This design allows swapping nested machines by changing YAML config
  without recompiling the binary.

lifecycle: |
  Lifecycle features are runtime ports around the same machine contract, not a
  separate programming model. History and rollback are ordinary lifecycle
  profiles: their MachineSpec files dispatch checkpoint_history or
  checkpoint_rollback, their tools.yaml files select those tools, and their
  ToolDef declarations bind typed config and emitted signals.

  State layers remain independent:
    - agent state is JSON loop bookkeeping in Checkpoint.agent_state;
    - command/domain state is command-owned undo state or JSON snapshots such
      as conversation logs, pipeline snapshots, evaluator session state, point
      context, validation state, or boundary compensation payloads;
    - workspace state is represented by Workspace refs, usually GitWorkspace
      commits, and is not stored in StateStore.

  Undo memento kinds:
    - noop means the command has no rollback-managed state;
    - reversible carries enough JSON to restore command/domain state or point
      rollback at workspace refs;
    - compensatable carries metadata for effects that need child command undo,
      workspace restore, or explicit operator/API compensation;
    - irreversible records why rollback cannot safely undo the effect.

  Safety rules:
    - disabled lifecycle ports preserve existing runtime behavior;
    - rollback and resume must refuse unmanaged workspace restore or require
      explicit operator configuration;
    - irreversible and compensatable tools must declare their side effects,
      reversibility, undo strategy, and confirmation requirements in the tool
      contract.

history_and_rollback_profiles: |
  checkpoint_history reads a persisted checkpoint through core checkpoint
  operations and prints a stable digest: iteration, command, from state, to
  state, result signal, undo memento status, and workspace ref.

  checkpoint_rollback resolves a checkpoint, targets an iteration, traverses the
  persisted history digest through core rollback operations, restores supported
  UndoMemento payloads into the new checkpoint, writes a rollback checkpoint,
  and restores the target workspace ref only when --directory identifies a
  managed GitWorkspace.

  Persisted rollback currently restores conversation and domain-state payloads
  recorded in mementos and reports missing, irreversible, or compensatable
  payloads explicitly. Boundary compensation payloads preserve child run IDs,
  artifact paths, issue IDs, server/user-action details, or nested-machine
  context for a follow-up compensating action instead of silently treating those
  effects as reversible.

  History and rollback are profile-selected machine actions. Operators pass
  checkpoint, target iteration, and workspace restore choices through request
  input or typed tool config. The binary no longer exposes history or rollback
  compatibility aliases.

config_file_layout: |
  tools/
    builtin/                # Individual shared builtin tool declarations
    exec/                   # Individual shared exec tool declarations
    builtin.yaml            # Legacy aggregate builtin declarations
    exec.yaml               # Legacy aggregate exec declarations
  agents/
    generator/
      profile.yaml          # Preferred generator runtime entry point
      machine.yaml          # Generator state machine and semantics
      tools.yaml            # Tool selection (names only)
      llm/                  # Per-model boundary tool configs
    planner/
      profile.yaml
      machine.yaml          # Full planner with execution
      machine-passthrough.yaml
      machine-plan-only.yaml
      tools.yaml
      llm/
    evaluator/
      profile.yaml
      machine.yaml          # Session-level eval orchestration and semantics
      point.yaml            # Per-point eval pipeline and semantics
      tools.yaml            # Session-level tool selection
      tools-point.yaml      # Per-point tool selection loaded by run_point
    bench/
      profile.yaml
      machine.yaml          # Interactive web UI loop and semantics
      tools.yaml            # serve_ui + launch_eval
    jurist/
      profile.yaml
      machine.yaml          # Spec validation pipeline and semantics
      tools.yaml            # load_corpus + validate_specs + format_report
    lifecycle/
      history/profile.yaml  # Lifecycle history configured program
      history.yaml          # History MachineSpec
      rollback/profile.yaml # Lifecycle rollback configured program
      rollback.yaml         # Rollback MachineSpec
      tools.yaml            # checkpoint_history + checkpoint_rollback selection

container_runtime_layout: |
  The release image packages the same profile-first runtime contract. The
  multi-stage Dockerfile builds and tests the `agent` binary in a Go builder
  stage, then copies only the binary, common Unix utilities, and shared YAML
  assets into a slim Alpine runtime image.

  Shared image assets are installed under /opt/agent-core:

    /opt/agent-core/tools/
    /opt/agent-core/agents/generator/
    /opt/agent-core/agents/evaluator/

  External evaluation repositories mount local suites, samples, and
  configuration into /work. Their profiles may reference the shared image
  declaration directories or generator profiles using absolute paths under
  /opt/agent-core, while keeping repository-specific suites and outputs under
  /work.

  The image intentionally excludes the Go toolchain, source checkout, test
  dependencies, and golangci-lint from the final runtime stage. Exec tools that
  need those binaries require a mounted workspace that provides them, a derived
  image, or another container/host provisioning step. The base release image is
  the portable Agent Core runtime plus common shell and git utilities, not a
  complete language build environment.

  `mage docker` is the canonical build wrapper. It resolves the latest remote
  release tag unless AGENT_CORE_REF overrides it, passes AGENT_CORE_REF to the
  Dockerfile, defaults build credentials to a repository-local .netrc BuildKit
  secret, prefers Docker when available and Podman as fallback, and prints the
  exact build command before execution.

invariants:
  - Every agent mode uses the same binary with the same startup sequence.
  - No mode-specific run subcommands exist; lifecycle history and rollback run
    through the same profile, machine, tool-selection, and builtin registration
    flow as other configured programs.
  - Mode-specific tool configuration lives in YAML config blocks. A small set
    of universal CLI flags such as --input, --output, --directory, and
    lifecycle/telemetry flags serve as runtime inputs. Model/provider settings
    are boundary-tool config.
  - Machine files reference tools by name; tools are resolved from the registry.
  - Named action tools may declare emitted signals with emits; declared emits
    are checked against the machine's signal and transition contract at startup.
  - Nested machine paths are declarative (read from tool config).
  - The transition table is fully validated at startup before any work begins.
  - Adding a new agent mode requires only new YAML files and (optionally)
    new Go builtin tool implementations registered in the BuiltinRegistry.

runtime_safety_boundary: |
  The fixed engine is allowed to own universal safety and observability
  mechanics that apply to every machine, even though those mechanics are not
  ordinary grammar words.

  Budget exhaustion is universal runtime safety. Iteration and token limits are
  checked before each transition; when they are exceeded, core.Loop injects the
  generic BudgetExhausted signal and lets the configured MachineSpec route it.
  Wall-clock limits are enforced through context cancellation and terminate with
  StatusCancelled because a cancelled process may not be in a state where
  another grammar transition can safely run.

  Dispatch protection is interpreter infrastructure. Command timeout, panic
  recovery, error-signal normalization, cost accumulation, RunEvent history, and
  tracing spans describe how the runtime executes a word. They do not choose
  generator, planner, evaluator, bench, or validate behavior.

  Lifecycle suspension is a runtime boundary around an explicit grammar signal.
  A machine or tool emits AwaitApproval; the engine then persists checkpoint
  state, marks the run suspended, and stops. Resume, history, and rollback
  operate on checkpoints and undo mementos, not on mode-specific branches.
  History and rollback are lifecycle profile runs that dispatch declared
  lifecycle tools. Disabled lifecycle ports preserve the normal no-persistence
  runtime.

  Domain behavior remains in YAML and tool declarations: states, signals,
  transitions, selected words, per-tool config, emitted-signal contracts, and
  word-level undo metadata. If a policy depends on a specific workflow or state
  name, it should be a machine transition, machine metadata, or an internal word
  rather than a core.Loop branch.

engine_policy_audit:
  fixed_engine_invariants:
    - item: State machine interpretation
      symbols: [core.Loop, core.StateMachine.Step, core.BuildTransitionTable]
      rationale: |
        The engine owns lookup, command dispatch, and routing on Result.Signal.
        Agent behavior remains in MachineSpec transitions and selected tools.
    - item: Budget and cancellation safety
      symbols: [core.Budget, core.BudgetExhausted, core.LoopHooks.BudgetExceeded]
      rationale: |
        Iteration, token, wall-clock, and opt-in extra budget checks are
        universal runtime safety controls. BudgetExhausted is routed through
        the grammar, while context cancellation terminates as StatusCancelled.
    - item: Dispatch accounting
      symbols: [core.Dispatch, core.RunEvent, core.Cost]
      rationale: |
        Panic recovery, command timeout, tracing, event recording, and cost
        accumulation are interpreter responsibilities, not mode behavior.

  lifecycle_infrastructure:
    - item: Pre-loop validation hook
      symbols: [core.LoopHooks.ValidateParams]
      rationale: |
        Startup validation is infrastructure when it checks runtime wiring
        before the registry freezes. Behavior-specific validation should remain
        in machine/tool contract checks rather than become a new policy hook.
    - item: Suspend checkpoints
      symbols: [core.AwaitApproval, core.LoopHooks.SnapshotConversation, core.LoopHooks.SnapshotDomain]
      rationale: |
        A machine emits the lifecycle signal, then the runtime persists agent,
        command/domain, and workspace references through lifecycle ports.
        The hook surface only supplies domain-owned JSON snapshots.
    - item: Resume seeding
      symbols: [core.ResumeFromCheckpoint, core.LoopParams.InitialSignal, core.LoopParams.InitialRun]
      rationale: |
        Resume restores checkpoint layers and re-enters the same machine without
        replaying bootstrap work. The default resume signal is an approval-gate
        convention, not a separate agent mode.
    - item: Lifecycle history and rollback tools
      symbols: [checkpoint_history, checkpoint_rollback, core.RollbackFromCheckpoint, core.FormatCheckpointHistory]
      rationale: |
        Lifecycle profiles dispatch declared builtin tools. The tools operate
        on persisted checkpoint data and undo mementos, then delegate checkpoint
        selection, formatting, traversal, and rewriting to core operations.
        Hidden CLI subcommands are transitional compatibility only.

  domain_policy_hooks:
    - item: Terminal status mapping
      symbols: [core.LoopHooks.TerminalStatus]
      rationale: |
        The default maps common terminal states, but custom success/failure
        interpretation is domain policy and should stay narrow.
    - item: Task summary capture
      symbols: [core.LoopHooks.TaskCompletedSignal]
      rationale: |
        Selecting which grammar signal copies Result.Output into the summary is
        agent semantics. Long term this can move into machine metadata.
    - item: Factory-family registration gates
      symbols: [registerBuiltinFactories, builtinFactoryCatalog]
      rationale: |
        cmd/agent registers builtin factory families through a centralized
        catalog selected by tool init names, not by mode names. This is
        configuration infrastructure: ToolDef selection activates catalog
        entries, while machine.yaml still defines the workflow.

  migration_candidates:
    - item: Parse-error retry fallback
      symbols: [core.LoopHooks.AfterDispatch, stl.ParseErrorPolicy]
      rationale: |
        Generator-style grammars enforce max_consecutive_parse_errors through
        the explicit report_parse_error word, which emits BudgetExhausted at
        the configured limit. The remaining AfterDispatch hook is a
        compatibility fallback for machines that do not route ParseFailed
        through that internal word.
    - item: Result accumulator mutation
      symbols: [core.LoopHooks.OnResult]
      rationale: |
        OnResult can mutate the run accumulator outside visible grammar
        transitions. It has no production cmd/agent use today and should remain
        test-only or be replaced by explicit words/domain state when needed.
    - item: Boundary tool manifest-state fallback
      symbols: [manifest_state]
      rationale: |
        The fallback state name Composing is generator-shaped. Agent configs
        should declare manifest_state explicitly so the universal runtime does
        not encode a domain state name.

