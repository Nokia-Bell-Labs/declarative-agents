id: srd019-mock
title: Mock Functional Block

context: |
  The mock profile is the rig's stand-in family. One shipped profile stands
  in for any REST dependency a subject agent calls: it serves the canned,
  scripted responses a scenario declares and records the requests it received
  so a validator can assert what the subject actually sent.

  The name matches the runtime surface it configures, the agent-core mock
  endpoint binding, so the profile and its binding agree about what the thing
  is. The reference architecture has no term for a scripted test double:
  mock, stub, emulator, fixture, and simulator do not appear in its corpus,
  which is an autonomous-networks vocabulary rather than a testing one. Its
  digital twin is a different concept and is not used here: a twin mirrors a
  real referent it is derived from, either a physical asset ("the OTDR trace
  becomes a digital twin of the physical fiber") or the live network as a
  whole ("sandboxes or digital twins"), and a scripted responder mirrors
  nothing. The reference term that does apply at the environment level is the
  sandbox, which srd018-assembler uses for the composed scenario the rig
  builds; a mock is one component inside it.

  The mock is configuration over the agent-core mock endpoint binding
  (srd039-mock-endpoint-binding). It is one profile, not one per dependency:
  what a mock serves comes from the fixture file a scenario mounts, so a new
  dependency needs a fixture, not a new profile or a new container image.

problem: |
  Testing a subject's REST tools requires controlling what its dependencies
  return. Standing up the real services makes tests slow, machine-dependent,
  and non-deterministic, and it cannot script a failure on a chosen call. A
  purpose-built mock server per dependency would be Go code outside the
  profile boundary and would multiply with every dependency.

goals:
  - G1: Model the mock profile as one generic, configured REST responder for any dependency.
  - G2: Define fixture selection so a scenario supplies what the mock serves without editing the profile.
  - G3: Define the request-log surface validators assert against.
  - G4: Record the mock actor boundary, inputs, tool selections, runtime dependencies, outputs, and terminal outcomes.

requirements:
  R1:
    title: Behavior model
    items:
      - R1.1: The mock profile must model a serve-mode responder that launches a REST server, serves until a lifecycle exit signal, and stops cleanly.
      - R1.2: The mock must serve its declared routes through the agent-core mock endpoint binding rather than profile-specific response logic.
      - R1.3: The mock must expose a health route so a rig can await readiness before starting a subject.
      - R1.4: The mock must not invoke a model.

  R2:
    title: Fixture selection and scope
    items:
      - R2.1: The fixture file the mock serves must be selected by environment at start, so one profile serves any dependency.
      - R2.2: A scenario must supply its own fixture files; the mock profile must not carry per-dependency response content.
      - R2.3: Starting several mocks for one scenario, each with its own fixture and address, must require no profile change.
      - R2.4: A malformed fixture must prevent the mock from serving, surfacing at configuration validation and at startup rather than on the first request.

  R3:
    title: Request log
    items:
      - R3.1: The mock must expose the recorded request log on a declared route so a validator can read what the subject sent.
      - R3.2: The log must let a validator distinguish a subject that called a dependency correctly from one that did not, including unmatched calls.
      - R3.3: The log must be scoped to the mock instance and reset when it starts, so a scenario never observes an earlier scenario's requests.

  R4:
    title: Inputs, tools, and runtime dependencies
    items:
      - R4.1: Mock inputs must include the fixture file path and the listen address, both supplied at start.
      - R4.2: The mock profile must select the REST server tool family and the lifecycle control words it needs to serve and exit.
      - R4.3: Mock dependencies must name agent-core for the mock endpoint binding and REST server runtime; the fixture content stays profile-owned or scenario-owned.
      - R4.4: The mock must run as the same agent binary over a mounted profile, requiring no dedicated container image.

  R5:
    title: Outputs and outcomes
    items:
      - R5.1: Mock outputs must include the served responses and the readable request log.
      - R5.2: Mock terminal outcomes must be Done or Failed.

non_goals:
  - Define the fixture schema, matching rules, or request-log payload shape; those are srd039 in agent-core.
  - Proxy to, record from, or replay a real upstream service.
  - Assert anything; the mock serves and records, and the validator asserts.
  - Model a client-side mock; the mock serves inbound requests only.

acceptance_criteria:
  - id: AC1
    criterion: The mock profile is described as one generic configured responder that serves through the agent-core mock binding, exposes health, stops on a lifecycle signal, and invokes no model.
    traces: [R1.1, R1.2, R1.3, R1.4]
  - id: AC2
    criterion: One mock profile serves any dependency because its fixture is selected by environment, scenarios own their fixtures, several mocks can run per scenario, and a malformed fixture blocks serving.
    traces: [R2.1, R2.2, R2.3, R2.4]
  - id: AC3
    criterion: The request log is readable on a declared route, is sufficient to verify a subject's outbound calls including unmatched ones, and is per-instance.
    traces: [R3.1, R3.2, R3.3]
  - id: AC4
    criterion: Mock inputs, selected tool families, and runtime dependencies are named and separated from agent-core runtime capability, and the mock needs no dedicated image.
    traces: [R4.1, R4.2, R4.3, R4.4]
  - id: AC5
    criterion: Mock outputs and terminal outcomes are checkable by mounted execution or conformance targets.
    traces: [R5.1, R5.2]

depends_on:
