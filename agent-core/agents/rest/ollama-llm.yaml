tools:
  - name: invoke_llm
    type: builtin
    init: invoke_llm
    visibility: internal
    emits: [LLMResponded, CommandError]
    description: Invoke the configured Qwen Ollama model for the live REST model-listing proof.
    category: boundary
    problem: The Ollama REST proof needs a model boundary that must choose the configured REST word before answering.
    goals:
      - Send the operator request, tool manifest, and REST result to Qwen.
      - Require use of ollama_list_models before final answer generation.
      - Keep model, provider, parser, and prompt configuration in profile-owned YAML.
    requirements:
      input:
        - must read conversation history and selected model-visible tools from runtime state
        - must use the configured Qwen 3 family model against local Ollama
      output:
        - must emit LLMResponded when Ollama returns model text
        - must emit CommandError for provider setup, model discovery, or chat failures
      side_effects:
        - must call local Ollama POST /api/chat
      undo:
        - must restore conversation history from the pre-call snapshot
    non_goals:
      - Does not call Ollama /api/tags directly.
      - Does not expose mutating Ollama REST tools.
    output:
      description: Raw Qwen response.
      schema:
        type: object
        properties:
          response: {type: string}
          provider: {type: string}
          model: {type: string}
    side_effects:
      - kind: external_api_call
        target: ollama.chat
        description: Sends prompt messages to the configured local Ollama model.
      - kind: state_mutation
        target: conversation_history
        state: appended
        description: Appends the model response after a successful provider call.
    reversibility:
      classification: reversible
      undo: conversation_truncate
      requires_confirmation: false
    undo:
      strategy: conversation_truncate
      description: Restore conversation history captured before the model call.
      requires: [conversation_checkpoint]
    errors:
      - signal: CommandError
        condition: provider configuration is invalid, the model is unavailable, or the model call fails
        message_shape: 'invoke_llm: <provider/model>: <error>'
        state_after_failure: conversation history is unchanged unless the provider response was already appended
    relationships:
      after:
        - parse_response
      overlaps:
        - tool: ollama_list_models
          difference: invoke_llm asks Qwen to choose or summarize; ollama_list_models calls GET /api/tags.
    config:
      model: "qwen3.6:35b-mlx"
      provider: ollama
      provider_url: "http://localhost:11434"
      manifest_state: Composing
      response_profile: qwen
      max_time: 120
      llm_timeout: 120
      system_prompt: |
        You list local Ollama models by using the provided REST tool.

        Rules:
        - First call ollama_list_models. Do not answer from memory.
        - After the REST result returns, call done with a concise answer.
        - The final answer must include at least one exact model name from the REST body models array.
        - Do not mention model names that are not present in the REST result.
        - Use only these tools: ollama_list_models, done.

        Tool call format:
        [tool_call]
        {"tool":"ollama_list_models","parameters":{}}
        [/tool_call]

        Final answer format:
        [tool_call]
        {"tool":"done","parameters":{"summary":"Local Ollama models include: <names from REST result>."}}
        [/tool_call]
