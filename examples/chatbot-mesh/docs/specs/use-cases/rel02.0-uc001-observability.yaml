id: rel02.0-uc001-observability
title: Observability Panel Shows Per-Agent State and a Cross-Agent Trace Waterfall

summary: |
  An operator opens the chatbot's observability panel (srd002 R5.1) and watches
  the mesh serve a turn. The panel renders one live sub-panel per monitored agent,
  each showing the agent's run state, a metric-sample counter, and a feed of
  run-event state transitions, fed by that agent's monitor read_state and SSE
  stream read through the chatbot's same-origin monitor_proxy so no read crosses
  origin. Selecting a turn renders its connected cross-agent trace as a span
  waterfall grouped and colored by service.name, fetched from the trace backend
  (Jaeger query API) same-origin through the monitor_proxy. The connected trace is
  real because the request-scoped machine exports its spans under the
  machine_request span and propagates traceparent to the RAG servers; the panel
  degrades to a backend-missing notice when the trace backend is absent. This is
  the observability epic (#295).

actor: An operator watching the mesh serve turns.

trigger: |
  The operator opens the observability route and selects a chat turn.

preconditions:
  - The chatbot serves the SPA and the monitor_proxy binding to each monitored agent's monitor server.
  - Each agent exports OTLP and a trace backend is reachable for the waterfall (else the panel degrades).
  - The chat response carries the turn's trace_id.

flow:
  - id: F1
    text: The panel opens one sub-panel per monitored agent (chatbot and each RAG) from ux.yaml monitored_agents, reading each agent's monitor state and SSE stream through the same-origin monitor_proxy.
  - id: F2
    text: Each sub-panel shows the agent's run state, a metric-sample counter, and a feed of run-event state transitions.
  - id: F3
    text: A turn-correlation bar records each turn's time window and highlights the events observed during a selected turn across every sub-panel.
  - id: F4
    text: Selecting a turn fetches its connected trace by trace_id from the trace backend through the monitor_proxy and renders a span waterfall grouped and colored by service.name.
  - id: F5
    text: When the trace backend is absent the waterfall degrades to a backend-missing notice, leaving the per-agent monitor panels live.

touchpoints:
  - id: T1
    target: srd002-chatbot-agent AC5
    reason: The observability panel is one of the three declared panels served over static_assets.
  - id: T2
    target: test-rel02.0-observability observability_panels
    reason: The suite records the per-agent monitor panels and the cross-agent trace waterfall with expected outcomes.

success_criteria:
  - id: S1
    criterion: The panel renders one live sub-panel per monitored agent, each showing run state, a metric-sample counter, and a run-event feed, read through the same-origin monitor_proxy.
    traces:
      - srd002-chatbot-agent R5.1
  - id: S2
    criterion: Selecting a turn renders its connected cross-agent trace as a span waterfall grouped by service.name, fetched from the trace backend through the monitor_proxy.
    traces:
      - srd002-chatbot-agent R5.1
  - id: S3
    criterion: Cross-agent trace continuity relies on traceparent propagation; when the trace backend is absent the waterfall degrades to a notice and the monitor panels stay live.
    traces:
      - srd002-chatbot-agent R5.3

out_of_scope:
  - Request-id-tagged turn correlation, a follow-on that needs the monitor run events to carry the request id.
  - The provisioning panel, deferred to the control-plane addition.

test_suite_trace: test-rel02.0-observability
status: implemented
