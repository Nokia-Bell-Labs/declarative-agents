id: test-rel01.0-routing-fanout
title: Test Suite for Release 01.0 Routing and Multi-RAG Fan-Out
release: "01.0"

overview: |
  This suite validates the routing and fan-out extension of the chatbot turn
  (srd002 R2, R3): the LLM $tool router that dispatches one chat-LLM word, and the
  sequential two-RAG fan-out that cites both disjoint corpora, degrades on a per-RAG
  failure (CommandError), and excludes an embedding-space mismatch (QueryRejected)
  through visible machine transitions.

traces:
  - rel01.0-uc001-routed-fanout

preconditions:
  - agent-core is available as AGENT_CORE_ROOT or a sibling ../agent-core checkout.
  - A Chroma server and an Ollama are reachable with the configured embedding, router, and two chat-LLM models.
  - This example owns the chatbot profile, the router prompt, and the fan-out declarations, under examples/chatbot-mesh/agents/.

test_cases:
  - use_case: rel01.0-uc001-routed-fanout
    name: Routed two-RAG fan-out tracer over disjoint corpora
    integration_target: mage integration:chatbot
    # Module-local unit evidence for the co-generated fan-out chain. The named
    # behaviors under expected are live outcomes proven by the integration target
    # above, not by this command. The previous command also named
    # TestChatbotComposeReadsEachRagSource, which lives in agent-profiles and not
    # in this module; the surviving TestChatbotFanOut branch matched an unrelated
    # co-generation test, so the missing proof went unreported (GH-592).
    go_test: go test ./magefiles -run '^TestChatbotFanOutCoGeneratedForNRags$'
    status: implemented
    description: |
      Integration.Chatbot starts one Chroma container with two disjoint collections
      (the ingest fixture for rag0 and a seeded disjoint Solar Ridge corpus for
      rag1), launches two rag-server agents and the router-enabled chatbot, and
      drives the chat endpoint. A factual turn and an analytical turn exercise the
      $tool router; the chatbot span log is asserted to show both the fast and the
      deep chat model answered (the router dispatched each word). A spanning turn
      draws the disjoint rag1 corpus into the answer (sequential fan-out; compose
      renders each RAG under its own [ragN] header, no merge word). Stopping rag1
      degrades the next turn to a 200 with the disjoint corpus absent (R3.2 via the
      CommandError machine transition). Verified end to end against live Docker and
      Ollama; skips cleanly without them, naming a missing model. The named Go test
      locks the generated N-RAG wiring; the Mage target owns routing, cross-corpus
      composition, and degradation behavior.
    inputs:
      chatbot_profile: agents/chatbot/profile.yaml
      rag_clients: [rag0, rag1]
      turns: factual, analytical, cross-corpus, then a degraded follow-up
      fault: rag1 stopped before the degraded turn
    expected:
      router_dispatches_both_chat_models: true
      fanout_draws_both_corpora: true
      degraded_turn_omits_stopped_corpus: true
      excluded_source_routes_on_queryrejected: true
    traces:
      - rel01.0-uc001-routed-fanout S1
      - rel01.0-uc001-routed-fanout S2
      - rel01.0-uc001-routed-fanout S3
      - rel01.0-uc001-routed-fanout S4
      - srd002-chatbot-agent AC2
      - srd002-chatbot-agent AC3
      - srd002-chatbot-agent AC6

  - use_case: rel01.0-uc001-routed-fanout
    name: Embedding-model exclusion where dimensions match but identities differ
    integration_target: mage integration:embeddingExclusion
    go_test: go test ./magefiles -run '^TestChatbotFanOutCoGeneratedForNRags$'
    status: implemented
    description: |
      The case srd002 R3.3 exists for, and the one the mapped 400 cannot reach. That
      400 originates in Chroma rejecting the query vector, so it fires on a dimension
      mismatch; two models of the same width both answer 200. This target stands two
      RAG mocks returning the same vector shape that differ only in the embedding model
      they report, and reads the composed prompt out of the LLM mock's request log
      rather than the answer, which is canned fixture text and therefore identical
      whichever chunks were composed. The mismatched source's chunk must be absent and
      the matching source's chunk present in the same prompt: asserting only the
      absence would also pass for a turn that simply lost both sources. The turn must
      still answer 200, since an exclusion degrades the grounding rather than failing
      the turn (R3.2). The chatbot runs from a port-shifted profile copy so the proof
      does not contend with a real Ollama on the shipped embedding port, moving the
      client base_urls and the network limits that pin them together (R6.1). Verified
      in both directions: with the comparison neutralized so a differing identity
      reports as matched, the target fails naming the mismatched chunk in the prompt.
    inputs:
      chatbot_profile: agents/chatbot/profile.yaml
      query_embedding_model: qwen3-embedding:8b
      rag0_reported_model: nomic-embed-text:v1.5
      rag1_reported_model: qwen3-embedding:8b
      rag_status: both answer 200 with the same vector shape
    expected:
      mismatched_source_excluded_from_prompt: true
      matching_source_composed_in_same_turn: true
      turn_degrades_rather_than_fails: true
    traces:
      - rel01.0-uc001-routed-fanout S3
      - srd002-chatbot-agent AC3
