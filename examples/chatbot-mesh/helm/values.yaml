# Chatbot mesh values. The ragUnits list is the single source of truth for the RAG
# topology: each entry renders a rag-server Deployment/Service and a Chroma
# StatefulSet/Service, and (in GH-314) the chatbot rest.yaml RAG client entries.

# The rel06.0 mounted-profile runtime image, one image across every agent role.
image:
  repository: ghcr.io/nokia-bell-labs/declarative-agents/agent-core
  tag: "0.1.0"
  pullPolicy: IfNotPresent

# Profiles are supplied to each agent from a ConfigMap mounted at /profiles; the
# agent runs agent-entrypoint --profile /profiles/agents/<name>/profile.yaml.
profiles:
  mountPath: /profiles
  workMountPath: /work

chatbot:
  replicas: 1
  # The model the chatbot embeds a query with; it must share the embedding space
  # of the RAG corpora (srd014 R3.3). Co-generated into the chatbot rest.yaml
  # embedding client.
  embeddingModel: qwen3-embedding:8b
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: "1", memory: 1Gi}
  ports:
    chat: 18080
    control: 18081
    monitor: 18082

# Each RAG unit is one rag-server agent paired with its own Chroma database.
# name is a DNS label; collection is the Chroma collection it serves;
# embeddingModel is the embedding-space identity the chatbot uses for mismatch
# handling (srd013 R2.3, srd014 R3.3).
ragUnits:
  - name: rag0
    collection: corpus
    embeddingModel: qwen3-embedding:8b
    replicas: 1
  - name: rag1
    collection: corpus2
    embeddingModel: qwen3-embedding:8b
    replicas: 1

ragServer:
  ports:
    query: 18085
    control: 18086
    monitor: 18087
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: "1", memory: 1Gi}

chroma:
  image: {repository: chromadb/chroma, tag: "1.5.3", pullPolicy: IfNotPresent}
  port: 8000
  storage: 1Gi
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: "1", memory: 1Gi}

# The chat and embedding LLM endpoint for the external path. When the in-cluster
# LLM tier is disabled (ollama.enabled=false), embedding/chat client entries point
# at externalURL; port is the Ollama API port either way.
llm:
  externalURL: http://ollama.default.svc.cluster.local:11434
  port: 11434

# The in-cluster LLM tier (srd015 R6, GH-337): a chart-owned Ollama workload with
# PVC model storage, a model-preload Job, agent readiness gating on model presence,
# and GPU scheduling values. Enabled by default so a fresh-cluster install is
# self-contained. Set enabled=false with an llm.externalURL override to point at an
# operator-supplied Ollama (the render is byte-identical to the pre-tier chart).
#
# Realized as chart-owned templates rather than a nested Helm subchart so the Ollama
# Service keeps the <release>-<chart>-ollama name the co-generated llmURL depends on
# (a nested subchart names its Service by the subchart's own fullname).
ollama:
  enabled: true
  image: {repository: ollama/ollama, tag: latest, pullPolicy: IfNotPresent}
  # The models, named once here, feed both the preload Job and the agents' rendered
  # config: the embedding model, the chat models (fast + deep), and the router model.
  models:
    embedding: qwen3-embedding:8b
    chat: ["qwen2.5:3b", "ornith:9b"]
    router: qwen2.5:3b
  persistence:
    size: 10Gi
    storageClass: ""
  resources:
    requests: {cpu: 500m, memory: 2Gi}
    limits: {cpu: "4", memory: 8Gi}
  # GPU scheduling; CPU-only is permitted (the kind smoke path). Set gpu.count > 0
  # and provide nodeSelector/tolerations for a GPU node pool in production.
  gpu:
    count: 0
  nodeSelector: {}
  tolerations: []
  # Topology: a single Ollama instance serving all models (default), or one instance
  # per logical service (embedding vs chat) when set to per-model. Single is the
  # default -- one process holds all models in one PVC, simplest and sufficient for
  # the mesh; per-model maps to the two-logical-services split for isolation or
  # independent GPU sizing (srd015 R6.5).
  topology: single

# Dolt checkpoint backend (agent-core srd035/srd036).
dolt:
  enabled: true
  image: {repository: dolthub/dolt-sql-server, tag: latest, pullPolicy: IfNotPresent}
  port: 3306
  storage: 1Gi
  rootHost: "%"
  # The MySQL-wire user and database the chatbot's checkpoint DSN targets. The
  # dolt-sql-server root user has no password; the database is created on the Dolt
  # volume (see NOTES). Used by chatbot-mesh.doltDSN.
  user: root
  database: agent_checkpoints

# OTel collector receives OTLP from every agent (R5.1) and exports to the trace
# backend that the observability panel queries (R5.2).
collector:
  enabled: true
  image: {repository: otel/opentelemetry-collector-contrib, tag: "0.116.0", pullPolicy: IfNotPresent}
  otlpGRPCPort: 4317
  otlpHTTPPort: 4318

jaeger:
  enabled: true
  image: {repository: jaegertracing/all-in-one, tag: "1.62.0", pullPolicy: IfNotPresent}
  otlpGRPCPort: 4317
  queryPort: 16686

ingress:
  enabled: true
  className: ""
  host: chatbot.local
  annotations: {}

# Validate the rendered chatbot rest.yaml before serving (R2.2). The co-generation
# that renders it from ragUnits lands in GH-314; the init check wires here.
validateProfiles: true

# The provisioning deployment API (srd003 R4): a minimal in-cluster values-patch
# service the provisioning panel drives to view the mesh and apply values edits
# that trigger a rollout, authenticated apart from chat. It never submits an
# endpoint to a running agent. Reached same-origin via the chatbot ingress at
# /provisioning.
provisioner:
  enabled: true
  # The service image bundles the chart and helm so apply can `helm upgrade` the
  # release in place; build it from examples/chatbot-mesh/provisioner.
  image: {repository: ghcr.io/nokia-bell-labs/declarative-agents/chatbot-mesh-provisioner, tag: "0.1.0", pullPolicy: IfNotPresent}
  port: 18090
  # allowApply grants the apply-path RBAC (helm upgrade manages the chart objects).
  # Set false for a read-only provisioning surface.
  allowApply: true
  resources:
    requests: {cpu: 50m, memory: 64Mi}
    limits: {cpu: 500m, memory: 256Mi}
  # The read/apply bearer tokens, held in a Secret separate from the chat path
  # (which has no auth). Provide your own Secret (create: false) or let the chart
  # create one from these values. The read token works with read-only RBAC.
  tokenSecret:
    create: true
    readToken: ""
    applyToken: ""
  # The interesting parameters the panel edits, grouped per srd003. They seed the
  # read-state mesh view; nResults is the per-RAG retrieval bound (srd001 R2.1).
  params:
    nResults: 5
    chunkCap: 0
    routerDefault: invoke_llm_fast
    chatModel: "qwen2.5:3b"

# The executor (srd006): the declarative agent that replaces the standard-library Go
# provisioner as the deployment API (srd003 R4). It runs the agent-core runtime with a
# mounted profile whose request-machine binds the helm and kubectl CLIs as exec words.
# Disabled by default until the executor image is published; enabling it points the
# creator's deployment_api client at the executor Service instead of the provisioner.
executor:
  enabled: false
  # The executor image bundles the runtime, helm, kubectl, and the chart at /chart
  # (srd003 R1.3 sanctioned divergence). Built from examples/chatbot-mesh/executor.Dockerfile.
  image: {repository: ghcr.io/nokia-bell-labs/declarative-agents/chatbot-mesh-executor, tag: "0.1.0", pullPolicy: IfNotPresent}
  ports: {apply: 18090, control: 18091, monitor: 18092}
  # allowApply grants the apply-path RBAC (helm upgrade manages the chart objects).
  allowApply: true
  # Authenticate the apply surface apart from the chat path at the network layer:
  # only the creator may reach the apply port (srd006 R4.1).
  networkPolicy:
    enabled: true
  resources:
    requests: {cpu: 50m, memory: 64Mi}
    limits: {cpu: 500m, memory: 256Mi}

# The control plane (srd004 coordinator, srd005 creator): two persistent agents on
# the runtime image that turn a provisioning intent into an ingest and a rollout
# through the deployment API. Disabled by default; the data plane serves without it.
# The chatbot gains its declared coordinator client only when this is enabled.
controlPlane:
  enabled: false
  coordinator:
    replicas: 1
    ports: {intent: 18100, control: 18101, monitor: 18102}
    resources:
      requests: {cpu: 50m, memory: 64Mi}
      limits: {cpu: 500m, memory: 256Mi}
  creator:
    replicas: 1
    ports: {instance: 18110, control: 18111, monitor: 18112}
    resources:
      requests: {cpu: 50m, memory: 64Mi}
      limits: {cpu: 500m, memory: 256Mi}
    # The deployment-API bearer token the creator uses to drive the provisioner,
    # mounted from a Secret separate from the chat path (the #392 file-mount pattern:
    # read from a mounted file, never from env or runtime input). Defaults to the
    # release provisioner Secret's applyToken; set name to point at your own.
    deploymentApiTokenSecret:
      name: ""
      key: applyToken
