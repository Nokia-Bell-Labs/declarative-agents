id: agent-profiles-roadmap
title: Agent Profiles Release Road Map

numbering_policy: |
  Release numbers share the number space defined by agent-core. A release exists
  in this road map only when this repository has deliverables for the matching
  agent-core release, so the sequence skips numbers with no profile-owned work
  (hence the jump from 00.1 to 06.0). Where a release carries
  related_agent_core_release, that field names the agent-core release it tracks,
  and any proof command that runs from an agent-core checkout says so explicitly.

releases:
  - version: "00.1"
    name: Repository bootstrap
    description: |
      Define the repository purpose and ownership boundary before assets move.
      The first release also adds a documentation index and migration roadmap.

      Issue format rules matter because the next issues touch profile assets,
      demos, and fixtures. With those rules in place, future issues can
      move assets without re-opening the runtime ownership decision.
    status: done
    deliverables:
      - README.md documents local usage, container usage, and ownership.
      - docs/VISION.yaml defines goals and boundaries.
      - docs/ARCHITECTURE.yaml defines repository structure and mount
        interfaces.
      - docs/SPECIFICATIONS.yaml indexes the initial docs.
      - docs/constitutions/issue-format.yaml defines future issue fields.
      - docs/specs/software-requirements/srd001-agent-functional-blocks.yaml
        defines migrated profile families as functional blocks.
      - docs/specs/semantic-models/multi-agent-profile-system.yaml defines
        profile role groups and dependency directions.
      - docs/specs/semantic-models/agent-role-taxonomy.yaml classifies each
        profile family by boundary, inputs, outputs, tools, and checks.
      - magefiles/release.go adds profile bundle release tagging.
      - magefiles/validation.go validates migrated profiles and mounted
        container usage against an external agent-core runtime.

  - version: "06.0"
    name: External agent profiles and mounted runtime assets
    description: |
      Profile-owned programs have moved from agent-core into this repository.
      Demos and integration fixtures moved with the profiles they exercise.

      Runtime code, builtin tool implementations, release image build logic,
      and core-owned assets stay in agent-core. At execution time, commands
      load profiles through AGENT_PROFILES_ROOT, /profiles, or another explicit
      external path.

      Release 06.0 is complete for this repository when the profile assets can
      be validated, tagged, mounted into a runtime container, and consumed by
      agent-core integration targets. The remaining ownership boundary belongs
      to agent-core release work, not to this profile bundle.
      Done here means the profile bundle has its own evidence.

      Operators still need a compatible agent-core runtime image or checkout,
      but this repository now supplies the profile programs, fixtures, UI
      assets, validation target, smoke target, release tag target, and formal
      traceability records that the runtime consumes.
    status: done
    related_agent_core_release: "06.0"
    planned_work:
      - id: agent-profiles-dte
        summary: Specify agent functional blocks and multi-agent semantics.
        status: done
      - id: agent-profiles-sqe
        summary: Migrate agent profiles and UX assets from agent-core.
        status: done
      - id: agent-profiles-6ar
        summary: Move demos and agent integration fixtures into agent-profiles.
        status: done
      - id: agent-profiles-73s
        summary: Add Mage release tag target for profile bundles.
        status: done
      - id: agent-profiles-8t8
        summary: Add profile validation and container usage checks.
        status: done
      - id: agent-profiles-dqm
        summary: Validate all profile variants in agent-profiles.
        status: done
      - id: agent-profiles-0g7
        summary: Add formal profile migration use cases and test suites.
        status: done
    use_cases:
      - id: rel06.0-uc001-mounted-profile-execution
        summary: Runtime executes profile-owned programs mounted from agent-profiles.
        status: implemented
      - id: rel06.0-uc002-profile-validation
        summary: Profile validation and release bundle tagging prove repository readiness.
        status: implemented
    test_suites:
      - id: test-rel06.0-agent-profiles
        summary: Formal proof suite for profile validation, mounted container execution, tagging, and agent-core integrations.
        status: implemented
    proof:
      - mage validate
      - mage containerSmoke
      - mage tag
      - go test ./magefiles
      - AGENT_PROFILES_ROOT=/path/to/agent-profiles mage integration:uc001 (run from an agent-core checkout)
      - AGENT_PROFILES_ROOT=/path/to/agent-profiles mage integration:uc002 (run from an agent-core checkout)
      - AGENT_PROFILES_ROOT=/path/to/agent-profiles mage integration:uc004 (run from an agent-core checkout)
    success_markers:
      - Migrated profile.yaml files load through agent-core from this
        repository.
      - Knowledge Manager UX config remains profile-local beside its profile.
      - Demos and fixtures use repository-relative paths, AGENT_PROFILES_ROOT,
        /profiles, or explicit workspace mounts.
      - agent-core runtime images do not copy migrated profile directories.

  - version: "07.0"
    name: Profile-owned integration tracer bullets
    description: |
      Profile-owned integration tests should prove concrete profile behavior
      where the profile assets live. Release 07.0 defines tracer bullets for
      Knowledge Manager/documentation-curator UX, evaluator to generator,
      planner to generator, bench to evaluator, and monitor/control boundaries.

      The release now includes executable profile-owned tracer bullets for
      Knowledge Manager/documentation-curator UX, evaluator to generator,
      planner to generator, bench to evaluator, and monitor/control boundaries.
      Each listed Mage target has profile-owned evidence.
    status: done
    related_agent_core_release: "07.0"
    planned_work:
      - id: gh-106
        summary: Define profile integration tracer-bullet use cases and suite.
        status: done
      - id: gh-107
        summary: Move documentation-curator integration proof to agent-profiles.
        status: done
      - id: gh-108
        summary: Add evaluator-to-generator profile tracer bullet.
        status: done
      - id: gh-109
        summary: Add planner-to-generator profile tracer bullet.
        status: done
      - id: gh-110
        summary: Add bench-to-evaluator profile tracer bullet.
        status: done
      - id: gh-111
        summary: Add or explicitly scope monitor-control tracer evidence.
        status: done
    use_cases:
      - id: rel07.0-uc001-documentation-curator-profile-ux
        summary: Knowledge Manager profile UX, document machine_request, trace, and lifecycle proof.
        status: implemented
      - id: rel07.0-uc002-evaluator-generator-profile-boundary
        summary: Evaluator runs generator as a benchmark subject profile.
        status: implemented
      - id: rel07.0-uc003-planner-generator-profile-boundary
        summary: Planner executes materialized work through generator.
        status: implemented
      - id: rel07.0-uc004-bench-evaluator-profile-boundary
        summary: Bench launches evaluator from a human/operator action.
        status: implemented
      - id: rel07.0-uc005-monitor-control-profile-boundary
        summary: Monitor/control tracer decision and lifecycle boundary proof.
        status: implemented
    test_suites:
      - id: test-rel07.0-profile-integrations
        summary: Implemented profile-owned tracer bullet evidence.
        status: implemented
    proof:
      - mage integration:all
      - mage integration:documentationCurator
      - mage integration:evaluatorGenerator
      - mage integration:plannerGenerator
      - mage integration:benchEvaluator
      - mage integration:monitorControl
    success_markers:
      - Each implemented tracer target lives in agent-profiles.
      - Fixtures resolve through AGENT_PROFILES_ROOT or repository-relative paths.
      - Cross-profile boundaries record concrete output, trace, or terminal state evidence.
      - agent-core remains unaware of concrete profile names in its own integration targets.

  - version: "07.1"
    name: Per-family SRDs and profile coverage
    description: |
      Release 07.1 gives each profile family its own requirements contract and
      validates the completed 07.0 tracer bullets without renumbering existing
      use cases. The requirements layer moves from one shared SRD holding ten
      blocks to one SRD per family, with srd001 keeping only the cross-cutting
      ownership boundary and dependency-direction invariants.

      The release also adds per-family boundary use cases and a test suite for
      the jurist, lifecycle, and rest families, which were previously validated
      only by the generic rel06.0 mounted-profile and profile-validation use
      cases. Each new use case names the actor boundary, inputs, outputs, and
      terminal outcomes for its family and traces to the family SRD.
    status: in-progress
    planned_work:
      - id: gh-193
        summary: Split srd001-agent-functional-blocks into per-family SRDs (srd002-generator through srd011-knowledge-manager) and retarget existing traces.
        status: done
      - id: gh-194
        summary: Add per-family boundary use cases and a test suite for the jurist, lifecycle, and rest profiles.
        status: done
      - id: gh-195
        summary: Add an executable per-family OpenTelemetry conformance suite (mage conformance) covering all ten profile families against srd002-srd011.
        status: in-progress
    deliverables:
      - docs/specs/software-requirements/srd002-generator.yaml through
        srd011-knowledge-manager.yaml define per-family functional blocks.
      - docs/specs/software-requirements/srd001-agent-functional-blocks.yaml
        keeps the profile ownership boundary and cross-profile
        dependency-direction invariants.
      - docs/specs/use-cases/rel07.1-uc001-jurist-profile-boundary.yaml,
        rel07.1-uc002-lifecycle-profile-boundary.yaml, and
        rel07.1-uc003-rest-profile-boundary.yaml add per-family boundary use
        cases for the previously uncovered families.
      - docs/specs/test-suites/test-rel07.1-profile-boundaries.yaml validates the
        three boundary use cases against the family SRD acceptance criteria.
      - docs/specs/test-suites/test-rel07.1-profile-conformance.yaml records the
        executable per-family conformance suite that runs each family through the
        agent-core CLI and asserts on captured OpenTelemetry traces.
    use_cases:
      - id: rel07.1-uc001-jurist-profile-boundary
        summary: Jurist deterministic, LLM-free charter validation boundary.
        status: specified
      - id: rel07.1-uc002-lifecycle-profile-boundary
        summary: Lifecycle history, rollback, and approval machine-action boundary.
        status: specified
      - id: rel07.1-uc003-rest-profile-boundary
        summary: REST client and server boundary words and the ollama-* variant.
        status: specified
    test_suites:
      - id: test-rel07.1-profile-boundaries
        summary: Boundary use-case validation for the jurist, lifecycle, and rest families.
        status: specified
      - id: test-rel07.1-profile-conformance
        summary: Executable per-family OpenTelemetry conformance for all ten families, all implemented (generator Ollama-gated, lifecycle suspend/resume and history/rollback Dolt-gated; rest proves its inbound webhook server boundary, with async await_operation polling proven at the agent-core package level).
        status: implemented
    proof:
      - mage validate
      - AGENT_CORE_ROOT=/path/to/agent-core mage conformance
    deferred:
      - Profile-owned Mage integration targets that execute the jurist,
        lifecycle, and rest boundary fixtures, mirroring
        magefiles/integration_*.go for the covered families. Until those land the
        three use cases and their test cases stay status specified rather than
        implemented.
      - Running the full rest client create/await head inside a profile machine
        (rel07.1-uc003), which needs inter-tool input shaping so REST client
        steps satisfy the declared-only runtime input contract. The rest
        conformance case proves the inbound webhook server boundary to Succeeded;
        the client async await_operation polling (#205) is delivered in agent-core
        and proven at the package level. Planner conformance (#211) is delivered —
        agent-core gained a load_graph pipeline word that seeds the requirement
        graph before extraction. Lifecycle history/rollback conformance (#209) is
        delivered — agent-core routes the --request checkpoint id and to_iteration
        into a target-pinned checkpoint backend and the tool configs.
