name: critic-point
purpose: |-
  The critic uses a two-level nested state machine architecture.

  The session-level machine (agents/critic/machine.yaml) iterates
  over profile-resolved evaluation points defined in a suite YAML:
  selected profile, sample, grid point, repetition, and any legacy harness
  metadata retained by compatibility suites. For each point it invokes a
  nested core.Loop that runs the per-point pipeline.

  The point-level machine (agents/critic/point.yaml) orchestrates
  a single evaluation point: it creates a point directory, copies the
  sample workspace/docs, initializes and commits a git baseline, snapshots
  the experiment configuration, invokes the executor agent as a subprocess,
  checks the results, and collects metrics. It is a deterministic
  pipeline that sequences atomic tools — no LLM calls.

  The former `agent eval` subcommand has been removed. Evaluation is
  now normally driven by `--profile agents/critic/profile.yaml`; direct
  `--machine`/`--tools` invocation remains compatibility-only startup input.

  This file is the critic point-level machine.
configuration:
  machine: agents/critic/machine.yaml
  point_machine: agents/critic/point.yaml
  session_tools: agents/critic/tools.yaml
  point_tools: agents/critic/tools-point.yaml
  tool_declarations:
  - tools/builtin.yaml
  - agents/critic/builtin.yaml
invariants:
- The critic never calls an LLM directly
- All agent outcomes (success, failure, timeout) proceed to run_oracle_check
- Oracle failures are domain results and still proceed through trace, version, summary, and metrics collection
- The workspace is a fresh temporary directory for each evaluation point
- Metrics are collected even when the agent fails or times out
- The session machine iterates sequentially through all profile-resolved grid points
- Session and point machines have separate tool selections
- run_point builds the nested point registry from agents/critic/tools-point.yaml
lifecycle: |-
  1. Idle → CreatingPointDir: create_point_dir
  2. CreatingPointDir → CopyingSampleWorkspace: copy_sample_workspace
  3. CopyingSampleWorkspace → CopyingSampleDocs: copy_sample_docs
  4. CopyingSampleDocs → InitializingWorkspaceRepo: init_workspace_repo
  5. InitializingWorkspaceRepo → StagingWorkspaceBaseline: stage_workspace_baseline
  6. StagingWorkspaceBaseline → CommittingWorkspaceBaseline: commit_workspace_baseline
  7. CommittingWorkspaceBaseline → SnapshotConfig: dump_config
  8. SnapshotConfig → RunningAgent: run_agent
  9. RunningAgent → RunningOracleCheck: run_oracle_check (on any harness outcome)
  10. RunningOracleCheck → CollectingTraceTokens: collect_trace_tokens (on pass or fail)
  11. CollectingTraceTokens → CheckingAgentVersion: check_agent_version
  12. CheckingAgentVersion → SummarizingPointResults: summarize_point_results (checked or mismatch)
  13. SummarizingPointResults → CollectingMetrics: collect_metrics
  14. CollectingMetrics → Done
pipeline_diagram: |-
  ```mermaid
  flowchart LR
    A[create_point_dir] --> B[copy_sample_workspace]
    B --> C[copy_sample_docs]
    C --> D[init_workspace_repo]
    D --> E[stage_workspace_baseline]
    E --> F[commit_workspace_baseline]
    F --> G[dump_config]
    G --> H[run_agent]
    H -->|any outcome| I[run_oracle_check]
    I --> J[collect_trace_tokens]
    J --> K[check_agent_version]
    K --> L[summarize_point_results]
    L --> M[collect_metrics]
  ```
initial_state: Idle
budget:
  max_iterations: 20
states:
- name: Idle
  meaning: Initial state before evaluation begins.
- name: CreatingPointDir
  meaning: Creating the per-point artifact directory and recording trace path.
- name: CopyingSampleWorkspace
  meaning: Copying sample workspace files into the point directory.
- name: CopyingSampleDocs
  meaning: Copying optional sample docs into the point directory.
- name: InitializingWorkspaceRepo
  meaning: Initializing the point workspace git repository.
- name: StagingWorkspaceBaseline
  meaning: Staging all point workspace files for the baseline commit.
- name: CommittingWorkspaceBaseline
  meaning: Creating the baseline git commit for the point workspace.
- name: SnapshotConfig
  meaning: Serializing the full experiment configuration into experiment.yaml.
- name: RunningAgent
  meaning: The executor agent is running as a subprocess.
- name: RunningOracleCheck
  meaning: Running deterministic oracle tests in the point workspace.
- name: CollectingTraceTokens
  meaning: Reading trace.ndjson and extracting token usage.
- name: CheckingAgentVersion
  meaning: Comparing configured harness version against trace metadata.
- name: SummarizingPointResults
  meaning: Emitting aggregate result status from populated point context fields.
- name: CollectingMetrics
  meaning: Writing evaluation metadata (exit code, duration, test results, tokens, convergence data) to meta.json.
- name: Done
  meaning: Terminal. Evaluation point completed successfully.
- name: Failed
  meaning: Terminal. An infrastructure error prevented evaluation.
terminal_states:
- Done
- Failed
signals:
- name: Seed
  trigger: Loop initialization.
- name: CommandError
  trigger: Infrastructure-level error.
- name: PointDirCreated
  trigger: Point artifact directory created and PointContext paths recorded.
- name: SampleWorkspaceCopied
  trigger: Sample workspace copied into the point directory.
- name: SampleDocsCopied
  trigger: Optional sample docs copied, or no docs were present.
- name: WorkspaceRepoInitialized
  trigger: Git repository initialized in the point workspace.
- name: WorkspaceBaselineStaged
  trigger: Baseline workspace files staged in the git index.
- name: WorkspaceBaselineCommitted
  trigger: Baseline git commit created.
- name: ConfigDumped
  trigger: Experiment configuration snapshot written to experiment.yaml.
- name: HarnessFinished
  trigger: The executor agent exited normally (exit code 0).
- name: HarnessFailed
  trigger: The executor agent exited with a non-zero exit code.
- name: HarnessTimedOut
  trigger: The executor agent exceeded its time budget.
- name: OracleCheckPassed
  trigger: Oracle tests passed.
- name: OracleCheckFailed
  trigger: Oracle tests failed as a domain result, not an infrastructure error.
- name: TraceTokensCollected
  trigger: Trace token extraction completed, including the missing-trace zero-token case.
- name: AgentVersionChecked
  trigger: Configured and traced agent versions are compatible or version check was skipped.
- name: AgentVersionMismatch
  trigger: Trace metadata reported an agent version different from the configured harness version.
- name: ResultsCollected
  trigger: Point result summary completed.
- name: MetricsCollected
  trigger: Metrics extraction completed.
transitions:
- state: Idle
  signal: Seed
  next: CreatingPointDir
  action: create_point_dir
- state: CreatingPointDir
  signal: PointDirCreated
  next: CopyingSampleWorkspace
  action: copy_sample_workspace
- state: CopyingSampleWorkspace
  signal: SampleWorkspaceCopied
  next: CopyingSampleDocs
  action: copy_sample_docs
- state: CopyingSampleDocs
  signal: SampleDocsCopied
  next: InitializingWorkspaceRepo
  action: init_workspace_repo
- state: InitializingWorkspaceRepo
  signal: WorkspaceRepoInitialized
  next: StagingWorkspaceBaseline
  action: stage_workspace_baseline
- state: StagingWorkspaceBaseline
  signal: WorkspaceBaselineStaged
  next: CommittingWorkspaceBaseline
  action: commit_workspace_baseline
- state: CommittingWorkspaceBaseline
  signal: WorkspaceBaselineCommitted
  next: SnapshotConfig
  action: dump_config
- state: SnapshotConfig
  signal: ConfigDumped
  next: RunningAgent
  action: run_agent
- state: RunningAgent
  signal: HarnessFinished
  next: RunningOracleCheck
  action: run_oracle_check
- state: RunningAgent
  signal: HarnessFailed
  next: RunningOracleCheck
  action: run_oracle_check
- state: RunningAgent
  signal: HarnessTimedOut
  next: RunningOracleCheck
  action: run_oracle_check
- state: RunningOracleCheck
  signal: OracleCheckPassed
  next: CollectingTraceTokens
  action: collect_trace_tokens
- state: RunningOracleCheck
  signal: OracleCheckFailed
  next: CollectingTraceTokens
  action: collect_trace_tokens
- state: CollectingTraceTokens
  signal: TraceTokensCollected
  next: CheckingAgentVersion
  action: check_agent_version
- state: CheckingAgentVersion
  signal: AgentVersionChecked
  next: SummarizingPointResults
  action: summarize_point_results
- state: CheckingAgentVersion
  signal: AgentVersionMismatch
  next: SummarizingPointResults
  action: summarize_point_results
- state: SummarizingPointResults
  signal: ResultsCollected
  next: CollectingMetrics
  action: collect_metrics
- state: CollectingMetrics
  signal: MetricsCollected
  next: Done
- state: CreatingPointDir
  signal: CommandError
  next: Failed
- state: CopyingSampleWorkspace
  signal: CommandError
  next: Failed
- state: CopyingSampleDocs
  signal: CommandError
  next: Failed
- state: InitializingWorkspaceRepo
  signal: CommandError
  next: Failed
- state: StagingWorkspaceBaseline
  signal: CommandError
  next: Failed
- state: CommittingWorkspaceBaseline
  signal: CommandError
  next: Failed
- state: SnapshotConfig
  signal: CommandError
  next: Failed
- state: RunningAgent
  signal: CommandError
  next: Failed
- state: RunningOracleCheck
  signal: CommandError
  next: Failed
- state: CollectingTraceTokens
  signal: CommandError
  next: Failed
- state: CheckingAgentVersion
  signal: CommandError
  next: Failed
- state: SummarizingPointResults
  signal: CommandError
  next: Failed
- state: CollectingMetrics
  signal: CommandError
  next: Failed
