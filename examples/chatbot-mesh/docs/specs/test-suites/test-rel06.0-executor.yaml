id: test-rel06.0-executor
title: Test Suite for Release 06.0 Declarative Executor Agent
release: "06.0"

overview: |
  This suite validates the executor agent (srd006): the declarative deployment API
  that replaces the standard-library Go provisioner. It drives a decided values patch
  through validate, apply, and verify, asserting that a non-conforming patch is
  rejected by the chart-schema dry-run, that a valid patch is applied as a values-file
  rollout and verified via kubectl rollout status, that an apply or verify failure
  rolls back, and that the authority boundary holds. The case is planned; the executor
  profile, the chart values schema, and the integration target land with the rel06.0
  release.

traces:
  - rel06.0-uc001-declarative-executor

preconditions:
  - agent-core is available for the request runtime, REST server, and exec tools.
  - The executor profile is deployed with its state, apply, and rollout servers on the Service the provisioner served; its image carries helm and kubectl.
  - The chart carries a values.schema.json, and the apply path is reached only by the creator, authenticated apart from chat.

test_cases:
  - use_case: rel06.0-uc001-declarative-executor
    name: Executor validates, applies, and verifies a values change through the deployment API
    integration_target: mage integration:executor
    go_test: TestAssertExecutorCallsRejectsMissingAndForbidden, TestExecutorAuthorityProblemRejectsTransportAuthority, TestExecutorScenariosCoverEveryTerminal, TestFakeScriptsClassifyTheDeclaredInvocations
    status: implemented
    description: |
      Drives a decided values patch against the shipped executor profile: the apply
      endpoint receives the patch, the executor validates it against the chart's
      values schema by a helm dry-run, rejecting a non-conforming patch with a client
      error and no rollout; for a valid patch it materializes the values as a file and
      applies helm upgrade --reuse-values --atomic; it verifies the rollout via
      kubectl rollout status and reports the phase, rolling the release back on a
      verify stall. Asserts the authority boundary: no invocation carries an endpoint,
      a credential, or per-field --set construction.

      What it rests on, so the status is not read for more than it says: helm and
      kubectl are recording fakes on the executor's PATH, taking their exit codes
      from the scenario. That is what lets one run walk every terminal of both
      machines -- four on the apply machine, three on the rollout read -- since a
      machine of exec words tells its outcomes apart only by which word failed. It is
      evidence about the machine, the arguments it constructs, and the responses it
      maps. It is not evidence that real helm and kubectl behave as the declarations
      assume, nor that the executor works against a cluster; the chart schema is
      covered by its own case below against real helm, and the live tier stays
      planned (GH-735).

      Two hops this case does not cover: the creator posting the patch through its
      declared client, which Integration.ControlPlane drives against a fake
      deployment API, and the network-layer restriction of the apply path to
      creator-labelled pods, which TestExecutorApplyStaysCreatorOnly asserts over the
      rendered chart.
    inputs:
      valid_patch: add a RAG source through a values-plane patch
      invalid_patch: a patch violating the chart values schema
      agents: [creator, executor]
    expected:
      invalid_patch_rejected_by_schema_dry_run_no_rollout: true
      valid_patch_applied_as_values_file_reuse_values_atomic: true
      no_per_field_set_construction: true
      rollout_verified_via_kubectl_rollout_status: true
      apply_or_verify_failure_rolls_back: true
      patch_carries_no_endpoint_or_credential: true
    traces:
      - rel06.0-uc001-declarative-executor S1
      - rel06.0-uc001-declarative-executor S2
      - rel06.0-uc001-declarative-executor S3
      - rel06.0-uc001-declarative-executor S4
      - rel06.0-uc001-declarative-executor S5
      - srd006-executor AC1
      - srd006-executor AC2
      - srd006-executor AC3
      - srd006-executor AC4
      - srd006-executor AC5
      - srd003-chatbot-deployment AC4

  - use_case: rel06.0-uc001-declarative-executor
    name: The chart schema rejects a non-conforming values patch
    integration_target: mage test (magefiles/executor_schema_test.go, GH-732)
    go_test: TestChartSchemaAcceptsAConformingPatch, TestChartSchemaRejectsANonConformingPatch, TestChartSchemaConstrainsTheRAGUnitName
    status: done
    description: |
      The executor's validate step is a helm dry-run against the chart's
      values.schema.json, so the rejection is only as real as the schema. The case
      above cannot prove it: its fake helm returns whatever exit code the scenario
      sets, and a schema that accepted every document would pass it unchanged.

      Real helm renders the real chart with two fixtures. The rejection must name
      /ragUnits/0/name and the pattern it violated, not merely exit non-zero -- a
      chart failing to render for an unrelated reason exits non-zero too. A third
      assertion pins the constraint the fixture rests on, so loosening the schema
      reads as the guard being removed rather than as a broken fixture.

      Substitution: the executor issues helm upgrade --dry-run, which needs a
      reachable cluster. helm template validates against the same schema without one.
      The executor's own command form is proven on a cluster by GH-735.
    inputs:
      conforming: testdata/integration/executor-values/conforming.yaml
      non_conforming: testdata/integration/executor-values/non-conforming.yaml
    expected:
      conforming_patch_renders: true
      non_conforming_patch_rejected_by_name_and_pattern: true
      rag_unit_name_constrained_to_a_dns_label: true
    traces:
      - rel06.0-uc001-declarative-executor S2
      - srd006-executor AC2

  - use_case: rel06.0-uc001-declarative-executor
    name: An executor-enabled chart renders a coherent surface
    integration_target: mage test (magefiles/executor_chart_test.go, GH-733)
    go_test: TestExecutorServiceTargetsItsDeployment, TestExecutorMountsEveryProfileItStarts, TestExecutorRendersItsWholeSurface
    status: done
    description: |
      helm/ci/kind-values.yaml disables the executor, because its image bundles helm,
      kubectl, and the chart while the smoke tests kind-load only the runtime image.
      Every cluster-level test therefore stands up a mesh without it, and the
      packaging path that would carry the executor into a cluster is proven here.

      Asserted over the staged render: the Service selects the pods the Deployment
      creates, and the profile the Deployment's args name is a path the profiles
      volume actually projects. The second is GH-485 at the render -- the executor
      Deployment once mounted a profile the staging list did not copy, and an enabled
      executor started with nothing to run.
    inputs:
      rendered_chart: staged chart with executor.enabled
    expected:
      service_targets_the_deployment_pods: true
      every_started_profile_is_projected: true
      whole_executor_object_set_renders: true
    traces:
      - rel06.0-uc001-declarative-executor S1
      - srd006-executor AC1

  - use_case: rel06.0-uc001-declarative-executor
    name: A live on-cluster rollout through the executor
    integration_target: mage integration:executorLive (GH-735, GH-751)
    status: done
    description: |
      What the fake CLIs cannot stand in for. The executor image is built on the
      runtime under test, loaded into kind, and the mesh installed with the
      executor enabled; a values patch then goes through the apply endpoint and
      the release moves to a new revision, which is the evidence a 200 is not --
      the fake tier returns one of those without helm existing.

      The compensating leg is live too. The tier stages a test-only post-upgrade
      hook and permissions into both the installed chart and the chart at /chart.
      A reserved valid parameter patch activates the hook. Helm first waits for
      the ordinary upgrade, then the hook uses the executor image's real kubectl
      to regress the chatbot Deployment before helm upgrade returns. The
      executor's subsequent declared kubectl rollout status therefore times out
      deterministically, reaches RollingBack, and invokes real helm rollback.
      The case requires the 500 rolled_back response, two new Helm revisions
      (upgrade and rollback), restored computed values, and a ready chatbot
      Deployment. It does not expect the revision number to move backwards:
      Helm records a rollback as a new revision.

      This hook closes the narrow timing window without racing an out-of-band
      scale or patch against helm --wait. It exists only in the live tier's
      temporary staged chart; the shipped chart and its RBAC are unchanged.

      The same non-conforming document the schema case validates locally is
      rejected here against the real chart schema, leaving the release untouched.

      Finding this tier produced: the executor Role could not read the Secrets
      helm queries to find its own release, so an apply failed at the validate
      step and the caller was told their values were bad. Nor could it read or
      write the NetworkPolicy, ServiceAccount, Role, and RoleBinding the chart it
      re-renders contains, nor the ReplicaSets and Pods helm --wait watches. The
      Role now covers what the chart it manages holds, and every rule traces to
      an observed denial.
    inputs:
      cluster: kind with the executor image built and loaded
      patch: testdata/integration/executor-values/conforming.yaml
      rollback_trigger: testdata/integration/executor-values/rollback-trigger.yaml
      rejected: testdata/integration/executor-values/non-conforming.yaml
    expected:
      real_helm_upgrade_changes_the_release: true
      post_upgrade_verify_failure_reaches_rolled_back: true
      real_helm_rollback_restores_prior_computed_values: true
      chatbot_deployment_recovers_after_rollback: true
      rollout_endpoint_reports_complete_with_real_counts: true
      non_conforming_patch_rejected_on_the_cluster: true
    traces:
      - rel06.0-uc001-declarative-executor S3
      - rel06.0-uc001-declarative-executor S4
      - srd006-executor AC3

  - use_case: rel06.0-uc001-declarative-executor
    name: A broken rollout read is distinguishable from a progressing one, and the counts reach the panel
    integration_target: mage test (magefiles/executor_rollout_test.go, magefiles/coordinator_intake_test.go, GH-686)
    go_test: TestExecutorRolloutMachineSeparatesBrokenRead, TestExecutorRolloutEndpointMapsThreeOutcomes, TestExecutorRolloutTerminalMappingsAgree, TestExecutorRolloutCountsWordContract, TestExecutorRolloutCountsRenderJSON, TestRolloutCountsSurviveTheCreatorHop, TestRolloutCountsSurviveTheCoordinatorHop, TestPanelRolloutInterfaceMatchesWhatIsServed
    status: done
    description: |
      Asserts over the declared profiles that the rollout read reaches three
      outcomes rather than two. kubectl rollout status exits non-zero for a
      rollout that is still progressing and for one it could not read at all, so
      a phase taken from that exit code alone reported an absent Deployment, a
      wrong kubeconfig, a denied RBAC read, or an unreachable API server as
      ongoing progress -- in a panel that polls every 3s, indefinitely.

      A second read of the Deployment object separates the two and supplies the
      counts, and the three terminal states map to three responses from two
      signals. The hop assertions follow the counts to the panel and compare the
      declared TypeScript interface against what the poll actually serves, in
      both directions.
    inputs:
      declared_config: the executor, creator, and coordinator profiles and the panel's provisioningApi.ts
      deployment_shapes: rolled out, no replica ready yet, freshly created with no revision annotation
    expected:
      unreadable_deployment_returns_gateway_error_not_a_phase: true
      complete_and_progressing_remain_distinguishable: true
      both_phases_carry_ready_desired_revision: true
      counts_survive_the_creator_and_coordinator_hops: true
      panel_interface_declares_exactly_what_is_served: true
    traces:
      - rel06.0-uc001-declarative-executor S7
      - srd006-executor AC3

  - use_case: rel06.0-uc001-declarative-executor
    name: The rendered chart routes provisioning to the coordinator
    integration_target: mage test (magefiles/provisioning_route_render_test.go, GH-681)
    go_test: TestProvisioningIngressRoutesToTheCoordinator, TestExecutorApplyStaysCreatorOnly, TestCoordinatorAdmitsOnlyTheIngressControllerOnIntent, TestNoProvisioningRouteWithoutTheControlPlane
    status: done
    description: |
      Asserts over the rendered chart, not the template text, that browser
      provisioning traffic and the apply surface agree on one authority path: the
      ingress /provisioning backend is the coordinator Service, the executor policy
      still admits only creator-labelled pods on the apply port, and the coordinator
      policy admits the ingress controller on the intent port alone.

      This is the check that would have caught GH-502. Each template was individually
      correct -- the ingress named a real Service, the policy named a real selector --
      and only the pair read together showed the route was dead.
    inputs:
      rendered_chart: default values with executor.enabled and networkPolicy.enabled
    expected:
      provisioning_ingress_backend: coordinator Service
      executor_apply_ingress_from: creator-labelled pods only
      coordinator_policy_admits_ingress_controller_on_intent_port: true
      coordinator_monitor_and_control_not_ingress_reachable: true
    traces:
      - rel06.0-uc001-declarative-executor S6
      - srd006-executor AC6
      - srd003-chatbot-deployment AC7
      - srd004-coordinator AC6

  - use_case: rel06.0-uc001-declarative-executor
    name: The panel route reaches only the authorized surface
    integration_target: mage integration:policyProof (GH-682)
    status: done
    description: |
      Proves against a live cluster with NetworkPolicy enforcement active that the
      browser provisioning route reaches the coordinator and that the executor apply
      port refuses traffic from any pod not labelled creator.

      Enforcement is asserted before anything else. A CNI that ignores NetworkPolicy
      would make every negative assertion here pass vacuously, which is the failure
      mode this case exists to rule out, so an unenforcing cluster fails rather than
      skips.
    inputs:
      cluster: kind with a NetworkPolicy-enforcing CNI
      positive: request through the ingress to the coordinator intent surface
      negative: request to the executor apply port from a non-creator pod
    expected:
      network_policy_enforcement_asserted_active: true
      browser_route_reaches_coordinator: true
      executor_apply_refuses_non_creator: true
      creator_instance_port_not_ingress_reachable: true
      coordinator_reaches_creator_instance: true
      creator_reaches_executor_apply: true
    traces:
      - rel06.0-uc001-declarative-executor S6
      - srd006-executor AC6
      - srd003-chatbot-deployment AC7
      - srd004-coordinator AC6
      - srd005-creator AC6
