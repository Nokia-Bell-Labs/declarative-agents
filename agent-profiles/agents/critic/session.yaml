# Tool declarations for the critic session-level tools.
# These tools drive the session machine (grid iteration, nested point loops).
# Per-point tools are declared in tools/builtin.yaml.

tools:
  - name: parse_suite_config
    type: builtin
    init: parse_suite_config
    visibility: internal
    description: "Read and validate critic suite YAML metadata."
    config:
      output_dir: eval-results
      reps: 1

  - name: discover_suite_samples
    type: builtin
    init: discover_suite_samples
    visibility: internal
    description: "Discover critic samples from the parsed suite samples directory."

  - name: expand_eval_grid
    type: builtin
    init: expand_eval_grid
    visibility: internal
    description: "Expand critic suite grid parameters into concrete grid points."

  - name: init_eval_session
    type: builtin
    init: init_eval_session
    visibility: internal
    description: "Create the critic session output directory and resolve runtime defaults."

  - name: report_suite_summary
    type: builtin
    init: report_suite_summary
    visibility: internal
    description: "Report suite point count after setup."

  - name: next_point
    type: builtin
    init: next_point
    visibility: internal
    description: "Advance to the next evaluation point in the grid. Returns PointReady or AllPointsDone."

  - name: run_point
    type: builtin
    init: run_point
    visibility: internal
    description: "Run the per-point evaluation pipeline via a nested core.Loop with the point machine."

  - name: report_session
    type: builtin
    init: report_session
    visibility: internal
    description: "Print session summary with pass/fail/timeout counts and total duration."
