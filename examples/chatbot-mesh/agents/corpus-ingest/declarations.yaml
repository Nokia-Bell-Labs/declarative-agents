tools:
  - name: chroma_ready
    type: builtin
    init: rest_client_invoke
    visibility: internal
    category: boundary
    description: Check the Chroma v2 heartbeat through the configured REST client.
    problem: The ingest flow must fail fast when the Chroma server is unreachable.
    goals:
      - Resolve the chroma client and heartbeat operation.
      - Return a configured readiness signal to MachineSpec.
    requirements:
      input:
        - Runtime input supplies no transport authority or request parameters.
      output:
        - Output reports operation identity and status.
      errors:
        - Definition, network, timeout, and mapping failures emit CommandError.
    non_goals:
      - Does not create collections or start the Chroma server.
      - Does not accept runtime method, URL, host, or auth overrides.
    parameters:
      type: object
      properties: {}
      additional_properties: false
    emits: [ChromaReady, CommandError]
    output:
      description: Mapped Chroma heartbeat result.
      schema:
        type: object
        properties:
          operation: {type: string}
          status: {type: integer}
    side_effects:
      - kind: external_api
        target: chroma.heartbeat
        state: read_only
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: A heartbeat check does not mutate state.
    errors:
      - signal: CommandError
        condition: The chroma client definition is missing, or the heartbeat call fails on network, timeout, or mapping.
        state_after_failure: No Chroma state is read or changed.
    relationships:
      overlaps:
        - tool: rest_client_invoke
          difference: This profile-specific word binds the Chroma heartbeat readiness probe.
    config:
      rest_ref: chroma
      operation: heartbeat

  - name: ollama_ready
    type: builtin
    init: rest_client_invoke
    visibility: internal
    category: boundary
    description: Check the Ollama version endpoint through the configured REST client.
    problem: The ingest flow must fail fast when the Ollama server is unreachable.
    goals:
      - Resolve the ollama client and version operation.
      - Return a configured readiness signal to MachineSpec.
    requirements:
      input:
        - Runtime input supplies no transport authority or request parameters.
      output:
        - Output reports operation identity, status, and Ollama version.
      errors:
        - Definition, network, timeout, and mapping failures emit CommandError.
    non_goals:
      - Does not pull models or start the Ollama server.
      - Does not accept runtime method, URL, host, or auth overrides.
    parameters:
      type: object
      properties: {}
      additional_properties: false
    emits: [OllamaReady, CommandError]
    output:
      description: Mapped Ollama version result.
      schema:
        type: object
        properties:
          operation: {type: string}
          status: {type: integer}
    side_effects:
      - kind: external_api
        target: ollama.version
        state: read_only
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: A version check does not mutate state.
    errors:
      - signal: CommandError
        condition: The ollama client definition is missing, or the version call fails on network, timeout, or mapping.
        state_after_failure: No Ollama state is read or changed.
    relationships:
      overlaps:
        - tool: rest_client_invoke
          difference: This profile-specific word binds the Ollama version readiness probe.
    config:
      rest_ref: ollama
      operation: version

  - name: embed_document
    type: builtin
    init: rest_client_invoke
    visibility: internal
    category: boundary
    description: Embed a corpus document at Ollama and carry its text and id forward.
    problem: Chroma does not embed server-side, so the agent must compute the vector at a provider.
    goals:
      - Select the document text and id from the previous read Result.
      - Return the embedding vector mapped from the Ollama response.
      - Carry the document text and id forward for the collection and add words.
    requirements:
      input:
        - Runtime input is selected from the previous Result output through input_mapping.
      output:
        - Output includes the mapped embedding vector and the carried text and id.
      errors:
        - Network, timeout, schema, and mapping failures emit CommandError.
    non_goals:
      - Does not author or alter the embedding vector.
      - Does not accept runtime method, URL, host, or auth overrides.
    parameters:
      type: object
      properties:
        input: {type: string}
        id: {type: string}
    emits: [DocumentEmbedded, CommandError]
    output:
      description: Mapped Ollama embedding with carried document text and id.
      schema:
        type: object
        properties:
          mapped: {type: object}
          carried: {type: object}
    side_effects:
      - kind: external_api
        target: ollama.embeddings
        state: read_only
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Computing an embedding does not mutate state.
    errors:
      - signal: CommandError
        condition: The Ollama embeddings call fails on network, timeout, schema, or mapping.
        state_after_failure: No embedding is produced and no state changes.
    relationships:
      overlaps:
        - tool: rest_client_invoke
          difference: This profile-specific word binds the Ollama document-embedding operation.
      after: [read_resource]
      before: [resolve_collection]
    config:
      rest_ref: ollama
      operation: embed

  - name: resolve_collection
    type: builtin
    init: rest_client_invoke
    visibility: internal
    category: boundary
    description: Create-or-get the collection and carry the embedding, document, and id forward.
    problem: Single-hop threading means the returned collection id must reach add through this word.
    goals:
      - Create-or-get the plain collection with no server-side embedding function.
      - Resolve the returned collection id for the add path.
      - Carry the embedding, document, and id forward from the embed Result.
    requirements:
      input:
        - Embedding, document, and id are selected from the previous embed Result output.
      output:
        - Output includes the mapped collection id and the carried embedding, document, and id.
      errors:
        - Network, timeout, schema, and mapping failures emit CommandError.
    non_goals:
      - Does not configure a server-side embedding function.
      - Does not accept runtime method, URL, host, or auth overrides.
    parameters:
      type: object
      properties:
        embeddings: {type: array}
        documents: {type: string}
        ids: {type: string}
    emits: [CollectionReady, CommandError]
    output:
      description: Mapped Chroma collection id with carried record fields.
      schema:
        type: object
        properties:
          mapped: {type: object}
          carried: {type: object}
    side_effects:
      - kind: external_api
        target: chroma.collection
        state: collection_upserted
    reversibility:
      classification: irreversible
      undo: noop
    undo:
      strategy: noop
      description: Create-or-get is idempotent for a stable collection name.
    errors:
      - signal: CommandError
        condition: The Chroma create-or-get collection call fails on network, timeout, schema, or mapping.
        state_after_failure: The collection id is unresolved; create-or-get is idempotent so there is no net change.
    relationships:
      overlaps:
        - tool: rest_client_invoke
          difference: This profile-specific word binds the Chroma create-or-get collection operation for the add path.
      after: [embed_document]
      before: [chroma_add]
    config:
      rest_ref: chroma
      operation: create_or_get_collection_carry

  - name: count_collection
    type: builtin
    init: rest_client_invoke
    visibility: internal
    category: boundary
    description: Re-resolve the collection id for the count verification.
    problem: The count verification needs the collection id after the ingest loop ends.
    goals:
      - Create-or-get the collection and resolve its id.
      - Provide the collection id to the count word.
    requirements:
      input:
        - Runtime input selects nothing from the previous Result.
      output:
        - Output includes the mapped collection id.
      errors:
        - Network, timeout, schema, and mapping failures emit CommandError.
    non_goals:
      - Does not add records or configure a server-side embedding function.
      - Does not accept runtime method, URL, host, or auth overrides.
    parameters:
      type: object
      properties: {}
    emits: [CollectionReady, CommandError]
    output:
      description: Mapped Chroma collection id.
      schema:
        type: object
        properties:
          mapped: {type: object}
    side_effects:
      - kind: external_api
        target: chroma.collection
        state: read_only
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Create-or-get is idempotent for a stable collection name.
    errors:
      - signal: CommandError
        condition: The Chroma create-or-get collection call fails on network, timeout, schema, or mapping.
        state_after_failure: The collection id is unresolved; create-or-get is idempotent so there is no net change.
    relationships:
      overlaps:
        - tool: rest_client_invoke
          difference: This profile-specific word binds the Chroma create-or-get collection operation for the count path.
      before: [chroma_count]
    config:
      rest_ref: chroma
      operation: create_or_get_collection

  - name: chroma_add
    type: builtin
    init: rest_client_invoke
    visibility: internal
    category: boundary
    description: Add the agent-supplied embedding, document, and id to the collection.
    problem: Chroma stores client-supplied vectors, threaded from the previous words.
    goals:
      - Thread the collection id, embedding, document, and id from the previous Result.
      - Write the record to the resolved collection.
    requirements:
      input:
        - Collection id, embedding, document, and id are selected from the previous Result output.
      output:
        - Output reports operation identity and status.
      errors:
        - Network, timeout, schema, and mapping failures emit CommandError.
    non_goals:
      - Does not author the embedding vector.
      - Does not accept runtime method, URL, host, or auth overrides.
    parameters:
      type: object
      properties:
        collection: {type: string}
        embeddings: {type: array}
        documents: {type: string}
        ids: {type: string}
    emits: [DocumentAdded, CommandError]
    output:
      description: Mapped Chroma add result.
      schema:
        type: object
        properties:
          operation: {type: string}
          status: {type: integer}
    side_effects:
      - kind: external_api
        target: chroma.records
        state: records_added
    reversibility:
      classification: irreversible
      undo: noop
    undo:
      strategy: noop
      description: Records can be removed by a separate delete word.
    errors:
      - signal: CommandError
        condition: The Chroma add call fails on network, timeout, schema, or mapping.
        state_after_failure: The record is not written to the collection.
    relationships:
      overlaps:
        - tool: rest_client_invoke
          difference: This profile-specific word binds the Chroma add-records operation.
      after: [resolve_collection]
    config:
      rest_ref: chroma
      operation: add_records

  - name: chroma_count
    type: builtin
    init: rest_client_invoke
    visibility: internal
    category: boundary
    description: Read the collection item count for post-ingest verification.
    problem: The ingest flow must verify that documents were added.
    goals:
      - Thread the collection id from the previous Result.
      - Read the collection item count.
    requirements:
      input:
        - The collection id is selected from the previous Result output.
      output:
        - Output reports operation identity and status.
      errors:
        - Network, timeout, and mapping failures emit CommandError.
    non_goals:
      - Does not add or remove records.
      - Does not accept runtime method, URL, host, or auth overrides.
    parameters:
      type: object
      properties:
        collection: {type: string}
    emits: [CountReady, CommandError]
    output:
      description: Mapped Chroma count result.
      schema:
        type: object
        properties:
          operation: {type: string}
          status: {type: integer}
    side_effects:
      - kind: external_api
        target: chroma.count
        state: read_only
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Reading a count does not mutate state.
    errors:
      - signal: CommandError
        condition: The Chroma count call fails on network, timeout, or mapping.
        state_after_failure: No count is read and no state changes.
    relationships:
      overlaps:
        - tool: rest_client_invoke
          difference: This profile-specific word binds the Chroma count-records operation.
      after: [count_collection]
    config:
      rest_ref: chroma
      operation: count_records

  - name: list_resource
    type: builtin
    init: list_resource
    category: boundary
    description: List the corpus documents so the model can choose which to ingest.
    problem: The model must discover the corpus files from trusted configuration, not guess paths.
    goals:
      - List the documents under the configured corpus resource.
      - Return resource-relative paths for the model to read.
    requirements:
      input:
        - Runtime input may choose only the configured resource name and optional prefix.
      output:
        - Output includes resource-relative document entries.
      errors:
        - Unknown resources and scan failures emit declared signals.
    non_goals:
      - Does not read document body content.
      - Does not let runtime input choose roots, include patterns, or extension policy.
    parameters:
      type: object
      properties:
        resource: {type: string}
        prefix: {type: string}
      required: [resource]
    emits: [DocumentListReady, DocumentResourceDenied, CommandError]
    output:
      description: Structured corpus document entries.
      schema:
        type: array
        items:
          type: object
          properties:
            path: {type: string}
    side_effects:
      - kind: filesystem_read
        target: configured_document_resource
        state: read_only
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Listing is read-only.
    errors:
      - signal: DocumentResourceDenied
        condition: The requested resource name is not a configured document resource.
        state_after_failure: No documents are listed and no state changes.
      - signal: CommandError
        condition: Scanning the configured resource root fails.
        state_after_failure: No documents are listed and no state changes.
    relationships:
      before: [read_resource]
    config:
      resources:
        corpus:
          root: "."
          include: ["**/*.md"]
          extensions: [".md"]
          modes: [raw]
          max_bytes: 1048576

  - name: read_resource
    type: builtin
    init: read_resource
    category: boundary
    description: Read one corpus document the model selected.
    problem: The model selects a document by path; the machine then embeds and adds it deterministically.
    goals:
      - Read the model-selected resource-relative document.
      - Return the raw document text and path for the embed and add words.
    requirements:
      input:
        - Runtime input may choose only the configured resource name and a resource-relative path.
      output:
        - Output includes the document path and raw content.
      errors:
        - Missing files, denied paths, and parse failures emit distinct declared signals.
    non_goals:
      - Does not mutate documents.
      - Does not let runtime input choose roots, parser mode, or extension policy.
    parameters:
      type: object
      properties:
        resource: {type: string}
        path: {type: string}
      required: [resource, path]
    emits: [DocumentReady, DocumentMissing, DocumentResourceDenied, DocumentParseFailed, CommandError]
    output:
      description: Structured document detail from the configured resource.
      schema:
        type: object
        properties:
          path: {type: string}
          raw: {type: string}
    side_effects:
      - kind: filesystem_read
        target: configured_document_resource
        state: read_only
    reversibility:
      classification: reversible
      undo: noop
    undo:
      strategy: noop
      description: Reading is read-only.
    errors:
      - signal: DocumentMissing
        condition: The selected resource-relative path does not exist.
        state_after_failure: No document is read and no state changes.
      - signal: DocumentResourceDenied
        condition: The requested resource name or path is outside the configured resource.
        state_after_failure: No document is read and no state changes.
      - signal: DocumentParseFailed
        condition: The document cannot be read or decoded under the configured mode.
        state_after_failure: No document is read and no state changes.
      - signal: CommandError
        condition: The resource read fails for a reason other than the declared document signals.
        state_after_failure: No document is read and no state changes.
    relationships:
      after: [list_resource]
      before: [embed_document]
    config:
      resources:
        corpus:
          root: "."
          include: ["**/*.md"]
          extensions: [".md"]
          modes: [raw]
          max_bytes: 1048576

  - name: invoke_llm
    type: builtin
    init: invoke_llm
    visibility: internal
    category: boundary
    emits: [LLMResponded, CommandError]
    description: Invoke the configured model to drive corpus file selection.
    problem: The ingest loop needs a model boundary that lists the corpus and selects one file to read per turn.
    goals:
      - List the corpus once, then select the next unread file, or signal done.
      - Never author an embedding vector; the machine sequences embedding after each read.
      - Keep model, provider, parser, and prompt configuration profile-owned.
    requirements:
      input:
        - must read conversation history and the model-visible manifest from runtime state
        - must use the configured model against local Ollama
      output:
        - must emit LLMResponded when the model returns text
        - must emit CommandError for provider setup, model discovery, or chat failures
      errors:
        - Provider setup, model discovery, and chat failures emit CommandError.
      side_effects:
        - must call local Ollama POST /api/chat
      undo:
        - must restore conversation history from the pre-call snapshot
    non_goals:
      - Does not call Chroma or the Ollama embedding endpoint.
      - Does not author or alter an embedding vector.
    output:
      description: Raw model response.
      schema:
        type: object
        properties:
          response: {type: string}
          provider: {type: string}
          model: {type: string}
        required: [response, provider, model]
    side_effects:
      - kind: external_api_call
        target: ollama.chat
        description: Sends the corpus listing and read results to the configured local model.
      - kind: state_mutation
        target: conversation_history
        state: appended
        description: Appends the model response after a successful provider call.
    reversibility:
      classification: reversible
      undo: conversation_truncate
      requires_confirmation: false
    undo:
      strategy: conversation_truncate
      description: Restore conversation history captured before the model call.
      requires: [conversation_checkpoint]
    errors:
      - signal: CommandError
        condition: provider configuration is invalid, the model is unavailable, or the model call fails
        message_shape: 'invoke_llm: <provider/model>: <error>'
        state_after_failure: conversation history is unchanged unless the provider response was already appended
    relationships:
      after: [chroma_ready, ollama_ready]
      before: [list_resource, read_resource]
    config:
      model: "ornith:9b"
      provider: ollama
      provider_url: "http://localhost:11434"
      manifest_state: Composing
      response_profile: qwen
      max_time: 120
      llm_timeout: 120
      system_prompt: |
        You load a document corpus into a vector database by choosing files to read.

        Rules:
        - First call list_resource with resource "corpus" to see the available files.
        - Then call read_resource once for each listed file, using resource "corpus"
          and the file's exact path. Read every file exactly once.
        - After every listed file has been read, call done.
        - Do not read a file twice. Do not invent paths that were not listed.
        - You never embed or store content yourself; the system does that after each read.

        Tool call format:
        [tool_call]
        {"tool":"list_resource","parameters":{"resource":"corpus"}}
        [/tool_call]

        [tool_call]
        {"tool":"read_resource","parameters":{"resource":"corpus","path":"<listed path>"}}
        [/tool_call]

        Finish format:
        [tool_call]
        {"tool":"done","parameters":{"summary":"Ingested <N> corpus documents."}}
        [/tool_call]
