id: cfg-runtime-contract
title: Machine + Tools Runtime Contract

purpose: |
  Documents the contract that governs how the agent binary assembles
  a running agent from declarative YAML configuration. Every agent
  mode (generator, planner, evaluator, bench, validate) follows the
  same contract — no mode-specific subcommands or procedural code paths
  exist. The binary is a universal runtime; behavior is determined
  entirely by the config files it receives.

invocation: |
  agent --machine <machine.yaml> \
        --tools <tools.yaml> \
        --tools-declaration <decl1.yaml> [--tools-declaration <decl2.yaml> ...] \
        [--input <file>] [--output <dir>] \
        [--model <name>] [--ollama-url <url>] \
        [--directory <path>]

  Required flags:
    --machine            Path to the state machine YAML (MachineSpec).
    --tools              Path to the tool selection YAML (list of tool names).

  Required when using declaration+selection split:
    --tools-declaration  One or more paths to tool declaration YAML files.
                         May be repeated. When provided, --tools is treated
                         as a selection file (names only); otherwise it is
                         parsed as a full declaration file.

  Optional universal flags:
    --input              Input file (e.g. suite YAML for evaluator).
    --output             Output directory (e.g. eval results).
    --model              Override LLM model name.
    --ollama-url         Override LLM provider URL.
    --directory          Workspace root for file tools and exec tools.
    --profiles-dir       Directory with model profile YAML overrides.
    --verbose-trace      Record LLM input/output in OTel traces.
    --otel-log-file      OTel trace output file.
    --otel-parent-span   W3C traceparent for distributed tracing.

startup_sequence:
  - step: 1
    name: Load tool definitions
    description: |
      If --tools-declaration is provided, load declarations from those
      files, then load --tools as a name-only selection list, and
      compute the intersection (SelectTools). Otherwise, load --tools
      as a full declaration file. Result: []ToolDef.
    implementation: stl.LoadToolDeclarations, stl.LoadToolSelection, stl.SelectTools

  - step: 2
    name: Extract LLM config and set up provider
    description: |
      Scan tool definitions for invoke_llm config blocks. Extract
      model, provider, endpoint, manifest_state, system prompt, num_ctx,
      llm_timeout, max_tokens, and max_time settings. Validate the
      provider and create the provider adapter.
      If a model profile has a MachineName, --machine is rewritten
      to use the profile's machine file (e.g. deepseek profile maps
      to deepseek-coding-agent.yaml). The resolved machine file is
      validated to exist at startup; a missing file fails immediately.
      This is a declarative contract: profiles declare machine
      affinity, the runtime validates and resolves it.
    implementation: extractLLMConfig, llm.LoadProfiles

  - step: 3
    name: Register tool factories
    description: |
      For each ToolDef, resolve and register a Builder in the
      core.Registry. Builtin tools are resolved via BuiltinRegistry
      (Go factories keyed by the "init" field). Exec tools are
      wrapped as ExecBuilder instances. Tool config from the
      declaration YAML is passed to factories for parametrization.
    implementation: stl.RegisterUnifiedTools

  - step: 4
    name: Load machine and validate tool signal contracts
    description: |
      cmd/agent loads and validates the machine spec from --machine
      before entering the loop. This extracts budget defaults and validates
      declared tool emits metadata for tools used as named transition actions:
      emitted signals must be declared by the machine, and each emitted signal
      must have a transition from the action target state unless that target
      state is terminal.
    implementation: core.LoadMachineSpec, stl.ValidateToolEmits

  - step: 5
    name: Run the loop
    description: |
      core.Loop loads the machine spec from --machine via initFromMachine,
      then builds the transition table mapping (state, signal) pairs to
      (next_state, Builder). Named actions are resolved from the registry;
      $tool resolves to a dynamic dispatch function. The loop then enters
      the initial state with a Seed signal and executes the run-to-completion
      finite state machine. Each transition fires its action's
      Builder.Build(result).Execute(), producing a new Result with a Signal
      that drives the next transition. The loop terminates when a terminal
      state is reached or a budget limit is exceeded.
    implementation: core.Loop, core.LoadMachineSpec, core.BuildTransitionTable

tool_parametrization: |
  Tool behavior is configured through the "config" block in tool
  declaration YAML. This config map is passed to the BuiltinFactory
  at registration time (step 4). Factories read config values with
  fallback defaults, making tools reusable across modes.

  Examples:
    - launch_eval reads "machine", "tools", and "tools_declarations"
      from its config to know which child agent to spawn.
    - execute_task reads the same keys to pass --machine/--tools to
      child agent processes.
    - load_suite reads "output_dir", "reps", "timeout" from config.
    - run_point reads "point_machine" to locate the nested machine YAML.
    - serve_ui reads "addr", "data_dir", "configs_dir", etc.

suite_input_contract: |
  Evaluator suite YAML is input data to evaluator tools, not a program
  definition layer beside machine.yaml and tools.yaml. load_suite owns
  parsing and validation of the suite input. run_agent consumes each
  harness entry as subprocess data (binary plus flags) for the current
  point. dump_config snapshots the resolved suite/harness/tool data into
  experiment.yaml for reproducibility.

  CLI flags (--input, --output, --model, --ollama-url) serve as
  universal overrides. Mode-specific parameters live exclusively in
  tool config YAML, not as CLI flags.

nested_machines: |
  Some tools spawn nested core.Loop instances (run_point) or child
  agent processes (launch_eval, execute_task). The nested machine
  path is read from the tool's config block, not hardcoded.

  Nested core.Loop (same process):
    run_point reads config.point_machine → core.Loop(LoopParams{MachineFile: ...})

  Child process:
    launch_eval reads config.machine, config.tools, config.tools_declarations
    → exec.Command("agent", "--machine", ..., "--tools", ...)

    execute_task reads config.machine, config.tools, config.tools_declarations
    → subprocess.Run with the same flags

  This design allows swapping nested machines by changing YAML config
  without recompiling the binary.

config_file_layout: |
  configs/
    tools/
      builtin.yaml          # Shared builtin tool declarations
      exec.yaml             # Shared exec tool declarations
    generator/
      machine.yaml          # Generator state machine
      tools.yaml            # Tool selection (names only)
      llm/                  # Per-model LLM configs
    planner/
      machine.yaml          # Full planner with execution
      machine-passthrough.yaml
      machine-plan-only.yaml
      tools.yaml
      llm/
    evaluator/
      machine.yaml          # Session-level eval orchestration
      point.yaml            # Per-point eval pipeline
      tools.yaml            # Selects both session + point tools
    bench/
      machine.yaml          # Interactive web UI loop
      tools.yaml            # serve_ui + launch_eval
    validate/
      machine.yaml          # Spec validation pipeline
      tools.yaml            # load_corpus + validate_specs + format_report

invariants:
  - Every agent mode uses the same binary with the same startup sequence.
  - No mode-specific CLI subcommands exist.
  - Mode-specific tool configuration lives in YAML config blocks. A small
    set of universal CLI flags (--input, --output, --model, --ollama-url)
    serve as overrides applicable to any mode.
  - Machine files reference tools by name; tools are resolved from the registry.
  - Named action tools may declare emitted signals with emits; declared emits
    are checked against the machine's signal and transition contract at startup.
  - Nested machine paths are declarative (read from tool config).
  - The transition table is fully validated at startup before any work begins.
  - Adding a new agent mode requires only new YAML files and (optionally)
    new Go builtin tool implementations registered in the BuiltinRegistry.

