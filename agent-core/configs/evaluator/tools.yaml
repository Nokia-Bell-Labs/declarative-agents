# Tool selection for the evaluator agent.
# Lists the subset of declared tools this agent uses.
#
# Usage:
#   agent --tools-declaration configs/tools/builtin.yaml \
#         --tools-declaration configs/tools/exec.yaml \
#         --tools configs/evaluator/tools.yaml \
#         --machine configs/evaluator/machine.yaml

tools:
  # workspace preparation
  - copy_dir
  - make_dir
  - git_init
  - stage_all
  - commit
  # agent execution
  - run_agent
  # results
  - check_results
  - collect_metrics
