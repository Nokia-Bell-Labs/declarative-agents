id: srd021-agent-cli-exec-tool
title: Agent CLI as an Exec Tool

problem: |
  The agent binary can run any configured program by receiving a machine
  file, tool selection file, and tool declaration files. Child-agent
  workflows such as launch_eval, execute_task, and self_invoke currently
  risk duplicating bespoke Go subprocess argument builders even though the
  agent binary is just another CLI from the tool system's point of view.
  Treating `agent` as a configured exec tool keeps child programs
  declarative: a parent state machine invokes a CLI tool whose parameters
  select the child machine and tools.

goals:
  - G1: Declare the agent binary as an exec tool with a complete parameter schema for child program invocation.
  - G2: Keep child machine, tool selection, and tool declaration paths in YAML configuration.
  - G3: Preserve telemetry propagation, working directory isolation, and artifact configuration across parent-child agent runs.
  - G4: Provide the requirements basis for replacing bespoke launch_eval, execute_task, and self_invoke subprocess builders.

requirements:
  R0:
    title: Tool authoring standard
    items:
      - R0.1: The agent CLI tool declaration SHOULD follow cfg-tool-authoring-standard, with category boundary when it launches a child program or nested machine.
      - R0.2: Agent CLI invocations SHOULD declare child process side effects, workspace effects, telemetry artifacts, reversibility, undo or compensation, and relationship metadata.

  R1:
    title: Agent exec tool declaration
    items:
      - R1.1: The agent CLI tool declaration SHALL use type exec and binary agent, or an explicitly configured binary path.
      - R1.2: The declaration SHALL expose parameters for --machine and --tools.
      - R1.3: The declaration SHALL expose repeated --tools-declaration values.
      - R1.4: The declaration SHALL expose --directory for the child workspace root.
      - R1.5: The declaration SHOULD expose generic data-flow parameters such as --input and --output.
      - R1.6: The declaration SHOULD expose LLM overrides such as --model and --ollama-url.
      - R1.7: The declaration SHOULD expose telemetry parameters such as --otel-log-file and --otel-parent-span.

  R2:
    title: Declarative child program selection
    items:
      - R2.1: Parent tools that run child agents SHALL receive child machine and tool paths from YAML tool configuration, not hardcoded Go constants.
      - R2.2: Child tool declaration paths SHALL be configurable and MAY include shared declarations plus mode-local overrides.
      - R2.3: A parent state machine SHOULD be able to swap the child program by changing only YAML configuration.
      - R2.4: Child invocation defaults, when present, SHALL be documented as defaults and validated before execution.

  R3:
    title: Trace and process propagation
    items:
      - R3.1: Child agent invocation SHALL propagate W3C traceparent when the parent context carries a valid span.
      - R3.2: The child agent SHOULD receive an --otel-log-file path when trace file capture is required.
      - R3.3: Child execution SHALL preserve cancellation semantics from the parent command context.
      - R3.4: Child stdout, stderr, exit code, and duration SHALL be captured and mapped to a core.Result.

  R4:
    title: Result mapping
    items:
      - R4.1: Successful child agent exit SHALL map to a success signal appropriate to the parent machine.
      - R4.2: Failed child agent exit SHALL map to a failure signal appropriate to the parent machine.
      - R4.3: Infrastructure errors in launching the child process SHALL map to CommandError.
      - R4.4: The mapping from child process outcome to parent signal SHOULD be declared or configured rather than embedded in multiple bespoke Go implementations.

  R5:
    title: Migration from bespoke subprocess paths
    items:
      - R5.1: launch_eval SHOULD be expressible as a configured invocation of the agent exec tool.
      - R5.2: execute_task SHOULD be expressible as a configured invocation of the agent exec tool.
      - R5.3: self_invoke SHOULD be reconciled with the same configured agent exec tool contract.
      - R5.4: Duplicate child-agent argument-building logic SHOULD be removed once the exec declaration covers the required flags.

non_goals:
  - Defining the generic exec tool implementation; see srd013 and the CLI/exec tool SRD work.
  - Defining every possible agent mode's child machine configuration.
  - Requiring the agent binary to be globally installed when a configured binary path is provided.

acceptance_criteria:
  - id: AC1
    criterion: An agent exec tool declaration can represent machine, tools, repeated tools-declaration, directory, input, output, model, ollama-url, and telemetry flags.
    traces: [R0.1, R0.2, R1.1, R1.2, R1.3, R1.4, R1.5, R1.6, R1.7]

  - id: AC2
    criterion: Child program selection is driven by YAML configuration, allowing the child machine/tools/declarations to change without recompiling Go code.
    traces: [R2.1, R2.2, R2.3, R2.4]

  - id: AC3
    criterion: Child agent execution propagates trace context, observes parent cancellation, and captures stdout/stderr/exit/duration.
    traces: [R3.1, R3.2, R3.3, R3.4]

  - id: AC4
    criterion: Child process outcomes are mapped to parent machine signals without duplicating argument-building logic across launch_eval, execute_task, and self_invoke.
    traces: [R4.1, R4.2, R4.3, R4.4, R5.1, R5.2, R5.3, R5.4]

implementation_follow_up:
  - issue: agent-core-nksx.2
    title: Model child agent invocation as configured exec tools

