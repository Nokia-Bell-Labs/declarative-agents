id: srd009-lifecycle
title: Lifecycle Functional Blocks

context: |
  The lifecycle profiles cover checkpoint history inspection, rollback, and
  approval. Each behavior is expressed as machine actions and visible signals.
  This SRD owns the lifecycle family requirements that
  srd001-agent-functional-blocks previously held as block R9.

  The block names the contract the lifecycle profiles present to the rest of the
  profile system. Lifecycle ports and the checkpoint store stay in agent-core; the
  selected vocabulary and machine wiring stay profile-owned.

problem: |
  The lifecycle family needs its own requirements document so that changes to
  history, rollback, or approval behavior do not churn a shared cross-family file.
  The requirements must name profile-owned machine actions separately from the
  agent-core lifecycle ports and checkpoint store.

goals:
  - G1: Model lifecycle history, rollback, and approval as configured machine-action functional blocks.
  - G2: Record the lifecycle actor boundary, inputs, tool selections, runtime dependencies, outputs, and terminal outcomes.
  - G3: Keep lifecycle vocabulary profile-owned while agent-core supplies lifecycle ports and the checkpoint store.

requirements:
  R1:
    title: Behavior model
    items:
      - R1.1: Lifecycle history must model checkpoint history inspection as a machine action that reads checkpoint state and reports success or failure.
      - R1.2: Lifecycle rollback must model rollback as a machine action with explicit checkpoint and target inputs.
      - R1.3: Lifecycle approval must model suspend, resume approval, resume rejection, and terminal outcomes through visible machine signals.
  R2:
    title: Inputs, tools, and runtime dependencies
    items:
      - R2.1: Lifecycle inputs must include a checkpoint ID, a target iteration, and an approval signal.
      - R2.2: The lifecycle profiles must select the checkpoint_history, checkpoint_rollback, suspend, and done tool families.
      - R2.3: Lifecycle runtime dependencies are the agent-core lifecycle ports, the checkpoint store, and workspace restore support.
  R3:
    title: Outputs and outcomes
    items:
      - R3.1: Lifecycle outputs must include a history report, a rewritten checkpoint, a suspended checkpoint, and an approved or rejected terminal state.
      - R3.2: Lifecycle terminal outcomes must be Done, Succeeded, Rejected, or Failed.

non_goals:
  - Define Go package APIs for the agent-core lifecycle ports or checkpoint store.
  - Reimplement checkpoint or rollback storage in agent-profiles.
  - Own cross-profile dependency-direction invariants; those stay in srd001.

acceptance_criteria:
  - id: AC1
    criterion: Lifecycle history, rollback, and approval are described as machine actions and visible signals rather than Go packages.
    traces: [R1.1, R1.2, R1.3]
  - id: AC2
    criterion: Lifecycle inputs, selected tool families, and runtime dependencies are named and separated from agent-core runtime capability.
    traces: [R2.1, R2.2, R2.3]
  - id: AC3
    criterion: Lifecycle outputs and terminal outcomes are checkable by mounted execution or integration targets.
    traces: [R3.1, R3.2]

depends_on:
  - srd_id: srd001-agent-functional-blocks
    symbols_used: [R1]

diagrams:
  requirements_trace: |
    ```mermaid
    flowchart LR
      Problem["Problem: Lifecycle family needs its own requirements..."] --> Goals["Goals: Lifecycle Functional Blocks"]
      Goals --> R1["R1: Behavior model"]
      Goals --> R2["R2: Inputs, tools, and runtime dependencies"]
      Goals --> R3["R3: Outputs and outcomes"]
      R1 --> AC1["AC1: History, rollback, approval as machine actions"]
      R2 --> AC2["AC2: Inputs, tools, dependencies named"]
      R3 --> AC3["AC3: Outputs and outcomes checkable"]
    ```
