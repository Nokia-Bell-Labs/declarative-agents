{{- $fullname := include "chatbot-mesh.fullname" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullname }}-profiles
  labels:
    {{- include "chatbot-mesh.labels" . | nindent 4 }}
    app.kubernetes.io/component: profiles
data:
  {{- $cogen := list "agents__chatbot__rest.yaml" "ux__ux.yaml" "agents__chatbot__request-machine.yaml" "agents__chatbot__request-fanout.yaml" }}
  {{- range $path, $_ := .Files.Glob "profiles/**" }}
  {{- $key := $path | trimPrefix "profiles/" | replace "/" "__" }}
  {{- if not (has $key $cogen) }}
  {{ $key }}: |-
  {{- if eq $key "agents__executor__exec-declarations.yaml" }}
    {{- /* Rewrite the executor exec args' placeholder coordinates to the installed
          release so an executor installed under any release name targets its own
          release, namespace, and chatbot Deployment rather than a baked
          chatbot-mesh/default (GH-484). The deployment token is replaced before
          the bare release token because it contains it. */}}
    {{- $exec := $.Files.Get $path }}
    {{- $exec = $exec | replace "deployment/chatbot-mesh-chatbot" (printf "deployment/%s-chatbot" $fullname) }}
    {{- $exec = $exec | replace "upgrade, chatbot-mesh," (printf "upgrade, %s," $.Release.Name) }}
    {{- $exec = $exec | replace "rollback, chatbot-mesh]" (printf "rollback, %s]" $.Release.Name) }}
    {{- $exec = $exec | replace "--namespace, default," (printf "--namespace, %s," $.Release.Namespace) }}
    {{- $exec | nindent 4 }}
  {{- else }}
    {{- $.Files.Get $path | nindent 4 }}
  {{- end }}
  {{- end }}
  {{- end }}
  # Co-generated from .Values.ragUnits (srd003 R2), overriding the packaged keys so
  # the chatbot config and fan-out breadth derive from the same list as the RAG
  # topology and cannot drift. Emitted unconditionally so `helm template` renders
  # them without a packaging step.
  agents__chatbot__rest.yaml: |-
    {{- include "chatbot-mesh.chatbotRest" . | nindent 4 }}
  ux__ux.yaml: |-
    {{- include "chatbot-mesh.chatbotUX" . | nindent 4 }}
  agents__chatbot__request-machine.yaml: |-
    {{- include "chatbot-mesh.chatbotMachine" . | nindent 4 }}
  agents__chatbot__request-fanout.yaml: |-
    {{- include "chatbot-mesh.chatbotFanout" . | nindent 4 }}
