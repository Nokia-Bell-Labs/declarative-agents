name: creator-instance-request
purpose: |-
  One request-scoped run of a decided instance operation. The machine_request
  instance endpoint seeds this machine with the operation body from the coordinator
  (the operation -- create, restart, terminate, or ingest -- its role, and for a
  rollout the decided values-plane document as content). The creator realizes the
  operation by forwarding the content to the deployment API (apply_instance), then
  verifies the instance's health through the deployment API's rollout read
  (verify_health) before the terminal HealthReported signal maps the reported health
  to the HTTP response. The creator acts on the coordinator's decision; it alone
  bears the deployment-API credential, it authors no values decision, and it passes
  no endpoint or credential into a running agent.

  The rollout read enters on SeedHealth and runs the verify leg alone. It applies
  nothing, so it reuses verify_health rather than declaring a second way to read the
  same thing, and the coordinator polls it while a reconfiguration proceeds
  (srd004 R1.3; GH-684).

  The state read enters on SeedState and runs the read_state leg alone (GH-753):
  the provisioning panel's initial load reads the deployed mesh view rather than
  rollout health, so it is its own leg rather than folded into verify_health,
  whose output shape (a health phase and replica counts) is unrelated to the mesh
  view (RAG topology, LLM configuration, parameters).

  The ingest enters on SeedIngest and runs the child-run leg (srd005 R3.1,
  GH-762): the creator runs a corpus-ingest child agent over the requested
  directory (run_corpus_ingest, agent-core srd021), then resolves the collection
  and reads its count to report what the run actually wrote. That read is not
  redundant with the child's exit code -- corpus-ingest reaches its own Succeeded
  terminal on CountReady whatever the count, so a run that ingested nothing still
  exits zero, and only the count says what landed.

  What this leg does not do is reject a shortfall. Deciding that an ingest "did
  not meet the requested source" is a comparison against zero, and no declarative
  primitive expresses one: response schema validation supports only required and
  type, and no builtin emits a signal from a value test. So the leg declares no
  rejected terminal and the coordinator's 422 stays unreachable, tracked
  separately rather than faked here.
initial_state: AwaitingRequest
budget:
  max_iterations: 8
states:
  - {name: AwaitingRequest, meaning: Seeded by the trusted instance endpoint with the decided operation body.}
  - {name: Applying, meaning: The creator is realizing the operation by driving the deployment API.}
  - {name: Verifying, meaning: The creator is reading the rollout status to verify the instance's health.}
  - {name: ReadingState, meaning: The creator is reading the deployed mesh view from the executor.}
  - {name: Ingesting, meaning: The corpus-ingest child agent is running over the requested directory.}
  - {name: ResolvingIngested, meaning: The ingested collection is being resolved to its id.}
  - {name: CountingIngested, meaning: The ingested collection's document count is being read.}
  - {name: HealthReported, meaning: Terminal. The instance is healthy and the reported health is ready for the HTTP response.}
  - {name: StateReported, meaning: Terminal. The executor reported the deployed mesh view.}
  - {name: Ingested, meaning: Terminal. The child run completed and the collection count reports what it wrote.}
  - {name: IngestFailed, meaning: Terminal. The child run failed, or the collection could not be read.}
  - {name: Failed, meaning: Terminal. A deployment-API boundary word failed.}
terminal_states:
  - HealthReported
  - StateReported
  - Ingested
  - IngestFailed
  - Failed
signals:
  - {name: Seed, trigger: The instance endpoint starts a request-scoped run.}
  - {name: SeedHealth, trigger: The rollout endpoint starts a request-scoped read of the rollout status.}
  - {name: SeedState, trigger: The state endpoint starts a request-scoped read of the deployed mesh view.}
  - {name: SeedIngest, trigger: The ingest endpoint starts a request-scoped corpus-ingest child run.}
  - {name: InstanceApplied, trigger: The deployment API accepted the operation and started the rollout.}
  - {name: HealthReported, trigger: The rollout read reported the instance healthy.}
  - {name: StateReported, trigger: The state read reported the deployed mesh view.}
  - {name: ToolDone, trigger: The corpus-ingest child agent reached a success terminal.}
  - {name: ToolFailed, trigger: The corpus-ingest child agent reached a failure terminal or could not run.}
  - {name: CollectionResolved, trigger: The ingested collection resolved to its id.}
  - {name: DocumentsCounted, trigger: The ingested collection's document count was read.}
  - {name: CommandError, trigger: A deployment-API or Chroma boundary word failed.}
transitions:
  - {state: AwaitingRequest, signal: Seed,            next: Applying,     action: apply_instance}
  - {state: AwaitingRequest, signal: SeedHealth,      next: Verifying,    action: verify_health}
  - {state: AwaitingRequest, signal: SeedState,       next: ReadingState, action: read_state}
  - {state: AwaitingRequest, signal: CommandError,    next: Failed}
  - {state: Applying,        signal: InstanceApplied, next: Verifying,    action: verify_health}
  - {state: Applying,        signal: CommandError,    next: Failed}
  - {state: Verifying,       signal: HealthReported,  next: HealthReported}
  - {state: Verifying,       signal: CommandError,    next: Failed}
  - {state: ReadingState,    signal: StateReported,   next: StateReported}
  - {state: ReadingState,    signal: CommandError,    next: Failed}
  - {state: AwaitingRequest,   signal: SeedIngest,         next: Ingesting,         action: run_corpus_ingest}
  - {state: Ingesting,         signal: ToolDone,           next: ResolvingIngested, action: resolve_ingest_collection}
  - {state: Ingesting,         signal: ToolFailed,         next: IngestFailed}
  - {state: ResolvingIngested, signal: CollectionResolved, next: CountingIngested,  action: count_ingested_documents}
  - {state: ResolvingIngested, signal: CommandError,       next: IngestFailed}
  - {state: CountingIngested,  signal: DocumentsCounted,   next: Ingested}
  - {state: CountingIngested,  signal: CommandError,       next: IngestFailed}
