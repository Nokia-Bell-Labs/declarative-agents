# Small-footprint values for the kind smoke test (the smoke test itself lands in
# its own issue). One RAG unit, minimal resources, no ingress, tiny storage.
image:
  pullPolicy: IfNotPresent

chatbot:
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits: {cpu: 500m, memory: 512Mi}

ragUnits:
  - name: rag0
    collection: corpus
    embeddingModel: qwen3-embedding:8b
    replicas: 1

ragServer:
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits: {cpu: 500m, memory: 512Mi}

chroma:
  storage: 256Mi
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits: {cpu: 500m, memory: 512Mi}

dolt:
  storage: 256Mi

ingress:
  enabled: false

# The executor image bundles helm, kubectl, and the chart (srd003 R1.3), not the
# runtime image the smoke/swap tests kind-load. Disable it here so those tests do
# not wait on an un-loaded image; the deployment-API flow is exercised by
# Integration.ControlPlane with a fake deployment API.
executor:
  enabled: false

# The smoke/swap tests use an external Ollama on the host; the in-cluster LLM tier
# is exercised by its own values (ci/kind-llm-values.yaml) so these tests do not
# wait on a model preload.
ollama:
  enabled: false

llm:
  externalURL: http://host.docker.internal:11434
