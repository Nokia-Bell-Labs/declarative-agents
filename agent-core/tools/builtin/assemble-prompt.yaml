tools:
- name: assemble_prompt
  type: builtin
  init: assemble_prompt
  description: Assemble the LLM prompt from task context and SRD requirements.
  visibility: internal
  emits:
  - ToolDone
  - CommandError
  category: word
  side_effects:
  - kind: none
    description: Formats prompt text from current pipeline context without mutating state.
  reversibility:
    classification: reversible
    undo: noop
  undo:
    strategy: noop
    description: Prompt assembly has no effects to reverse.
  problem: The machine needs a declared word for assembling a planner prompt without embedding that workflow step in Go control flow.
  goals:
  - Perform the assemble_prompt action as one machine-selected word.
  - Return an explicit signal that lets the MachineSpec choose the next state.
  - Keep sequencing outside the tool implementation and in machine.yaml.
  requirements:
    input:
    - must consume parameters from tool input, prior Result, or configured command/domain state
    output:
    - must emit one declared signal and return machine-readable output when available
    errors:
    - must emit CommandError for infrastructure failures and preserve domain failures as declared signals
  non_goals:
  - Does not choose the next workflow step; machine.yaml owns sequencing.
  - Does not hide unrelated tool execution behind this word.
  errors:
  - signal: CommandError
    condition: required input, configuration, or runtime state is invalid
    message_shape: 'assemble_prompt: <error>'
    state_after_failure: no additional workflow step is executed by this tool
  relationships:
    before:
    - machine-selected predecessor
    after:
    - machine-selected successor
  output:
    description: assemble_prompt command result summary.
    schema:
      type: object
      properties:
        message:
          type: string
        signal:
          type: string
      required:
      - message
