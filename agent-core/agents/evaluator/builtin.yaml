tools:
- name: parse_suite_config
  type: builtin
  init: parse_suite_config
  visibility: internal
  emits:
  - SuiteConfigParsed
  - CommandError
  description: Read and validate evaluator suite YAML metadata without discovering samples or creating session artifacts.
  config:
    output_dir: eval-results
    reps: 1
  category: stateful_internal
  problem: The evaluator session machine needs suite YAML parsed into evaluator session state before sample discovery, grid expansion, or point iteration can run.
  goals:
  - Parse suite metadata from the configured input file.
  - Resolve session defaults such as output directory and repetitions.
  - Store suite configuration in evaluator session state for later words.
  requirements:
    input:
    - must read suite YAML from the configured input path
    - must apply output_dir and reps defaults from tool config
    output:
    - must emit SuiteConfigParsed when suite metadata is valid
    side_effects:
    - must update evaluator session state with parsed suite config
    undo:
    - must restore evaluator session state to the previous snapshot
    errors:
    - must emit CommandError when suite YAML is missing, invalid, or incompatible
  non_goals:
  - Does not discover sample directories.
  - Does not expand grid points.
  - Does not create session artifact directories.
  output:
    description: Parsed evaluator suite metadata summary.
    schema:
      type: object
      properties:
        suite:
          type: string
        profiles:
          type: integer
        samples_dir:
          type: string
        repetitions:
          type: integer
        output_dir:
          type: string
      required:
      - suite
  side_effects:
  - kind: state_mutation
    target: evaluator_session
    state: suite_config_parsed
    description: Stores parsed suite config and defaults in evaluator session state.
  reversibility:
    classification: reversible
    undo: session_state_restore
    requires_confirmation: false
  errors:
  - signal: CommandError
    condition: suite file is missing, invalid, or mixes incompatible suite formats
    message_shape: 'parse_suite_config: <error>'
    state_after_failure: previous evaluator session state is preserved
  relationships:
    before:
    - Seed
    after:
    - discover_suite_samples
  undo:
    strategy: session_state_restore
    description: Restore the evaluator session snapshot captured before parsing suite config.
- name: run_point
  type: builtin
  init: run_point
  visibility: internal
  emits:
  - PointDone
  - CommandError
  description: Run the per-point evaluation pipeline via a nested core.Loop with the point machine.
  category: boundary
  problem: 'The evaluator session machine needs a boundary word that runs one

    evaluation point by entering a nested state machine. This is not an

    ordinary deterministic word because it delegates control to another

    machine with its own tool registry and point-local side effects.

    '
  goals:
  - Run the configured point_machine with the configured point_tools for the current evaluation point.
  - Record the point result in evaluator session state.
  - Keep point-machine configuration declarative in YAML rather than hardcoded in Go.
  requirements:
    input:
    - must require point_machine and point_tools in config
    - must consume the current point context selected by next_point
    output:
    - must emit PointDone after the nested point machine reaches its configured success state
    - must return nested machine status, point identity, and result metadata
    side_effects:
    - must run one nested core.Loop with the point registry
    - must allow nested point tools to create workspaces, run agents, and write artifacts
    - must update evaluator session state with the point outcome
    undo:
    - must rely on point workspace checkpoints and session-state history to reverse nested effects
    errors:
    - must emit CommandError when config is missing, current point context is absent, or nested machine setup fails
  non_goals:
  - Does not prepare the point workspace itself.
  - Does not run oracle checks or collect metrics directly.
  - Does not hide point-machine sequencing; point.yaml owns that workflow.
  output:
    description: Nested point-machine execution result.
    schema:
      type: object
      properties:
        point_id:
          type: string
        machine:
          type: string
        status:
          type: string
        terminal_state:
          type: string
        elapsed_ms:
          type: integer
        artifact_dir:
          type: string
      required:
      - status
      - terminal_state
  side_effects:
  - kind: state_mutation
    target: evaluator_session
    state: point_result_recorded
    description: Records the nested point outcome in session state.
  - kind: filesystem_write
    target: point_artifacts
    description: Nested point tools may create workspaces and write evaluation artifacts.
  - kind: nested_machine_execution
    target: core.Loop
    description: Runs the configured point machine with its selected tools.
  reversibility:
    classification: compensatable
    undo: workspace_restore
    requires_confirmation: false
  undo:
    strategy: workspace_restore
    description: Restore point artifact workspace and remove or restore the session point-result entry.
    requires:
    - point_workspace_checkpoint
    - evaluator_session_checkpoint
  errors:
  - signal: CommandError
    condition: required config is missing, no point is ready, or nested machine construction fails
    message_shape: 'run_point: <error>'
    state_after_failure: session state unchanged unless nested execution already recorded a result
  relationships:
    before:
    - next_point
    after:
    - next_point
    - report_session
    overlaps:
    - tool: execute_task
      difference: execute_task spawns a child agent process; run_point runs an in-process nested core.Loop.
    - tool: launch_eval
      difference: launch_eval starts an evaluator session process; run_point runs one point inside that session.
  config:
    point_machine: agents/evaluator/point.yaml
    point_tools: agents/evaluator/tools-point.yaml
    agent_name: evaluator-point
    max_iterations: 20
    success_state: Done
