id: architecture-agent-core
title: Agent Core Architecture

overview:
  summary: |
    A Go framework for building declarative tool-language agents. A single
    unified binary (cmd/agent) drives five agent types — generator,
    evaluator, planner, constitution-auditor, and bench — each defined entirely by
    YAML configuration files (state machines, tool selections, LLM
    configs). The bench mode serves an embedded web UI for browsing
    experiments, launching evaluations, and comparing results.

    The framework is organized in four cooperating layers:

    Engine layer (internal/runtime/core). Domain-agnostic loop machinery: types,
    state machine, command dispatch, tool registry, agentic loop, and
    YAML machine configuration. The engine knows about States, Signals,
    and Commands but not about coding tools, LLMs, or file systems.

    Infrastructure layer. Shared packages consumed by all agent types:
    - pkg/tracing — Tracer port interface (5 methods) and NoopTracer
    - pkg/telemetry — concrete OTel implementation, traceparent, replay
    - pkg/telemetry/genai — GenAI semantic convention helpers
    - internal/model/llm — LLM client, conversation, profiles, parsing utilities
    - internal/model/llm/ollama — Ollama adapter satisfying llm.Client
    - internal/model/prompt — prompt schema, YAML loading, system template
    - pkg/stl — standard tool library (file, build, LLM, eval tools)
    - pkg/cli — CLI flag constants and argument propagation (library; not imported by cmd/agent)
    - pkg/subprocess — subprocess execution utilities

    Domain layer. Packages supporting specific agent workflows:
    - pkg/execute — agent subprocess execution with process groups
    - internal/planning/pipeline — planner pipeline tools (extract, assemble, parse)
    - internal/planning/plan — implementation plan parsing and prompt assembly
    - internal/planning/extract — task extraction from requirement graphs
    - internal/planning/graph — requirement DAG construction and traversal
    - internal/planning/materialize — plan-to-issue materialization
    - pkg/worktree — git worktree lifecycle management
    - pkg/spec — specification corpus parsing and validation

    Configuration layer (agents/, tools/, and docs/specs/). YAML files defining each agent's
    behavior: state machines (machine.yaml), tool selections (tools.yaml),
    tool declarations (tools/), and per-model LLM configurations
    (agents/*/llm/*.yaml). Specification YAML documents define the
    requirements, semantic models, use cases, and formal tests that explain
    those agents. The configurations ARE the agents -- no Go code changes are
    needed to modify agent behavior.

  layer_diagram: |
    ```mermaid
    flowchart TB
      subgraph Config["Configuration and Specifications"]
        MACH[agents/*/machine.yaml]
        SEL[agents/*/tools.yaml]
        DEF[tools/*.yaml]
        LLMCFG[agents/*/llm/*.yaml]
        SPECS[docs/specs/*.yaml]
      end

      subgraph Binary["Unified Binary"]
        AGENT[cmd/agent]
      end

      subgraph Domain["Domain Workflow Packages"]
        PIPE[internal/planning/pipeline]
        PLAN[internal/planning/plan]
        EXTRACT[internal/planning/extract]
        REQGRAPH[internal/planning/graph]
        MAT[internal/planning/materialize]
        EXEC[pkg/execute]
        WORKTREE[pkg/worktree]
        SPEC[pkg/spec]
        BENCH[pkg/bench]
      end

      subgraph Infra["Reusable Infrastructure"]
        LLM[internal/model/llm and internal/model/llm/ollama]
        PROMPT[internal/model/prompt]
        STL[pkg/stl]
        TELE[pkg/telemetry]
        TRACE[pkg/tracing]
        CLI[pkg/cli]
        SUB[pkg/subprocess]
      end

      subgraph Engine["Engine"]
        CORE[internal/runtime/core]
      end

      Config --> AGENT
      AGENT --> CORE
      AGENT --> Domain
      AGENT --> Infra
      PIPE --> PLAN
      PIPE --> EXTRACT
      PIPE --> MAT
      EXTRACT --> REQGRAPH
      EXEC --> SUB
      EXEC --> CLI
      BENCH --> STL
      STL --> CORE
      LLM --> CORE
      TELE --> TRACE
      CORE --> TRACE
    ```

  system_context_diagram: |
    ```mermaid
    flowchart LR
      DEV[Developer or operator] --> AGENT[cmd/agent]
      AGENT --> CFG[Machine, tool, LLM YAML]
      AGENT --> LOOP[internal/runtime/core Loop]
      LOOP --> TOOLS[Registered tools]
      TOOLS --> FS[Workspace filesystem]
      TOOLS --> MODEL[LLM provider]
      TOOLS --> CHILD[Child agent or external CLI]
      LOOP --> OTEL[Telemetry exporters]
      LOOP --> STORE[Optional StateStore]
      LOOP --> WORK[Optional Workspace]
      SPEC[docs/specs and pkg/spec] --> CFG
    ```

  config_dataflow_diagram: |
    ```mermaid
    flowchart TD
      MF[machine.yaml] --> MS[MachineSpec]
      TSF[tools.yaml] --> SELECT[Tool selection]
      TDF[tool declaration YAML] --> TD[ToolDef]
      LLMF[llm config YAML] --> LCFG[LLM config]

      TD --> SELECTED[Selected ToolDefs]
      SELECT --> SELECTED
      SELECTED --> SPEC[ToolSpec metadata]
      SELECTED --> BUILDER[Builder factory]
      SPEC --> REG[Registry]
      BUILDER --> REG
      MS --> TABLE[TransitionTable]
      REG --> TABLE
      TABLE --> LOOP[core.Loop]
      LCFG --> LOOP
    ```

  lifecycle: |
    A run proceeds through three phases.

    Initialization. The domain agent creates a Registry, registers
    ToolSpec-Builder pairs, and builds (or loads) a TransitionTable.
    It configures a Budget and LoopHooks, then calls core.Loop.

    Execution. Loop freezes the registry, starts a root span, and
    enters the iteration loop. Each iteration:
    1. Checks context cancellation.
    2. Checks budget (generic + domain hook).
    3. Calls StateMachine.Step to get the next state and Command.
    4. If terminal, resolves RunStatus and exits.
    5. Dispatches the Command via Dispatch (span, timeout, recovery).
    6. Accumulates cost, records the event, calls OnResult hook.

    Completion. Loop sets Duration, logs a summary, and returns
    RunResult to the caller. The domain agent can extend RunResult
    with its own fields by embedding core.RunResult.

  loop_flow: |
    ```mermaid
    flowchart TD
      A[Initialize Registry] --> B[Configure Budget]
      B --> C[core.Loop]
      C --> D{Context cancelled}
      D -->|Yes| J[StatusCancelled]
      D -->|No| E{Budget exceeded}
      E -->|Yes| K[StatusBudgetExceeded]
      E -->|No| F[StateMachine.Step]
      F --> G{Terminal state}
      G -->|Yes| L[Resolve RunStatus]
      G -->|No| H[Dispatch Command]
      H --> I[Accumulate cost]
      I --> D
      L --> M[Return RunResult]
    ```

  runtime_sequence: |
    ```mermaid
    sequenceDiagram
      participant A as cmd/agent
      participant CFG as YAML config
      participant R as Registry
      participant M as MachineSpec
      participant L as core.Loop
      participant SM as StateMachine
      participant D as Dispatch
      participant C as Command
      participant T as Tracer

      A->>CFG: load machine, tool selection, declarations, LLM config
      A->>R: register selected ToolSpec and Builder pairs
      A->>M: parse and validate machine.yaml
      A->>L: call Loop with registry, table, hooks, budget
      L->>R: freeze registry
      L->>SM: Step(current state, previous signal)
      SM-->>L: next state and Command
      L->>D: Dispatch(Command)
      D->>T: start execute_tool span
      D->>C: Execute()
      C-->>D: Result
      D-->>L: Result with Signal, Cost, Metrics
      L->>SM: next Step uses Result.Signal
    ```

  dispatch_tracing_sequence: |
    ```mermaid
    sequenceDiagram
      participant L as Loop
      participant D as Dispatch
      participant C as Command
      participant T as Tracer

      L->>D: Dispatch(ctx, command, timeout, tracer)
      D->>T: Push execute_tool span
      D->>C: Execute()
      alt command succeeds
        C-->>D: Result.Signal
        D->>T: SetAttributes cost and command metadata
      else command panics or times out
        D->>T: RecordError
        D-->>L: CommandError Result
      end
      D-->>L: Result with duration filled
    ```

  tool_language_architecture:
    summary: |
      Agent Core treats tools as vocabulary and machine.yaml as grammar. A tool
      should be a reusable word with a declared contract. A workflow is a
      sentence, and sentences belong in MachineSpec transitions where states,
      signals, and actions are visible, validated, traced, and eventually
      recoverable.

      This separation keeps the program auditable. If a workflow is hidden in a
      Go command, startup validation cannot see intermediate signals, telemetry
      cannot explain the real sequence, and rollback cannot reliably identify
      which command/domain or workspace state changed. If the workflow is in
      machine.yaml, each tool can stay small while the machine owns order,
      branching, retries, validation, and approval gates.

    categories:
      word: |
        A normal vocabulary word is a single deterministic verb with typed
        input, typed output, declared side effects, explicit errors, and a
        rollback story. Examples include read, edit, build, run_oracle_check,
        and collect_trace_tokens.
      stateful_internal: |
        A stateful internal word mutates agent or command/domain state rather
        than visible workspace state. Examples include report_parse_error,
        reset_history, nudge_reread, parse_suite_config, and next_point. These
        are usually machine actions, not LLM-visible manifest entries.
      boundary: |
        A boundary tool intentionally crosses into a model, human, child
        process, nested machine, external CLI, external API, or workspace. It
        is still a word from the parent machine's point of view, but its
        contract must make the boundary, emitted signals, side effects, and
        undo/compensation explicit. Examples include invoke_llm, serve_ui,
        run_agent, run_point, launch_eval, and self_invoke.
      sentence: |
        A sentence tool hides multiple observable verbs behind one name. New
        tools should not use this category except to mark legacy compatibility.
        Sentence tools migrate by identifying each verb, declaring word tools,
        and moving sequencing into machine.yaml.

    composition_rules:
      - machine.yaml owns workflows, ordering, branching, retries, validation sequences, and approval gates.
      - ToolDef owns the meaning of one word: problem, parameters, output, emits, side effects, reversibility, undo, errors, and relationships.
      - ToolSpec is runtime metadata derived from selected ToolDefs and used to register or expose tools.
      - Builder turns prior Result state or parsed tool input into a Command.
      - Command.Execute performs the word; Result.Signal returns control to the machine.
      - LLM $tool dispatch selects one vocabulary word dynamically; it does not license hidden workflows inside the selected tool.

    machine_composes_words_diagram: |
      ```mermaid
      flowchart TD
        subgraph Machine["machine.yaml sentence"]
          A[State: Parsing]
          B[State: ValidatingBuild]
          C[State: ValidatingLint]
          D[State: ValidatingTest]
          E[State: Succeeded]
        end

        subgraph Words["tool vocabulary"]
          W1[done]
          W2[build]
          W3[lint]
          W4[test]
        end

        A -->|TaskCompleted / action build| B
        B -->|ToolDone / action lint| C
        C -->|ToolDone / action test| D
        D -->|ToolDone| E

        W1 -. emits TaskCompleted .-> A
        W2 -. emits ToolDone or ToolFailed .-> B
        W3 -. emits ToolDone or ToolFailed .-> C
        W4 -. emits ToolDone or ToolFailed .-> D
      ```

    tool_contract_pipeline_diagram: |
      ```mermaid
      sequenceDiagram
        participant YAML as ToolDef YAML
        participant Select as Tool selection
        participant Reg as Registry
        participant Build as Builder
        participant Cmd as Command
        participant Loop as Loop
        participant Machine as MachineSpec

        YAML->>Select: available vocabulary
        Select->>Reg: selected ToolSpec and factory config
        Machine->>Loop: action name from transition
        Loop->>Reg: Resolve(action)
        Reg-->>Loop: Builder
        Loop->>Build: Build(previous Result)
        Build-->>Loop: Command
        Loop->>Cmd: Execute()
        Cmd-->>Loop: Result.Signal
        Loop->>Machine: transition on signal
      ```

    boundary_tool_diagram: |
      ```mermaid
      flowchart LR
        P[Parent MachineSpec] -->|action run_agent| B[Boundary ToolDef]
        B --> C[Command]
        C --> X[Child process or nested machine]
        X --> C
        C -->|declared Result.Signal| P
        C -->|declared side effects| L[Lifecycle and rollback model]
        L --> W[Workspace restore or compensation]
        L --> S[Command/domain state restore]
      ```

    sentence_tool_migration_diagram: |
      ```mermaid
      flowchart LR
        A[Legacy sentence tool] --> B[Name observable verbs]
        B --> C[Declare one ToolDef per verb]
        C --> D[Add emits and side effects]
        D --> E[Wire sequence in machine.yaml]
        E --> F[Validate transitions]
        F --> G[Mark aggregate deprecated compatibility]
      ```

    references:
      - docs/specs/config-formats/tool-authoring-standard.yaml
      - docs/specs/semantic-models/tool-language.yaml
      - docs/specs/semantic-models/tool-vocabulary-audit.yaml
      - docs/specs/test-suites/test-rel02.0-tool-contracts.yaml

  rollback_lifecycle_architecture:
    status: |
      The architecture defines the lifecycle ports and model now, while parts of
      the full operational feature set are implemented by the follow-up
      tundo/tlife epics. Disabled-mode behavior remains the default: when
      StateStore, Workspace, and CheckpointPolicy are nil or disabled, existing
      machines run without checkpoint persistence, full history recording, or
      workspace restore behavior.

    summary: |
      Rollback and lifecycle support is architectural because agent programs
      mutate more than one kind of state. The runtime must keep those state
      layers separate:

      - Agent state is loop bookkeeping: current state/signal, iteration,
        budget counters, accumulated cost, status, and run summary.
      - Command/domain state is mutable in-process state owned by commands or
        domains: conversation history, planner pipeline state, evaluator
        session state, or PointContext.
      - Workspace/environment state is the external filesystem or environment
        changed by file tools, exec tools, child agents, and evaluator point
        tools.

      StateStore stores JSON snapshots for agent and command/domain state.
      Workspace stores external environment refs, with GitWorkspace as the
      default filesystem implementation. A Checkpoint references all relevant
      layers without pretending one layer can serialize another.

    state_layer_diagram: |
      ```mermaid
      flowchart TB
        subgraph Runtime["Loop runtime"]
          L[Loop]
          RR[RunResult]
          H[History]
        end

        subgraph AgentState["Agent state JSON"]
          AS[State, Signal, Iteration, Budget, Cost, Status]
        end

        subgraph DomainState["Command/domain state JSON"]
          CONV[Conversation]
          PLAN[Planner state]
          EVAL[Evaluator session and PointContext]
        end

        subgraph WorkspaceState["Workspace/environment state"]
          FS[Filesystem tree]
          ART[Generated artifacts]
          CHILD[Child process effects]
        end

        L --> AS
        L --> H
        RR --> AS
        CONV --> STORE[StateStore or command snapshot]
        PLAN --> STORE
        EVAL --> STORE
        FS --> WORK[Workspace]
        ART --> WORK
        CHILD --> WORK
        WORK --> GIT[GitWorkspace ref]
      ```

    checkpoint_capture_diagram: |
      ```mermaid
      sequenceDiagram
        participant L as Loop
        participant P as CheckpointPolicy
        participant C as Command or domain owner
        participant W as Workspace
        participant S as StateStore

        L->>P: consider lifecycle event
        P-->>L: checkpoint enabled
        L->>L: build AgentSnapshot
        L->>C: collect command/domain snapshot
        C-->>L: domain JSON or no snapshot
        L->>W: CurrentRef or Checkpoint(label)
        W-->>L: WorkspaceRef
        L->>S: Save checkpoint JSON
      ```

    suspend_resume_diagram: |
      ```mermaid
      stateDiagram-v2
        [*] --> Running
        Running --> AwaitingApproval: machine action emits approval signal
        AwaitingApproval --> SavingCheckpoint: lifecycle enabled
        SavingCheckpoint --> Suspended: checkpoint saved
        Suspended --> LoadingCheckpoint: resume requested
        LoadingCheckpoint --> RestoringState: checkpoint compatible
        RestoringState --> Running: StateStore and Workspace restored
        LoadingCheckpoint --> Failed: missing or incompatible checkpoint
        SavingCheckpoint --> Failed: required StateStore unavailable
      ```

    rollback_traversal_diagram: |
      ```mermaid
      flowchart TD
        A[Current iteration] --> B[Load History]
        B --> C{Reached target iteration?}
        C -- no --> D[Call Command.Undo]
        D --> E{Undo succeeded?}
        E -- yes --> F[Move to previous HistoryEntry]
        F --> C
        E -- no --> G[Report partial rollback and remaining state]
        C -- yes --> H[Restore Workspace target ref]
        H --> I[Return resumable agent state]
      ```

    tool_effects_to_lifecycle_diagram: |
      ```mermaid
      flowchart LR
        TD[ToolDef contract] --> SE[side_effects]
        TD --> RV[reversibility]
        TD --> UNDO[undo strategy]
        TD --> ERR[errors and state_after_failure]

        SE --> CLASS{Effect layer}
        CLASS -->|state_mutation| CMD[Command/domain restore]
        CLASS -->|filesystem| WS[Workspace restore]
        CLASS -->|boundary| COMP[Compensation or confirmation]

        CMD --> HIST[HistoryEntry]
        WS --> HIST
        COMP --> HIST
        HIST --> RB[Rollback traversal]
      ```

    ownership_rules:
      - StateStore owns JSON blobs for agent and command/domain state; it does not store filesystem trees.
      - Workspace owns external environment refs; GitWorkspace refs do not serialize conversation history or state-machine position.
      - Command.Undo owns command/domain restoration because each command knows the state it changed.
      - MachineSpec owns approval and suspend routing through explicit states and signals.
      - Loop owns traversal order, checkpoint timing, and lifecycle status, but not domain-specific compensation logic.

    references:
      - docs/specs/software-requirements/srd025-rollback-lifecycle.yaml
      - docs/specs/semantic-models/rollback-lifecycle.yaml
      - docs/specs/test-suites/test-rel02.0-lifecycle.yaml
      - docs/specs/test-suites/test-rel02.0-tool-contracts.yaml
      - roll-backs.md

  coordination_pattern: |
    Work flows through the state machine. The loop holds the current
    State and last Result. StateMachine.Step returns the next State
    plus a Command (via ActionFunc). The loop dispatches that Command
    via Dispatch and repeats.

    Domain agents control behavior by supplying:
    - State and Signal constants (string types)
    - A TransitionTable mapping (State, Signal) pairs to transitions
    - Tool Builders registered in a Registry
    - A TerminalFunc predicate for stop states
    - Optional LoopHooks for domain-specific budget, status, and result processing

    Dependency rules:
    - internal/runtime/core depends on pkg/tracing, pkg/telemetry/genai, the Go
      standard library, go.opentelemetry.io/otel/attribute, and
      gopkg.in/yaml.v3.
    - pkg/tracing depends on go.opentelemetry.io/otel/attribute and
      context.
    - pkg/telemetry depends on pkg/tracing, the OTel SDK, gRPC, and
      protobuf. It imports pkg/tracing but not internal/runtime/core.
    - pkg/telemetry/genai depends only on go.opentelemetry.io/otel/attribute.
    - internal/model/llm depends on internal/runtime/core, internal/model/prompt, and pkg/tracing.
    - pkg/stl depends on internal/runtime/core, internal/model/llm, pkg/tracing,
      pkg/telemetry/genai, pkg/execute, and pkg/subprocess.
    - internal/planning/pipeline depends on internal/runtime/core, internal/planning/plan, internal/planning/extract,
      internal/planning/materialize, and pkg/stl.
    - pkg/execute depends on pkg/subprocess, internal/model/llm, and pkg/tracing.
    - internal/planning/plan depends on gopkg.in/yaml.v3.
    - internal/planning/extract depends on internal/planning/graph and internal/planning/plan.
    - internal/planning/graph depends on gopkg.in/yaml.v3.
    - internal/planning/materialize depends on internal/planning/plan.
    - pkg/worktree depends on os/exec.
    - pkg/spec depends on the Go standard library, gopkg.in/yaml.v3,
      and a graph library.
    - pkg/subprocess depends on the Go standard library.
    - pkg/cli depends on the Go standard library.
    - cmd/agent imports internal/runtime/core, pkg/stl, internal/model/llm, internal/model/prompt,
      pkg/telemetry, internal/planning/pipeline, pkg/bench, pkg/execute, and
      pkg/tracing.
    - pkg/bench imports pkg/stl for evaluation result analysis and
      internal/runtime/core for the state machine loop.

interfaces:
  - name: Tracer interface
    summary: |
      Port interface for OpenTelemetry tracing (pkg/tracing). Five
      methods: Push (child span), Event (span event), SetAttributes
      (span metadata), RecordError (error recording with status),
      Context (span context access). The engine imports this interface;
      the concrete implementation lives in pkg/telemetry (TraceAdapter).
      A NoopTracer is provided for tests and optional tracing paths.

  - name: Command interface
    summary: |
      Single interface for all executable units of work (internal/runtime/core).
      Three methods: Name() string, Execute() Result, and Undo() Result.
      Both internal commands (LLM invoke, response parsing) and external
      tools (file I/O, build, test) implement Command. The loop dispatches
      them uniformly through Dispatch. Undo gives every command an explicit
      rollback contract, even when the current implementation is a no-op.

  - name: Builder interface
    summary: |
      Stateless factory that constructs a ready-to-execute Command
      from the previous Result (internal/runtime/core). One method: Build(res
      Result) Command. Builders are registered in the Registry and
      resolved by name during state machine transitions and YAML
      machine config loading.

  - name: CommandResolver interface
    summary: |
      Lookup interface satisfied by Registry (internal/runtime/core). One method:
      Resolve(name string) (Builder, bool). Used by domain code that
      needs to resolve builders without depending on the full Registry
      type.

components:
  - name: Types
    responsibility: |
      Core type definitions shared across all components. Defines
      State (string), Signal (string), Command interface, Result
      struct, Cost struct, ToolMetrics struct, Builder interface,
      CommandResolver interface, SpanOverride interface, and rollback
      foundation interfaces for StateStore, Workspace, CheckpointPolicy,
      Checkpoint, and GitWorkspace. Defines
      generic signals (Seed, BudgetExhausted, CommandError), standard
      tool signals (ToolDone, ToolFailed, EditDone), and LLM signals
      (LLMResponded, ParseFailed, TaskCompleted).
    capabilities:
      - Define the State and Signal string types
      - Define the Command interface (Name, Execute, Undo)
      - Define Result, Cost, and ToolMetrics structs for command output
      - Define ToolMetrics for structured success/failure tracking on Result
      - Define Builder and CommandResolver interfaces
      - Define SpanOverride interface for custom dispatch span naming
      - Define StateStore, Workspace, CheckpointPolicy, Checkpoint, and GitWorkspace
      - Define generic signals (Seed, BudgetExhausted, CommandError)
      - Define standard tool signals (ToolDone, ToolFailed, EditDone)
      - Define LLM signals (LLMResponded, ParseFailed, TaskCompleted)

  - name: State Machine
    responsibility: |
      Holds an immutable transition table and a terminal-state
      predicate. Step performs a single (State, Signal) lookup and
      returns the next state and a Command built by the matching
      ActionFunc. IsTerminal delegates to the domain-supplied
      TerminalFunc.
    capabilities:
      - Map (State, Signal) pairs to (NextState, ActionFunc) transitions
      - Build Commands via ActionFunc from the previous Result
      - Detect terminal states via TerminalFunc
      - Report unhandled state-signal pairs as errors

  - name: Dispatch
    responsibility: |
      Wraps Command.Execute with tracing, timeout, panic recovery,
      duration measurement, and signal normalization. SafeExecute
      runs the command in a goroutine with a timer. Dispatch adds
      an OpenTelemetry child span using GenAI semconv execute_tool
      naming. Commands implementing SpanOverride customize the span.
    capabilities:
      - Execute commands with panic recovery
      - Enforce per-command timeout
      - Measure and fill command duration
      - Normalize error signals (ForceErrorSignal)
      - Emit GenAI semconv execute_tool spans per dispatch
      - Support SpanOverride for custom span naming (e.g. LLM inference)

  - name: Registry
    responsibility: |
      Pairs ToolSpec metadata (name, description, JSON schema,
      visibility, phases) with Builders. Supports state-filtered
      manifest generation. Freezes before the loop starts to prevent
      mutation during execution.
    capabilities:
      - Register ToolSpec-Builder pairs (panics on duplicate or post-freeze)
      - Freeze the registry to prevent further registration
      - Resolve a Builder by name
      - Look up a ToolSpec by name
      - Generate state-filtered manifests of external tools
      - Report all tool names or external-only tool names

  - name: Loop
    responsibility: |
      The main agentic loop. Drives the state machine from an initial
      state to a terminal state, dispatching Commands, tracking budget,
      and collecting events. Domain-specific behavior is injected
      through LoopHooks callbacks.
    capabilities:
      - Drive the state machine through initialization, iteration, and completion
      - Enforce iteration, token, and wall-clock budget limits
      - Support domain-specific budget hooks (BudgetExceeded)
      - Accumulate token usage, cost, and events per iteration
      - Capture task summary from TaskCompletedSignal
      - Emit GenAI semconv invoke_agent spans for the entire run and events for each iteration
      - Support pre-run validation (ValidateParams hook)
      - Support post-dispatch processing (OnResult hook)
      - Handle context cancellation

  - name: Machine Config
    responsibility: |
      Provides YAML-based declarative state machine configuration.
      MachineSpec defines states, signals, terminal states, and
      transitions. ParseMachineSpec validates referential integrity.
      BuildTransitionTable resolves action names from the Registry.
    capabilities:
      - Parse MachineSpec from YAML bytes or file
      - Validate referential integrity (states, signals, terminals, transitions)
      - Build a TransitionTable from a MachineSpec and Registry
      - Support the $tool sentinel for dynamic dispatch
      - Support empty actions for terminal transitions

  - name: Telemetry
    responsibility: |
      Concrete OpenTelemetry implementation satisfying the Tracer port
      interface. Sets up trace and metric providers, manages root span
      lifecycle, handles file and OTLP export, and provides offline
      trace replay.
    capabilities:
      - Create providers with file and/or OTLP exporters (NewRoot)
      - Manage root span lifecycle with idempotent shutdown
      - Atomic file delivery via temp-file-then-rename
      - Satisfy tracing.Tracer via TraceAdapter
      - Replay recorded OTLP JSON trace files to a remote collector

design_decisions:
  - id: 1
    title: Domain-agnostic engine
    decision: |
      The engine defines State, Signal, Command, Budget, Result, registry,
      state machine, loop, dispatch, and lifecycle ports as abstract runtime
      concepts. All domain-specific states, signals, tools, and budget
      dimensions are supplied by the configured agent. No import in internal/runtime/core
      references coding tools, LLM providers, or any specific domain.
    benefits:
      - Multiple agent types share one loop engine
      - Engine improvements propagate to all agents
      - Clean testing without domain dependencies
    alternatives_rejected:
      - "Embedded domain logic: couples engine to one agent type"

  - id: 2
    title: Hooks for domain injection
    decision: |
      LoopHooks is a struct of optional function callbacks. The domain
      agent populates only the hooks it needs. No interface
      implementation or subclassing required.
    benefits:
      - Zero-cost for unused hooks (nil check)
      - New hooks can be added without breaking existing agents
      - Simpler than interface hierarchies
    alternatives_rejected:
      - "Interface with many methods: forces empty stubs"
      - "Plugin system: overengineered for a Go library"

  - id: 3
    title: OpenTelemetry for observability
    decision: |
      The engine emits OpenTelemetry spans and events for state
      transitions, budget checks, and command dispatch. The Tracer
      port interface decouples span creation from the OTel SDK setup.
    benefits:
      - Industry-standard API, stable Go SDK
      - Instrumentation decoupled from export destination
      - Domain agents supply their own OTel configuration
    alternatives_rejected:
      - "Custom logging: not interoperable"
      - "No tracing: loses observability"

  - id: 4
    title: YAML declarative state machine
    decision: |
      State machines can be defined in YAML files (MachineSpec) and
      converted to TransitionTables at runtime. This separates behavior
      definition from code.
    benefits:
      - Non-programmers can read and modify agent behavior
      - Machine configuration is version-controlled alongside code
      - Validation catches errors before the loop starts
    alternatives_rejected:
      - "Code-only tables: harder to audit, harder to diff"

  - id: 5
    title: Tool composition via machine.yaml sequences
    decision: |
      Complex workflows (e.g. "stage all then commit") are NOT encoded
      as compound Go tools. Instead, each atomic verb is a separate
      declared tool (stage_all, commit), and the machine.yaml
      wires them together via state transitions:

        - state: Staging
          signal: ToolDone
          next: Committing
          action: commit

      The state machine IS the composition layer. This eliminates
      compound tool code entirely — the workflow lives in YAML where
      it can be audited, diffed, and modified without recompilation.
    benefits:
      - Workflows are visible in machine.yaml diffs
      - Each tool stays atomic and independently testable
      - New workflows require zero Go code changes
      - State machine validation catches broken compositions at init
    alternatives_rejected:
      - "Compound Go tools: embed workflow logic in code, untestable"
      - "Shell script tools: opaque, no validation, no tracing"

  - id: 6
    title: Declarative tool initialization
    decision: |
      When LoopParams.MachineFile is set, Loop owns the full init
      sequence: create registry, call InitFunc to register tools,
      load machine YAML, validate all actions resolve, enter loop.
      This enforces the ordering invariant structurally.
    benefits:
      - Impossible to validate the machine before tools are registered
      - Eliminates per-agent init boilerplate
      - Single function call replaces multi-step setup
    alternatives_rejected:
      - "Caller manages ordering: error-prone, duplicated in every agent"

  - id: 7
    title: Registry freeze before loop
    decision: |
      The Registry is mutable during initialization and frozen before
      the loop starts. Post-freeze registration panics. This ensures
      the tool set is stable during execution.
    benefits:
      - No race conditions during the loop
      - Manifest generation is deterministic
      - Early detection of initialization errors
    alternatives_rejected:
      - "Immutable from construction: harder to build incrementally"
      - "No freeze: risk of mutation during dispatch"

technology_choices:
  - component: Language
    technology: Go
    purpose: Implementation language
  - component: Observability
    technology: OpenTelemetry (go.opentelemetry.io/otel/attribute)
    purpose: Span attribute types for tracing interface
  - component: YAML parsing
    technology: gopkg.in/yaml.v3
    purpose: Machine spec parsing and validation
  - component: Test assertions
    technology: testify (stretchr/testify)
    purpose: Test assertions and helpers

project_structure:
  binaries:
    - path: cmd/agent/
      role: Unified agent binary — generator, evaluator, planner, constitution-auditor, bench modes via YAML config

  bench:
    - path: pkg/bench/
      role: Bench server, API handlers, state machine tools (serve_ui, launch_eval)
    - path: pkg/bench/ui/
      role: Embedded React frontend for experiment browsing and launching

  engine:
    - path: internal/runtime/core/
      role: Generic agentic loop engine (types, state machine, dispatch, registry, loop, machine config)

  infrastructure:
    - path: pkg/tracing/
      role: Tracer port interface for OpenTelemetry (5 methods) and NoopTracer
    - path: pkg/telemetry/
      role: Concrete OTel implementation (providers, exporters, adapter, traceparent, replay)
    - path: pkg/telemetry/genai/
      role: OTel GenAI semantic convention constants, span name builders, attribute helpers
    - path: internal/model/llm/
      role: LLM client, conversation, profiles, parse utilities, domain interfaces
    - path: internal/model/llm/ollama/
      role: Ollama LLM adapter satisfying llm.Client
    - path: internal/model/prompt/
      role: Prompt struct, YAML loading, system prompt template, and manifest serialization
    - path: pkg/stl/
      role: Standard tool library (file, build, LLM, eval tools, config loading, subprocess)
    - path: pkg/cli/
      role: Standard CLI flag constants, PropagateArgs builder, and budget helpers
    - path: pkg/subprocess/
      role: Subprocess execution utilities (Run, EnvVar)

  domain:
    - path: pkg/execute/
      role: Agent subprocess execution with process groups and timeouts
    - path: internal/planning/pipeline/
      role: Planner pipeline tools (extract, assemble, parse, create issue, execute, check)
    - path: internal/planning/plan/
      role: Implementation plan parsing and prompt assembly
    - path: internal/planning/extract/
      role: Task extraction from requirement graphs
    - path: internal/planning/graph/
      role: Requirement DAG construction, traversal, and persistence
    - path: internal/planning/materialize/
      role: Plan-to-issue materialization (bd create)
    - path: pkg/worktree/
      role: Git worktree lifecycle management
    - path: pkg/spec/
      role: Specification corpus parsing, graph construction, and cross-artifact validation

  configuration:
    - path: agents/generator/
      role: Generator agent — machine.yaml, tools.yaml, llm/*.yaml
    - path: agents/evaluator/
      role: Evaluator agent — machine.yaml, tools.yaml, llm/*.yaml
    - path: agents/planner/
      role: Planner agent — machine.yaml (3 variants), tools.yaml, llm/*.yaml
    - path: agents/constitution-auditor/
      role: Validation agent — machine.yaml, tools.yaml
    - path: agents/bench/
      role: Bench agent — machine.yaml, tools.yaml, serve_ui.yaml
    - path: tools/
      role: Shared tool declarations — builtin.yaml and exec.yaml
    - path: internal/model/llm/profiles/
      role: Embedded LLM response profiles (9 model families)

  build:
    - path: magefiles/
      role: Mage build targets (build, lint, install, clean, tag, stats)
    - path: docs/
      role: Documentation, specifications, and roadmap

