rest:
  version: v1
  auth:
    none:
      type: none
  limits:
    local_executor_apply:
      timeout: 130s
      read_timeout: 130s
      max_request_bytes: 1048576
      max_response_bytes: 1048576
      redirect:
        mode: none
      network:
        schemes: [http]
        hosts: [127.0.0.1, localhost]
        ports: [18090]
        allow_public_listener: true
    local_executor_control:
      timeout: 30s
      read_timeout: 5s
      max_request_bytes: 16384
      max_response_bytes: 65536
      redirect:
        mode: none
      network:
        schemes: [http]
        hosts: [127.0.0.1, localhost]
        ports: [18091]
        allow_public_listener: true
    local_executor_monitor:
      timeout: 5s
      read_timeout: 5s
      max_request_bytes: 4096
      max_response_bytes: 1048576
      redirect:
        mode: none
      network:
        schemes: [http]
        hosts: [127.0.0.1, localhost]
        ports: [18092]
        allow_public_listener: true

  servers:
    executor_apply:
      # The apply endpoint is served on the Service name and port the provisioner
      # served (srd006 R1.1), so the creator's declared deployment_api client is
      # unchanged. It accepts a decided values-overrides document and SHALL NOT
      # accept an endpoint or credential for a running agent; no runtime input
      # supplies transport authority.
      address: ${EXECUTOR_BIND_HOST:-127.0.0.1}:18090
      limits_ref: local_executor_apply
      endpoints:
        state:
          # Read the deployed mesh view for the provisioning panel (srd006 R1.5).
          # helm get values --all reads the release's fully computed values (chart
          # defaults merged with any applied overrides), so this works on a fresh
          # install with no prior apply -- unlike the executor's own overrides
          # file, which exists only after the first apply.
          method: GET
          path: /provisioning/api/state
          binding: machine_request
          machine_request:
            profile: profile.yaml
            machine: state-machine.yaml
            timeout: 15s
            request:
              body: {}
            response:
              # Keyed by terminal state. The state_response contract (srd006
              # deployment_api_contract) is flat: machine_request response bodies
              # map one selector per named field (agent-core
              # rest.MachineResponseMapping.Body is a flat string map), so a
              # nested llm/params object cannot be assembled here from several
              # source paths in one step. The panel's provisioningApi.ts
              # reassembles the nested MeshView client-side from these flat
              # fields (GH-753).
              terminal_states:
                Read:
                  status: 200
                  content_type: application/json
                  body:
                    schema_version: "1"
                    rags: $.ragUnits
                    llmInCluster: $.ollama.enabled
                    llmExternalURL: $.llm.externalURL
                    llmChatModel: $.executor.params.chatModel
                    llmEmbedModel: $.chatbot.embeddingModel
                    llmChatModels: $.ollama.models.chat
                    llmRouterModel: $.ollama.models.router
                    llmTopology: $.ollama.topology
                    paramsNResults: $.executor.params.nResults
                    paramsChunkCap: $.executor.params.chunkCap
                    paramsRouterDefault: $.executor.params.routerDefault
                # helm could not read the release: absent, or a kubeconfig, RBAC,
                # or API-server failure. Reporting a mapped-empty view here would
                # render as a legitimate but topology-less mesh to the panel.
                Unavailable:
                  status: 502
                  content_type: application/json
                  body:
                    schema_version: "1"
                    status: unavailable
                    error: state_read_failed
        apply:
          method: POST
          path: /provisioning/api/apply
          binding: machine_request
          request:
            # The apply request carries the decided values-plane document as content
            # under the versioned deployment_api_contract (srd006 R1.4); the executor
            # writes and applies it, deciding no values (R5.1).
            body_schema:
              type: object
              required: [schema_version, content]
              properties:
                schema_version: {type: string}
                content: {type: string}
          machine_request:
            profile: profile.yaml
            machine: apply-machine.yaml
            timeout: 130s
            request:
              body:
                content: $.content
                # The values file lands in the agent's workspace, which the
                # deployment sets from .Values.profiles.workMountPath. Binding
                # both to one value keeps write_overrides inside the workspace:
                # a path outside it is refused (agent-core filesystem
                # ValidatePath), which failed every apply on its first word
                # whenever the mount moved. The helm words read the same
                # reference, so one mounted profile parameterizes per pod
                # (srd013 R5.6, GH-728) and the write and the read cannot
                # diverge. The default keeps a default render unchanged.
                path: ${EXECUTOR_WORK_DIR:-/work}/overrides.yaml
            response:
              # Keyed by terminal state, not terminal signal: every word in
              # apply-machine.yaml is an exec word emitting only ToolDone or
              # ToolFailed, so signal keying could not separate a rejected patch
              # from a failed apply, nor a successful rollback from either
              # (srd030 R4.3; GH-615).
              terminal_states:
                Done:
                  status: 200
                  content_type: application/json
                  body:
                    schema_version: "1"
                    status: applied
                # The dry-run rejected the patch against the chart schema. The
                # caller sent bad values and nothing was applied, so this is a
                # client error and retrying the same patch will not help.
                Rejected:
                  status: 400
                  content_type: application/json
                  body:
                    schema_version: "1"
                    status: rejected
                    error: validate_rejected
                # The rollout stalled and helm_rollback restored the prior
                # revision. The release is intact; the patch did not take.
                RolledBack:
                  status: 500
                  content_type: application/json
                  body:
                    schema_version: "1"
                    status: rolled_back
                    error: rolled_back
                Failed:
                  status: 500
                  content_type: application/json
                  body:
                    schema_version: "1"
                    status: failed
                    error: apply_failed
        rollout:
          # Read the chatbot Deployment's rollout status (srd006 R1.1). kubectl
          # computes the phase, then the machine reads the Deployment itself for
          # the counts.
          method: GET
          path: /provisioning/api/rollout
          binding: machine_request
          machine_request:
            profile: profile.yaml
            machine: rollout-machine.yaml
            timeout: 10s
            request:
              body: {}
            response:
              # Keyed by terminal state, not terminal signal. Both reads are exec
              # words emitting only ToolDone and ToolFailed, and the counts read
              # emits ToolDone for a complete and a progressing rollout alike, so
              # signal keying could not tell the three outcomes apart -- nor
              # separate a broken read from a slow rollout, which is the whole
              # point of the second read (srd030 R4.6; GH-615).
              terminal_states:
                # ready, desired, and revision come from the last word's output:
                # kubectl_get_rollout_counts renders the Deployment as a JSON
                # object, which the binding maps by field (srd030 R4.3).
                Complete:
                  status: 200
                  content_type: application/json
                  body:
                    schema_version: "1"
                    phase: complete
                    ready: $.ready
                    desired: $.desired
                    revision: $.revision
                Progressing:
                  status: 200
                  content_type: application/json
                  body:
                    schema_version: "1"
                    phase: progressing
                    ready: $.ready
                    desired: $.desired
                    revision: $.revision
                # kubectl could not read the Deployment: it is absent, or the
                # kubeconfig, RBAC, or API server denies the read. Reporting a
                # phase here would render a broken read as an ongoing rollout in
                # a panel that polls every 3s, indefinitely.
                Unavailable:
                  status: 502
                  content_type: application/json
                  body:
                    schema_version: "1"
                    status: unavailable
                    error: rollout_read_failed

    executor_control:
      address: ${EXECUTOR_BIND_HOST:-127.0.0.1}:18091
      limits_ref: local_executor_control
      queue:
        name: executor_control
        capacity: 8
        timeout: 30s
      shutdown:
        timeout: 5s
        drain_policy: drain_then_stop
      endpoints:
        exit:
          method: POST
          path: /api/lifecycle/exit
          binding: emit_signal
          signal: ExitRequested
          request:
            body_schema:
              type: object
              properties:
                reason: {type: string}
                status: {type: string}
          response:
            output:
              accepted: "true"
        health:
          method: GET
          path: /api/lifecycle/health
          binding: health

    monitor:
      address: ${EXECUTOR_BIND_HOST:-127.0.0.1}:18092
      limits_ref: local_executor_monitor
      queue:
        name: executor_monitor
        capacity: 8
        overflow: reject
        timeout: 100ms
      shutdown:
        timeout: 2s
        drain_policy: drain
        stop_listeners: true
        unblock_await_signal: ServerStopped
      endpoints:
        machine_spec:  {method: GET, path: /monitor/machine,       binding: read_state,    monitor_view: machine_spec}
        current_state: {method: GET, path: /monitor/state,         binding: read_state,    monitor_view: current_state}
        tools:         {method: GET, path: /monitor/tools,         binding: read_state,    monitor_view: tools}
        metrics:       {method: GET, path: /monitor/metrics,       binding: read_state,    monitor_view: metrics}
        recent_events: {method: GET, path: /monitor/events,        binding: read_state,    monitor_view: events}
        event_stream:  {method: GET, path: /monitor/events/stream, binding: stream_events, monitor_view: events}
        control_exit:
          method: POST
          path: /monitor/control/exit
          binding: emit_signal
          signal: ExitRequested
          request:
            body_schema:
              type: object
              properties:
                reason: {type: string}
          response:
            output:
              accepted: "true"
