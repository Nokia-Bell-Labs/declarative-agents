  - use_case: rel03.0-uc004-openapi-import
    name: OpenAPI import reports invalid operation IDs
    go_test: TestRESTOpenAPI_InvalidOperationIDs
    status: done
    description: |
      When an import names a missing or duplicated operation ID, validation
      fails before ToolDefs register. An incompatible server binding fails the
