id: test-rel04.0-monitor
title: Test Suite for Release 04.0 Embedded Monitor
release: "04.0"

traces:
  - rel04.0-uc001-configurable-tool-metrics
  - rel04.0-uc002-monitor-rest-api

preconditions:
  - internal/observability/monitor contains the monitor store and recorder ports.
  - ToolDef metrics declarations can be loaded from trusted YAML.
  - MachineSpec metric_labels can be loaded from trusted YAML.
  - OpenTelemetry metric export can use a local in-memory metric reader in tests.
  - REST monitor tests can use httptest.Server with profile-owned routes.
  - OpenAPI tests can inspect generated or configured endpoint descriptions.
  - Disabled-mode tests can run without monitor config.
  - A real cmd/agent monitor process can bind an isolated localhost REST listener during tests.
  - REST server launch output exposes the bound listener address when the profile config uses 127.0.0.1:0.

test_cases:
  - use_case: rel04.0-uc001-configurable-tool-metrics
    name: End-to-end monitor release proof
    go_test: TestMonitorReleaseProfileProof
    integration_target: mage integration:uc004
    status: implemented
    description: |
      Load the external monitor profile through cmd/agent startup helpers. Run
      the configured monitor machine with a live MonitorRecorder. Query the
      configured monitor REST views from the same store. The proof also checks
      workflow labels, OpenTelemetry export, REST OpenAPI output, launch-output
      bound address discovery, and cached event-stream frames.
    inputs:
      profile: ${AGENT_PROFILES_ROOT}/monitor/profile.yaml
      fixture: testdata/integration/rel04-monitor/monitor-rest.yaml
    expected:
      cmd_agent_monitor_recorder_wired: true
      live_store_used_by_rest: true
      specialized_rest_live_store_test: TestMonitorREST_FactoryUsesLiveMonitorState
      openapi_output_present: true
      otel_metrics_exported: true
      workflow_labels_present: true
      bound_address_discovered_from_launch_output: true
      profile_owned_monitor_path_used: true
    traces:
      - rel04.0-uc001-configurable-tool-metrics S1
      - rel04.0-uc001-configurable-tool-metrics S2
      - rel04.0-uc001-configurable-tool-metrics S4
      - rel04.0-uc002-monitor-rest-api S1
      - rel04.0-uc002-monitor-rest-api S2
      - rel04.0-uc002-monitor-rest-api S3
      - rel04.0-uc002-monitor-rest-api S4
      - srd032-tool-metrics-monitor-store AC1
      - srd032-tool-metrics-monitor-store AC2
      - srd032-tool-metrics-monitor-store AC4
      - srd033-monitor-rest-api AC1
      - srd033-monitor-rest-api AC2
      - srd033-monitor-rest-api AC3
      - srd033-monitor-rest-api AC4

  - use_case: rel04.0-uc002-monitor-rest-api
    name: Real CLI monitor process stays queryable until exit
    go_test: TestMonitorCLIProfileServesUntilControlExit
    integration_target: mage integration:uc004
    status: implemented
    description: |
      Start cmd/agent with ${AGENT_PROFILES_ROOT}/monitor/profile.yaml or an
      equivalent profile-owned monitor path, then wait until the monitor REST listener
      accepts requests. Discover the base URL from REST server launch output
      when the configured address uses 127.0.0.1:0. Request /monitor/state
      while the process is still running. Before shutdown, ask /monitor/metrics
      for the live aggregate view and send the configured monitor control exit
      request. After handling the control request, the process should stop the
      owned listener and complete with terminal state Done or Succeeded. The
      proof should avoid a shared fixed profile port while preserving profile
      launch, blocking await, control exit, listener stop, and successful
      terminal routing.
    inputs:
      profile: ${AGENT_PROFILES_ROOT}/monitor/profile.yaml
      query_routes:
        - /monitor/state
        - /monitor/metrics
      control_route: /monitor/control/exit
      binding: isolated_loopback_address
      discovery: rest_server_launch_output_address
    expected:
      process_running_after_server_launch: true
      monitor_state_query_succeeds: true
      monitor_metrics_query_succeeds: true
      control_exit_stops_listener: true
      terminal_status_succeeded: true
      avoids_shared_fixed_port: true
      bound_address_discovered: true
      stock_or_equivalent_profile_owned_path: true
    traces:
      - rel04.0-uc002-monitor-rest-api S6
      - srd033-monitor-rest-api AC6

  - use_case: rel04.0-uc001-configurable-tool-metrics
    name: Monitor store returns bounded snapshots
    go_test: TestMonitorStore_BoundedSnapshot
    status: implemented
    description: |
      Seed the store with current machine state and recent runtime data. Add
      per-tool usage plus metric samples. Add diagnostics and recent errors
      too. Read one snapshot after the store exceeds its configured limits, so
      the assertion can prove that older entries fall out without a reader
      reaching into tools or workspace files. Snapshot reads must stay passive.
    inputs:
      limits:
        events: 3
        samples: 4
        errors: 2
      sample_count: 8
    expected:
      snapshot_bounded: true
      reads_execute_tools: false
      reads_workspace_files: false
    traces:
      - rel04.0-uc001-configurable-tool-metrics S1
      - srd032-tool-metrics-monitor-store AC1

  - use_case: rel04.0-uc001-configurable-tool-metrics
    name: Recorder separates runtime and tool-owned metrics
    go_test: TestToolMetricsRecorder_OwnershipBoundaries
    status: implemented
    description: |
      Dispatch records standard context. A filesystem tool records specialized
      samples. Both forms should carry the same low-cardinality runtime
      envelope. The recorder should accept both forms through one path. Direct
      writes to exporters or REST readers should fail before any reader learns
      tool-family internals.
    inputs:
      standard_context: [run_id, agent_name, tool_name, state, signal, status, duration, workflow_labels]
      specialized_samples: [files_written, bytes_changed]
    expected:
      runtime_context_recorded: true
      specialized_samples_recorded: true
      specialized_envelope_present: [run_id, state, signal, status, tool_name, workflow_labels]
      direct_exporter_write_allowed: false
    traces:
      - rel04.0-uc001-configurable-tool-metrics S2
      - srd032-tool-metrics-monitor-store AC2

  - use_case: rel04.0-uc001-configurable-tool-metrics
    name: Metric config rejects unsafe labels
    go_test: TestMonitorMetricConfig_RejectsUnsafeLabels
    status: implemented
    description: |
      Load ToolDef metrics and MachineSpec labels with unsafe sources.
      Validation should reject bad names and source paths. Unsafe attributes
      should fail before monitor recording starts, even when the rest of the
      profile is valid.
    inputs:
      invalid_sources:
        - raw_prompt
        - full_tool_output
        - arbitrary_url
        - request_id
        - timestamp
    expected:
      validation_failed: true
      recording_started: false
      diagnostic_identifies_field: true
    traces:
      - rel04.0-uc001-configurable-tool-metrics S3
      - srd032-tool-metrics-monitor-store AC3

  - use_case: rel04.0-uc001-configurable-tool-metrics
    name: OpenTelemetry export reads normalized samples
    go_test: TestMonitorOTelExport_NormalizedSamples
    status: implemented
    description: |
      Export normalized monitor samples through an OpenTelemetry metric path.
      The exporter should use service resource identity. When export fails, the
      monitor should record diagnostics without changing command results, since
      export is observational and the loop must keep its original signal.
    inputs:
      instruments: [dispatch_duration, dispatch_count]
      exporter_failure: true
    expected:
      resource_identity_matches_trace: true
      diagnostics_recorded: true
      command_signal_changed: false
    traces:
      - rel04.0-uc001-configurable-tool-metrics S4
      - srd032-tool-metrics-monitor-store AC4

  - use_case: rel04.0-uc001-configurable-tool-metrics
    name: Disabled mode avoids monitor allocation
    go_test: TestMonitorDisabledMode_NoStoreAllocation
    status: implemented
    description: |
      Run setup without monitor config. Runtime should provide nil or no-op
      recorder behavior and avoid monitor store allocation. Existing loop,
      dispatch, tracing, and tool behavior should remain unchanged.
    inputs:
      monitor_configured: false
    expected:
      monitor_store_allocated: false
      recorder_noop: true
      existing_behavior_preserved: true
    traces:
      - rel04.0-uc001-configurable-tool-metrics S5
      - srd032-tool-metrics-monitor-store AC5

  - use_case: rel04.0-uc002-monitor-rest-api
    name: Monitor REST routes read cached state
    go_test: TestMonitorREST_ReadOnlyCachedState
    status: implemented
    description: |
      Serve configured monitor REST routes with a populated monitor store. The
      handlers should read cached state only. They should not execute tools or
      dispatch actions. They should not scrape prompts or inspect workspace
      files.
    inputs:
      routes: [machine_spec, current_state, tools, metrics, events]
      monitor_store_seeded: true
    expected:
      all_routes_return_cached_state: true
      tools_executed: false
      machine_actions_dispatched: false
    traces:
      - rel04.0-uc002-monitor-rest-api S1
      - srd033-monitor-rest-api AC1

  - use_case: rel04.0-uc002-monitor-rest-api
    name: Monitor OpenAPI omits unsafe fields
    go_test: TestMonitorREST_OpenAPIRedaction
    status: implemented
    description: |
      Inspect the configured OpenAPI document for monitor endpoints. Operation
      IDs should be stable. Schemas should describe safe monitor responses with
      precise JSON Schema types and omit prompt data or output data. They should
      also omit secret material, workspace paths, and unbounded labels. The
      OpenAPI document should include profile-owned lifecycle control endpoints
      such as POST /monitor/control/exit. It should describe
      /monitor/events/stream as an SSE endpoint with text/event-stream content.
    inputs:
      endpoints: [machine_spec, current_state, tool_metrics, aggregate_metrics, event_stream, control_exit]
    expected:
      operation_ids_stable: true
      unsafe_fields_absent: true
      control_exit_documented: true
      generated_go_server_code: false
      event_stream_content_type: text/event-stream
      lower_snake_case_schema_fields: true
      shallow_all_object_scalar_schemas_absent: true
      monitor_state_schema:
        run_id: string
        status: string
        state: string
        signal: string
        iteration: integer
        updated_at: string_date_time
        diagnostics: array_of_objects
        errors: array_of_objects
      monitor_metrics_schema:
        tools: object_map
        metrics: object_map
        schemas: object_map
        recent_samples: array_of_objects
        sample_value: number
        timestamp: string_date_time
      monitor_events_schema:
        recent_events: array_of_objects
        iteration: integer
        duration_ms: number
        tokens_in: integer
        tokens_out: integer
        timestamp: string_date_time
      monitor_control_exit_schema:
        request_reason: string
        accepted: boolean
        signal: string
    traces:
      - rel04.0-uc002-monitor-rest-api S2
      - rel04.0-uc002-monitor-rest-api S3
      - srd033-monitor-rest-api AC2
      - srd033-monitor-rest-api AC3

  - use_case: rel04.0-uc002-monitor-rest-api
    name: Monitor snapshot endpoints return configured views
    go_test: TestMonitorREST_SnapshotEndpoints
    status: implemented
    description: |
      Query each configured snapshot endpoint. Each response should come from
      the monitor snapshot. Labels should use only allowed low-cardinality
      attributes. JSON field names should use lower_snake_case API names, not Go
      struct field names.
    inputs:
      requested_views:
        - machine_spec
        - current_state
        - tools
        - per_tool_metrics
        - aggregate_metrics
        - recent_events
    expected:
      views_present: true
      labels_safe: true
      source_is_monitor_store: true
      lower_snake_case_fields: true
      go_struct_field_names_absent: [RunID, ToolName, UpdatedAt]
      openapi_schema_matches_payload_fields: true
    traces:
      - rel04.0-uc002-monitor-rest-api S3
      - srd033-monitor-rest-api AC3

  - use_case: rel04.0-uc002-monitor-rest-api
    name: Monitor event stream reads cached updates
    go_test: TestMonitorREST_EventStreamCachedUpdates
    status: implemented
    description: |
      Connect to the configured monitor event stream. Frames should reflect
      cached monitor updates and obey stream limits. Frames should use
      run_event or metric_sample event names and carry one JSON data payload
      shaped like the cached recent event or recent sample. A disconnect should
      clean up the subscription without changing agent state.
    inputs:
      subscribers: 2
      store_updates: [state_change, metric_sample, diagnostic]
    expected:
      frames_from_cached_updates: true
      event_names: [run_event, metric_sample]
      frame_payloads_are_json: true
      frame_payload_shape_matches_cached_views: true
      workflow_signals_created: false
      disconnect_changes_agent_state: false
    traces:
      - rel04.0-uc002-monitor-rest-api S4
      - srd033-monitor-rest-api AC4

  - use_case: rel04.0-uc002-monitor-rest-api
    name: Monitor REST failures stay observational
    go_test: TestMonitorREST_FailureDoesNotMutateState
    status: implemented
    description: |
      Force a handler failure and a redaction failure. The response should be a
      structured REST error with redacted diagnostics. Command results should
      remain unchanged. Monitor store state and MachineSpec state should remain
      unchanged too.
    inputs:
      failures: [handler_failed, redaction_failed]
    expected:
      structured_error: true
      command_signal_changed: false
      monitor_store_mutated: false
      machine_state_changed: false
    traces:
      - rel04.0-uc002-monitor-rest-api S5
      - srd033-monitor-rest-api AC5
