rest:
  version: v1
  auth:
    none:
      type: none
  limits:
    local_deployment_client:
      timeout: 130s
      read_timeout: 130s
      max_request_bytes: 1048576
      max_response_bytes: 1048576
      redirect:
        mode: none
      network:
        schemes: [http]
        # The deployment-API host is the egress allowlist entry; a values-driven deploy
        # sets PROVISIONER_HOST to the provisioner Service DNS name, defaulting to
        # loopback locally.
        hosts: [${PROVISIONER_HOST:-127.0.0.1}]
        ports: [18090]
    local_chroma_client:
      # The creator reads the collection count before and after the child to report
      # that run's contribution (srd005 R3.1). Read-only: the corpus-ingest child
      # does the writing, and the creator declares no add or delete operation.
      timeout: 30s
      read_timeout: 30s
      max_request_bytes: 16384
      max_response_bytes: 65536
      redirect:
        mode: none
      network:
        schemes: [http]
        hosts: [${CHROMA_HOST:-127.0.0.1}]
        ports: [8000]
    local_creator_instance:
      timeout: 130s
      read_timeout: 130s
      max_request_bytes: 1048576
      max_response_bytes: 1048576
      redirect:
        mode: none
      network:
        schemes: [http]
        hosts: [127.0.0.1, localhost]
        ports: [18110]
        allow_public_listener: true
    local_creator_control:
      timeout: 30s
      read_timeout: 5s
      max_request_bytes: 16384
      max_response_bytes: 65536
      redirect:
        mode: none
      network:
        schemes: [http]
        hosts: [127.0.0.1, localhost]
        ports: [18111]
        allow_public_listener: true
    local_creator_monitor:
      timeout: 5s
      read_timeout: 5s
      max_request_bytes: 4096
      max_response_bytes: 1048576
      redirect:
        mode: none
      network:
        schemes: [http]
        hosts: [127.0.0.1, localhost]
        ports: [18112]
        allow_public_listener: true

  clients:
    deployment_api:
      # The creator alone holds the deployment-API authority (srd005 R5.1): it is the
      # only agent in the mesh that declares a deployment-API client (the chatbot and
      # coordinator declare none). The bearer credential is deployment-realized -- the
      # creator's pod mounts the deployment-API Secret and the provisioner enforces the
      # token -- rather than resolved in the declarative runtime, which carries no
      # credential resolver. No runtime input supplies the endpoint or the credential.
      base_url: ${DEPLOYMENT_API_URL:-http://127.0.0.1:18090}
      auth_ref: none
      limits_ref: local_deployment_client
      operations:
        apply_instance:
          # Realize the decided operation by driving the deployment API's apply path
          # (srd005 R3). The creator forwards the coordinator's decided values-plane
          # document as the versioned apply request content (srd006 R1.4); it authors
          # no values decision (srd005 R2.2). No endpoint or credential for a running
          # agent is sent; the executor validates the content against the chart schema.
          method: POST
          path: /provisioning/api/apply
          params:
            body_schema:
              type: object
              properties:
                content: {type: string}
            body_source: previous_result
            input_mapping:
              content: $.content
          body:
            schema_version: "1"
            content: "{{ params.content }}"
          success: {status: [200], signal: InstanceApplied}
          response:
            output: {}
          side_effects:
            - kind: external_api
              target: deployment_api.apply
              state: instance_applied
          reversibility:
            classification: compensatable
            undo: apply_instance
        read_rollout:
          # Verify the instance's health through the deployment API's rollout read
          # (srd005 R4.1) before reporting the operation complete. The rollout
          # response carries the phase and the Deployment's counts (srd006 R1.4,
          # R3.3); all four travel on so the panel renders what it declares. A
          # read the executor could not serve answers 502, which is outside the
          # declared success status and so emits CommandError rather than a
          # phase.
          method: GET
          path: /provisioning/api/rollout
          params:
            body_source: none
          success: {status: [200], signal: HealthReported}
          response:
            output:
              health: $.phase
              ready: $.ready
              desired: $.desired
              revision: $.revision
          side_effects:
            - kind: external_api
              target: deployment_api.rollout
              state: read_only
          reversibility:
            classification: reversible
            undo: noop
        read_state:
          # Read the deployed mesh view through the deployment API's state read
          # (srd006 R1.5), so the provisioning panel's initial load is served by
          # the creator rather than 404ing. The state_response contract is flat
          # (srd006 deployment_api_contract): machine_request response bodies map
          # one selector per named field, so these fields travel through
          # unchanged rather than being regrouped into a nested object at this
          # hop. A read the executor could not serve answers 502, which is
          # outside the declared success status and so emits CommandError rather
          # than a mapped-empty view.
          method: GET
          path: /provisioning/api/state
          params:
            body_source: none
          success: {status: [200], signal: StateReported}
          response:
            output:
              rags: $.rags
              llmInCluster: $.llmInCluster
              llmExternalURL: $.llmExternalURL
              llmChatModel: $.llmChatModel
              llmEmbedModel: $.llmEmbedModel
              llmChatModels: $.llmChatModels
              llmRouterModel: $.llmRouterModel
              llmTopology: $.llmTopology
              paramsNResults: $.paramsNResults
              paramsChunkCap: $.paramsChunkCap
              paramsRouterDefault: $.paramsRouterDefault
          side_effects:
            - kind: external_api
              target: deployment_api.state
              state: read_only
          reversibility:
            classification: reversible
            undo: noop

    chroma:
      # The vector store the corpus-ingest child writes into. The creator reads it
      # before and after the child to report the run's contribution (srd005 R3.1)
      # rather than trusting the child's exit code or the accumulated collection
      # total: a run can exit zero having written nothing.
      base_url: ${CHROMA_URL:-http://127.0.0.1:8000}
      auth_ref: none
      limits_ref: local_chroma_client
      operations:
        resolve_ingest_collection:
          # Resolve the collection the child ingested into, to its id. get_or_create
          # keeps the read total: a collection the child never created resolves to an
          # empty one and counts zero, rather than failing as a missing resource.
          #
          # The name is the corpus-ingest profile's own configured collection, which
          # that profile hardcodes (agents/corpus-ingest/corpus-rest.yaml). It is not
          # per-request: agent-core exec tools pass no environment, so the child
          # cannot be told a different collection at invocation. Ingesting into a
          # caller-named collection needs the child profile parameterized first, and
          # is tracked separately.
          method: POST
          path: /api/v2/tenants/default_tenant/databases/default_database/collections
          params:
            body_source: previous_result
            input_mapping: {}
          body:
            name: corpus
            get_or_create: true
          success: {status: [200, 201], signal: CollectionResolved}
          response:
            output:
              collection_id: $.id
          side_effects:
            - kind: external_api
              target: chroma.collection
              state: read_only
          reversibility:
            classification: reversible
            undo: noop
        count_ingested_documents:
          # Chroma answers this with a bare integer, which agent-core cannot decode
          # into an object, so it lands under `raw` as a string (client_response.go
          # decodeResponsePayload). The count therefore travels as a string and the
          # value predicate coerces both reads to numbers.
          #
          # Both the pre-run and post-run words invoke this operation. Their
          # immediately preceding results differ, so the collection id is selected
          # from the earlier resolve through command state rather than from the
          # previous result (agent-core srd038).
          method: GET
          path: /api/v2/tenants/default_tenant/databases/default_database/collections/{collection}/count
          params:
            path:
              collection: {type: string}
            body_source: command_state
            input_mapping:
              collection: $from(resolve_ingest_collection).mapped.collection_id
          success: {status: [200], signal: DocumentsCounted}
          response:
            output:
              count: $.raw
          side_effects:
            - kind: external_api
              target: chroma.count
              state: read_only
          reversibility:
            classification: reversible
            undo: noop

  servers:
    creator_instance:
      # The instance endpoint is served on its own service and port, reached only by
      # the coordinator (srd005 R1). It accepts a declared operation and SHALL NOT
      # accept an already-resolved endpoint or credential from the coordinator; no
      # runtime input supplies transport authority.
      address: ${CREATOR_BIND_HOST:-127.0.0.1}:18110
      limits_ref: local_creator_instance
      endpoints:
        instance:
          method: POST
          path: /api/v1/instance
          binding: machine_request
          request:
            # The coordinator's rollout operation carries the decided values-plane
            # document as content (srd006 R1.4); the creator forwards it to the
            # executor apply.
            #
            # content is required, because every operation this endpoint realizes
            # goes through apply_instance, whose body is {schema_version, content}.
            # It was optional until GH-755, on the premise that a non-rollout
            # operation (an ingest) would omit it -- but no leg realizes such an
            # operation: the creator declares one client (deployment_api) and the
            # machine drives apply_instance on Seed whatever the operation says.
            # A request without content therefore died inside request rendering
            # ("body field \"content\" must be string") and surfaced as an opaque
            # 500, which is what broke mage integration:controlPlane. Declaring it
            # required turns that into a 400 the caller can read. The corpus-ingest
            # child run srd005 R3.1 specifies is not implemented; it is tracked
            # separately and needs its own leg and endpoint, not a values apply
            # with a missing field.
            body_schema:
              type: object
              required: [operation, content]
              properties:
                operation: {type: string}
                role: {type: string}
                directory: {type: string}
                collection: {type: string}
                content: {type: string}
          machine_request:
            profile: profile.yaml
            machine: request-machine.yaml
            timeout: 130s
            request:
              body:
                operation: $.operation
                role: $.role
                directory: $.directory
                collection: $.collection
                content: $.content
            response:
              terminal_signals:
                HealthReported:
                  status: 200
                  content_type: application/json
                  body:
                    status: healthy
                    health: $.mapped.health
                CommandError:
                  status: 500
                  content_type: application/json
                  body:
                    error: command_error
                    stage: $.failure_stage
                    message: $.message
                    operation: $.operation
        rollout:
          # The rollout status the coordinator polls while a reconfiguration runs,
          # so it can aggregate progress for the provisioning panel (srd004 R1.3).
          # Reached by the coordinator, not a browser: the creator exposes no
          # browser-facing surface (srd005 R5.4). GH-684.
          method: GET
          path: /api/v1/rollout
          binding: machine_request
          machine_request:
            profile: profile.yaml
            machine: request-machine.yaml
            timeout: 15s
            # SeedHealth runs the verify leg alone. A poll is a read: it applies
            # nothing and mutates no instance state.
            initial_signal: SeedHealth
            request:
              body: {}
            response:
              # Keyed by terminal state. A read that fails must not arrive as a
              # successful unknown phase, so Failed is its own response rather than
              # collapsing into the 200 (agent-core srd030 R4.6, GH-615).
              terminal_states:
                HealthReported:
                  status: 200
                  content_type: application/json
                  body:
                    schema_version: "1"
                    phase: $.mapped.health
                    ready: $.mapped.ready
                    desired: $.mapped.desired
                    revision: $.mapped.revision
                Failed:
                  status: 502
                  content_type: application/json
                  body:
                    error: rollout_read_failed
                    stage: $.failure_stage
                    message: $.message
        ingest:
          # The corpus-ingest child run the coordinator delegates (srd004 R2.1,
          # srd005 R3.1). Its own endpoint rather than an operation on /instance,
          # because initial_signal is per-endpoint: the machine cannot branch on a
          # body field, which is why an ingest posted at /instance could only ever
          # take the values-apply leg (GH-755).
          method: POST
          path: /api/v1/ingest
          binding: machine_request
          request:
            body_schema:
              type: object
              required: [directory]
              properties:
                directory: {type: string}
                collection: {type: string}
          machine_request:
            profile: profile.yaml
            machine: request-machine.yaml
            timeout: 600s
            initial_signal: SeedIngest
            request:
              body:
                # The directory becomes the child's workspace; the corpus-ingest
                # profile roots its document resource there. collection is accepted
                # so the coordinator's declared intent stays whole, but it does not
                # reach the child: agent-core exec tools pass no environment, and
                # the child profile hardcodes its collection name. Ingesting into a
                # caller-named collection needs that profile parameterized first.
                directory: $.directory
            response:
              # Keyed by terminal state. The child-run and Chroma words emit a fixed
              # signal vocabulary, so signal keying could not separate a failed child
              # from an unreadable collection (agent-core srd030 R4.6, GH-615).
              #
              # IngestRejected is a 422 and IngestFailed a 500, which is the
              # distinction the coordinator's declared failure mapping needs: a run
              # that wrote nothing is the caller's source falling short, while a
              # child that could not run, or a collection that could not be read,
              # is ours. A count that will not resolve reaches IngestFailed, not
              # IngestRejected -- a broken read is not an empty corpus.
              terminal_states:
                Ingested:
                  status: 200
                  content_type: application/json
                  body:
                    schema_version: "1"
                    status: ingested
                    # The predicate's left operand is the post-run collection
                    # count it judged, kept raw and selectable by srd041 R4.4.
                    count: $.left
                    status_detail: documents were written
                IngestRejected:
                  status: 422
                  content_type: application/json
                  body:
                    schema_version: "1"
                    status: rejected
                    error: ingest_shortfall
                    count: "0"
                IngestFailed:
                  status: 500
                  content_type: application/json
                  body:
                    schema_version: "1"
                    status: ingest_failed
                    error: ingest_failed
        state:
          # The deployed mesh view the coordinator carries to the provisioning
          # panel's initial load (srd006 R1.5). Reached by the coordinator, not a
          # browser: the creator exposes no browser-facing surface (srd005 R5.4).
          method: GET
          path: /api/v1/state
          binding: machine_request
          machine_request:
            profile: profile.yaml
            machine: request-machine.yaml
            timeout: 15s
            # SeedState runs the read_state leg alone. A read: it applies nothing
            # and mutates no instance state.
            initial_signal: SeedState
            request:
              body: {}
            response:
              # Keyed by terminal state. A read that fails must not arrive as a
              # successful mapped-empty view (agent-core srd030 R4.6, GH-615).
              # The fields are flat, matching the executor's state_response
              # contract: machine_request response bodies map one selector per
              # named field, so they travel through unchanged rather than being
              # regrouped into a nested object at this hop (GH-753).
              terminal_states:
                StateReported:
                  status: 200
                  content_type: application/json
                  body:
                    schema_version: "1"
                    rags: $.mapped.rags
                    llmInCluster: $.mapped.llmInCluster
                    llmExternalURL: $.mapped.llmExternalURL
                    llmChatModel: $.mapped.llmChatModel
                    llmEmbedModel: $.mapped.llmEmbedModel
                    llmChatModels: $.mapped.llmChatModels
                    llmRouterModel: $.mapped.llmRouterModel
                    llmTopology: $.mapped.llmTopology
                    paramsNResults: $.mapped.paramsNResults
                    paramsChunkCap: $.mapped.paramsChunkCap
                    paramsRouterDefault: $.mapped.paramsRouterDefault
                Failed:
                  status: 502
                  content_type: application/json
                  body:
                    error: state_read_failed
                    stage: $.failure_stage
                    message: $.message

    creator_control:
      address: ${CREATOR_BIND_HOST:-127.0.0.1}:18111
      limits_ref: local_creator_control
      queue:
        name: creator_control
        capacity: 8
        timeout: 30s
      shutdown:
        timeout: 5s
        drain_policy: drain_then_stop
      endpoints:
        exit:
          method: POST
          path: /api/lifecycle/exit
          binding: emit_signal
          signal: ExitRequested
          request:
            body_schema:
              type: object
              properties:
                reason: {type: string}
                status: {type: string}
          response:
            output:
              accepted: "true"
        health:
          method: GET
          path: /api/lifecycle/health
          binding: health

    monitor:
      address: ${CREATOR_BIND_HOST:-127.0.0.1}:18112
      limits_ref: local_creator_monitor
      queue:
        name: creator_monitor
        capacity: 8
        overflow: reject
        timeout: 100ms
      shutdown:
        timeout: 2s
        drain_policy: drain
        stop_listeners: true
        unblock_await_signal: ServerStopped
      endpoints:
        machine_spec:  {method: GET, path: /monitor/machine,       binding: read_state,    monitor_view: machine_spec}
        current_state: {method: GET, path: /monitor/state,         binding: read_state,    monitor_view: current_state}
        tools:         {method: GET, path: /monitor/tools,         binding: read_state,    monitor_view: tools}
        metrics:       {method: GET, path: /monitor/metrics,       binding: read_state,    monitor_view: metrics}
        recent_events: {method: GET, path: /monitor/events,        binding: read_state,    monitor_view: events}
        event_stream:  {method: GET, path: /monitor/events/stream, binding: stream_events, monitor_view: events}
        control_exit:
          method: POST
          path: /monitor/control/exit
          binding: emit_signal
          signal: ExitRequested
          request:
            body_schema:
              type: object
              properties:
                reason: {type: string}
          response:
            output:
              accepted: "true"
