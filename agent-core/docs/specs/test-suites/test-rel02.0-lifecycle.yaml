id: test-rel02.0-lifecycle
title: Test Suite for Release 02.0 Rollback Lifecycle
release: "02.0"

traces:
  - rel02.0-uc001-approval-suspend-resume
  - rel02.0-uc002-history-rollback

preconditions:
  - Lifecycle features can be configured with nil stores for disabled-mode scenarios.
  - A temporary FileStore root is available for StateStore round-trip scenarios.
  - A temporary git repository top-level is available for GitWorkspace scenarios.
  - Test commands can model no-op, command/domain restore, workspace restore, and compensating-action undo behavior.

test_cases:
  - use_case: rel02.0-uc001-approval-suspend-resume
    name: Disabled lifecycle preserves existing loop behavior
    go_test: TestLoop_NilRollbackParamsPreserveBehavior
    status: done
    description: |
      Run a simple machine with StateStore, Workspace, and CheckpointPolicy unset.
      Expected behavior is completion without checkpoint writes, history persistence, or
      workspace ref mutations.
    inputs:
      lifecycle: disabled
      machine: simple_success
      state_store: nil
      workspace: nil
      checkpoint_policy: nil
    expected:
      status: succeeded
      checkpoint_writes: 0
      persisted_history_entries: 0
      workspace_checkpoint_calls: 0
    traces:
      - srd025-rollback-lifecycle AC6

  - use_case: rel02.0-uc001-approval-suspend-resume
    name: FileStore persists and lists checkpoint JSON
    go_test: TestFileStoreSaveLoadListDelete
    status: done
    description: |
      Save a checkpoint through FileStore, load it by store path, list it by prefix,
      and verify the JSON agent snapshot and domain snapshot are preserved.
    inputs:
      store: FileStore
      store_path: checkpoint/run-001
      prefix: checkpoint/
    expected:
      save: ok
      load: same_checkpoint_json
      list_contains: checkpoint/run-001
      error_context: store_path_and_store_location_available
    traces:
      - srd025-rollback-lifecycle AC2

  - use_case: rel02.0-uc001-approval-suspend-resume
    name: Checkpoint separates StateStore JSON from Workspace ref
    go_test: TestCheckpointContractsCompileAndRoundTrip
    status: done
    description: |
      Build a checkpoint with AgentSnapshot, command/domain JSON, and a
      GitWorkspace ref. Verify the workspace ref is referenced but agent state
      is not serialized into git.
    inputs:
      state_layers: [agent_state, command_domain_state, workspace_environment_state]
      workspace: GitWorkspace
    expected:
      checkpoint_contains_agent_snapshot: true
      checkpoint_contains_domain_json: true
      checkpoint_contains_workspace_ref: true
      git_ref_contains_agent_json: false
    traces:
      - srd025-rollback-lifecycle AC1
      - srd025-rollback-lifecycle AC2

  - use_case: rel02.0-uc002-history-rollback
    name: GitWorkspace checkpoints and restores repository state
    go_test: TestGitWorkspaceCheckpointAndRestore
    status: done
    description: |
      In a temporary git repository top-level, mutate files, create a
      GitWorkspace checkpoint, mutate again, restore the checkpoint ref, and
      verify the filesystem returns to the checkpointed state.
    inputs:
      workspace: GitWorkspace
      repo_location: git_top_level
      mutations: [write_file_before_checkpoint, write_file_after_checkpoint]
    expected:
      checkpoint_ref: commit_sha
      current_ref: commit_sha
      restore: filesystem_matches_checkpoint
      non_top_level_config: rejected
    traces:
      - srd025-rollback-lifecycle AC2
      - srd025-rollback-lifecycle AC4

  - use_case: rel02.0-uc002-history-rollback
    name: Command undo categories restore owned state
    go_test: TestNoopUndoReturnsSuccessfulResult, TestRollbackCombinesInMemoryUndoAndGitWorkspaceRestore
    status: done
    description: |
      Execute representative commands for each undo category, then invoke
      Undo. No-op commands return ToolDone without mutation; conversation and
      domain commands restore snapshots; workspace commands restore refs; and
      compensating commands report their compensating action.
    inputs:
      commands:
        - read_only_noop
        - conversation_append
        - domain_state_mutation
        - workspace_file_write
        - external_compensating_action
    expected:
      noop_undo_signal: ToolDone
      conversation_restored: true
      domain_state_restored: true
      workspace_ref_restored: true
      compensating_action_reported: true
    traces:
      - srd025-rollback-lifecycle AC3
      - srd025-rollback-lifecycle AC6

  - use_case: rel02.0-uc002-history-rollback
    name: History records dispatch entries for rollback target selection
    go_test: TestLoop_HistoryRecordsDispatchesWhenPolicyEnabled
    status: done
    description: |
      Execute a multi-step machine with history enabled. Verify each
      HistoryEntry includes iteration, timestamp, command name, from/to state,
      input signal, result signal, result summary, and optional workspace ref.
    inputs:
      history_recording: enabled
      commands: [read, edit, test]
    expected:
      history_order: dispatch_order
      entries_include_required_fields: true
      target_iteration_can_be_selected: true
    traces:
      - srd025-rollback-lifecycle AC3

  - use_case: rel02.0-uc002-history-rollback
    name: Rollback traverses history backward to target iteration
    go_test: TestRollbackCallsUndoInReverseOrder, TestRollbackRestoresTargetWorkspaceRef
    status: done
    description: |
      Given a recorded history with command/domain and workspace mutations,
      roll back from the current iteration to a target iteration. Runtime
      should call Command.Undo in reverse dispatch order and restore Workspace
      to the target ref.
    inputs:
      current_iteration: 5
      target_iteration: 2
      history: five_entries_with_workspace_refs
    expected:
      undo_order: [iteration_5, iteration_4, iteration_3]
      workspace_restored_to: iteration_2_ref
      returned_state: iteration_2_to_state
    traces:
      - srd025-rollback-lifecycle AC4

  - use_case: rel02.0-uc001-approval-suspend-resume
    name: Approval gate suspends and resumes from checkpoint
    go_test: TestApprovalLifecycleProfileSuspendsAndResumesApproved, TestResumeFromCheckpointRestoresStateAndReentersLoop
    status: done
    description: |
      Route a machine through an approval-gate tool that emits a suspend
      signal. Verify the run exits as suspended after persisting a checkpoint,
      then resumes after an approved signal by restoring StateStore and
      Workspace state.
    inputs:
      machine_state: AwaitingApproval
      approval_outcome: approved
      checkpoint_store: FileStore
      workspace: GitWorkspace
    expected:
      first_run_status: suspended
      checkpoint_saved: true
      resume_validates_machine_and_tools: true
      workspace_restored_before_resume: true
      resumed_signal: approved
    traces:
      - srd024-blocking-input-tools AC2
      - srd025-rollback-lifecycle AC5

  - use_case: rel02.0-uc001-approval-suspend-resume
    name: Resume reports checkpoint and restore failure classes
    go_test: TestResumeFromCheckpointMissingCheckpointError, TestResumeFromCheckpointIncompatibleCheckpointError, TestResumeFromCheckpointRestoreErrorsAreClassified
    status: done
    description: |
      Attempt resume with missing checkpoint, incompatible checkpoint,
      command/domain restore failure, and workspace restore failure. Each
      failure class should be reported distinctly.
    inputs:
      resume_failures:
        - missing_checkpoint
        - incompatible_checkpoint
        - domain_restore_failure
        - workspace_restore_failure
    expected:
      missing_checkpoint_error: explicit
      incompatible_checkpoint_error: explicit
      domain_restore_error: explicit
      workspace_restore_error: explicit
    traces:
      - srd025-rollback-lifecycle AC5

  - use_case: rel02.0-uc002-history-rollback
    name: Partial rollback reports remaining state after failure
    go_test: TestRollbackReportsPartialFailureAndContinues
    status: done
    description: |
      Force a Command.Undo failure during rollback. Rollback reporting should
      identify the failing command, whether workspace restore was attempted,
      and what state remains for operator recovery.
    inputs:
      failing_undo_iteration: 4
      target_iteration: 2
    expected:
      status: partial_rollback_failed
      failing_component: command_undo
      command_name_reported: true
      remaining_state_reported: true
    traces:
      - srd025-rollback-lifecycle AC4

  - use_case: rel02.0-uc002-history-rollback
    name: Lifecycle history profile dispatches checkpoint_history
    go_test: TestLifecycleProfilesValidateMachineWiring
    status: done
    description: |
      Invoke the history lifecycle program through its profile. Confirm the
      profile loads the lifecycle MachineSpec, selects checkpoint_history, and
      registers the builtin adapter before the machine dispatches the action.
    inputs:
      profile: agents/lifecycle/history/profile.yaml
      tool_selection: agents/lifecycle/tools.yaml
      selected_tool: checkpoint_history
      state_store: FileStore
    expected:
      profile_loaded: true
      machine_action: checkpoint_history
      selected_as_builtin: true
      hidden_cli_subcommand_used: false
    traces:
      - srd025-rollback-lifecycle AC7
      - srd026-lifecycle-tools AC1
      - srd026-lifecycle-tools AC5

  - use_case: rel02.0-uc002-history-rollback
    name: Lifecycle rollback profile dispatches checkpoint_rollback
    go_test: TestLifecycleProfilesValidateMachineWiring
    status: done
    description: |
      Run the rollback lifecycle program through its profile. Confirm the
      profile loads the rollback MachineSpec, selects checkpoint_rollback, and
      registers the builtin adapter before the machine dispatches the action.
    inputs:
      profile: agents/lifecycle/rollback/profile.yaml
      tool_selection: agents/lifecycle/tools.yaml
      selected_tool: checkpoint_rollback
      state_store: FileStore
      workspace: GitWorkspace
    expected:
      profile_loaded: true
      machine_action: checkpoint_rollback
      selected_as_builtin: true
      hidden_cli_subcommand_used: false
    traces:
      - srd025-rollback-lifecycle AC7
      - srd026-lifecycle-tools AC1
      - srd026-lifecycle-tools AC5

  - use_case: rel02.0-uc002-history-rollback
    name: checkpoint_history formats selected checkpoint history
    go_test: TestCheckpointHistoryExecuteFormatsLatestCheckpoint
    status: done
    description: |
      With a FileStore containing an older checkpoint and a newer checkpoint,
      call checkpoint_history with the default latest selector. It
      should resolve the latest checkpoint, load it, format the digest, and
      return ToolDone.
    inputs:
      tool: checkpoint_history
      checkpoint_selector: latest
      state_store: FileStore
      checkpoints: [older, newer]
    expected:
      signal: ToolDone
      resolved_checkpoint: newer
      output_contains_history_digest: true
      side_effects: none
      undo: noop
    traces:
      - srd025-rollback-lifecycle AC7
      - srd026-lifecycle-tools AC2

  - use_case: rel02.0-uc002-history-rollback
    name: checkpoint_history reports missing StateStore
    go_test: TestCheckpointHistoryExecuteRequiresStateStore
    status: done
    description: |
      Call checkpoint_history without a StateStore. Expected behavior should
      return CommandError and leave checkpoint and workspace state unchanged.
    inputs:
      tool: checkpoint_history
      state_store: nil
    expected:
      signal: CommandError
      error_class: missing_state_store
      checkpoint_mutation: none
      workspace_restore_attempted: false
    traces:
      - srd026-lifecycle-tools AC2
      - srd026-lifecycle-tools AC6

  - use_case: rel02.0-uc002-history-rollback
    name: checkpoint_rollback creates rollback checkpoint
    go_test: TestCheckpointRollbackExecutePersistsNewCheckpoint
    status: done
    description: |
      Use a persisted checkpoint with history entries and run
      checkpoint_rollback with a target iteration. Adapter behavior should delegate
      traversal to core rollback operations, persist a new checkpoint, and
      return a summary with the original checkpoint, target iteration, and new
      checkpoint ID.
    inputs:
      tool: checkpoint_rollback
      checkpoint_selector: latest
      to_iteration: 2
      state_store: FileStore
      workspace: nil
    expected:
      signal: ToolDone
      rollback_delegated_to_core: true
      new_checkpoint_written: true
      output_names_original_and_new_checkpoint: true
      undo: compensatable
    traces:
      - srd025-rollback-lifecycle AC4
      - srd025-rollback-lifecycle AC7
      - srd026-lifecycle-tools AC3

  - use_case: rel02.0-uc002-history-rollback
    name: checkpoint_rollback reports missing target iteration
    go_test: TestCheckpointRollbackExecuteRequiresTargetIteration
    status: done
    description: |
      Omit to_iteration when running checkpoint_rollback. Validation should
      reject the request before traversal and return CommandError.
    inputs:
      tool: checkpoint_rollback
      checkpoint_selector: latest
      to_iteration: null
      state_store: FileStore
    expected:
      signal: CommandError
      error_class: missing_target_iteration
      rollback_traversal_started: false
      new_checkpoint_written: false
    traces:
      - srd026-lifecycle-tools AC3
      - srd026-lifecycle-tools AC4
      - srd026-lifecycle-tools AC6

  - use_case: rel02.0-uc002-history-rollback
    name: checkpoint_rollback refuses unmanaged workspace ref
    go_test: TestCheckpointRollbackExecuteRequiresManagedWorkspaceForRef
    status: done
    description: |
      Submit checkpoint data that names a
      WorkspaceRef while no managed workspace directory is configured. This
      adapter should refuse the rollback rather than skip workspace restore.
    inputs:
      tool: checkpoint_rollback
      checkpoint_selector: latest
      to_iteration: 2
      state_store: FileStore
      workspace_ref_present: true
      workspace: nil
    expected:
      signal: CommandError
      error_class: unmanaged_workspace_ref
      workspace_restore_skipped_as_success: false
      new_checkpoint_written: false
    traces:
      - srd025-rollback-lifecycle AC2
      - srd025-rollback-lifecycle AC4
      - srd026-lifecycle-tools AC3
      - srd026-lifecycle-tools AC6
