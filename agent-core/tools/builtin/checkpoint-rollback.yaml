tools:
- name: checkpoint_rollback
  type: builtin
  contract: migrated
  init: checkpoint_rollback
  visibility: internal
  emits:
  - ToolDone
  - CommandError
  description: Roll back a run to a target step by reverting the Dolt branch and replaying receipts.
  category: boundary
  problem: |
    Operators need rollback as a machine action with explicit inputs, not as
    a special root command path.
  goals:
  - Resolve one run and target step index.
  - Revert DB-persisted state to the target step with the Dolt adapter Revert.
  - Reverse external effects by replaying each reverted entry's receipt into its tool's receipt-consuming Undo.
  requirements:
    input:
    - must receive the resolved checkpoint backend (the Dolt adapter by default).
    - must receive a run id or use latest.
    - must receive a target step index.
    output:
    - must print the run id, target step, reverted-entry count, and any skipped irreversible entries.
    side_effects:
    - must revert DB-persisted state on the run branch to the target step (DB-only).
    - reverses external effects only through each tool's receipt-consuming Undo; effects with no sufficient receipt are not reverted.
    undo:
    - must document that rollback recovery requires an operator-selected step.
    errors:
    - must fail when the target step is invalid, Revert fails, or a receipt-walk Undo fails.
  non_goals:
  - Does not resume the agent after rollback.
  - Does not revert files, HTTP, or workspace effects inside the Dolt adapter; Revert is DB-only and external effects are reversed only through tool receipts.
  parameters:
    type: object
    properties:
      run:
        type: string
        description: Run id, or latest.
        default: latest
      to_step:
        type: integer
        description: Target execution step index.
    required:
    - to_step
  output:
    description: Rollback result summary.
    schema:
      type: object
      properties:
        run:
          type: string
        target_step:
          type: integer
        reverted_entries:
          type: integer
        skipped_irreversible:
          type: array
          items:
            type: string
      required:
      - run
      - target_step
      - reverted_entries
  side_effects:
  - kind: state_mutation
    target: checkpoint_backend
    state: run_branch_reverted
    description: Reverts DB-persisted state on the run branch to the target step commit (Dolt Revert). DB-only.
  - kind: child_tool_execution
    target: tool_receipts
    state: external_effects_reversed
    description: Replays each reverted entry's restored, receipt-bearing Result into its tool's receipt-consuming Undo to reverse external effects; irreversible entries are skipped and logged.
  reversibility:
    classification: compensatable
    undo: compensating_action
    receipt: compensatable_boundary_compensation
    requires_confirmation: true
  undo:
    strategy: compensating_action
    description: Operator can choose another target step or resume from the run's latest state; external audit history cannot be erased.
    payload: boundary_compensation
    captures:
    - run
    - target_step
    requires:
    - run
    - operator_decision
  errors:
  - signal: CommandError
    condition: rollback fails to resolve the run/step, revert the branch, or replay a receipt-consuming Undo
    message_shape: "rollback <component>: <error>"
    state_after_failure: the run branch is reverted, but a failed receipt-walk Undo may leave some external effects unreversed; the report names them
  relationships:
    before:
    - checkpoint_history
    after: []
    overlaps:
    - tool: checkpoint_history
      difference: "checkpoint_rollback reverts the run branch and replays receipts; checkpoint_history only reads Dolt commit history."
