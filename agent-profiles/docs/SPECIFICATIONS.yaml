id: agent-profiles-specifications
title: Agent Profiles Specification Index

overview: |
  This index starts the specification corpus for profile-owned agent assets.
  Foundation documents come first because the migration needs a stable
  ownership boundary before assets move.

  The first SRD defines migrated profile families as functional blocks. Semantic
  models describe role boundaries, dependency directions, and validation views.
  Later issues add use cases, test suites, and validation specs as profile
  families leave agent-core.

roadmap_summary:
  - version: "00.1"
    name: Repository bootstrap
    status: in_progress
    scope: |
      Replace the template README and add the foundation docs needed for future
      structured Beads issues.
  - version: "06.0"
    name: External agent profiles and mounted runtime assets
    status: planned
    scope: |
      Move profile-owned agent assets, demos, and integration fixtures into
      this repository. agent-core consumes them from AGENT_PROFILES_ROOT,
      /profiles, or release bundles.

foundation_document_index:
  - id: agent-profiles
    title: Agent Profiles Repository Vision
    summary: Goals, boundaries, ownership, and success criteria for external
      profile assets.
    path: docs/VISION.yaml
  - id: architecture-agent-profiles
    title: Agent Profiles Architecture
    summary: Repository layout, runtime mount interfaces, ownership decisions,
      and implementation status.
    path: docs/ARCHITECTURE.yaml
  - id: agent-profiles-roadmap
    title: Agent Profiles Release Road Map
    summary: Bootstrap and migration release plan.
    path: docs/road-map.yaml
  - id: issue-format
    title: Issue Format Constitution
    summary: Required Beads issue fields and scope rules for future work.
    path: docs/constitutions/issue-format.yaml

srd_index:
  - id: srd001-agent-functional-blocks
    title: Agent Functional Blocks
    summary: Requirements for generator, evaluator, planner, jurist, bench,
      REST, monitor, lifecycle, control, and Knowledge Manager profiles as
      configured functional blocks.
    status: planned
    path: docs/specs/software-requirements/srd001-agent-functional-blocks.yaml

config_format_index: []

semantic_model_index:
  - id: sm-multi-agent-profile-system
    title: Multi-Agent Profile System
    summary: Role groups, actor boundaries, dependency directions, and
      validation views for profile-owned agent programs.
    path: docs/specs/semantic-models/multi-agent-profile-system.yaml
  - id: sm-agent-role-taxonomy
    title: Agent Role Taxonomy
    summary: Per-profile role, inputs, outputs, selected tool families,
      runtime dependencies, outcomes, and checks.
    path: docs/specs/semantic-models/agent-role-taxonomy.yaml

use_case_index: []

test_suite_index: []

coverage_gaps: |
  The initial SRD and semantic models describe ownership, role boundaries, and
  functional-block requirements for migrated profile families. Use cases,
  formal test suites, and validation command specs remain planned follow-up
  work.

  Beads tracks the operational proof work separately. That work covers profile
  asset migration, demo migration, integration fixture migration, profile
  validation, and mounted container execution checks.
